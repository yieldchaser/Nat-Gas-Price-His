function _renderPriceLogPage(el) {
  if (!el) el = document.getElementById('daily-table');
  if (!el) return;
  const { data, page, pageSize } = _priceLogState;
  const totalPages = Math.ceil(data.length / pageSize);
  const start = page * pageSize;
  const pageData = data.slice(start, start + pageSize);
  const allPrices = data.map(p => p.p);
  const pMin = Math.min(...allPrices), pMax = Math.max(...allPrices), pRange = pMax - pMin || 1;
  const sessionLabel = data.length >= 8000 ? data.length + '+ SESSIONS' : data.length + ' sessions';
  const th = (label, extra) => '<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;' + (label === 'Date' ? 'text-align:left;' : '') + (extra || '') + '">' + label + '</th>';
  let html = '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;flex-wrap:wrap;gap:4px;">' +
    '<span class="card-title" style="margin-bottom:0;">Price Log &mdash; NG=F · <span style="color:var(--accent-hh);">' + sessionLabel + '</span></span>' +
    '<div style="display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">' +
    '<button onclick="_priceLogPage(-1)" style="background:var(--bg-primary);border:1px solid var(--border);color:var(--text-secondary);border-radius:4px;padding:2px 8px;cursor:pointer;font-family:var(--font-mono);font-size:12px;" ' + (page === 0 ? 'disabled' : '') + '>&#9664; Prev</button>' +
    '<span>Page ' + (page + 1) + ' / ' + totalPages + '</span>' +
    '<button onclick="_priceLogPage(1)" style="background:var(--bg-primary);border:1px solid var(--border);color:var(--text-secondary);border-radius:4px;padding:2px 8px;cursor:pointer;font-family:var(--font-mono);font-size:12px;" ' + (page >= totalPages - 1 ? 'disabled' : '') + '>Next &#9654;</button>' +
    '</div></div>';
  html += '<div style="overflow-y:auto;max-height:420px;"><table><thead><tr>' + th('Date') + th('Close') + th('Day \u0394%') + th('Range') + '</tr></thead><tbody>';
  pageData.forEach((pt, i) => {
    const globalIdx = start + i;
    const prevPt = globalIdx < data.length - 1 ? data[globalIdx + 1] : pt;
    const delta = (pt.p - prevPt.p) / prevPt.p * 100;
    const barW = ((pt.p - pMin) / pRange * 56).toFixed(1);
    html += '<tr>' +
      '<td style="text-align:left;">' + formatDailyDate(pt.date) + '</td>' +
      '<td style="font-family:var(--font-mono);">$' + pt.p.toFixed(3) + '</td>' +
      '<td class="' + (delta >= 0 ? 'positive' : 'negative') + '">' + (globalIdx === data.length - 1 ? '\u2014' : (delta >= 0 ? '+' : '') + delta.toFixed(2) + '%') + '</td>' +
      '<td><div style="width:' + barW + 'px;height:3px;background:var(--accent-hh);border-radius:2px;opacity:0.55;"></div></td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function _priceLogPage(dir) {
  const totalPages = Math.ceil(_priceLogState.data.length / _priceLogState.pageSize);
  _priceLogState.page = Math.max(0, Math.min(totalPages - 1, _priceLogState.page + dir));
  _renderPriceLogPage();
}

</script>

<script>
// ─── DAILY TRACKER UPGRADE 6: MONTHLY SEASONALITY + ANNUAL PERFORMANCE ───────

function _renderMonthlySeasonality(data) {
  const el = document.getElementById('daily-seasonality');
  if (!el || data.length < 50) {
    if (el) el.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">Need more data for seasonality</div>';
    return;
  }

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthReturns = Array.from({length:12}, () => []);
  const monthYearCounts = Array.from({length:12}, () => ({ pos: 0, total: 0 }));

  // Build a map of (year, month) -> { last close price } using correct field: pt.close ?? pt.p
  // Yahoo data uses pt.p for close price; fall back to pt.close if present
  const getClose = pt => (pt.close != null ? pt.close : pt.p);

  const yearlyMonthData = new Map();
  data.forEach(pt => {
    const close = getClose(pt);
    if (close == null || close <= 0) return;
    const d = new Date(pt.date + 'T00:00:00Z');
    const mo = d.getUTCMonth();   // 0 = Jan … 11 = Dec
    const yr = d.getUTCFullYear();
    const key = `${yr}-${String(mo).padStart(2,'0')}`;
    if (!yearlyMonthData.has(key)) {
      yearlyMonthData.set(key, { month: mo, year: yr, firstClose: close, lastClose: close });
    } else {
      yearlyMonthData.get(key).lastClose = close;
    }
  });

  // Sort entries chronologically so we can look up the previous month's last close
  const entries = [...yearlyMonthData.entries()].sort((a, b) => a[0].localeCompare(b[0]));

  for (let i = 1; i < entries.length; i++) {
    const [, v] = entries[i];
    const [, prev] = entries[i - 1];

    // Only use the previous month's last close as the baseline if it is the
    // immediately preceding calendar month (handles year boundaries correctly)
    const prevDate = new Date(Date.UTC(prev.year, prev.month, 1));
    const currDate = new Date(Date.UTC(v.year, v.month, 1));
    const diffMs = currDate - prevDate;
    const diffMonths = Math.round(diffMs / (1000 * 60 * 60 * 24 * 30));
    if (diffMonths !== 1) continue;   // skip gaps (e.g. missing months in data)

    if (prev.lastClose <= 0) continue;
    // Month-over-month return: this month's last close vs previous month's last close
    const ret = (v.lastClose - prev.lastClose) / prev.lastClose * 100;
    monthReturns[v.month].push(ret);
    monthYearCounts[v.month].total++;
    if (ret >= 0) monthYearCounts[v.month].pos++;
  }

  const avgs = monthReturns.map(rets => rets.length ? rets.reduce((s, r) => s + r, 0) / rets.length : 0);
  const maxAbs = Math.max(...avgs.map(Math.abs), 0.01);

  // X-axis labels: use month names directly (Jan … Dec).
  // Fixed reference dates "2024-MM-15" are used as time tokens for any
  // LightweightCharts series if this chart is later ported; for the current
  // pure-CSS rendering the MONTH_NAMES array is the authoritative label.
  let html = '<div class="card-title" style="padding:10px 14px 4px;">AVERAGE MONTHLY RETURN \u2014 NG=F <span style="font-size:10px;color:var(--text-muted);font-weight:400;">full history</span></div>' +
    '<div style="display:flex;align-items:flex-end;justify-content:space-around;padding:8px 14px 0;gap:4px;height:140px;">';

  avgs.forEach((avg, i) => {
    const pct = Math.abs(avg) / maxAbs;
    const isPos = avg >= 0;
    const barH = Math.max(4, Math.floor(pct * 80));
    const { pos, total } = monthYearCounts[i];
    // Use toFixed(2) so values like +0.049% are not rounded down to "+0.0%"
    const label = (isPos ? '+' : '') + avg.toFixed(2) + '%';
    html += '<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;" title="' + MONTH_NAMES[i] + ': ' + pos + ' of ' + total + ' months positive">' +
      '<span style="font-family:var(--font-mono);font-size:9px;color:' + (isPos ? 'var(--positive)' : 'var(--negative)') + ';">' + label + '</span>' +
      '<div style="width:100%;display:flex;flex-direction:column;justify-content:' + (isPos ? 'flex-end' : 'flex-start') + ';height:84px;">' +
        '<div style="width:100%;height:' + barH + 'px;background:' + (isPos ? 'rgba(0,255,136,0.7)' : 'rgba(255,68,85,0.7)') + ';border-radius:2px;"></div>' +
      '</div>' +
      '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">' + MONTH_NAMES[i] + '</span>' +
      '<span style="font-size:9px;color:var(--text-muted);">' + pos + '/' + total + '</span>' +
    '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

function _renderAnnualPerformance(data) {
  const el = document.getElementById('daily-annual');
  if (!el || data.length < 50) { if (el) el.innerHTML = ''; return; }

  const yearMap = new Map();
  data.forEach(pt => {
    const yr = pt.date.slice(0, 4);
    if (!yearMap.has(yr)) yearMap.set(yr, { first: pt.p, last: pt.p });
    else yearMap.get(yr).last = pt.p;
  });

  const rows = [];
  for (const [yr, {first, last}] of yearMap) {
    if (first <= 0) continue;
    rows.push({ year: yr, jan: first, dec: last, pct: (last - first) / first * 100 });
  }
  rows.sort((a, b) => b.year.localeCompare(a.year));

  // Rank by annual %
  const sorted = [...rows].sort((a, b) => b.pct - a.pct);
  sorted.forEach((r, i) => { r.rank = i + 1; });
  const byYear = new Map(rows.map(r => [r.year, r]));

  const posYears = rows.filter(r => r.pct >= 0).length;
  const allPcts = rows.map(r => r.pct);
  const avgAnn = allPcts.reduce((s, v) => s + v, 0) / allPcts.length;
  const best = sorted[0];
  const worst = sorted[sorted.length - 1];

  const th = label => '<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">' + label + '</th>';
  let html = '<div class="card-title" style="padding:10px 14px 6px;">ANNUAL PERFORMANCE \u2014 NG=F <span style="font-size:10px;color:var(--text-muted);font-weight:400;">' + rows.length + ' years</span></div>';
  html += '<div style="overflow-y:auto;max-height:360px;"><table><thead><tr>' +
    '<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;text-align:left;">Year</th>' +
    th('Jan Price') + th('Dec Price') + th('Annual \u0394%') + th('Rank') + '</tr></thead><tbody>';

  rows.forEach(r => {
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600;">' + r.year + '</td>' +
      '<td style="font-family:var(--font-mono);">$' + r.jan.toFixed(3) + '</td>' +
      '<td style="font-family:var(--font-mono);">$' + r.dec.toFixed(3) + '</td>' +
      '<td class="' + (r.pct >= 0 ? 'positive' : 'negative') + '">' + (r.pct >= 0 ? '+' : '') + r.pct.toFixed(1) + '%</td>' +
      '<td style="color:var(--text-muted);">#' + r.rank + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  html += '<div style="padding:8px 14px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;display:flex;gap:16px;flex-wrap:wrap;color:var(--text-muted);">' +
    '<span>Avg: <strong style="color:var(--text-primary);">' + (avgAnn >= 0 ? '+' : '') + avgAnn.toFixed(1) + '%</strong></span>' +
    '<span>Best: <strong style="color:var(--positive);">+' + best.pct.toFixed(1) + '% (' + best.year + ')</strong></span>' +
    '<span>Worst: <strong style="color:var(--negative);">' + worst.pct.toFixed(1) + '% (' + worst.year + ')</strong></span>' +
    '<span>Pos: <strong style="color:var(--positive);">' + posYears + '/' + rows.length + '</strong></span>' +
  '</div>';

  el.innerHTML = html;
}
</script>

<script>
// ─── GLOBAL CROSS-TAB NAVIGATION ─────────────────────────────────────────────
function navigateTo(tab, params) {
  params = params || {};
  // Map tab name to the tab button data-tab attribute
  const tabMap = {
    prices: 'prices',
    spread: 'spread',
    curve: 'curve',
    expiry: 'expiry',
    daily: 'daily',
  };
  const tabId = tabMap[tab] || tab;

  // Click the nav tab button to switch tabs (uses existing tab switching logic)
  const btn = document.querySelector('.tab-btn[data-tab="' + tabId + '"]');
  if (btn) btn.click();

  // After tab renders, apply params
  requestAnimationFrame(() => {
    if (tab === 'prices' && params.month && params.year) {
      // Update STATE.priceView directly (reliable path regardless of element IDs)
      const market = params.market || 'hh';
      STATE.priceView.instrument = market;
      STATE.priceView.month = params.month;
      STATE.priceView.year = parseInt(params.year, 10) || STATE.priceView.year;
      // Reset view window so chart shows the full contract
      STATE.priceView.rangeStart = 0;
      STATE.priceView.rangeEnd = null;
      // Re-render controls and chart
      if (typeof renderPricesControls === 'function') renderPricesControls();
      if (typeof schedulePricesChartUpdate === 'function') schedulePricesChartUpdate();
    }
  });
}

</script>

<script>
init();
</script>

</body>
