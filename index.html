function getSpreadInstrument() {
  const btn = document.querySelector('#spread-instrument-switch .segment-btn.active');
  return btn ? btn.dataset.val : 'hh';
}

function populateSpreadYears() {
  const sel = document.getElementById('spread-year');
  const front = document.getElementById('spread-front')?.value || 'Jan';
  const back = document.getElementById('spread-back')?.value || 'Feb';
  const currentVal = sel.value ? parseInt(sel.value, 10) : null;
  const instrument = getSpreadInstrument();
  const yearSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  // Live data years
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const years = [...yearSet]
    .sort((a, b) => b - a)
    .filter(y => computeSpread(front, back, y, instrument).points.length > 0);
  sel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  if (years.length) {
    sel.value = String(currentVal && years.includes(currentVal) ? currentVal : years[0]);
  }
}

function scheduleSpreadChartUpdate(immediate = false) {
  immediate = immediate === true;
  if (STATE._spreadUpdateTimer) {
    clearTimeout(STATE._spreadUpdateTimer);
    STATE._spreadUpdateTimer = null;
  }

  if (immediate) {
    updateSpreadChart();
    return;
  }

  STATE._spreadUpdateTimer = setTimeout(() => {
    STATE._spreadUpdateTimer = null;
    updateSpreadChart();
  }, 60);
}

function computeSpread(frontMonth, backMonth, year, instrument = 'hh') {
  const cacheKey = `${instrument}|${frontMonth}|${backMonth}|${year}`;
  if (STATE.spreadCache[cacheKey]) return STATE.spreadCache[cacheKey];

  const legInfo = getSpreadLegInfo(frontMonth, backMonth, year, instrument);
  const t1 = legInfo.frontTicker;
  const t2 = legInfo.backTicker;
  const d1 = instrument === 'ttf' ? getTTFContractData(t1) : getContractData(t1);
  const d2 = instrument === 'ttf' ? getTTFContractData(t2) : getContractData(t2);
  if (d1.length === 0 || d2.length === 0) {
    const empty = { points: [], stats: { min: 0, max: 0, avg: 0, count: 0 } };
    STATE.spreadCache[cacheKey] = empty;
    return empty;
  }
  // Build map for d2
  const d2map = {};
  d2.forEach(pt => { d2map[pt.d] = pt.p; });
  const spread = [];
  d1.forEach(pt => {
    if (d2map[pt.d] !== undefined) {
      spread.push({ d: pt.d, date: pt.date, value: pt.p - d2map[pt.d] });
    }
  });
  const result = {
    points: spread,
    stats: getSeriesStats(spread, point => point.value),
  };
  STATE.spreadCache[cacheKey] = result;
  return result;
}

function getSpreadReferenceMetrics(frontMonth, backMonth, year, instrument, referenceDay) {
  if (!Number.isFinite(referenceDay)) {
    return { allTime: null, avg5y: null, avg10y: null, priorYearsCount: 0, historyStart: null, historyEnd: null };
  }

  const instrumentStore = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  const yearSet = new Set();
  [frontMonth, backMonth].forEach(month => {
    if (!instrumentStore[month]) return;
    Object.keys(instrumentStore[month].contracts).forEach(ticker => {
      const yr = parseInt(ticker.slice(3), 10);
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });

  const availableYears = [...yearSet].sort((a, b) => a - b);
  const referenceRows = availableYears
    .filter(yr => yr < year)
    .sort((a, b) => b - a)
    .map(yr => {
      const spreadResult = computeSpread(frontMonth, backMonth, yr, instrument);
      if (!spreadResult.points.length) return null;
      const point = spreadResult.points.find(entry => entry.d === referenceDay);
      return point ? { yr, value: point.value } : null;
    })
    .filter(Boolean);

  const avgFor = rows => rows.length
    ? rows.reduce((sum, row) => sum + row.value, 0) / rows.length
    : null;

  return {
    allTime: avgFor(referenceRows),
    avg5y: avgFor(referenceRows.filter(row => row.yr >= year - 5)),
    avg10y: avgFor(referenceRows.filter(row => row.yr >= year - 10)),
    priorYearsCount: referenceRows.length,
    historyStart: availableYears.length ? availableYears[0] : null,
    historyEnd: availableYears.length ? availableYears[availableYears.length - 1] : null,
  };
}

function updateSpreadChart() {
  const front = document.getElementById('spread-front').value;
  const back = document.getElementById('spread-back').value;
  const year = parseInt(document.getElementById('spread-year').value);
  if (!year) return;

  const instrument = getSpreadInstrument();
  const legInfo = getSpreadLegInfo(front, back, year, instrument);
  const unit = instrument === 'ttf' ? 'EUR/MWh' : 'USD/MMBtu';
  document.getElementById('spread-desc').textContent = `${legInfo.longLabel} Calendar Spread · ${instrument === 'ttf' ? 'Dutch TTF' : 'Henry Hub'} · ${unit}`;

  const chartContainer = document.getElementById('spread-chart-container');
  const chart = createManagedChart('spread', 'main', chartContainer);
  const palette = getNeutralChartPalette();

  // Collect all years with data for selected instrument
  const allYearsSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const allYearsSorted = [...allYearsSet].sort((a, b) => b - a);

  // Init/reset visible years and range when pair/instrument changes
  const pairKey = `${instrument}|${front}|${back}`;
  if (!STATE.spreadVisibleYears || STATE.spreadPairKey !== pairKey) {
    STATE.spreadPairKey = pairKey;
    STATE.spreadView = { rangeStart: 0, rangeEnd: null };
    // Default: selected year + 4 most recent other years
    const defaults = new Set([year]);
    allYearsSorted.filter(y => y !== year).slice(0, 4).forEach(y => defaults.add(y));
    STATE.spreadVisibleYears = defaults;
  }
  // Always ensure selected year is visible
  STATE.spreadVisibleYears.add(year);
  STATE.spreadSeriesMap = new Map();

  const tableRows = [];
  let selectedSeries = null;
  let selectedLookup = new Map();
  let selectedStats = { min: 0, max: 0, avg: 0, count: 0 };
  let selectedLastPoint = null;

  // Render oldest→newest so selected year draws on top
  [...allYearsSorted].reverse().forEach(yr => {
    const spreadResult = computeSpread(front, back, yr, instrument);
    const sp = spreadResult.points;
    if (sp.length === 0) return;
    const isSelected = yr === year;
    const visible = STATE.spreadVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    const lineWidth = isSelected ? 2.5 : 1.2;
    const series = chart.addLineSeries({
      color, lineWidth,
      priceLineVisible: false,
      lastValueVisible: false,
      crosshairMarkerVisible: isSelected,
      visible,
    });
    series.setData(sp.map(pt => ({ time: dayToTime(pt.d), value: pt.value })));
    STATE.spreadSeriesMap.set(yr, series);
    if (isSelected) {
      selectedSeries = series;
      selectedLookup = new Map(sp.map(point => [timeKey(dayToTime(point.d)), point]));
      selectedStats = spreadResult.stats;
      selectedLastPoint = sp[sp.length - 1] || null;
    }
    const last = sp[sp.length - 1].value;
    tableRows.push({ yr, last, max: spreadResult.stats.max, min: spreadResult.stats.min, avg: spreadResult.stats.avg, days: sp.length });
  });

  // KPI bar
  const kpiEl = document.getElementById('spread-kpis');
  if (kpiEl && tableRows.length) {
    const curRow = tableRows.find(r => r.yr === year);
    const curLast = curRow ? curRow.last : null;
    const referenceDay = computeSpread(front, back, year, instrument).points.at(-1)?.d ?? null;
    const refs = getSpreadReferenceMetrics(front, back, year, instrument, referenceDay);
    const delta5y = refs.avg5y != null && curLast != null ? curLast - refs.avg5y : null;
    const delta10y = refs.avg10y != null && curLast != null ? curLast - refs.avg10y : null;
    const pct5y = getSpreadRelativePercent(curLast, refs.avg5y);
    const pct10y = getSpreadRelativePercent(curLast, refs.avg10y);
    const refAvailabilityNote = getSpreadReferenceAvailabilityMessage(refs, year, instrument);
    const chip = (label, val, color = 'var(--text-primary)') =>
      `<div class="ctrl-group"><div class="ctrl-group-label">${label}</div><div style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:${color};">${val}</div></div>`;
    const sep = `<div class="ctrl-sep"></div>`;
    const formatKpiSpread = value => Number.isFinite(value) ? formatSignedSpread(value) : 'N/A';
    const formatDeltaWithPercent = (delta, pct, reference, color) => {
      if (!Number.isFinite(delta)) return 'N/A';
      if (!isMeaningfulSpreadRelativePercent(reference, pct)) return formatSignedSpread(delta);
      const pctText = formatSignedPercent(pct);
      if (!pctText) return formatSignedSpread(delta);
      return `${formatSignedSpread(delta)} <span style="font-size:12px;color:${color};opacity:0.82;">(${pctText})</span>`;
    };
    kpiEl.innerHTML = [
      chip('Ref T-Day', referenceDay != null ? String(referenceDay) : '—'),
      sep,
      chip('All-Time Ref', formatKpiSpread(refs.allTime)),
      sep,
      chip('5Y Ref', formatKpiSpread(refs.avg5y)),
      sep,
      chip('10Y Ref', formatKpiSpread(refs.avg10y)),
      sep,
      chip('Curr - 5Y', formatDeltaWithPercent(delta5y, pct5y, refs.avg5y, delta5y != null ? (delta5y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'), delta5y != null ? (delta5y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'),
      sep,
      chip('Curr - 10Y', formatDeltaWithPercent(delta10y, pct10y, refs.avg10y, delta10y != null ? (delta10y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'), delta10y != null ? (delta10y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'),
    ].join('') + (refAvailabilityNote
      ? `<div style="flex-basis:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--text-muted);">${refAvailabilityNote}</div>`
      : '');
  }

  // Year legend chips
  const legendEl = document.getElementById('spread-legend');
  if (legendEl) {
    const yearsWithData = allYearsSorted.filter(yr => {
      const r = computeSpread(front, back, yr, instrument);
      return r.points.length > 0;
    });
    legendEl.innerHTML = yearsWithData.map(yr => {
      const on = STATE.spreadVisibleYears.has(yr);
      const color = yr === year ? '#ffffff' : getSpreadYearColor(yr);
      const isSelected = yr === year;
      return `<span data-spread-yr="${yr}" onclick="toggleSpreadYear(${yr})" style="
        display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
        border:1px solid ${on ? color : 'rgba(255,255,255,0.15)'};
        background:${on ? color + '22' : 'transparent'};
        opacity:${on ? '1' : '0.28'};
        cursor:pointer;font-family:var(--font-mono);font-size:11px;
        color:${color};font-weight:${isSelected ? '700' : '400'};
        transition:opacity 0.15s,background 0.15s;
        ${isSelected ? 'box-shadow:0 0 0 1px '+color+';' : ''}
      "><span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${yr}</span>`;
    }).join('');
  }

  // Zero line
  const zeroLine = chart.addLineSeries({
    color: palette.zero, lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  const allSpreads = computeSpread(front, back, year, instrument).points;
  if (allSpreads.length > 0) {
    zeroLine.setData([
      { time: dayToTime(1), value: 0 },
      { time: dayToTime(allSpreads[allSpreads.length - 1].d), value: 0 },
    ]);
  }

  applyChartTimeScaleOptions(chart, {
    formatter: buildDateAxisFormatter(time => selectedLookup.get(timeKey(time))),
    barSpacing: getChartBarSpacing(allSpreads.length || 80),
  });
  chart.timeScale().fitContent();
  if (selectedSeries) {
    attachChartTooltip({
      chart,
      container: chartContainer,
      titleColor: '#f5f7fb',
      seriesConfigs: [{
        series: selectedSeries,
        label: legInfo.shortLabel,
        color: palette.main,
        emphasis: true,
        getPoint: param => selectedLookup.get(timeKey(param.time)),
        formatValue: value => value.toFixed(3),
      }],
      getTitle: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? formatDisplayDate(point.date) : `${legInfo.shortLabel} spread`;
      },
      getSubtitle: () => `${legInfo.longLabel} spread`,
      getMetrics: param => {
        const point = selectedLookup.get(timeKey(param.time));
        if (!point) return [];
        return [
          { label: 'Max', value: selectedStats.max.toFixed(3) },
          { label: 'Min', value: selectedStats.min.toFixed(3) },
          { label: 'Avg', value: selectedStats.avg.toFixed(3) },
          { label: 'T-Day', value: String(point.d) },
        ];
      },
      getNote: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? `T-Day ${point.d} • ${legInfo.longLabel} calendar spread` : '';
      },
    });
  }

  // Update header price/change
  const priceEl = document.getElementById('spread-price');
  const changeEl = document.getElementById('spread-change');
  if (priceEl) {
    if (tableRows.length > 0) {
      const selected = tableRows.find(r => r.yr === year);
      if (selected) {
        const sign = selected.last >= 0 ? '+' : '';
        priceEl.textContent = `${sign}${selected.last.toFixed(3)}`;
        priceEl.style.color = selected.last >= 0 ? 'var(--positive)' : 'var(--negative)';
        if (changeEl) changeEl.textContent = `${legInfo.shortLabel} · ref T-Day ${allSpreads.at(-1)?.d ?? '—'}`;
      }
    } else {
      priceEl.textContent = '--';
      if (changeEl) changeEl.textContent = '';
    }
  }

  // Table with sticky header + rank + position bar
  const allLasts = tableRows.map(r => r.last).filter(Number.isFinite);
  const lastMin = allLasts.length ? Math.min(...allLasts) : 0;
  const lastMax = allLasts.length ? Math.max(...allLasts) : 1;
  const lastRange = lastMax - lastMin || 1;
  const sortedDesc = [...allLasts].sort((a, b) => b - a);

  const SCROLL_WRAP = inner => `<div style="overflow-x:auto;">${inner}</div>`;

  let html = `<div class="card-title" style="padding:12px 16px 8px;">${legInfo.shortLabel} Spread History <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${tableRows.length} years</span></div>`;
  html += SCROLL_WRAP(`<table><thead><tr>
    <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;">Year</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Last</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Rank</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Max</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Min</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Avg</th>
  </tr></thead><tbody>`);

  tableRows.sort((a, b) => b.yr - a.yr).forEach(r => {
    const cls = r.last >= 0 ? 'positive' : 'negative';
    const rank = Number.isFinite(r.last) ? sortedDesc.indexOf(r.last) + 1 : null;
    const rankOf = `#${rank}<span style="color:var(--text-muted);font-size:10px;">/${allLasts.length}</span>`;
    const barW = ((r.last - lastMin) / lastRange * 44).toFixed(1);
    const barColor = r.last >= 0 ? 'var(--positive)' : 'var(--negative)';
    const bar = `<span style="display:inline-block;width:${barW}px;height:3px;background:${barColor};border-radius:2px;vertical-align:middle;opacity:0.55;margin-left:4px;"></span>`;
    const rowStyle = r.yr === year ? 'background:rgba(157,78,221,0.08);font-weight:600;' : '';
    const sign = r.last >= 0 ? '+' : '';
    html += `<tr style="${rowStyle}">
      <td style="text-align:left;">${r.yr}</td>
      <td class="${cls}">${sign}${r.last.toFixed(3)}${bar}</td>
      <td style="font-family:var(--font-mono);font-size:11px;">${rank ? rankOf : '—'}</td>
      <td>${r.max.toFixed(3)}</td>
      <td>${r.min.toFixed(3)}</td>
      <td>${r.avg.toFixed(3)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('spread-table').innerHTML = html;

  // Store refs and sync range footer
  STATE._spreadChart = chart;
  STATE._spreadSelectedPoints = allSpreads; // selected year's points
  STATE._spreadSelectedSeries = selectedSeries;
  STATE._spreadSelectedLastPoint = selectedLastPoint;
  syncSpreadRangeFooter();
  renderSpreadAxisLabel();
}

function syncSpreadRangeFooter() {
  const points = STATE._spreadSelectedPoints;
  const chart = STATE._spreadChart;
  if (!points || !points.length || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  const view = STATE.spreadView;
  const start = clamp(Number.isFinite(view.rangeStart) ? view.rangeStart : 0, 0, maxIdx);
  const end = clamp(view.rangeEnd != null ? view.rangeEnd : maxIdx, 0, maxIdx);
  view.rangeStart = start; view.rangeEnd = end;

  const startSlider = document.getElementById('spread-window-start');
  const endSlider   = document.getElementById('spread-window-end');
  const selection   = document.getElementById('spread-range-selection');
  const minLabel    = document.getElementById('spread-range-min-label');
  const maxLabel    = document.getElementById('spread-range-max-label');
  const helperEl    = document.getElementById('spread-range-helper');
  const readoutEl   = document.getElementById('spread-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min='0'; s.max=String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(start); endSlider.value = String(end);

  const pct = getRangeSelectionPercent(points.length, start, end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = formatRangeEdgeLabel(points[0].date);
  if (maxLabel) maxLabel.textContent = formatRangeEdgeLabel(points[maxIdx].date);

  const count = end - start + 1;
  if (helperEl) helperEl.textContent = count >= points.length
    ? 'Full span across available history'
    : `${count} days selected · drag handles to move or resize`;
  if (readoutEl) readoutEl.innerHTML = count >= points.length
    ? `<span>${formatDisplayDate(points[0].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[maxIdx].date)}</span><span style="color:var(--text-muted);">|</span><span>Full span</span>`
    : `<span>${formatDisplayDate(points[start].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[end].date)}</span><span style="color:var(--text-muted);">|</span><span>${count} days</span><span style="color:var(--text-muted);">|</span><span>${count}/${points.length} pts</span>`;

  if (start > 0 || end < maxIdx) {
    chart.timeScale().setVisibleRange({ from: dayToTime(points[start].d), to: dayToTime(points[end].d) });
  } else {
    chart.timeScale().fitContent();
  }
  renderSpreadAxisLabel();
}

function onSpreadSlider() {
  const points = STATE._spreadSelectedPoints;
  const chart  = STATE._spreadChart;
  if (!points || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  let start = clamp(parseInt(document.getElementById('spread-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('spread-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('spread-window-start').value = String(start); }
  STATE.spreadView.rangeStart = start; STATE.spreadView.rangeEnd = end;
  syncSpreadRangeFooter();
}

async function buildSpreadHeatmap(force = false) {
  const heatmapEl = document.getElementById('spread-heatmap');
  if (!heatmapEl) return;
  const instrument = getSpreadInstrument();
  const cacheKey = `${instrument}|last5`;
  syncSpreadHeatmapTitle();
  if (force || STATE.spreadHeatmapKey !== cacheKey) {
    STATE.spreadHeatmapHtml = '';
    STATE.spreadHeatmapKey = cacheKey;
  }
  if (STATE.spreadHeatmapHtml) {
    heatmapEl.innerHTML = STATE.spreadHeatmapHtml;
    return;
  }

  // 12x12 grid: front(row) x back(col)
  const currentYear = new Date().getFullYear();
  let html = '<table style="font-size:11px;"><thead><tr><th></th>';
  for (const month of MONTHS) {
    html += `<th style="text-align:center;padding:4px 6px;">${month.slice(0,3)}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (let fi = 0; fi < MONTHS.length; fi++) {
    const front = MONTHS[fi];
    html += `<tr><td style="text-align:left;font-weight:600;padding:4px 6px;">${front.slice(0,3)}</td>`;
    for (let bi = 0; bi < MONTHS.length; bi++) {
      const back = MONTHS[bi];
      if (fi === bi) { html += '<td style="background:var(--bg-primary);"></td>'; continue; }
      // Compute avg spread across last 5 years
      let sum = 0, count = 0;
      for (let yr = currentYear - 5; yr < currentYear; yr++) {
        const spreadResult = computeSpread(front, back, yr, instrument);
        if (spreadResult.points.length > 0) {
          sum += spreadResult.stats.avg;
          count++;
        }
      }
      const avg = count > 0 ? sum / count : null;
      const intensity = avg != null ? Math.min(Math.abs(avg) / 2, 1) : 0;
      const color = avg == null
        ? 'transparent'
        : (avg > 0 ? `rgba(0,255,136,${intensity * 0.4})` : `rgba(255,68,85,${intensity * 0.4})`);
      const cursor = avg == null ? 'default' : 'pointer';
      const value = avg == null ? '—' : avg.toFixed(2);
      const click = avg == null ? '' : ` onclick="setSpreadPair('${front}','${back}')"`;
      html += `<td style="text-align:center;padding:4px 6px;background:${color};cursor:${cursor};font-family:var(--font-mono);font-size:11px;"${click}>${value}</td>`;
    }
    html += '</tr>';
    await yieldToBrowser();
  }
  html += '</tbody></table>';
  STATE.spreadHeatmapHtml = html;
  heatmapEl.innerHTML = html;
}

function scheduleSpreadHeatmap(force = false) {
  const heatmapEl = document.getElementById('spread-heatmap');
  if (!heatmapEl) return;
  syncSpreadHeatmapTitle();
  const cacheKey = `${getSpreadInstrument()}|last5`;
  if (STATE.spreadHeatmapHtml && STATE.spreadHeatmapKey === cacheKey && !force) {
    heatmapEl.innerHTML = STATE.spreadHeatmapHtml;
    return;
  }
  if (STATE.spreadHeatmapPending && !force) return;

  STATE.spreadHeatmapPending = true;
  heatmapEl.innerHTML = '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);padding:8px 0;">COMPUTING HEATMAP...</div>';

  setTimeout(async () => {
    try {
      await buildSpreadHeatmap(force);
    } finally {
      STATE.spreadHeatmapPending = false;
    }
  }, 0);
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TAB 5: FORWARD CURVE
     ═══════════════════════════════════════════════════════════ -->
<script>
function getCurveSeason(monthIdx) {
  if ([10, 11, 0, 1].includes(monthIdx)) return 'winter';
  if ([4, 5, 6, 7].includes(monthIdx)) return 'summer';
  return 'shoulder';
}

function buildCurveSlot(baseDate, offset) {
  const d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, 1);
  const yr = d.getFullYear();
  const monthIdx = d.getMonth();
  const month = MONTHS[monthIdx];
  const yy = yr % 100;
  const pad = yy < 10 ? '0' + yy : '' + yy;
  const ticker = `NG${MONTH_CODES[month]}${pad}`;
  const data = getContractData(ticker);
  const last = data.length ? data[data.length - 1] : null;

  return {
    ticker,
    month,
    year: yr,
    monthIdx,
    season: getCurveSeason(monthIdx),
    label: `${month.slice(0, 3)} ${String(yr).slice(2)}`,
    price: last && Number.isFinite(last.p) ? last.p : null,
    quoteDate: last && last.date ? last.date : null,
    pointCount: data.length,
  };
}

function isCurveQuoteFresh(slot, latestQuoteStamp) {
  if (!slot || !slot.quoteDate || !Number.isFinite(slot.price)) return false;
  if (!latestQuoteStamp) return true;
  const slotStamp = timeToStamp(slot.quoteDate);
  if (!slotStamp) return false;
  return ((latestQuoteStamp - slotStamp) / 86400000) <= FORWARD_CURVE_FRESHNESS_DAYS;
}

function summarizeCurveLabels(items, limit = 5) {
  const labels = (items || [])
    .map(item => typeof item === 'string' ? item : item.label)
    .filter(Boolean);
  if (!labels.length) return '';
  if (labels.length <= limit) return labels.join(', ');
  return `${labels.slice(0, limit).join(', ')} +${labels.length - limit} more`;
}

function formatCurveValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(3)}` : 'N/A';
}

function formatCurveAxisValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function formatCurvePointLabel(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function teardownCurveAnnotations() {
  if (STATE._curveAnnotationFrame) {
    cancelAnimationFrame(STATE._curveAnnotationFrame);
    STATE._curveAnnotationFrame = null;
  }
  if (STATE._curveResizeObserver) {
    STATE._curveResizeObserver.disconnect();
    STATE._curveResizeObserver = null;
  }
  if (STATE._curveTimeRangeListener && STATE._curveChart) {
    try {
      STATE._curveChart.timeScale().unsubscribeVisibleTimeRangeChange(STATE._curveTimeRangeListener);
    } catch (_) {}
    STATE._curveTimeRangeListener = null;
  }
}

function ensureCurveAnnotationLayer(container) {
  if (!container) return null;
  let layer = container.querySelector('.curve-annotation-layer');
  if (!layer) {
    layer = document.createElement('div');
    layer.className = 'curve-annotation-layer';
    container.appendChild(layer);
  }
  return layer;
}

function bindCurveAnnotations(chart, container) {
  teardownCurveAnnotations();
  const rerender = () => scheduleCurveAnnotationRender();
  STATE._curveTimeRangeListener = rerender;
  chart.timeScale().subscribeVisibleTimeRangeChange(rerender);
  if (typeof ResizeObserver === 'function' && container) {
    const observer = new ResizeObserver(() => scheduleCurveAnnotationRender());
    observer.observe(container);
    STATE._curveResizeObserver = observer;
  }
}

function scheduleCurveAnnotationRender() {
  if (STATE._curveAnnotationFrame) cancelAnimationFrame(STATE._curveAnnotationFrame);
  STATE._curveAnnotationFrame = requestAnimationFrame(() => {
    STATE._curveAnnotationFrame = null;
    renderCurveAnnotations();
  });

  if (selectedSeries && selectedLastPoint && typeof selectedSeries.createPriceLine === 'function') {
    selectedSeries.createPriceLine({
      price: selectedLastPoint.value,
      color: selectedLastPoint.value >= 0 ? '#00ff88' : '#ff4455',
      lineVisible: false,
      axisLabelVisible: true,
      lineWidth: 1,
      title: '',
    });
  }
}

function isCurveTurningPoint(points, index) {
  if (!Array.isArray(points) || index <= 0 || index >= points.length - 1) return false;
  const prev = points[index - 1] && points[index - 1].slot ? points[index - 1].slot.price : null;
  const curr = points[index] && points[index].slot ? points[index].slot.price : null;
  const next = points[index + 1] && points[index + 1].slot ? points[index + 1].slot.price : null;
  if (![prev, curr, next].every(Number.isFinite)) return false;
  const isPeak = curr >= prev && curr >= next && (curr > prev || curr > next);
  const isTrough = curr <= prev && curr <= next && (curr < prev || curr < next);
  return isPeak || isTrough;
}

function renderCurveAnnotations() {
  const chart = STATE._curveChart;
  const series = STATE._curveSeries;
  const windowContext = STATE._curveWindowContext;
  const slots = (windowContext && Array.isArray(windowContext.windowSlots) && windowContext.windowSlots.length)
    ? windowContext.windowSlots
    : (STATE._curveSlots || []);
  const container = document.getElementById('curve-chart-container');
  const layer = ensureCurveAnnotationLayer(container);
  if (!layer) return;

  if (!chart || !series || !slots.length) {
    layer.innerHTML = '';
    return;
  }

  const width = container.clientWidth || 0;
  const height = container.clientHeight || 0;
  const bottomInset = Math.max(26, Math.round(height * 0.07));
  const visiblePoints = slots
    .filter(slot => Number.isFinite(slot.price))
    .map(slot => ({
      slot,
      x: chart.timeScale().timeToCoordinate(slot.time),
      y: series.priceToCoordinate(slot.price),
    }))
    .filter(point =>
      Number.isFinite(point.x) &&
      Number.isFinite(point.y) &&
      point.x >= -24 &&
      point.x <= width + 24 &&
      point.y >= -24 &&
      point.y <= height + 24
    );

  if (!visiblePoints.length) {
    layer.innerHTML = '';
    return;
  }

  const spacings = [];
  for (let i = 1; i < visiblePoints.length; i++) {
    const gap = visiblePoints[i].x - visiblePoints[i - 1].x;
    if (gap > 0) spacings.push(gap);
  }
  spacings.sort((a, b) => a - b);
  const medianSpacing = spacings.length ? spacings[Math.floor(spacings.length / 2)] : width;
  const labelStride = Math.max(1, Math.ceil(38 / Math.max(medianSpacing, 10)));
  const lastVisibleIndex = visiblePoints.length - 1;

  layer.innerHTML = visiblePoints.map((point, index) => {
    const dropHeight = Math.max(10, height - point.y - bottomInset);
    const showLabel = index === 0
      || index === lastVisibleIndex
      || isCurveTurningPoint(visiblePoints, index)
      || index % labelStride === 0;
    return `<div class="curve-annotation" style="left:${point.x.toFixed(2)}px;top:${point.y.toFixed(2)}px;">
      <div class="curve-drop-line" style="height:${dropHeight.toFixed(2)}px;"></div>
      <div class="curve-drop-dot"></div>
      ${showLabel ? `<div class="curve-point-label">${formatCurvePointLabel(point.slot.price)}</div>` : ''}
    </div>`;
  }).join('');
}

function buildForwardCurveData() {
  const baseDate = new Date();
  const rawSlots = [];
  for (let offset = 0; offset < FORWARD_CURVE_HORIZON + FORWARD_CURVE_FETCH_BUFFER; offset++) {
    rawSlots.push(buildCurveSlot(baseDate, offset));
  }

  const latestQuoteStamp = rawSlots.reduce((max, slot) => {
    const stamp = slot.quoteDate && Number.isFinite(slot.price) ? timeToStamp(slot.quoteDate) : 0;
    return Math.max(max, stamp || 0);
  }, 0);

  let startIndex = rawSlots.findIndex(slot => isCurveQuoteFresh(slot, latestQuoteStamp));
  if (startIndex < 0) startIndex = rawSlots.findIndex(slot => Number.isFinite(slot.price));
  if (startIndex < 0) startIndex = 0;

  const skippedSlots = rawSlots
    .slice(0, startIndex)
    .filter(slot => Number.isFinite(slot.price) || slot.quoteDate);

  const slots = rawSlots
    .slice(startIndex, startIndex + FORWARD_CURVE_HORIZON)
    .map((slot, index) => Object.assign({}, slot, {
      index,
      time: dayToTime(index + 1),
      missing: !Number.isFinite(slot.price),
    }));

  const quotedSlots = slots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = slots.filter(slot => !Number.isFinite(slot.price));

  return {
    slots,
    quotedSlots,
    missingSlots,
    skippedSlots,
    latestQuoteDate: latestQuoteStamp ? new Date(latestQuoteStamp).toISOString().slice(0, 10) : '',
    firstQuoted: quotedSlots[0] || null,
    lastQuoted: quotedSlots[quotedSlots.length - 1] || null,
  };
}

function getCurveWindowContext(slots) {
  if (!slots || !slots.length) {
    return {
      start: 0,
      end: -1,
      count: 0,
      windowSlots: [],
      quotedSlots: [],
      missingSlots: [],
      firstQuoted: null,
      lastQuoted: null,
      stats: { min: 0, max: 0, avg: 0, count: 0 },
      winterAvg: null,
      summerAvg: null,
      premium: null,
      slope: null,
      coverageText: '0/0',
    };
  }

  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = slots.length - 1;
  let start = clamp(Number.isFinite(STATE.curveView.rangeStart) ? STATE.curveView.rangeStart : 0, 0, maxIdx);
  let end = clamp(STATE.curveView.rangeEnd != null ? STATE.curveView.rangeEnd : maxIdx, 0, maxIdx);
  if (end < start) {
    const swap = start;
    start = end;
    end = swap;
  }
  if (start === end && slots.length > 1) {
    if (end < maxIdx) end += 1;
    else start = Math.max(0, start - 1);
  }

  STATE.curveView.rangeStart = start;
  STATE.curveView.rangeEnd = end;

  const windowSlots = slots.slice(start, end + 1);
  const quotedSlots = windowSlots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = windowSlots.filter(slot => !Number.isFinite(slot.price));
  const firstQuoted = quotedSlots[0] || null;
  const lastQuoted = quotedSlots[quotedSlots.length - 1] || null;
  const stats = getSeriesStats(quotedSlots, slot => slot.price);
  const averageFor = list => list.length ? list.reduce((sum, slot) => sum + slot.price, 0) / list.length : null;
  const winterAvg = averageFor(quotedSlots.filter(slot => slot.season === 'winter'));
  const summerAvg = averageFor(quotedSlots.filter(slot => slot.season === 'summer'));

  return {
    start,
    end,
    count: windowSlots.length,
    windowSlots,
    quotedSlots,
    missingSlots,
    firstQuoted,
    lastQuoted,
    stats,
    winterAvg,
    summerAvg,
    premium: winterAvg != null && summerAvg != null ? winterAvg - summerAvg : null,
    slope: quotedSlots.length >= 2 ? lastQuoted.price - firstQuoted.price : null,
    coverageText: `${quotedSlots.length}/${windowSlots.length}`,
  };
}

function renderCurveMetrics(curveData, windowContext) {
  const metricsEl = document.getElementById('curve-metrics');
  if (!metricsEl || !curveData || !windowContext) return;

  const chip = (label, val, color = 'var(--text-primary)') =>
    `<div class="ctrl-group"><div class="ctrl-group-label">${label}</div><div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:${color};">${val}</div></div>`;
  const sep = `<div class="ctrl-sep"></div>`;
  const slopeLabel = windowContext.slope == null
    ? 'N/A'
    : `${windowContext.slope >= 0 ? '+' : ''}$${windowContext.slope.toFixed(3)} · ${windowContext.slope >= 0 ? 'Contango' : 'Backwardation'}`;
  const slopeColor = windowContext.slope == null
    ? 'var(--text-muted)'
    : (windowContext.slope >= 0 ? 'var(--positive)' : 'var(--negative)');
  const coverageColor = windowContext.missingSlots.length ? 'var(--negative)' : 'var(--positive)';
  const notes = [];

  if (curveData.latestQuoteDate) {
    notes.push(`Latest quote across strip: ${formatDisplayDate(curveData.latestQuoteDate)}.`);
  }
  if (curveData.skippedSlots.length) {
    notes.push(`Rolled past stale contracts: ${summarizeCurveLabels(curveData.skippedSlots, 3)}.`);
  }
  if (windowContext.missingSlots.length) {
    notes.push(`Missing quotes in window: ${summarizeCurveLabels(windowContext.missingSlots, 6)}.`);
  }

  metricsEl.innerHTML = [
    chip('Coverage', `${windowContext.coverageText} quoted`, coverageColor),
    sep,
    chip('Front Quote', windowContext.firstQuoted ? `${formatCurveValue(windowContext.firstQuoted.price)} · ${windowContext.firstQuoted.label}` : 'N/A', 'var(--accent-hh)'),
    sep,
    chip('Back Quote', windowContext.lastQuoted ? `${formatCurveValue(windowContext.lastQuoted.price)} · ${windowContext.lastQuoted.label}` : 'N/A'),
    sep,
    chip('Slope', slopeLabel, slopeColor),
    sep,
    chip('Winter Avg', formatCurveValue(windowContext.winterAvg), '#f5f7fb'),
    sep,
    chip('Summer Avg', formatCurveValue(windowContext.summerAvg), '#c5c8cf'),
    sep,
    chip('W/S Premium', formatCurveValue(windowContext.premium), windowContext.premium == null ? 'var(--text-muted)' : (windowContext.premium >= 0 ? 'var(--positive)' : 'var(--negative)')),
  ].join('') + (notes.length
    ? `<div style="flex-basis:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--text-muted);">${notes.join(' ')}</div>`
    : '');
}

function renderCurveTable(curveData, windowContext) {
  const tableEl = document.getElementById('curve-table');
  if (!tableEl || !curveData || !windowContext) return;

  const quotedPrices = curveData.quotedSlots.map(slot => slot.price);
  const priceMin = quotedPrices.length ? Math.min(...quotedPrices) : 0;
  const priceMax = quotedPrices.length ? Math.max(...quotedPrices) : 0;
  const priceRange = (priceMax - priceMin) || 1;
  const seasonColor = { winter: '#f5f7fb', summer: '#c5c8cf', shoulder: '#7d818b' };

  let tableHtml = `<div class="card-title" style="padding:12px 16px 8px;">Contract Quotes <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${curveData.quotedSlots.length}/${curveData.slots.length} quoted total</span></div>`;
  tableHtml += `<div style="overflow-x:auto;"><table><thead><tr>
    <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;">Contract</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Price</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Last Quote</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Season</th>
  </tr></thead><tbody>`;

  curveData.slots.forEach((slot, index) => {
    const inWindow = index >= windowContext.start && index <= windowContext.end;
    const rowStyle = `${inWindow ? 'background:rgba(255,255,255,0.03);' : ''}${slot.missing ? 'opacity:0.72;' : ''}`;
    const barWidth = Number.isFinite(slot.price) ? ((slot.price - priceMin) / priceRange * 40).toFixed(1) : '0';
    const bar = Number.isFinite(slot.price)
      ? `<span style="display:inline-block;width:${barWidth}px;height:3px;background:var(--accent-hh);border-radius:2px;vertical-align:middle;opacity:0.5;margin-left:4px;"></span>`
      : '';
    const priceHtml = Number.isFinite(slot.price)
      ? `$${slot.price.toFixed(3)}${bar}`
      : `<span style="color:var(--text-muted);">—</span>`;
    const quoteHtml = slot.quoteDate
      ? formatDisplayDate(slot.quoteDate)
      : `<span style="color:var(--negative);">Missing</span>`;
    const seasonHtml = `<span style="color:${seasonColor[slot.season]};">${slot.season.charAt(0).toUpperCase() + slot.season.slice(1)}</span>`;

    tableHtml += `<tr style="${rowStyle}">
      <td style="text-align:left;">
        <div style="font-family:var(--font-mono);color:var(--text-primary);">${slot.ticker}</div>
        <div style="font-size:11px;color:var(--text-muted);">${slot.label}</div>
      </td>
      <td>${priceHtml}</td>
      <td style="font-family:var(--font-mono);font-size:12px;">${quoteHtml}</td>
      <td style="text-align:center;">${seasonHtml}</td>
    </tr>`;
  });

  tableHtml += '</tbody></table></div>';
  tableEl.innerHTML = tableHtml;
}

function renderCurveTab() {
  const container = document.getElementById('tab-curve');
  if (!container.dataset.built) {
    container.dataset.built = '1';
    container.innerHTML = `
      <div class="contract-header" id="curve-header">
        <div class="ch-left">
          <div class="ch-top">
            <span class="ticker" style="color:var(--accent-hh);">FORWARD CURVE</span>
            <span class="instrument-stamp"><span class="instrument-dot" style="background:var(--accent-hh);border-radius:50%;display:inline-block;width:7px;height:7px;"></span>Henry Hub</span>
          </div>
          <span class="desc" id="curve-desc">Live Futures Strip</span>
        </div>
        <div class="ch-right">
          <span class="price" id="curve-price" style="margin-left:0;">--</span>
          <span class="change" id="curve-change" style="font-size:12px;color:var(--text-muted);"></span>
        </div>
      </div>
      <div class="flex gap" style="flex-wrap:wrap;">
        <div class="grow" style="min-width:0;">

            <div class="chart-wrap" id="curve-chart-container" style="height:55vh;"></div>
          </div>

              <div class="flex flex-col gap-sm">
                <span class="range-kicker">Window</span>
                <span class="range-helper" id="curve-range-helper">Full strip</span>

              <div class="range-scale-labels">

              <input type="range" id="curve-window-start" min="0" max="0" value="0" aria-label="Curve window start">
              <input type="range" id="curve-window-end" min="0" max="0" value="0" aria-label="Curve window end">
            </div>

    `;
    document.getElementById('curve-window-start').addEventListener('input', onCurveSlider);
    document.getElementById('curve-window-end').addEventListener('input', onCurveSlider);
  }
  updateCurveChart();

function updateCurveChart() {
  const curveData = buildForwardCurveData();
  const slots = curveData.slots;
  const palette = getNeutralChartPalette();

  if (!slots.length || !curveData.firstQuoted) {
    teardownCurveAnnotations();
    document.getElementById('curve-desc').textContent = 'No quoted curve data available';
    document.getElementById('curve-price').textContent = '--';
    document.getElementById('curve-change').textContent = '';
    document.getElementById('curve-metrics').innerHTML = `<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);padding:8px 0;">No forward quotes available for the current strip.</div>`;
    document.getElementById('curve-table').innerHTML = '';
    return;
  }

  document.getElementById('curve-desc').textContent = `${slots.length}-month strip — ${slots[0].label} to ${slots[slots.length - 1].label} • ${curveData.quotedSlots.length}/${slots.length} quoted`;

  // Chart
  const chartContainer = document.getElementById('curve-chart-container');
  teardownCurveAnnotations();
  const chart = createManagedChart('curve', 'main', chartContainer);
  chart.applyOptions({
    rightPriceScale: {
      scaleMargins: { top: 0.18, bottom: 0.12 },
    },
  });

  const lineSeries = chart.addLineSeries({
    color: palette.main,
    lineWidth: 2,
    priceLineVisible: false,
    lastValueVisible: false,
    crosshairMarkerVisible: false,
    priceFormat: {
      type: 'custom',
      formatter: value => formatCurveAxisValue(value),
      minMove: 0.001,
    },
  });
  lineSeries.setData(slots.map(slot => Number.isFinite(slot.price) ? ({ time: slot.time, value: slot.price }) : ({ time: slot.time })));
  const curveLookup = new Map(slots.map(slot => [timeKey(slot.time), slot]));

  applyChartTimeScaleOptions(chart, {
    formatter: buildCurveAxisFormatter(time => curveLookup.get(timeKey(time))),
    barSpacing: slots.length > 36 ? 8 : 11,
  });
  chart.timeScale().fitContent();
  attachChartTooltip({
    chart,
    container: chartContainer,
    titleColor: '#f5f7fb',
    seriesConfigs: [{
      series: lineSeries,
      label: 'HH curve',
      color: palette.main,
      emphasis: true,
      getPoint: param => curveLookup.get(timeKey(param.time)),
      formatValue: value => `$${value.toFixed(3)}`,
    }],
    getSubtitle: () => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      const slotSet = STATE._curveSlots || slots;
      if (!windowContext || !windowContext.count) return 'Henry Hub strip';
      return `Henry Hub strip | ${slotSet[windowContext.start].label} to ${slotSet[windowContext.end].label} • ${windowContext.coverageText} quoted`;
    },
    getMetrics: () => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      return [
        { label: 'Max', value: formatCurveValue(windowContext.stats.count ? windowContext.stats.max : null) },
        { label: 'Min', value: formatCurveValue(windowContext.stats.count ? windowContext.stats.min : null) },
        { label: 'First', value: windowContext.firstQuoted ? `${formatCurveValue(windowContext.firstQuoted.price)} • ${windowContext.firstQuoted.label}` : 'N/A' },
        { label: 'Last', value: windowContext.lastQuoted ? `${formatCurveValue(windowContext.lastQuoted.price)} • ${windowContext.lastQuoted.label}` : 'N/A' },
      ];
    },
    getTitle: param => {
      const point = curveLookup.get(timeKey(param.time));
      return point ? `${point.label} • ${point.ticker}` : 'Forward curve';
    },
    getNote: param => {
      const point = curveLookup.get(timeKey(param.time));
      if (!point) return '';
      if (!point.quoteDate) return `No quote available • ${point.season} contract`;
      return `${point.season} contract • Quote ${formatDisplayDate(point.quoteDate)}`;
    },
  });

  // Header price = first quoted prompt
  const curveHeaderPrice = document.getElementById('curve-price');
  const curveHeaderChange = document.getElementById('curve-change');
  if (curveHeaderPrice) {
    curveHeaderPrice.textContent = formatCurveValue(curveData.firstQuoted.price);
    curveHeaderPrice.style.color = 'var(--accent-hh)';
  }
  if (curveHeaderChange) curveHeaderChange.textContent = `${curveData.firstQuoted.label} prompt month · ${curveData.quotedSlots.length}/${slots.length} quoted`;

  // Store refs and sync range footer
  STATE._curveChart = chart;
  STATE._curveSlots = slots;
  STATE._curveData = curveData;
  STATE._curveSeries = lineSeries;
  bindCurveAnnotations(chart, chartContainer);
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const curveKey = `${slots.length}|${slots[0].ticker}|${slots[slots.length - 1].ticker}`;
  if (STATE._curvePrevKey !== curveKey) {
    STATE._curvePrevKey = curveKey;
    STATE.curveView = { rangeStart: 0, rangeEnd: null };
  }
  syncCurveRangeFooter();
}

function syncCurveRangeFooter() {
  const curveData = STATE._curveData;
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!curveData || !contracts || !contracts.length || !chart) return;

  const windowContext = getCurveWindowContext(contracts);
  STATE._curveWindowContext = windowContext;
  const maxIdx = contracts.length - 1;

  const startSlider = document.getElementById('curve-window-start');
  const endSlider   = document.getElementById('curve-window-end');
  const selection   = document.getElementById('curve-range-selection');
  const minLabel    = document.getElementById('curve-range-min-label');
  const maxLabel    = document.getElementById('curve-range-max-label');
  const helperEl    = document.getElementById('curve-range-helper');
  const readoutEl   = document.getElementById('curve-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min = '0'; s.max = String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(windowContext.start);
  endSlider.value = String(windowContext.end);

  const pct = getRangeSelectionPercent(contracts.length, windowContext.start, windowContext.end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = contracts[0].label;
  if (maxLabel) maxLabel.textContent = contracts[maxIdx].label;

  const count = windowContext.count;
  if (helperEl) helperEl.textContent = count >= contracts.length
    ? `Full strip • ${windowContext.coverageText} quoted`
    : `${count} months selected • ${windowContext.coverageText} quoted`;
  if (readoutEl) {
    const missingCount = windowContext.missingSlots.length;
    readoutEl.innerHTML = `<span>${contracts[windowContext.start].label}</span><span style="color:var(--text-muted);">to</span><span>${contracts[windowContext.end].label}</span><span style="color:var(--text-muted);">|</span><span>${count} month${count !== 1 ? 's' : ''}</span><span style="color:var(--text-muted);">|</span><span>${windowContext.quotedSlots.length} quoted</span>${missingCount ? `<span style="color:var(--text-muted);">|</span><span>${missingCount} missing</span>` : ''}`;
  }

  if (windowContext.start > 0 || windowContext.end < maxIdx) {
    chart.timeScale().setVisibleRange({ from: dayToTime(windowContext.start + 1), to: dayToTime(windowContext.end + 1) });
  } else {
    chart.timeScale().fitContent();
  }

  renderCurveMetrics(curveData, windowContext);
  renderCurveTable(curveData, windowContext);
  scheduleCurveAnnotationRender();
}

function onCurveSlider() {
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!contracts || !chart) return;
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = contracts.length - 1;
  let start = clamp(parseInt(document.getElementById('curve-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('curve-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('curve-window-start').value = String(start); }
  STATE.curveView.rangeStart = start; STATE.curveView.rangeEnd = end;
  syncCurveRangeFooter();
}
</script>

              <button class="segment-btn" data-range="10" onclick="filterExpiry(this)">10Y</button>
              <button class="segment-btn" data-range="5" onclick="filterExpiry(this)">5Y</button>
              <button class="segment-btn" data-range="3" onclick="filterExpiry(this)">3Y</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card" style="overflow-x:auto;" id="expiry-table-wrap"></div>
    `;
  }
  buildExpiryTable('all');
}

function filterExpiry(btn) {
  btn.parentElement.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildExpiryTable(btn.dataset.range);
}

function buildExpiryTable(range) {
  const expiry = STATE.expiry;
  let years = Object.keys(expiry).sort((a, b) => a - b);
  const currentYear = new Date().getFullYear();

  if (range !== 'all') {
    const n = parseInt(range);
    years = years.filter(y => parseInt(y) >= currentYear - n);
  }

  // Compute 5Y and 3Y averages per month
  const avg5y = {}, avg3y = {}, avgAll = {};
  MONTHS.forEach(m => {
    let s5 = 0, c5 = 0, s3 = 0, c3 = 0, sa = 0, ca = 0;
    Object.keys(expiry).forEach(yr => {
      const v = expiry[yr][m];
      if (v == null) return;
      sa += v; ca++;
      if (parseInt(yr) >= currentYear - 5) { s5 += v; c5++; }
      if (parseInt(yr) >= currentYear - 3) { s3 += v; c3++; }
    });
    avg5y[m] = c5 ? s5 / c5 : null;
    avg3y[m] = c3 ? s3 / c3 : null;
    avgAll[m] = ca ? sa / ca : null;
  });

  let html = '<table style="white-space:nowrap;"><thead><tr><th style="text-align:left;">Month</th>';
  years.forEach(y => { html += `<th>${y}</th>`; });
  html += '<th style="color:var(--accent-hh);">All Avg</th><th style="color:var(--accent-hh);">5Y Avg</th><th style="color:var(--accent-hh);">3Y Avg</th></tr></thead><tbody>';

  MONTHS.forEach(m => {
    html += `<tr><td style="text-align:left;font-weight:600;">${m}</td>`;
    years.forEach(yr => {
      const v = expiry[yr] ? expiry[yr][m] : null;
      if (v == null) { html += '<td style="color:var(--text-muted);">—</td>'; return; }
      // Color: green if above 5Y avg, red if below
      const ref = avg5y[m];
      let bg = 'transparent';
      if (ref) {
        const delta = (v - ref) / ref;
        if (delta > 0.02) bg = `rgba(0,255,136,${Math.min(delta, 0.4) * 0.5})`;
        else if (delta < -0.02) bg = `rgba(255,68,85,${Math.min(Math.abs(delta), 0.4) * 0.5})`;
      }
      html += `<td style="background:${bg};">$${v.toFixed(3)}</td>`;
    });
    // Averages
    [avgAll, avg5y, avg3y].forEach(a => {
      html += `<td style="font-weight:600;">${a[m] ? '$' + a[m].toFixed(3) : '—'}</td>`;
    });
    html += '</tr>';
  });

  // Year average row
  html += '<tr style="border-top:2px solid var(--border);"><td style="text-align:left;font-weight:700;">Year Avg</td>';
  years.forEach(yr => {
    const vals = MONTHS.map(m => expiry[yr] ? expiry[yr][m] : null).filter(v => v != null);
    const avg = vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
    html += `<td style="font-weight:600;">${avg ? '$' + avg.toFixed(3) : '—'}</td>`;
  });
  html += '<td></td><td></td><td></td></tr>';

  html += '</tbody></table>';
  document.getElementById('expiry-table-wrap').innerHTML = html;
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TAB 7: DAILY TRACKER
     ═══════════════════════════════════════════════════════════ -->
<script>
function renderDailyTab() {
  const container = document.getElementById('tab-daily');
  if (!container.dataset.built) {
    container.dataset.built = '1';
    container.innerHTML = `
      <div class="contract-header" id="daily-header">
        <div class="ch-left">
          <div class="ch-top">
            <span class="ticker" style="color:var(--accent-hh);">FRONT MONTH TRACKER</span>
          </div>
          <span class="desc" id="daily-contract">—</span>
        </div>
        <div class="ch-right">
          <span class="price" id="daily-price" style="margin-left:0;">—</span>
          <span class="change" id="daily-change">—</span>
        </div>
      </div>
      <div class="flex gap" style="flex-wrap:wrap;">
        <div class="grow" style="min-width:0;">
          <div class="card" style="padding:0;" id="daily-table"></div>
        </div>
        <div style="width:320px;flex-shrink:0;">
          <div class="card" id="daily-calendar"></div>
        </div>
      </div>
      <div class="card" style="margin-top:var(--gap);padding:0;">
        <div class="card-title" style="padding:12px 16px 8px;">Weekly % Change — NG=F <span id="daily-weekly-subtitle" style="font-size:11px;color:var(--text-muted);font-weight:400;"></span></div>
        <div class="chart-wrap" id="daily-weekly-chart" style="height:280px;"></div>
      </div>
      <div class="flex gap" style="margin-top:var(--gap);flex-wrap:wrap;">
        <div class="card grow" style="min-width:0;padding:0;" id="daily-dist"></div>
        <div class="card" style="min-width:220px;flex-shrink:0;padding:0;" id="daily-posnegtable"></div>
      </div>
    `;
  }
  updateDailyTracker();
}

function updateDailyTracker() {
  const now = new Date();
  const data = STATE.liveData['NG=F'] || [];

  document.getElementById('daily-contract').textContent = 'NG=F · Continuous Front Month Contract';

  if (!data.length) {
    document.getElementById('daily-price').textContent = 'No data';
    document.getElementById('daily-change').textContent = '';
    document.getElementById('daily-table').innerHTML = '<div style="padding:16px;color:var(--text-muted);">Live data not loaded</div>';
    return;
  }

  const last = data[data.length - 1];
  const prev = data.length > 1 ? data[data.length - 2] : last;
  const dayDelta = (last.p - prev.p) / prev.p * 100;

  document.getElementById('daily-price').textContent = `$${last.p.toFixed(3)}`;
  const changeEl = document.getElementById('daily-change');
  changeEl.textContent = `${dayDelta >= 0 ? '+' : ''}${dayDelta.toFixed(2)}% day`;
  changeEl.className = 'change ' + (dayDelta >= 0 ? 'positive' : 'negative');

  // Price log — most recent first
  const reversed = [...data].reverse();
  const allPrices = reversed.map(p => p.p);
  const pMin = Math.min(...allPrices), pMax = Math.max(...allPrices), pRange = pMax - pMin || 1;
  const th = label => `<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;${label==='Date'?'text-align:left;':''}">${label}</th>`;
  let html = `<div class="card-title" style="padding:12px 16px 8px;">Price Log — NG=F <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${data.length} sessions</span></div>`;
  html += `<div style="overflow-y:auto;max-height:600px;"><table><thead><tr>${th('Date')}${th('Close')}${th('Day Δ%')}</tr></thead><tbody>`;
  reversed.forEach((pt, i) => {
    const prevPt = i < reversed.length - 1 ? reversed[i + 1] : pt;
    const delta = (pt.p - prevPt.p) / prevPt.p * 100;
    const barW = ((pt.p - pMin) / pRange * 44).toFixed(1);
    const bar = `<span style="display:inline-block;width:${barW}px;height:3px;background:var(--accent-hh);border-radius:2px;vertical-align:middle;opacity:0.5;margin-left:4px;"></span>`;
    html += `<tr>
      <td style="text-align:left;">${pt.date}</td>
      <td>$${pt.p.toFixed(3)}${bar}</td>
      <td class="${delta >= 0 ? 'positive' : 'negative'}">${i === reversed.length-1 ? '—' : (delta >= 0 ? '+' : '') + delta.toFixed(2) + '%'}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('daily-table').innerHTML = html;

  // Expiry calendar - next 12 contracts
  let calHtml = '<div class="card-title">Upcoming Expirations</div>';
  for (let offset = 1; offset <= 12; offset++) {
    const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const month = MONTHS[d.getMonth()];
    const code = MONTH_CODES[month];
    const yr = d.getFullYear() % 100;
    const pad = yr < 10 ? '0' + yr : '' + yr;
    const ticker = `NG${code}${pad}`;
    // Approximate expiry: 3 business days before first day of contract month
    const expiry = new Date(d.getFullYear(), d.getMonth(), -3);
    const expiryStr = expiry.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const isActive = offset <= 2;
    calHtml += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:12px;">
      <span style="color:${isActive ? 'var(--accent-hh)' : 'var(--text-secondary)'};">${ticker}</span>
      <span style="color:var(--text-muted);">${month} ${d.getFullYear()}</span>
      <span style="color:var(--text-secondary);">${expiryStr}</span>
    </div>`;
  }
  document.getElementById('daily-calendar').innerHTML = calHtml;

  // Weekly % change analysis
  const weekly = computeWeeklyChanges(data);
  document.getElementById('daily-weekly-subtitle').textContent = `${weekly.length} weeks`;

  // Chart
  const wChart = createManagedChart('daily', 'weekly', document.getElementById('daily-weekly-chart'));
  const zeroline = wChart.addLineSeries({ color:'rgba(255,255,255,0.15)', lineWidth:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
  zeroline.setData([{ time: weekly[0].date, value:0 }, { time: weekly[weekly.length-1].date, value:0 }]);
  const wSeries = wChart.addLineSeries({ color:'rgba(100,160,255,0.5)', lineWidth:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:true, crosshairMarkerRadius:4 });
  wSeries.setData(weekly.map(w => ({ time: w.date, value: w.pct })));
  wSeries.setMarkers(weekly.map(w => ({ time: w.date, position:'inBar', shape:'circle', color: w.pct >= 0 ? 'var(--positive)' : 'var(--negative)', size:0 })));
  applyChartTimeScaleOptions(wChart, { barSpacing: Math.max(4, Math.floor(800 / weekly.length)) });
  wChart.timeScale().fitContent();
  const wLookup = new Map(weekly.map(w => [w.date, w]));
  attachChartTooltip({ chart: wChart, container: document.getElementById('daily-weekly-chart'), titleColor:'#f5f7fb',
    seriesConfigs:[{ series: wSeries, label:'Weekly Δ%', color:'#60a5fa', emphasis:true,
      getPoint: p => wLookup.get(typeof p.time === 'string' ? p.time : ''),
      formatValue: v => `${v >= 0 ? '+' : ''}${v.toFixed(2)}%` }],
    getTitle: p => { const w = wLookup.get(typeof p.time==='string'?p.time:''); return w ? formatDisplayDate(w.date) : ''; },
    getMetrics: () => [
      { label:'Pos weeks', value: weekly.filter(w=>w.pct>=0).length },
      { label:'Neg weeks', value: weekly.filter(w=>w.pct<0).length },
      { label:'Max', value:`+${Math.max(...weekly.map(w=>w.pct)).toFixed(2)}%` },
      { label:'Min', value:`${Math.min(...weekly.map(w=>w.pct)).toFixed(2)}%` },
    ],
  });

  // Frequency distribution
  const BUCKETS = [[-Infinity,-20],[-20,-15],[-15,-10],[-10,-5],[-5,0],[0,5],[5,10],[10,15],[15,20],[20,Infinity]];
  const BUCKET_LABELS = ['< -20%','-20 to -15%','-15 to -10%','-10 to -5%','-5 to 0%','0 to 5%','5 to 10%','10 to 15%','15 to 20%','> 20%'];
  const counts = BUCKETS.map(([lo,hi]) => weekly.filter(w => w.pct >= lo && w.pct < hi).length);
  const maxCount = Math.max(...counts, 1);
  const posCount = weekly.filter(w => w.pct >= 0).length;
  const negCount = weekly.length - posCount;

  let distHtml = `<div class="card-title" style="padding:12px 16px 8px;">Frequency Distribution</div><div style="padding:0 16px 12px;">`;
  counts.forEach((c, i) => {
    const isPos = BUCKETS[i][0] >= 0;
    const barColor = isPos ? 'var(--positive)' : 'var(--negative)';
    const barW = (c / maxCount * 100).toFixed(1);
    distHtml += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-family:var(--font-mono);font-size:11px;">
      <span style="width:110px;text-align:right;color:var(--text-secondary);flex-shrink:0;">${BUCKET_LABELS[i]}</span>
      <div style="flex:1;background:var(--bg-primary);border-radius:2px;height:14px;position:relative;">
        <div style="width:${barW}%;height:100%;background:${barColor};opacity:0.7;border-radius:2px;"></div>
      </div>
      <span style="width:24px;text-align:right;color:var(--text-primary);font-weight:600;">${c}</span>
    </div>`;
  });
  distHtml += '</div>';
  document.getElementById('daily-dist').innerHTML = distHtml;

  const posPct = weekly.length ? (posCount/weekly.length*100).toFixed(1) : 0;
  const negPct = weekly.length ? (negCount/weekly.length*100).toFixed(1) : 0;
  document.getElementById('daily-posnegtable').innerHTML = `
    <div class="card-title" style="padding:12px 16px 8px;">Territory Split</div>
    <div style="padding:0 16px 12px;display:flex;flex-direction:column;gap:8px;">
      <div style="background:rgba(0,255,136,0.1);border:1px solid var(--positive);border-radius:6px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--positive);font-weight:600;font-size:13px;">Positive Territory</span>
        <span style="font-family:var(--font-mono);font-weight:700;">${posCount} <span style="color:var(--positive);">${posPct}%</span></span>
      </div>
      <div style="background:rgba(255,68,85,0.1);border:1px solid var(--negative);border-radius:6px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--negative);font-weight:600;font-size:13px;">Negative Territory</span>
        <span style="font-family:var(--font-mono);font-weight:700;">${negCount} <span style="color:var(--negative);">${negPct}%</span></span>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding-top:4px;">
        <div>Avg weekly Δ: <span style="color:var(--text-primary);">${(weekly.reduce((s,w)=>s+w.pct,0)/weekly.length).toFixed(2)}%</span></div>
        <div>Std dev: <span style="color:var(--text-primary);">${Math.sqrt(weekly.reduce((s,w)=>s+(w.pct-weekly.reduce((a,b)=>a+b.pct,0)/weekly.length)**2,0)/weekly.length).toFixed(2)}%</span></div>
        <div>Best week: <span style="color:var(--positive);">+${Math.max(...weekly.map(w=>w.pct)).toFixed(2)}%</span></div>
        <div>Worst week: <span style="color:var(--negative);">${Math.min(...weekly.map(w=>w.pct)).toFixed(2)}%</span></div>
      </div>
    </div>`;
}

function computeWeeklyChanges(data) {
  // Get last trading day close per ISO week — pure NG=F, no contract mixing
  const weekMap = new Map();
  data.forEach(pt => {
    const d = new Date(pt.date + 'T00:00:00');
    // Key: ISO year-week (Monday-based)
    const day = d.getDay() || 7; // 1=Mon..7=Sun
    const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
    const key = mon.toISOString().slice(0, 10);
    weekMap.set(key, pt); // overwrite = keeps last day of week
  });
  const weeks = [...weekMap.values()].sort((a, b) => a.date.localeCompare(b.date));
  const changes = [];
  for (let i = 1; i < weeks.length; i++) {
    const pct = (weeks[i].p - weeks[i-1].p) / weeks[i-1].p * 100;
    changes.push({ date: weeks[i].date, pct });
  }
  return changes;
}
</script>
