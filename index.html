function getSpreadInstrument() {
  const btn = document.querySelector('#spread-instrument-switch .segment-btn.active');
  return btn ? btn.dataset.val : 'hh';
}

function populateSpreadYears() {
  const sel = document.getElementById('spread-year');
  const front = document.getElementById('spread-front')?.value || 'Jan';
  const back = document.getElementById('spread-back')?.value || 'Feb';
  const currentVal = sel.value ? parseInt(sel.value, 10) : null;
  const instrument = getSpreadInstrument();
  const yearSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  // Live data years
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const years = [...yearSet]
    .sort((a, b) => b - a)
    .filter(y => computeSpread(front, back, y, instrument).points.length > 0);
  sel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  if (years.length) {
    const currentYear = new Date().getFullYear();
    const fallback = years.includes(currentYear) ? currentYear : years[0];
    sel.value = String(currentVal && years.includes(currentVal) ? currentVal : fallback);
  }
}

function scheduleSpreadChartUpdate(immediate = false) {
  immediate = immediate === true;
  if (STATE._spreadUpdateTimer) {
    clearTimeout(STATE._spreadUpdateTimer);
    STATE._spreadUpdateTimer = null;
  }

  if (immediate) {
    updateSpreadChart();
    return;
  }

  STATE._spreadUpdateTimer = setTimeout(() => {
    STATE._spreadUpdateTimer = null;
    updateSpreadChart();
  }, 60);
}

function computeSpread(frontMonth, backMonth, year, instrument = 'hh') {
  const cacheKey = `${instrument}|${frontMonth}|${backMonth}|${year}`;
  if (STATE.spreadCache[cacheKey]) return STATE.spreadCache[cacheKey];

  const legInfo = getSpreadLegInfo(frontMonth, backMonth, year, instrument);
  const t1 = legInfo.frontTicker;
  const t2 = legInfo.backTicker;
  const d1 = instrument === 'ttf' ? getTTFContractData(t1) : getContractData(t1);
  const d2 = instrument === 'ttf' ? getTTFContractData(t2) : getContractData(t2);
  if (d1.length === 0 || d2.length === 0) {
    const empty = { points: [], stats: { min: 0, max: 0, avg: 0, count: 0 } };
    STATE.spreadCache[cacheKey] = empty;
    return empty;
  }
  // Build map for d2
  const d2map = {};
  d2.forEach(pt => { d2map[pt.d] = pt.p; });
  const spread = [];
  d1.forEach(pt => {
    if (d2map[pt.d] !== undefined) {
      spread.push({ d: pt.d, date: pt.date, value: pt.p - d2map[pt.d] });
    }
  });
  const result = {
    points: spread,
    stats: getSeriesStats(spread, point => point.value),
  };
  STATE.spreadCache[cacheKey] = result;
  return result;
}

function getSpreadReferenceMetrics(frontMonth, backMonth, year, instrument, referenceDay) {
  if (!Number.isFinite(referenceDay)) {
    return { allTime: null, avg5y: null, avg10y: null, priorYearsCount: 0, historyStart: null, historyEnd: null };
  }

  const instrumentStore = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  const yearSet = new Set();
  [frontMonth, backMonth].forEach(month => {
    if (!instrumentStore[month]) return;
    Object.keys(instrumentStore[month].contracts).forEach(ticker => {
      const yr = parseInt(ticker.slice(3), 10);
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });

  const availableYears = [...yearSet].sort((a, b) => a - b);
  const referenceRows = availableYears
    .filter(yr => yr < year)
    .sort((a, b) => b - a)
    .map(yr => {
      const spreadResult = computeSpread(frontMonth, backMonth, yr, instrument);
      if (!spreadResult.points.length) return null;
      const point = spreadResult.points.find(entry => entry.d === referenceDay);
      return point ? { yr, value: point.value } : null;
    })
    .filter(Boolean);

  const avgFor = rows => rows.length
    ? rows.reduce((sum, row) => sum + row.value, 0) / rows.length
    : null;

  return {
    allTime: avgFor(referenceRows),
    avg5y: avgFor(referenceRows.filter(row => row.yr >= year - 5)),
    avg10y: avgFor(referenceRows.filter(row => row.yr >= year - 10)),
    priorYearsCount: referenceRows.length,
    historyStart: availableYears.length ? availableYears[0] : null,
    historyEnd: availableYears.length ? availableYears[availableYears.length - 1] : null,
  };
}

function updateSpreadChart() {
  const front = document.getElementById('spread-front').value;
  const back = document.getElementById('spread-back').value;
  const year = parseInt(document.getElementById('spread-year').value);
  if (!year) return;

  const instrument = getSpreadInstrument();
  const header = document.getElementById('spread-header');
  if (header) {
    const isHH = instrument === 'hh';
    const isTTF = instrument === 'ttf';
    let badge = '';
    if ((isHH && STATE.hhCacheUsed) || (isTTF && STATE.ttfCacheUsed)) {
      const isStale = isHH ? STATE.hhCacheStale : STATE.ttfCacheStale;
      const age = isHH ? STATE.hhCacheAge : STATE.ttfCacheAge;
      badge = isStale 
        ? `<span class="ctrl-hint-badge" style="color:var(--warning);border-color:var(--warning);margin-left:8px;">⚠️ STALE CACHE (${age}h ago)</span>`
        : `<span class="ctrl-hint-badge" style="color:var(--warning);border-color:var(--warning);margin-left:8px;">🟡 CACHED (${age}h ago)</span>`;
    }
    const oldBadge = header.querySelector('.ctrl-hint-badge');
    if (oldBadge) oldBadge.remove();
    if (badge) {
      const temp = document.createElement('div');
      temp.innerHTML = badge;
      header.querySelector('.ch-top').appendChild(temp.firstElementChild);
    }
  }

  const legInfo = getSpreadLegInfo(front, back, year, instrument);
  const unit = instrument === 'ttf' ? 'EUR/MWh' : 'USD/MMBtu';
  document.getElementById('spread-desc').textContent = `${legInfo.longLabel} Calendar Spread · ${instrument === 'ttf' ? 'Dutch TTF' : 'Henry Hub'} · ${unit}`;

  const chartContainer = document.getElementById('spread-chart-container');
  const chart = createManagedChart('spread', 'main', chartContainer);
  const palette = getNeutralChartPalette();

  // Collect all years with data for selected instrument
  const allYearsSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const allYearsSorted = [...allYearsSet].sort((a, b) => b - a);

  // Init/reset visible years and range when pair/instrument changes
  const currentYear = new Date().getFullYear();
  const pairKey = `${instrument}|${front}|${back}`;
  if (!STATE.spreadPinnedYears) {
    const defaults = new Set();
    const historicalDefaults = allYearsSorted
      .filter(y => y < currentYear)
      .slice(0, 4);
    historicalDefaults.forEach(y => defaults.add(y));
    STATE.spreadPinnedYears = defaults;
  }

  if (STATE.spreadPairKey !== pairKey) {
    STATE.spreadPairKey = pairKey;
    STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  }
  STATE.spreadVisibleYears = new Set(STATE.spreadPinnedYears || []);
  STATE.spreadVisibleYears.add(year);
  STATE.spreadSeriesMap = new Map();

  const tableRows = [];
  let selectedSeries = null;
  let selectedLookup = new Map();
  let selectedStats = { min: 0, max: 0, avg: 0, count: 0 };
  let selectedLastPoint = null;

  // Render oldest→newest so selected year draws on top
  [...allYearsSorted].reverse().forEach(yr => {
    const spreadResult = computeSpread(front, back, yr, instrument);
    const sp = spreadResult.points;
    if (sp.length === 0) return;
    const isSelected = yr === year;
    const visible = STATE.spreadVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    const lineWidth = isSelected ? 2.5 : 1.2;
    const series = chart.addLineSeries({
      color, lineWidth,
      priceLineVisible: false,
      lastValueVisible: false,
      crosshairMarkerVisible: isSelected,
      visible,
    });
    series.setData(sp.map(pt => ({ time: dayToTime(pt.d), value: pt.value })));
    STATE.spreadSeriesMap.set(yr, series);
    if (isSelected) {
      selectedSeries = series;
      selectedLookup = new Map(sp.map(point => [timeKey(dayToTime(point.d)), point]));
      selectedStats = spreadResult.stats;
      selectedLastPoint = sp[sp.length - 1] || null;
    }
    const last = sp[sp.length - 1].value;
    
    const getValAt = d => { const pt = sp.find(p => p.d === d); return pt ? pt.value : null; };
    const getPenult = () => getValAt(518); // T-Day 518 (penultimate contract day)
    tableRows.push({ 
      yr, last, max: spreadResult.stats.max, min: spreadResult.stats.min, avg: spreadResult.stats.avg, days: sp.length,
      at519: getValAt(519),
      at90: getValAt(90),
      at10: getValAt(10),
      penult: getValAt(518)
    });

  });

  // KPI bar
  const kpiEl = document.getElementById('spread-kpis');
  if (kpiEl && tableRows.length) {
    const curRow = tableRows.find(r => r.yr === year);
    const curLast = curRow ? curRow.last : null;
    const referenceDay = computeSpread(front, back, year, instrument).points.at(-1)?.d ?? null;
    const refs = getSpreadReferenceMetrics(front, back, year, instrument, referenceDay);
    const delta5y = refs.avg5y != null && curLast != null ? curLast - refs.avg5y : null;
    const delta10y = refs.avg10y != null && curLast != null ? curLast - refs.avg10y : null;
    const pct5y = getSpreadRelativePercent(curLast, refs.avg5y);
    const pct10y = getSpreadRelativePercent(curLast, refs.avg10y);
    const refAvailabilityNote = getSpreadReferenceAvailabilityMessage(refs, year, instrument);
    const chip = (label, val, color = 'var(--text-primary)') =>
      `<div class="ctrl-group"><div class="ctrl-group-label">${label}</div><div style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:${color};">${val}</div></div>`;
    const sep = `<div class="ctrl-sep"></div>`;
    const formatKpiSpread = value => Number.isFinite(value) ? formatSignedSpread(value) : 'N/A';
    const formatDeltaWithPercent = (delta, pct, reference, color) => {
      if (!Number.isFinite(delta)) return 'N/A';
      if (!isMeaningfulSpreadRelativePercent(reference, pct)) return formatSignedSpread(delta);
      const pctText = formatSignedPercent(pct);
      if (!pctText) return formatSignedSpread(delta);
      return `${formatSignedSpread(delta)} <span style="font-size:12px;color:${color};opacity:0.82;">(${pctText})</span>`;
    };
    kpiEl.innerHTML = [
      chip('Ref T-Day', referenceDay != null ? String(referenceDay) : '—'),
      sep,
      chip('All-Time Ref', formatKpiSpread(refs.allTime)),
      sep,
      chip('5Y Ref', formatKpiSpread(refs.avg5y)),
      sep,
      chip('10Y Ref', formatKpiSpread(refs.avg10y)),
      sep,
      chip('Curr - 5Y', formatDeltaWithPercent(delta5y, pct5y, refs.avg5y, delta5y != null ? (delta5y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'), delta5y != null ? (delta5y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'),
      sep,
      chip('Curr - 10Y', formatDeltaWithPercent(delta10y, pct10y, refs.avg10y, delta10y != null ? (delta10y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'), delta10y != null ? (delta10y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'),
    ].join('') + (refAvailabilityNote
      ? `<div style="flex-basis:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--text-muted);">${refAvailabilityNote}</div>`
      : '');
  }

  // Year legend chips
  const legendEl = document.getElementById('spread-legend');
  if (legendEl) {
    const yearsWithData = allYearsSorted.filter(yr => {
      const r = computeSpread(front, back, yr, instrument);
      return r.points.length > 0;
    });
    legendEl.innerHTML = yearsWithData.map(yr => {
      const on = STATE.spreadVisibleYears.has(yr);
      const color = yr === year ? '#ffffff' : getSpreadYearColor(yr);
      const isSelected = yr === year;
      return `<span data-spread-yr="${yr}" onclick="toggleSpreadYear(${yr})" style="
        display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
        border:1px solid ${on ? color : 'rgba(255,255,255,0.15)'};
        background:${on ? color + '22' : 'transparent'};
        opacity:${on ? '1' : '0.28'};
        cursor:pointer;font-family:var(--font-mono);font-size:11px;
        color:${color};font-weight:${isSelected ? '700' : '400'};
        transition:opacity 0.15s,background 0.15s;
        ${isSelected ? 'box-shadow:0 0 0 1px '+color+';' : ''}
      "><span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${yr}</span>`;
    }).join('');
  }

  // Zero line
  const zeroLine = chart.addLineSeries({
    color: palette.zero, lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  const allSpreads = computeSpread(front, back, year, instrument).points;
  if (allSpreads.length > 0) {
    zeroLine.setData([
      { time: dayToTime(1), value: 0 },
      { time: dayToTime(allSpreads[allSpreads.length - 1].d), value: 0 },
    ]);
  }

  applyChartTimeScaleOptions(chart, {
    formatter: buildDateAxisFormatter(time => selectedLookup.get(timeKey(time))),
    barSpacing: getChartBarSpacing(allSpreads.length || 80),
  });
  chart.timeScale().fitContent();
  if (selectedSeries) {
    attachChartTooltip({
      chart,
      container: chartContainer,
      titleColor: '#f5f7fb',
      seriesConfigs: [{
        series: selectedSeries,
        label: legInfo.shortLabel,
        color: palette.main,
        emphasis: true,
        getPoint: param => selectedLookup.get(timeKey(param.time)),
        formatValue: value => value.toFixed(3),
      }],
      getTitle: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? formatDisplayDate(point.date) : `${legInfo.shortLabel} spread`;
      },
      getSubtitle: () => `${legInfo.longLabel} spread`,
      getMetrics: param => {
        const point = selectedLookup.get(timeKey(param.time));
        if (!point) return [];
        return [
          { label: 'Max', value: selectedStats.max.toFixed(3) },
          { label: 'Min', value: selectedStats.min.toFixed(3) },
          { label: 'Avg', value: selectedStats.avg.toFixed(3) },
          { label: 'T-Day', value: String(point.d) },
        ];
      },
      getNote: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? `T-Day ${point.d} • ${legInfo.longLabel} calendar spread` : '';
      },
    });
  }

  // Update header price/change
  const priceEl = document.getElementById('spread-price');
  const changeEl = document.getElementById('spread-change');
  if (priceEl) {
    if (tableRows.length > 0) {
      const selected = tableRows.find(r => r.yr === year);
      if (selected) {
        const sign = selected.last >= 0 ? '+' : '';
        priceEl.textContent = `${sign}${selected.last.toFixed(3)}`;
        priceEl.style.color = selected.last >= 0 ? 'var(--positive)' : 'var(--negative)';
        if (changeEl) changeEl.textContent = `${legInfo.shortLabel} · ref T-Day ${allSpreads.at(-1)?.d ?? '—'}`;
      }
    } else {
      priceEl.textContent = '--';
      if (changeEl) changeEl.textContent = '';
    }
  }

  // Table with sticky header + rank + position bar
  const allLasts = tableRows.map(r => r.last).filter(Number.isFinite);
  const lastMin = allLasts.length ? Math.min(...allLasts) : 0;
  const lastMax = allLasts.length ? Math.max(...allLasts) : 1;
  const lastRange = lastMax - lastMin || 1;
  const sortedDesc = [...allLasts].sort((a, b) => b - a);

  const SCROLL_WRAP = inner => `<div style="overflow-x:auto;">${inner}</div>`;

  let html = `<div class="card-title" style="padding:12px 16px 8px;">${legInfo.shortLabel} Spread History <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${tableRows.length} years</span></div>`;
  html += SCROLL_WRAP(`<table><thead><tr>
    <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;">Year</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Last</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Rank</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Max</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Min</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">Avg</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">AT-519</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">AT-PENULT</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">AT-90D</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;">AT-10D</th>
  </tr></thead><tbody>`);

  tableRows.sort((a, b) => b.yr - a.yr).forEach(r => {
    const cls = r.last >= 0 ? 'positive' : 'negative';
    const rank = Number.isFinite(r.last) ? sortedDesc.indexOf(r.last) + 1 : null;
    const rankOf = `#${rank}<span style="color:var(--text-muted);font-size:10px;">/${allLasts.length}</span>`;
    const barW = ((r.last - lastMin) / lastRange * 44).toFixed(1);
    const barColor = r.last >= 0 ? 'var(--positive)' : 'var(--negative)';
    const bar = `<span style="display:inline-block;width:${barW}px;height:3px;background:${barColor};border-radius:2px;vertical-align:middle;opacity:0.55;margin-left:4px;"></span>`;
    const rowStyle = r.yr === year ? 'background:rgba(157,78,221,0.08);font-weight:600;' : '';
    const sign = r.last >= 0 ? '+' : '';
    html += `<tr style="${rowStyle}cursor:pointer;" title="View ${front} ${r.yr} in Prices tab" onclick="navigateTo('prices',{month:'${front}',year:'${r.yr}'})">
      <td style="text-align:left;">${r.yr}</td>
      <td class="${cls}">${sign}${r.last.toFixed(3)}${bar}</td>
      <td style="font-family:var(--font-mono);font-size:11px;">${rank ? rankOf : '—'}</td>
      <td>${r.max.toFixed(3)}</td>
      <td>${r.min.toFixed(3)}</td>
      <td>${r.avg.toFixed(3)}</td>
      <td>${r.at519 != null ? r.at519.toFixed(3) : '—'}</td>
      <td>${r.penult != null ? r.penult.toFixed(3) : '—'}</td>
      <td>${r.at90 != null ? r.at90.toFixed(3) : '—'}</td>
      <td>${r.at10 != null ? r.at10.toFixed(3) : '—'}</td>
    </tr>`;
  });

  // Compute summary stats
  const calcAvg = key => {
    const vals = tableRows.map(r => r[key]).filter(Number.isFinite);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  const calcAvg5y = key => {
    const vals = tableRows.filter(r => r.yr > currentYear - 5 && r.yr <= currentYear).map(r => r[key]).filter(Number.isFinite);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };

  const sums = {
    all: { last: calcAvg('last'), max: calcAvg('max'), min: calcAvg('min'), avg: calcAvg('avg'), at519: calcAvg('at519'), penult: calcAvg('penult'), at90: calcAvg('at90'), at10: calcAvg('at10') },
    y5: { last: calcAvg5y('last'), max: calcAvg5y('max'), min: calcAvg5y('min'), avg: calcAvg5y('avg'), at519: calcAvg5y('at519'), penult: calcAvg5y('penult'), at90: calcAvg5y('at90'), at10: calcAvg5y('at10') }
  };

  const mkRow = (label, data) => `
    <tr style="background:var(--bg-card);font-weight:600;border-top:1px solid rgba(255,255,255,0.1);">
      <td style="text-align:left;">${label}</td>
      <td>${data.last != null ? data.last.toFixed(3) : '—'}</td>
      <td>—</td>
      <td>${data.max != null ? data.max.toFixed(3) : '—'}</td>
      <td>${data.min != null ? data.min.toFixed(3) : '—'}</td>
      <td>${data.avg != null ? data.avg.toFixed(3) : '—'}</td>
      <td>${data.at519 != null ? data.at519.toFixed(3) : '—'}</td>
      <td>${data.penult != null ? data.penult.toFixed(3) : '—'}</td>
      <td>${data.at90 != null ? data.at90.toFixed(3) : '—'}</td>
      <td>${data.at10 != null ? data.at10.toFixed(3) : '—'}</td>
    </tr>
  `;
  html = html.replace('</tbody>', mkRow('Avg (All Time)', sums.all) + mkRow('Avg (Last 5Y)', sums.y5) + '</tbody>');

  html += `</tbody></table></div>`;
  document.getElementById('spread-table').innerHTML = html;

  // Store refs and sync range footer
  STATE._spreadChart = chart;
  STATE._spreadSelectedPoints = allSpreads; // selected year's points
  STATE._spreadSelectedSeries = selectedSeries;
  STATE._spreadSelectedLastPoint = selectedLastPoint;
  syncSpreadRangeFooter();
  renderSpreadAxisLabel();
}

function syncSpreadRangeFooter() {
  const points = STATE._spreadSelectedPoints;
  const chart = STATE._spreadChart;
  if (!points || !points.length || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  const view = STATE.spreadView;
  const start = clamp(Number.isFinite(view.rangeStart) ? view.rangeStart : 0, 0, maxIdx);
  const end = clamp(view.rangeEnd != null ? view.rangeEnd : maxIdx, 0, maxIdx);
  view.rangeStart = start; view.rangeEnd = end;

  const startSlider = document.getElementById('spread-window-start');
  const endSlider   = document.getElementById('spread-window-end');
  const selection   = document.getElementById('spread-range-selection');
  const minLabel    = document.getElementById('spread-range-min-label');
  const maxLabel    = document.getElementById('spread-range-max-label');
  const helperEl    = document.getElementById('spread-range-helper');
  const readoutEl   = document.getElementById('spread-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min='0'; s.max=String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(start); endSlider.value = String(end);

  const pct = getRangeSelectionPercent(points.length, start, end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = formatRangeEdgeLabel(points[0].date);
  if (maxLabel) maxLabel.textContent = formatRangeEdgeLabel(points[maxIdx].date);

  const count = end - start + 1;
  if (helperEl) helperEl.textContent = count >= points.length
    ? 'Full span across available history'
    : `${count} days selected · drag handles to move or resize`;
  if (readoutEl) readoutEl.innerHTML = count >= points.length
    ? `<span>${formatDisplayDate(points[0].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[maxIdx].date)}</span><span style="color:var(--text-muted);">|</span><span>Full span</span>`
    : `<span>${formatDisplayDate(points[start].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[end].date)}</span><span style="color:var(--text-muted);">|</span><span>${count} days</span><span style="color:var(--text-muted);">|</span><span>${count}/${points.length} pts</span>`;

  if (start > 0 || end < maxIdx) {
    chart.timeScale().setVisibleRange({ from: dayToTime(points[start].d), to: dayToTime(points[end].d) });
  } else {
    chart.timeScale().fitContent();
  }
  renderSpreadAxisLabel();
}

function onSpreadSlider() {
  const points = STATE._spreadSelectedPoints;
  const chart  = STATE._spreadChart;
  if (!points || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  let start = clamp(parseInt(document.getElementById('spread-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('spread-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('spread-window-start').value = String(start); }
  STATE.spreadView.rangeStart = start; STATE.spreadView.rangeEnd = end;
  syncSpreadRangeFooter();
}

async function buildSpreadHeatmap(force = false) {
  const heatmapEl = document.getElementById('spread-heatmap');
  if (!heatmapEl) return;
  const instrument = getSpreadInstrument();
  const cacheKey = `${instrument}|last5`;
  syncSpreadHeatmapTitle();
  if (force || STATE.spreadHeatmapKey !== cacheKey) {
    STATE.spreadHeatmapHtml = '';
    STATE.spreadHeatmapKey = cacheKey;
  }
  if (STATE.spreadHeatmapHtml) {
    heatmapEl.innerHTML = STATE.spreadHeatmapHtml;
    return;
  }

  // 12x12 grid: front(row) x back(col)
  const currentYear = new Date().getFullYear();
  let html = '<table style="font-size:11px;"><thead><tr><th></th>';
  for (const month of MONTHS) {
    html += `<th style="text-align:center;padding:4px 6px;">${month.slice(0,3)}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (let fi = 0; fi < MONTHS.length; fi++) {
    const front = MONTHS[fi];
    html += `<tr><td style="text-align:left;font-weight:600;padding:4px 6px;">${front.slice(0,3)}</td>`;
    for (let bi = 0; bi < MONTHS.length; bi++) {
      const back = MONTHS[bi];
      if (fi === bi) { html += '<td style="background:var(--bg-primary);"></td>'; continue; }
      // Compute avg spread across last 5 years
      let sum = 0, count = 0;
      for (let yr = currentYear - 5; yr < currentYear; yr++) {
        const spreadResult = computeSpread(front, back, yr, instrument);
        if (spreadResult.points.length > 0) {
          sum += spreadResult.stats.avg;
          count++;
        }
      }
      const avg = count > 0 ? sum / count : null;
      const intensity = avg != null ? Math.min(Math.abs(avg) / 2, 1) : 0;
      const color = avg == null
        ? 'transparent'
        : (avg > 0 ? `rgba(0,255,136,${intensity * 0.4})` : `rgba(255,68,85,${intensity * 0.4})`);
      const cursor = avg == null ? 'default' : 'pointer';
      const value = avg == null ? '—' : avg.toFixed(2);
      const click = avg == null ? '' : ` onclick="setSpreadPair('${front}','${back}')"`;
      html += `<td style="text-align:center;padding:4px 6px;background:${color};cursor:${cursor};font-family:var(--font-mono);font-size:11px;"${click}>${value}</td>`;
    }
    html += '</tr>';
    await yieldToBrowser();
  }
  html += '</tbody></table>';
  STATE.spreadHeatmapHtml = html;
  heatmapEl.innerHTML = html;
}


// ─── SPREADS UPGRADE 11: LIFECYCLE RESOLUTION CHART ───────────────────────
let _resolutionMode = 'all';

function renderSpreadResolutionChart() {
  const container = document.getElementById('spread-resolution-chart');
  if (!container) return;

  const front = document.getElementById('spread-front').value;
  const back = document.getElementById('spread-back').value;
  const year = parseInt(document.getElementById('spread-year').value);
  if (!year) return;
  const instrument = getSpreadInstrument();

  const chart = createManagedChart('spread', 'resolution', container);
  const palette = getNeutralChartPalette();

  // Draw zero line
  const zeroLine = chart.addLineSeries({
    color: palette.zero, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false
  });
  const _zeroBase = new Date('2000-01-01T00:00:00Z').getTime();
  const _zeroStart = new Date(_zeroBase + 1 * 86400000).toISOString().split('T')[0];
  const _zeroEnd   = new Date(_zeroBase + 519 * 86400000).toISOString().split('T')[0];
  zeroLine.setData([{ time: _zeroStart, value: 0 }, { time: _zeroEnd, value: 0 }]);

  // Gather years based on mode
  const currentYear = new Date().getFullYear();
  const allYearsSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  
  const allYearsSorted = [...allYearsSet].sort((a, b) => b - a);
  STATE._resolutionAvailableYears = allYearsSorted.filter(y => computeSpread(front, back, y, instrument).points.length > 0);

  // Init/reset pinned years on pair change
  const pairKey = `${instrument}|${front}|${back}`;
  if (STATE.resolutionPairKey !== pairKey) {
    STATE.resolutionPairKey = pairKey;
    const defaults = new Set();
    STATE._resolutionAvailableYears.filter(y => y < currentYear).slice(0, 4).forEach(y => defaults.add(y));
    STATE.resolutionPinnedYears = defaults;
    STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
  }
  
  STATE.resolutionVisibleYears = new Set(STATE.resolutionPinnedYears || []);
  STATE.resolutionVisibleYears.add(year);
  STATE.resolutionSeriesMap = new Map();
  STATE._resolutionChart = chart;
  STATE._resolutionYearData = new Map();

  let yearsToPlot = [...STATE._resolutionAvailableYears].sort((a, b) => a - b);
  // Filtering mode (All/5Y/Current) still restricts what's added to chart initially
  if (_resolutionMode === '5y') {
    yearsToPlot = yearsToPlot.filter(y => y > currentYear - 5 && y <= currentYear);
  } else if (_resolutionMode === 'current') {
    yearsToPlot = [year];
  }

  const seriesConfigs = [];

  // Draw oldest first
  yearsToPlot.forEach(yr => {
    const spreadResult = computeSpread(front, back, yr, instrument);
    const sp = spreadResult.points;
    if (sp.length === 0) return;

    const isSelected = yr === year;
    const visible = STATE.resolutionVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    const lineWidth = isSelected ? 2.5 : (_resolutionMode === 'all' ? 1.2 : 1.5);
    const series = chart.addLineSeries({
      color, lineWidth,
      priceLineVisible: false, lastValueVisible: isSelected,
      crosshairMarkerVisible: isSelected || _resolutionMode !== 'all',
      visible,
      priceFormat: { type: 'custom', formatter: v => formatSignedSpread(v, 3), minMove: 0.001 }
    });
    
    const dataToPlot = [];
    const localLookup = new Map();
    sp.forEach(pt => {
      const d = pt.d;
      const baseMs = new Date("2000-01-01T00:00:00Z").getTime();
      const fakeTimeStr = new Date(baseMs + d * 86400000).toISOString().split('T')[0];
      dataToPlot.push({ time: fakeTimeStr, value: pt.value });
      localLookup.set(fakeTimeStr, pt);
    });
    series.setData(dataToPlot);
    STATE.resolutionSeriesMap.set(yr, series);
    STATE._resolutionYearData.set(yr, sp);

    seriesConfigs.push({
      series, label: `${yr}`, color, emphasis: isSelected,
      getPoint: p => localLookup.get(typeof p.time === 'string' ? p.time : ''),
      formatValue: v => formatSignedSpread(v, 3)
    });
  });

  // Render Legend
  const legendEl = document.getElementById('spread-resolution-legend');
  if (legendEl) {
    const yearsInChart = yearsToPlot.sort((a, b) => b - a);
    legendEl.innerHTML = yearsInChart.map(yr => {
      const on = STATE.resolutionVisibleYears.has(yr);
      const isSelected = yr === year;
      const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
      return `<span data-resolution-yr="${yr}" onclick="toggleResolutionYear(${yr})" style="
        display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
        border:1px solid ${on ? color : 'rgba(255,255,255,0.15)'};
        background:${on ? color + '22' : 'transparent'};
        opacity:${on ? '1' : '0.28'};
        cursor:pointer;font-family:var(--font-mono);font-size:11px;
        color:${color};font-weight:${isSelected ? '700' : '400'};
        transition:opacity 0.15s,background 0.15s;
        ${isSelected ? 'box-shadow:0 0 0 1px '+color+';' : ''}
      "><span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${yr}</span>`;
    }).join('') + `
      <div style="flex-grow:1;"></div>
      <span onclick="toggleAllResolutionYears(true)" style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">ALL</span>
      <span onclick="toggleAllResolutionYears(false)" style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">NONE</span>
    `;
  }
  
  applyChartTimeScaleOptions(chart, {
    formatter: time => {
      // Convert time back to T-Day
      const d = (new Date(time).getTime() - new Date("2000-01-01T00:00:00Z").getTime()) / 86400000;
      return `T-${519 - Math.round(d)}`;
    },
    barSpacing: 2,
    fixLeftEdge: false,
    fixRightEdge: false
  });
  chart.timeScale().fitContent();

  if (seriesConfigs.length) {
    attachChartTooltip({
      chart, container, titleColor: '#f5f7fb',
      seriesConfigs: seriesConfigs.reverse(), // Put newest/selected at top
      getTitle: p => {
        const d = (new Date(p.time).getTime() - new Date("2000-01-01T00:00:00Z").getTime()) / 86400000;
        return `T-${519 - Math.round(d)}`;
      },
      getMetrics: p => []
    });
  }
  syncResolutionRangeFooter();
}

function onResolutionSlider() {
  const chart = STATE._resolutionChart;
  if (!chart) return;
  if (!STATE.resolutionView) STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
  let start = parseInt(document.getElementById('resolution-window-start').value) || 1;
  let end   = parseInt(document.getElementById('resolution-window-end').value) || 519;
  if (start >= end) { start = Math.max(1, end - 1); document.getElementById('resolution-window-start').value = String(start); }
  STATE.resolutionView.rangeStart = start;
  STATE.resolutionView.rangeEnd = end;
  syncResolutionRangeFooter();
}

function syncResolutionRangeFooter() {
  const chart = STATE._resolutionChart;
  if (!chart) return;
  if (!STATE.resolutionView) STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
  const view = STATE.resolutionView;
  
  const startSlider = document.getElementById('resolution-window-start');
  const endSlider   = document.getElementById('resolution-window-end');
  const selection   = document.getElementById('resolution-range-selection');
  const readout     = document.getElementById('resolution-range-readout');
  const helper      = document.getElementById('resolution-range-helper');

  if (!startSlider) return;

  const start = view.rangeStart;
  const end = view.rangeEnd;
  
  const pctStart = ((start - 1) / 518) * 100;
  const pctEnd = ((end - 1) / 518) * 100;
  if (selection) {
    selection.style.left = `${pctStart}%`;
    selection.style.width = `${pctEnd - pctStart}%`;
  }
  
  const count = end - start + 1;
  if (readout) {
    readout.innerHTML = `<span>T-${519 - start}</span> <span style="color:var(--text-muted);">to</span> <span>T-${519 - end}</span> <span style="color:var(--text-muted);">|</span> <span>${count} days</span>`;
  }
  if (helper) {
    helper.textContent = count >= 519 ? 'Full lifecycle' : `${count} days selected`;
  }
  
  // Use same consecutive-day formula as renderSpreadResolutionChart (NOT dayToTime which skips weekends)
  const _resBase = new Date("2000-01-01T00:00:00Z").getTime();
  const resolutionDayToTime = d => new Date(_resBase + d * 86400000).toISOString().split('T')[0];
  if (start > 1 || end < 519) {
    chart.timeScale().setVisibleRange({ from: resolutionDayToTime(start), to: resolutionDayToTime(end) });
  } else {
    chart.timeScale().fitContent();
  }
  updateResolutionKPI(start, end);
}

function updateResolutionKPI(start, end) {
  const kpiEl = document.getElementById('resolution-kpi');
  if (!kpiEl || !STATE._resolutionYearData) return;
  const visYears = STATE.resolutionVisibleYears || new Set();
  const front = document.getElementById('spread-front')?.value;
  const back  = document.getElementById('spread-back')?.value;
  const instrument = document.getElementById('spread-instrument')?.value || 'hh';
  const selectedYear = parseInt(document.getElementById('spread-year')?.value, 10);
  const items = [];
  [...STATE._resolutionYearData.entries()]
    .filter(([yr]) => visYears.has(yr))
    .sort(([a], [b]) => b - a)
    .forEach(([yr, sp]) => {
      const pts = sp.filter(pt => pt.d >= start && pt.d <= end).map(pt => pt.value);
      if (!pts.length) return;
      const avg = pts.reduce((s, v) => s + v, 0) / pts.length;
      const mn = Math.min(...pts);
      const mx = Math.max(...pts);
      const color = yr === selectedYear ? '#ffffff' : getSpreadYearColor(yr);
      items.push(`<div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;border:1px solid ${color}33;background:${color}11;">
        <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:${color};font-weight:${yr===selectedYear?'700':'400'};">${yr}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">avg</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">${formatSignedSpread(avg,3)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">${formatSignedSpread(mn,3)}/${formatSignedSpread(mx,3)}</span>
      </div>`);
    });
  kpiEl.innerHTML = items.join('');
}

function toggleResolutionYear(yr) {
  yr = parseInt(yr);
  const yearSelect = document.getElementById('spread-year');
  const selectedYear = parseInt(yearSelect?.value, 10);
  
  if (yr === selectedYear) return;
  
  if (!STATE.resolutionPinnedYears) STATE.resolutionPinnedYears = new Set();
  if (STATE.resolutionPinnedYears.has(yr)) {
    STATE.resolutionPinnedYears.delete(yr);
  } else {
    STATE.resolutionPinnedYears.add(yr);
  }
  
  if (!STATE.resolutionVisibleYears) STATE.resolutionVisibleYears = new Set();
  STATE.resolutionVisibleYears = new Set(STATE.resolutionPinnedYears);
  STATE.resolutionVisibleYears.add(selectedYear);
  
  const on = STATE.resolutionPinnedYears.has(yr);
  const series = STATE.resolutionSeriesMap && STATE.resolutionSeriesMap.get(yr);
  if (series) series.applyOptions({ visible: on });
  
  const chip = document.querySelector(`[data-resolution-yr="${yr}"]`);
  if (chip) {
    const color = getSpreadYearColor(yr);
    chip.style.opacity = on ? '1' : '0.28';
    chip.style.background = on ? `${color}22` : 'transparent';
    chip.style.border = `1px solid ${on ? color : 'rgba(255,255,255,0.15)'}`;
  }
}

function toggleAllResolutionYears(on) {
  const yearSelect = document.getElementById('spread-year');
  const selectedYear = parseInt(yearSelect?.value, 10);
  
  if (!STATE.resolutionPinnedYears) STATE.resolutionPinnedYears = new Set();
  
  if (on) {
    (STATE._resolutionAvailableYears || []).forEach(y => {
      if (y !== selectedYear) STATE.resolutionPinnedYears.add(y);
    });
  } else {
    STATE.resolutionPinnedYears.clear();
  }
  
  renderSpreadResolutionChart();
}

function initSpreadResolutionEvents() {
  const container = document.getElementById('tab-spread');
  if (!container) return;
  
  const resMode = document.getElementById('spread-resolution-mode');
  if (resMode) {
    resMode.addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      document.querySelectorAll('#spread-resolution-mode .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _resolutionMode = btn.dataset.mode;
      
      // Auto-zoom slider on presets
      if (_resolutionMode === 'current') {
        const year = parseInt(document.getElementById('spread-year').value);
        const instrument = getSpreadInstrument();
        const front = document.getElementById('spread-front').value;
        const back = document.getElementById('spread-back').value;
        const sp = computeSpread(front, back, year, instrument).points;
        if (sp.length) {
          STATE.resolutionView = { rangeStart: sp[0].d, rangeEnd: sp[sp.length - 1].d };
        }
      } else {
        STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
      }
      
      renderSpreadResolutionChart();
    });
  }

  const startSlider = document.getElementById('resolution-window-start');
  const endSlider = document.getElementById('resolution-window-end');
  if (startSlider) startSlider.addEventListener('input', onResolutionSlider);
  if (endSlider) endSlider.addEventListener('input', onResolutionSlider);
}

function scheduleSpreadHeatmap(force = false) {
  const heatmapEl = document.getElementById('spread-heatmap');
  if (!heatmapEl) return;
  syncSpreadHeatmapTitle();
  const cacheKey = `${getSpreadInstrument()}|last5`;
  if (STATE.spreadHeatmapHtml && STATE.spreadHeatmapKey === cacheKey && !force) {
    heatmapEl.innerHTML = STATE.spreadHeatmapHtml;
    return;
  }
  if (STATE.spreadHeatmapPending && !force) return;

  STATE.spreadHeatmapPending = true;
  heatmapEl.innerHTML = '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);padding:8px 0;">COMPUTING HEATMAP...</div>';

  setTimeout(async () => {
    try {
      await buildSpreadHeatmap(force);
    } finally {
      STATE.spreadHeatmapPending = false;
    }
  }, 0);
}

<script>
function getForwardCurveStatusHtml() {
  const hhLive = STATE.hhLiveCount || 0;
  const ttfLive = STATE.ttfLiveCount || 0;
  const totalLive = hhLive + ttfLive;
  
  const getBadge = (used, stale, age) => {
    if (!used) return '';
    const color = stale ? 'var(--negative)' : 'var(--warning)';
    const text = stale ? 'STALE' : 'CACHED';
    const sym = stale ? '\u26A0' : '\u231B';
    return `<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid ${color};color:${color};margin-right:4px;font-weight:700;" title="${age}h ago">${sym} ${text}</span>`;
  };

  const hhBadge = getBadge(STATE.hhCacheUsed, STATE.hhCacheIsStale, STATE.hhCacheAgeH);
  const ttfBadge = getBadge(STATE.ttfCacheUsed, STATE.ttfCacheIsStale, STATE.ttfCacheAgeH);

  let html = `${hhBadge}HH: ${hhLive}/72 · ${ttfBadge}TTF: ${ttfLive}/36 quoted`;
  if (totalLive < 20 && totalLive > 0 && !STATE.hhCacheUsed && !STATE.ttfCacheUsed) {
    html = `<span style="color:var(--warning);font-weight:700;">\u26A0 PARTIAL DATA</span> \u2014 ` + html;
  }
  return html;
}

function getCurveSeason(monthIdx) {
  if ([10, 11, 0, 1].includes(monthIdx)) return 'winter';
  if ([4, 5, 6, 7].includes(monthIdx)) return 'summer';
  return 'shoulder';
}

function buildCurveSlot(baseDate, offset, instrument = 'hh') {
  const d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, 1);
  const yr = d.getFullYear();
  const monthIdx = d.getMonth();
  const month = MONTHS[monthIdx];
  const yy = yr % 100;
  const pad = yy < 10 ? '0' + yy : '' + yy;
  const prefix = instrument === 'ttf' ? 'TG' : 'NG';
  const ticker = `${prefix}${MONTH_CODES[month]}${pad}`;
  
  // Robust Priority chain: 
  // 1. Live Yahoo fetch
  const liveTicker = instrument === 'ttf' ? 'TTF' + ticker.slice(2) + '.NYM' : ticker + '.NYM';
  const liveDataExists = STATE.liveData[liveTicker] && STATE.liveData[liveTicker].length > 0;
  
  // 2. Historical local data
  const histData = (instrument === 'ttf' ? STATE.ttf : STATE.hh)[month]?.contracts?.[ticker];
  const histDataExists = histData && histData.length > 0;

  let source = 'missing';
  let data = [];
  
  if (liveDataExists) {
    source = 'live';
    data = instrument === 'ttf' ? getTTFContractData(ticker) : getContractData(ticker);
  } else if (histDataExists) {
    source = 'historical';
    data = histData;
  }

  const last = data.length ? data[data.length - 1] : null;

  return {
    ticker,
    month,
    year: yr,
    monthIdx,
    season: getCurveSeason(monthIdx),
    label: `${month.slice(0, 3)} ${String(yr).slice(2)}`,
    price: last && Number.isFinite(last.p) ? last.p : null,
    quoteDate: last && last.date ? last.date : null,
    pointCount: data.length,
    source, // 'live', 'historical', or 'missing'
  };
}

function isCurveQuoteFresh(slot, latestQuoteStamp) {
  if (!slot || !slot.quoteDate || !Number.isFinite(slot.price)) return false;
  if (!latestQuoteStamp) return true;
  const slotStamp = timeToStamp(slot.quoteDate);
  if (!slotStamp) return false;
  return ((latestQuoteStamp - slotStamp) / 86400000) <= FORWARD_CURVE_FRESHNESS_DAYS;
}

function summarizeCurveLabels(items, limit = 5) {
  const labels = (items || [])
    .map(item => typeof item === 'string' ? item : item.label)
    .filter(Boolean);
  if (!labels.length) return '';
  if (labels.length <= limit) return labels.join(', ');
  return `${labels.slice(0, limit).join(', ')} +${labels.length - limit} more`;
}

function formatCurveValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(3)}` : 'N/A';
}

function formatCurveAxisValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function formatCurvePointLabel(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function teardownCurveAnnotations() {
  if (STATE._curveAnnotationFrame) {
    cancelAnimationFrame(STATE._curveAnnotationFrame);
    STATE._curveAnnotationFrame = null;
  }
  if (STATE._curveResizeObserver) {
    STATE._curveResizeObserver.disconnect();
    STATE._curveResizeObserver = null;
  }
  if (STATE._curveTimeRangeListener && STATE._curveChart) {
    try {
      STATE._curveChart.timeScale().unsubscribeVisibleTimeRangeChange(STATE._curveTimeRangeListener);
      STATE._curveChart.timeScale().unsubscribeVisibleLogicalRangeChange(STATE._curveTimeRangeListener);
    } catch (_) {}
    STATE._curveTimeRangeListener = null;
  }
}

function ensureCurveAnnotationLayer(container) {
  if (!container) return null;
  let layer = container.querySelector('.curve-annotation-layer');
  if (!layer) {
    layer = document.createElement('div');
    layer.className = 'curve-annotation-layer';
    container.appendChild(layer);
  }
  return layer;
}

function bindCurveAnnotations(chart, container) {
  teardownCurveAnnotations();
  const rerender = () => scheduleCurveAnnotationRender();
  STATE._curveTimeRangeListener = rerender;
  chart.timeScale().subscribeVisibleTimeRangeChange(rerender);
  chart.timeScale().subscribeVisibleLogicalRangeChange(rerender);
  if (typeof ResizeObserver === 'function' && container) {
    const observer = new ResizeObserver(() => scheduleCurveAnnotationRender());
    observer.observe(container);
    STATE._curveResizeObserver = observer;
  }
}

function scheduleCurveAnnotationRender() {
  if (STATE._curveAnnotationFrame) cancelAnimationFrame(STATE._curveAnnotationFrame);
  STATE._curveAnnotationFrame = requestAnimationFrame(() => {
    STATE._curveAnnotationFrame = null;
    renderCurveAnnotations();
  });
}

function isCurveTurningPoint(points, index) {
  if (!Array.isArray(points) || index <= 0 || index >= points.length - 1) return false;
  const prev = points[index - 1] && points[index - 1].slot ? points[index - 1].slot.price : null;
  const curr = points[index] && points[index].slot ? points[index].slot.price : null;
  const next = points[index + 1] && points[index + 1].slot ? points[index + 1].slot.price : null;
  if (![prev, curr, next].every(Number.isFinite)) return false;
  const isPeak = curr >= prev && curr >= next && (curr > prev || curr > next);
  const isTrough = curr <= prev && curr <= next && (curr < prev || curr < next);
  return isPeak || isTrough;
}

function renderCurveAnnotations() {
  const chart = STATE._curveChart;
  const series = STATE._curveSeries;
  const windowContext = STATE._curveWindowContext;
  // Guard: windowSlots may be undefined on first render before syncCurveRangeFooter
  const slots = (windowContext && Array.isArray(windowContext.windowSlots) && windowContext.windowSlots.length > 0)
    ? windowContext.windowSlots
    : (Array.isArray(STATE._curveSlots) && STATE._curveSlots.length > 0 ? STATE._curveSlots : []);
  const container = document.getElementById('curve-chart-container');
  const layer = ensureCurveAnnotationLayer(container);
  if (!layer) return;

  if (!chart || !series || !slots.length) {
    layer.innerHTML = '';
    return;
  }

  const width = container.clientWidth || 0;
  const height = container.clientHeight || 0;
  // Clamp bottomInset so dots don't float too high on compact/narrow viewports
  const bottomInset = Math.max(20, Math.min(40, height * 0.06));
  const visiblePoints = slots
    .filter(slot => Number.isFinite(slot.price))
    .map(slot => ({
      slot,
      x: chart.timeScale().timeToCoordinate(slot.time),
      y: series.priceToCoordinate(slot.price),
    }))
    .filter(point =>
      Number.isFinite(point.x) &&
      Number.isFinite(point.y) &&
      point.x >= -24 &&
      point.x <= width + 24 &&
      point.y >= -24 &&
      point.y <= height + 24
    );

  if (!visiblePoints.length) {
    layer.innerHTML = '';
    return;
  }

  const spacings = [];
  for (let i = 1; i < visiblePoints.length; i++) {
    const gap = visiblePoints[i].x - visiblePoints[i - 1].x;
    if (gap > 0) spacings.push(gap);
  }
  spacings.sort((a, b) => a - b);
  const medianSpacing = spacings.length ? spacings[Math.floor(spacings.length / 2)] : width;
  const labelStride = Math.max(1, Math.ceil(38 / Math.max(medianSpacing, 10)));
  const lastVisibleIndex = visiblePoints.length - 1;

  let lastLabelX = -1000;
  const LABEL_MIN_DISTANCE = 36;

  layer.innerHTML = visiblePoints.map((point, index) => {
    const dropHeight = Math.max(10, height - point.y - bottomInset);
    const isTurning = isCurveTurningPoint(visiblePoints, index);
    
    // Logic: 
    // 1. Always show first and last.
    // 2. Show turning points if they aren't too close to the previous label.
    // 3. Show stride points if they aren't too close to the previous label.
    let showLabel = index === 0 || index === lastVisibleIndex;
    // Always show turning points (peaks/troughs) regardless of distance — critical price levels must be visible
    if (!showLabel && isTurning) {
      if (Math.abs(point.x - lastLabelX) > 28) {
        showLabel = true;
      }
    } else if (!showLabel && index % labelStride === 0) {
      if (Math.abs(point.x - lastLabelX) > LABEL_MIN_DISTANCE) {
        showLabel = true;
      }
    }

    if (showLabel) {
      lastLabelX = point.x;
    }

    return `<div class="curve-annotation" style="left:${point.x.toFixed(2)}px;top:${point.y.toFixed(2)}px;">
      <div class="curve-drop-line" style="height:${dropHeight.toFixed(2)}px;"></div>
      <div class="curve-drop-dot"></div>
      ${showLabel ? `<div class="curve-point-label">${formatCurvePointLabel(point.slot.price)}</div>` : ''}
    </div>`;
  }).join('');
}

function buildCurveAnchorData(slots) {
  if (!Array.isArray(slots) || !slots.length) return [];
  const nextFinite = new Array(slots.length).fill(null);
  let carryForward = null;
  for (let index = slots.length - 1; index >= 0; index--) {
    if (Number.isFinite(slots[index].price)) carryForward = slots[index].price;
    nextFinite[index] = carryForward;
  }

  let carryBack = null;
  return slots.map((slot, index) => {
    if (Number.isFinite(slot.price)) carryBack = slot.price;
    const anchorValue = Number.isFinite(slot.price) ? slot.price : (carryBack ?? nextFinite[index]);
    return Number.isFinite(anchorValue)
      ? { time: slot.time, value: anchorValue }
      : null;
  }).filter(Boolean);
}

function applyCurveVisibleWindow(chart, slots, start, end) {
  if (!chart || !Array.isArray(slots) || !slots.length) return;
  const maxIdx = slots.length - 1;
  const isFullWindow = start <= 0 && end >= maxIdx;
  const logicalPadding = 0.45;
  // Always use logical range — prevents the chart from rendering empty
  // pseudo-time space at the edges which causes spurious "Year 2000" labels.
  if (typeof chart.timeScale().setVisibleLogicalRange === 'function') {
    const from = Math.max(-0.5, start - logicalPadding);
    const to = Math.min(maxIdx + 0.5, end + logicalPadding);
    if (isFullWindow) {
      chart.timeScale().setVisibleLogicalRange({ from: -logicalPadding, to: maxIdx + logicalPadding });
    } else {
      chart.timeScale().setVisibleLogicalRange({ from, to });
    }
    return;
  }
  // Fallback: use time-based range
  if (isFullWindow) {
    chart.timeScale().fitContent();
    return;
  }
  chart.timeScale().setVisibleRange({
    from: slots[start].time,
    to: slots[end].time,
  });
}

function syncCurveVisibleWindow(chart, slots, start, end) {
  if (!chart || !Array.isArray(slots) || !slots.length) return;
  applyCurveVisibleWindow(chart, slots, start, end);
  if (STATE._curveVisibleWindowFrame) cancelAnimationFrame(STATE._curveVisibleWindowFrame);
  STATE._curveVisibleWindowFrame = requestAnimationFrame(() => {
    STATE._curveVisibleWindowFrame = null;
    applyCurveVisibleWindow(chart, slots, start, end);
  });
}

function buildForwardCurveData() {
  const instrument = getCurveInstrument();
  const baseDate = new Date();
  const rawSlots = [];
  for (let offset = 0; offset < FORWARD_CURVE_HORIZON + FORWARD_CURVE_FETCH_BUFFER; offset++) {
    rawSlots.push(buildCurveSlot(baseDate, offset, instrument));
  }

  const latestQuoteStamp = rawSlots.reduce((max, slot) => {
    const stamp = slot.quoteDate && Number.isFinite(slot.price) ? timeToStamp(slot.quoteDate) : 0;
    return Math.max(max, stamp || 0);
  }, 0);

  let startIndex = rawSlots.findIndex(slot => isCurveQuoteFresh(slot, latestQuoteStamp));
  if (startIndex < 0) startIndex = rawSlots.findIndex(slot => Number.isFinite(slot.price));
  if (startIndex < 0) startIndex = 0;

  const skippedSlots = rawSlots
    .slice(0, startIndex)
    .filter(slot => Number.isFinite(slot.price) || slot.quoteDate);

  const slots = rawSlots
    .slice(startIndex, startIndex + FORWARD_CURVE_HORIZON)
    .map((slot, index) => Object.assign({}, slot, {
      index,
      time: dayToTime(index + 1),
      missing: !Number.isFinite(slot.price),
    }));

  const quotedSlots = slots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = slots.filter(slot => !Number.isFinite(slot.price));

  return {
    slots,
    quotedSlots,
    missingSlots,
    skippedSlots,
    latestQuoteDate: latestQuoteStamp ? new Date(latestQuoteStamp).toISOString().slice(0, 10) : '',
    firstQuoted: quotedSlots[0] || null,
    lastQuoted: quotedSlots[quotedSlots.length - 1] || null,
  };
}

function getCurveWindowContext(slots) {
  if (!slots || !slots.length) {
    return {
      start: 0,
      end: -1,
      count: 0,
      windowSlots: [],
      quotedSlots: [],
      missingSlots: [],
      firstQuoted: null,
      lastQuoted: null,
      stats: { min: 0, max: 0, avg: 0, count: 0 },
      winterAvg: null,
      summerAvg: null,
      premium: null,
      slope: null,
      coverageText: '0/0',
    };
  }

  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = slots.length - 1;
  let start = clamp(Number.isFinite(STATE.curveView.rangeStart) ? STATE.curveView.rangeStart : 0, 0, maxIdx);
  let end = clamp(STATE.curveView.rangeEnd != null ? STATE.curveView.rangeEnd : maxIdx, 0, maxIdx);
  if (end < start) {
    const swap = start;
    start = end;
    end = swap;
  }
  if (start === end && slots.length > 1) {
    if (end < maxIdx) end += 1;
    else start = Math.max(0, start - 1);
  }

  STATE.curveView.rangeStart = start;
  STATE.curveView.rangeEnd = end;

  const windowSlots = slots.slice(start, end + 1);
  const quotedSlots = windowSlots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = windowSlots.filter(slot => !Number.isFinite(slot.price));
  const firstQuoted = quotedSlots[0] || null;
  const lastQuoted = quotedSlots[quotedSlots.length - 1] || null;
  const stats = getSeriesStats(quotedSlots, slot => slot.price);
  const averageFor = list => list.length ? list.reduce((sum, slot) => sum + slot.price, 0) / list.length : null;
  const winterAvg = averageFor(quotedSlots.filter(slot => slot.season === 'winter'));
  const summerAvg = averageFor(quotedSlots.filter(slot => slot.season === 'summer'));

  return {
    start,
    end,
    count: windowSlots.length,
    windowSlots,
    quotedSlots,
    missingSlots,
    firstQuoted,
    lastQuoted,
    stats,
    winterAvg,
    summerAvg,
    premium: winterAvg != null && summerAvg != null ? winterAvg - summerAvg : null,
    slope: quotedSlots.length >= 2 ? lastQuoted.price - firstQuoted.price : null,
    coverageText: `${quotedSlots.length}/${windowSlots.length}`,
  };
}

function renderCurveTable(curveData, windowContext) {
  const tableEl = document.getElementById('curve-table');
  if (!tableEl || !curveData || !windowContext) return;

  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const quotedPrices = curveData.quotedSlots.map(slot => slot.price);
  const priceMin = quotedPrices.length ? Math.min(...quotedPrices) : 0;
  const priceMax = quotedPrices.length ? Math.max(...quotedPrices) : 0;
  const priceRange = (priceMax - priceMin) || 1;
  const seasonColor = { winter: '#f5f7fb', summer: '#c5c8cf', shoulder: '#7d818b' };

  let tableHtml = `<div class="card-title" style="padding:12px 16px 8px;">Contract Quotes <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${curveData.quotedSlots.length}/${curveData.slots.length} quoted total</span></div>`;
  tableHtml += `<div style="overflow-x:auto;"><table><thead><tr>
    <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;">Contract</th>
    <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;">Price</th>
    <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;">Last Quote</th>
    <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;">Season</th>
  </tr></thead><tbody>`;

  curveData.slots.forEach((slot, index) => {
    const inWindow = index >= windowContext.start && index <= windowContext.end;
    const rowStyle = `${inWindow ? 'background:rgba(255,255,255,0.03);' : ''}${slot.missing ? 'opacity:0.72;' : ''}cursor:pointer;`;
    const barWidth = Number.isFinite(slot.price) ? ((slot.price - priceMin) / priceRange * 40).toFixed(1) : '0';
    const bar = Number.isFinite(slot.price)
      ? `<span style="display:inline-block;width:${barWidth}px;height:3px;background:${meta.color};border-radius:2px;vertical-align:middle;opacity:0.5;margin-left:4px;"></span>`
      : '';
    const priceHtml = Number.isFinite(slot.price)
      ? `${meta.currency}${slot.price.toFixed(3)}${bar}`
      : `<span style="color:var(--text-muted);">—</span>`;
    const quoteHtml = slot.quoteDate
      ? formatDisplayDate(slot.quoteDate)
      : `<span style="color:var(--negative);">Missing</span>`;
    const seasonHtml = `<span style="color:${seasonColor[slot.season]};">${slot.season.charAt(0).toUpperCase() + slot.season.slice(1)}</span>`;

    // Extract month and year from ticker for cross-tab navigation
    // Ticker format: NGJ26 or TTFJ26 — month code at pos 2 (HH) or pos 3 (TTF)
    const isHH = instrument === 'hh';
    const tickerCode = isHH ? slot.ticker.charAt(2) : slot.ticker.charAt(3);
    const tickerYrStr = isHH ? slot.ticker.slice(3) : slot.ticker.slice(4);
    const tickerYrFull = parseInt(tickerYrStr) < 50 ? 2000 + parseInt(tickerYrStr) : 1900 + parseInt(tickerYrStr);
    const tickerMonth = (typeof CODE_TO_MONTH !== 'undefined' ? CODE_TO_MONTH : {})[tickerCode] || '';
    const navMarket = isHH ? 'hh' : 'ttf';
    const clickHandler = tickerMonth
      ? `onclick="navigateTo('prices',{market:'${navMarket}',month:'${tickerMonth}',year:'${tickerYrFull}'})" title="View ${slot.ticker} in Prices tab"`
      : '';

    tableHtml += `<tr style="${rowStyle}" ${clickHandler}>
      <td style="text-align:left;">
        <div style="font-family:var(--font-mono);color:${meta.color};">${slot.ticker}</div>

    </tr>`;
  });

  tableHtml += '</tbody></table></div>';
  tableEl.innerHTML = tableHtml;
}


// ─── FORWARD CURVE UPGRADE 3: CAL STRIP AVERAGES ─────────────────────────────
function renderCurveStrips(curveData) {
  const containerEl = document.getElementById('curve-strips');
  if (!containerEl || !curveData || !curveData.slots.length) return;

  const currentYear = new Date().getFullYear();
  const frontPrice = curveData.quotedSlots.length ? curveData.quotedSlots[0].price : null;
  const strips = [];

  // Group by year
  const byYear = {};
  curveData.slots.forEach(slot => {
    if (!byYear[slot.year]) byYear[slot.year] = [];
    byYear[slot.year].push(slot);
  });

  const getAvg = slots => {
    const quoted = slots.filter(s => s.isQuote && Number.isFinite(s.price));
    if (quoted.length === 0) return { avg: null, missing: slots.length };
    const sum = quoted.reduce((s, slot) => s + slot.price, 0);
    return { avg: sum / quoted.length, missing: slots.length - quoted.length, total: slots.length, quoted: quoted.length };
  };

  const getStruct = avg => {
    if (avg == null || frontPrice == null) return '—';
    const diff = avg - frontPrice;
    if (Math.abs(diff) < 0.005) return '—';
    return diff > 0 ? '<span style="color:var(--positive);">Contango</span>' : '<span style="color:var(--negative);">Back</span>';
  };

  // Build Cal Strips
  Object.keys(byYear).sort().forEach(yr => {
    const year = parseInt(yr);
    if (year < currentYear) return;
    const slots = byYear[yr];
    if (slots.length < 1) return;
    
    // Cal strip (Jan-Dec) -> wait, maybe some early months have expired, but if they are in the curve they are active
    const stat = getAvg(slots);
    strips.push({ label: 'Cal ' + year, desc: 'Jan–Dec', stat });

    // Summer strip (Apr-Oct)
    const summerSlots = slots.filter(s => s.monthIdx >= 3 && s.monthIdx <= 9);
    if (summerSlots.length > 0) {
      strips.push({ label: 'Summer ' + String(year).slice(2), desc: 'Apr–Oct', stat: getAvg(summerSlots) });
    }

    // Winter strip (Nov-Mar) -> Nov/Dec of this year + Jan/Feb/Mar of NEXT year
    if (byYear[year + 1]) {
      const winterSlots = [
        ...slots.filter(s => s.monthIdx === 10 || s.monthIdx === 11),
        ...byYear[year + 1].filter(s => s.monthIdx >= 0 && s.monthIdx <= 2)
      ];
      if (winterSlots.length > 0) {
        strips.push({ label: 'Winter ' + String(year).slice(2) + '/' + String(year+1).slice(2), desc: 'Nov–Mar', stat: getAvg(winterSlots) });
      }
    }
  });

  if (strips.length === 0) {
    containerEl.innerHTML = '';
    return;
  }

  const th = (label, left = false) => '<th style="text-align:' + (left ? 'left' : 'center') + ';position:sticky;top:0;background:var(--bg-card);z-index:2;">' + label + '</th>';
  let html = '<div class="card-title" style="padding:12px 16px 8px;">Strip Averages</div>';
  html += '<div style="overflow-x:auto;"><table><thead><tr>' +
    th('Strip', true) + th('Contracts', true) + th('Avg Price') + th('vs Front') + th('Structure') +
    '</tr></thead><tbody>';

  strips.forEach(strip => {
    const s = strip.stat;
    const avgStr = s.avg == null ? '—' : '$' + s.avg.toFixed(3);
    const missingStr = s.missing > 0 ? ' <span style="font-size:10px;color:var(--negative);">' + s.quoted + '/' + s.total + ' quoted</span>' : '';
    const vsFront = (s.avg != null && frontPrice != null) ? s.avg - frontPrice : null;
    const vsFrontStr = vsFront == null ? '—' : (vsFront > 0 ? '+$' : '-$') + Math.abs(vsFront).toFixed(3);
    const vsFrontColor = vsFront == null ? '' : (vsFront > 0 ? 'color:var(--positive);' : 'color:var(--negative);');
    
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600;">' + strip.label + '</td>' +
      '<td style="text-align:left;color:var(--text-muted);">' + strip.desc + missingStr + '</td>' +
      '<td style="text-align:center;font-family:var(--font-mono);">' + avgStr + '</td>' +
      '<td style="text-align:center;font-family:var(--font-mono);' + vsFrontColor + '">' + vsFrontStr + '</td>' +
      '<td style="text-align:center;">' + getStruct(s.avg) + '</td>' +
      '</tr>';
  });

  html += '</tbody></table></div>';
  containerEl.innerHTML = html;
}
