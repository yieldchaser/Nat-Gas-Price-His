function buildCurveHistoricalData(slots, period) {
  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const now = new Date();
  let targetDate;
  if (period === '1w') targetDate = new Date(now.setDate(now.getDate() - 7));
  else if (period === '1m') targetDate = new Date(now.setMonth(now.getMonth() - 1));
  else if (period === '3m') targetDate = new Date(now.setMonth(now.getMonth() - 3));
  else if (period === '1y') targetDate = new Date(now.setFullYear(now.getFullYear() - 1));
  else return [];
  
  const targetStr = targetDate.toISOString().slice(0, 10);
  
  return slots.map(slot => {
    const data = instrument === 'ttf' ? getTTFContractData(slot.ticker) : getContractData(slot.ticker);
    if (!data || data.length === 0) return { time: slot.time };
    
    let closest = null;
    for (let i = data.length - 1; i >= 0; i--) {
      if (data[i].date <= targetStr) {
        closest = data[i];
        break;
      }
    }
    
    if (closest && Number.isFinite(closest.p)) {
      return { time: slot.time, value: closest.p };
    }
    return { time: slot.time };
  });
}

function getCurveInstrument() {
  const btn = document.querySelector('#curve-instrument-switch .segment-btn.active');
  return btn ? btn.dataset.val : 'hh';
}

function updateCurveChart() {
  const curveData = buildForwardCurveData();
  const slots = curveData.slots;
  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const palette = getNeutralChartPalette();

  if (!slots.length || !curveData.firstQuoted) {
    teardownCurveAnnotations();
    document.getElementById('curve-desc').textContent = 'No quoted curve data available';
    document.getElementById('curve-price').textContent = '--';
    document.getElementById('curve-change').textContent = '';
    document.getElementById('curve-metrics').innerHTML = `<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);padding:8px 0;">No forward quotes available for the current strip.</div>`;
    document.getElementById('curve-table').innerHTML = '';
    return;
  }

  // Update header text/colors
  document.getElementById('curve-ticker').style.color = meta.color;
  document.getElementById('curve-dot').style.background = meta.color;
  document.getElementById('curve-instrument-label').textContent = meta.label;

  document.getElementById('curve-desc').textContent = `${slots.length}-month strip — ${slots[0].label} to ${slots[slots.length - 1].label} • ${curveData.quotedSlots.length}/${slots.length} quoted`;

  // Chart
  const chartContainer = document.getElementById('curve-chart-container');
  teardownCurveAnnotations();
  const chart = createManagedChart('curve', 'main', chartContainer);
  chart.applyOptions({
    rightPriceScale: {
      scaleMargins: { top: 0.18, bottom: 0.12 },
    },
  });

  const lineSeries = chart.addLineSeries({
    color: meta.color,
    lineWidth: 2,
    priceLineVisible: false,
    lastValueVisible: false,
    crosshairMarkerVisible: false,
    priceFormat: {
      type: 'custom',
      formatter: value => formatCurveAxisValue(value),
      minMove: 0.001,
    },
  });
  lineSeries.setData(slots.map(slot => Number.isFinite(slot.price) ? ({ time: slot.time, value: slot.price }) : ({ time: slot.time })));
  const anchorSeries = chart.addLineSeries({
    color: 'rgba(0,0,0,0)',
    lineWidth: 1,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  anchorSeries.setData(buildCurveAnchorData(slots));

  const comparePeriod = document.getElementById('curve-compare') ? document.getElementById('curve-compare').value : 'none';
  let histLookup = new Map();
  if (comparePeriod !== 'none') {
    const histData = buildCurveHistoricalData(slots, comparePeriod);
    if (histData.length) {
      const histSeries = chart.addLineSeries({
        color: 'rgba(255, 255, 255, 0.45)',
        lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
      });
      histSeries.setData(histData);
      histData.forEach(pt => histLookup.set(timeKey(pt.time), pt));
      STATE._curveHistSeries = histSeries;
      STATE._curveHistData = histData;
    }
  } else {
    STATE._curveHistSeries = null;
    STATE._curveHistData = null;
  }
  const curveLookup = new Map(slots.map(slot => [timeKey(slot.time), slot]));

  applyChartTimeScaleOptions(chart, {
    formatter: buildCurveAxisFormatter(time => curveLookup.get(timeKey(time))),
    barSpacing: slots.length > 36 ? 8 : 11,
    minBarSpacing: 0.5,
    fixLeftEdge: true,
    fixRightEdge: true,
  });
  chart.timeScale().fitContent();
  attachChartTooltip({
    chart,
    container: chartContainer,
    titleColor: '#f5f7fb',
    seriesConfigs: [{
      series: lineSeries,
      label: `${meta.label} curve`,
      color: meta.color,
      emphasis: true,
      getPoint: param => curveLookup.get(timeKey(param.time)),
      formatValue: value => `${meta.currency}${value.toFixed(3)}`,
    }],
    getSubtitle: () => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      if (!windowContext || !windowContext.count) return `${meta.label} strip`;
      return `${meta.label} strip • Window Slope: ${windowContext.slope >= 0 ? '+' : ''}${meta.currency}${windowContext.slope != null ? windowContext.slope.toFixed(3) : 'N/A'}`;
    },
    getMetrics: (param) => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      const fmt = val => Number.isFinite(val) ? `${meta.currency}${val.toFixed(3)}` : 'N/A';
      const m = [
        { label: 'Max', value: fmt(windowContext.stats.count ? windowContext.stats.max : null) },
        { label: 'Min', value: fmt(windowContext.stats.count ? windowContext.stats.min : null) },
      ];
      
      const point = curveLookup.get(timeKey(param.time));
      const histPt = histLookup.get(timeKey(param.time));
      if (point && histPt && histPt.value != null && point.price != null) {
        const diff = point.price - histPt.value;
        const comparePeriod = document.getElementById('curve-compare') ? document.getElementById('curve-compare').value : 'none';
        const lblMap = { '1w':'1W Ago', '1m':'1M Ago', '3m':'3M Ago', '1y':'1Y Ago' };
        m.push({ label: lblMap[comparePeriod] || 'History', value: fmt(histPt.value) });
        m.push({ label: 'Shift', value: `<span style="color:${diff >= 0 ? 'var(--positive)' : 'var(--negative)'};">${diff >= 0 ? '+' : ''}${fmt(diff)}</span>` });
      } else {
        m.push({ label: 'First', value: windowContext.firstQuoted ? `${fmt(windowContext.firstQuoted.price)} • ${windowContext.firstQuoted.label}` : 'N/A' });
        m.push({ label: 'Last', value: windowContext.lastQuoted ? `${fmt(windowContext.lastQuoted.price)} • ${windowContext.lastQuoted.label}` : 'N/A' });
      }
      return m;
    },
    getTitle: param => {
      const point = curveLookup.get(timeKey(param.time));
      return point ? `${point.label} • ${point.ticker}` : 'Forward curve';
    },
    getNote: param => {
      const point = curveLookup.get(timeKey(param.time));
      if (!point) return '';
      if (!point.quoteDate) return `No quote available • ${point.season} contract`;
      return `${point.season} contract • Quote ${formatDisplayDate(point.quoteDate)}`;
    },
  });

  // Header price = first quoted prompt
  const curveHeaderPrice = document.getElementById('curve-price');
  const curveHeaderChange = document.getElementById('curve-change');
  if (curveHeaderPrice) {
    curveHeaderPrice.textContent = `${meta.currency}${curveData.firstQuoted.price.toFixed(3)}`;
    curveHeaderPrice.style.color = meta.color;
  }
  if (curveHeaderChange) {
    const promptMonth = curveData.firstQuoted ? `${curveData.firstQuoted.label} prompt month · ` : '';
    curveHeaderChange.innerHTML = `${promptMonth}${getForwardCurveStatusHtml()}`;
  }

  // Store refs and sync range footer
  STATE._curveChart = chart;
  STATE._curveSlots = slots;
  STATE._curveData = curveData;
  STATE._curveSeries = lineSeries;
  bindCurveAnnotations(chart, chartContainer);
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const curveKey = `${slots.length}|${slots[0].ticker}|${slots[slots.length - 1].ticker}`;
  if (STATE._curvePrevKey !== curveKey) {
    STATE._curvePrevKey = curveKey;
    STATE.curveView = { rangeStart: 0, rangeEnd: null };
  }
  syncCurveRangeFooter();
}

function syncCurveRangeFooter() {
  const curveData = STATE._curveData;
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!curveData || !contracts || !contracts.length || !chart) return;

  const windowContext = getCurveWindowContext(contracts);
  STATE._curveWindowContext = windowContext;
  const maxIdx = contracts.length - 1;

  const startSlider = document.getElementById('curve-window-start');
  const endSlider   = document.getElementById('curve-window-end');
  const selection   = document.getElementById('curve-range-selection');
  const minLabel    = document.getElementById('curve-range-min-label');
  const maxLabel    = document.getElementById('curve-range-max-label');
  const helperEl    = document.getElementById('curve-range-helper');
  const readoutEl   = document.getElementById('curve-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min = '0'; s.max = String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(windowContext.start);
  endSlider.value = String(windowContext.end);

  const pct = getRangeSelectionPercent(contracts.length, windowContext.start, windowContext.end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = contracts[0].label;
  if (maxLabel) maxLabel.textContent = contracts[maxIdx].label;

  const count = windowContext.count;
  if (helperEl) helperEl.textContent = count >= contracts.length
    ? `Full strip • ${windowContext.coverageText} quoted`
    : `${count} months selected • ${windowContext.coverageText} quoted`;
  if (readoutEl) {
    const missingCount = windowContext.missingSlots.length;
    readoutEl.innerHTML = `<span>${contracts[windowContext.start].label}</span><span style="color:var(--text-muted);">to</span><span>${contracts[windowContext.end].label}</span><span style="color:var(--text-muted);">|</span><span>${count} month${count !== 1 ? 's' : ''}</span><span style="color:var(--text-muted);">|</span><span>${windowContext.quotedSlots.length} quoted</span>${missingCount ? `<span style="color:var(--text-muted);">|</span><span>${missingCount} missing</span>` : ''}`;
  }

  syncCurveVisibleWindow(chart, contracts, windowContext.start, windowContext.end);

  renderCurveMetrics(curveData, windowContext);
  renderCurveTable(curveData, windowContext);
  renderCurveStrips(curveData);
  scheduleCurveAnnotationRender();
}

function onCurveSlider() {
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!contracts || !chart) return;
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = contracts.length - 1;
  let start = clamp(parseInt(document.getElementById('curve-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('curve-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('curve-window-start').value = String(start); }
  STATE.curveView.rangeStart = start; STATE.curveView.rangeEnd = end;
  syncCurveRangeFooter();
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TAB 6: EXPIRY PRICES
     ═══════════════════════════════════════════════════════════ -->
<script>
function renderExpiryTab() {
  const container = document.getElementById('tab-expiry');
  if (!container.dataset.built) {
    container.dataset.built = '1';
    container.innerHTML = `
      <div class="contract-header" id="expiry-header">
        <div class="ch-left">
          <div class="ch-top">
            <span class="ticker" style="color:var(--accent-hh);">EXPIRY SETTLEMENT PRICES</span>
          </div>
          <span class="desc">Henry Hub Settlement Prices — USD/MMBtu</span>
        </div>
      </div>
      <div class="card" style="margin-bottom:var(--gap);">
        <div class="ctrl-toolbar">
          <div class="ctrl-group">
            <div class="ctrl-group-label">Time Window</div>
            <div class="segment-switch" id="expiry-range-switch">
              <button class="segment-btn active" data-range="all" data-tone="hh" onclick="filterExpiry(this)">All</button>
              <button class="segment-btn" data-range="10" data-tone="hh" onclick="filterExpiry(this)">10Y</button>
              <button class="segment-btn" data-range="5" data-tone="hh" onclick="filterExpiry(this)">5Y</button>
              <button class="segment-btn" data-range="3" data-tone="hh" onclick="filterExpiry(this)">3Y</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card" style="overflow-x:auto;" id="expiry-table-wrap"></div>
      <div id="expiry-month-profile" style="margin-top:var(--gap);display:none;"></div>
      <div class="card" style="padding:0;margin-top:var(--gap);" id="expiry-seasonal-bar"></div>
    `;
  }
  buildExpiryTable('all');
  buildExpirySeasonalBar('all');
}

function filterExpiry(btn) {
  btn.parentElement.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildExpiryTable(btn.dataset.range);
}

function buildExpiryTable(range) {
  const expiry = STATE.expiry;
  let years = Object.keys(expiry).sort((a, b) => a - b);
  const currentYear = new Date().getFullYear();

  if (range !== 'all') {
    const n = parseInt(range);
    years = years.filter(y => parseInt(y) >= currentYear - n);
  }

  // Bug fix: compute averages using ONLY the visible/filtered years so the
  // heat-map coloring is relative to whatever the user is looking at.
  const avg5y = {}, avg3y = {}, avgVisible = {};
  MONTHS.forEach(m => {
    let sv = 0, cv = 0, s5 = 0, c5 = 0, s3 = 0, c3 = 0;
    years.forEach(yr => {
      const v = expiry[yr] && expiry[yr][m];
      if (v == null) return;
      sv += v; cv++;
      if (parseInt(yr) >= currentYear - 5) { s5 += v; c5++; }
      if (parseInt(yr) >= currentYear - 3) { s3 += v; c3++; }
    });
    avgVisible[m] = cv ? sv / cv : null;
    avg5y[m]      = c5 ? s5 / c5 : null;
    avg3y[m]      = c3 ? s3 / c3 : null;
  });

  // Range label for Avg column header
  const rangeLabel = range === 'all' ? 'All' : range + 'Y';

  let html = '<table style="white-space:nowrap;"><thead><tr>' +
    '<th style="text-align:left;">Month</th>';
  years.forEach(y => { html += '<th>' + y + '</th>'; });
  html += '<th style="color:var(--text-muted);font-size:10px;">YoY%</th>' +
    '<th style="color:var(--accent-hh);">Avg(' + rangeLabel + ')</th>' +
    '<th style="color:var(--accent-hh);">5Y Avg</th>' +
    '<th style="color:var(--accent-hh);">3Y Avg</th>' +
    '</tr></thead><tbody>';

  // Pre-compute per-month all-years rank lookup (over all years in STATE.expiry, not just visible)
  const allExpiryYears = Object.keys(STATE.expiry).sort((a, b) => +a - +b);
  const monthRankLookup = {}; // m -> sorted prices desc for ranking
  MONTHS.forEach(m => {
    const allPricesForMonth = allExpiryYears.map(yr => STATE.expiry[yr] ? STATE.expiry[yr][m] : null).filter(v => v != null);
    monthRankLookup[m] = [...allPricesForMonth].sort((a, b) => b - a);
  });

  MONTHS.forEach(m => {
    html += '<tr><td style="text-align:left;font-weight:600;cursor:pointer;" class="expiry-month-label" data-month="' + m + '" onclick="showExpiryMonthProfile(\'' + m + '\')" title="Click to view ' + m + ' expiry history">' + m + ' &#9660;</td>';
    years.forEach(yr => {
      const v = expiry[yr] ? expiry[yr][m] : null;
      if (v == null) { html += '<td style="color:var(--text-muted);">\u2014</td>'; return; }
      // Heat-map: compare against visible-window average for better contrast
      const ref = avgVisible[m];
      let bg = 'transparent';
      if (ref) {
        const delta = (v - ref) / ref;
        if (delta > 0.02)       bg = 'rgba(0,255,136,'  + Math.min(delta * 1.8, 0.55) + ')';
        else if (delta < -0.02) bg = 'rgba(255,68,85,'  + Math.min(Math.abs(delta) * 1.8, 0.55) + ')';
      }
      // Per-cell tooltip: rank + vs 5Y avg + YoY
      const sortedM = monthRankLookup[m];
      const rank = sortedM.indexOf(v) + 1;
      const rankN = sortedM.length;
      const vs5y = avg5y[m] != null ? ((v - avg5y[m]) / avg5y[m] * 100) : null;
      const priorYr = String(parseInt(yr) - 1);
      const priorV = expiry[priorYr] ? expiry[priorYr][m] : null;
      const yoyCell = (priorV != null && priorV !== 0) ? ((v - priorV) / priorV * 100) : null;
      const ttParts = ['Rank #' + rank + '/' + rankN + ' all time'];
      if (vs5y != null) ttParts.push((vs5y >= 0 ? '+' : '') + vs5y.toFixed(1) + '% vs 5Y avg');
      if (yoyCell != null) ttParts.push('YoY: ' + (yoyCell >= 0 ? '+' : '') + yoyCell.toFixed(1) + '% from ' + priorYr);
      const tooltipTitle = ttParts.join(' | ');
      const rankSup = rank <= 3
        ? '<sup style="font-size:8px;color:var(--accent-hh);vertical-align:super;">#' + rank + '</sup>'
        : rank >= rankN - 2
          ? '<sup style="font-size:8px;color:var(--negative);vertical-align:super;">#' + rank + '</sup>'
          : '';
      html += '<td style="background:' + bg + ';cursor:pointer;position:relative;" title="' + tooltipTitle + '" onclick="navigateTo(\'prices\',{month:\'' + m + '\',year:\'' + yr + '\'})">' +
        '$' + v.toFixed(3) + rankSup + '</td>';
    });
    // YoY column: last vs second-to-last visible year
    const lastYr = years[years.length - 1];
    const prevYr = years[years.length - 2];
    const lastV = lastYr && expiry[lastYr] ? expiry[lastYr][m] : null;
    const prevV = prevYr && expiry[prevYr] ? expiry[prevYr][m] : null;
    const yoy = (lastV != null && prevV != null && prevV !== 0)
      ? (lastV - prevV) / prevV * 100 : null;
    html += '<td style="color:' + (yoy == null ? 'var(--text-muted)' : yoy >= 0 ? 'var(--positive)' : 'var(--negative)') + ';font-style:italic;">' +
      (yoy == null ? '\u2014' : (yoy >= 0 ? '+' : '') + yoy.toFixed(1) + '%') + '</td>';
    // Avg columns
    [avgVisible, avg5y, avg3y].forEach(a => {
      html += '<td style="font-weight:600;">' + (a[m] != null ? '$' + a[m].toFixed(3) : '\u2014') + '</td>';
    });
    html += '</tr>';
  });

  // Year Avg row — fix: compute cross-column averages instead of blank cells
  html += '<tr style="border-top:2px solid var(--border);"><td style="text-align:left;font-weight:700;">Year Avg</td>';
  const yearAvgs = [];
  years.forEach(yr => {
    const vals = MONTHS.map(m => expiry[yr] ? expiry[yr][m] : null).filter(v => v != null);
    const avg = vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
    yearAvgs.push(avg);
    html += '<td style="font-weight:600;">' + (avg != null ? '$' + avg.toFixed(3) : '\u2014') + '</td>';
  });
  const lastYrAvg = yearAvgs[yearAvgs.length - 1];
  const prevYrAvg = yearAvgs[yearAvgs.length - 2];
  const yoyAvg = (lastYrAvg != null && prevYrAvg != null && prevYrAvg !== 0)
    ? (lastYrAvg - prevYrAvg) / prevYrAvg * 100 : null;
  html += '<td style="color:' + (yoyAvg == null ? 'var(--text-muted)' : yoyAvg >= 0 ? 'var(--positive)' : 'var(--negative)') + ';font-style:italic;font-weight:600;">' +
    (yoyAvg == null ? '\u2014' : (yoyAvg >= 0 ? '+' : '') + yoyAvg.toFixed(1) + '%') + '</td>';
  const visAll = yearAvgs.filter(v => v != null);
  const v5 = yearAvgs.slice(-5).filter(v => v != null);
  const v3 = yearAvgs.slice(-3).filter(v => v != null);
  const visAllAvg = visAll.length ? visAll.reduce((s, v) => s + v, 0) / visAll.length : null;
  const vis5Avg   = v5.length   ? v5.reduce((s, v) => s + v, 0)   / v5.length   : null;
  const vis3Avg   = v3.length   ? v3.reduce((s, v) => s + v, 0)   / v3.length   : null;
  [visAllAvg, vis5Avg, vis3Avg].forEach(v => {
    html += '<td style="font-weight:700;">' + (v != null ? '$' + v.toFixed(3) : '\u2014') + '</td>';
  });
  html += '</tr>';

  // YoY% row — year-over-year % change of full-year average
  html += '<tr style="border-top:1px solid var(--border);background:rgba(0,0,0,0.18);"><td style="text-align:left;font-weight:700;color:var(--text-muted);font-size:11px;">YoY%</td>';
  years.forEach((yr, i) => {
    const thisAvg = yearAvgs[i];
    const priorAvg = i > 0 ? yearAvgs[i - 1] : null;
    const yoyRow = (thisAvg != null && priorAvg != null && priorAvg !== 0)
      ? (thisAvg - priorAvg) / priorAvg * 100 : null;
    html += '<td style="font-family:var(--font-mono);font-size:11px;font-style:italic;color:' +
      (yoyRow == null ? 'var(--text-muted)' : yoyRow >= 0 ? '#00ff88' : '#ff4455') + ';">' +
      (yoyRow == null ? '\u2014' : (yoyRow >= 0 ? '+' : '') + yoyRow.toFixed(1) + '%') + '</td>';
  });
  // YoY% column in the summary columns (YoY of last vs prev yearAvg — same as yoyAvg already computed)
  html += '<td style="font-family:var(--font-mono);font-size:11px;font-style:italic;font-weight:700;color:' +
    (yoyAvg == null ? 'var(--text-muted)' : yoyAvg >= 0 ? '#00ff88' : '#ff4455') + ';">' +
    (yoyAvg == null ? '\u2014' : (yoyAvg >= 0 ? '+' : '') + yoyAvg.toFixed(1) + '%') + '</td>';
  // Avg columns (blank for YoY row)
  html += '<td>\u2014</td><td>\u2014</td><td>\u2014</td>';
  html += '</tr>';

  html += '</tbody></table>';
  document.getElementById('expiry-table-wrap').innerHTML = html;
}


// ─── EXPIRY PRICES UPGRADE 1: MONTH PROFILE + SEASONAL BAR + CELL ENHANCEMENTS ─

// State: which month is currently selected for the profile chart
let _expirySelectedMonth = null;

function showExpiryMonthProfile(month) {
  const expiry = STATE.expiry;
  const profileEl = document.getElementById('expiry-month-profile');
  if (!profileEl) return;

  if (_expirySelectedMonth === month) {
    // Toggle off
    _expirySelectedMonth = null;
    profileEl.style.display = 'none';
    profileEl.innerHTML = '';
    // Remove active highlight
    document.querySelectorAll('.expiry-month-label').forEach(e => e.classList.remove('expiry-month-active'));
    return;
  }
  _expirySelectedMonth = month;
  document.querySelectorAll('.expiry-month-label').forEach(e => {
    e.classList.toggle('expiry-month-active', e.dataset.month === month);
  });

  // Build data: year → price for this month
  const allYears = Object.keys(expiry).sort((a, b) => +a - +b);
  const seriesData = allYears
    .filter(yr => expiry[yr] && expiry[yr][month] != null)
    .map(yr => ({ time: yr + '-06-01', year: +yr, value: expiry[yr][month] }));

  if (seriesData.length < 2) {
    profileEl.innerHTML = '<div style="padding:12px;color:var(--text-muted);">Not enough data for ' + month + '</div>';
    profileEl.style.display = 'block';
    return;
  }

  const prices = seriesData.map(d => d.value);
  const avgAll = prices.reduce((s, v) => s + v, 0) / prices.length;
  const avg5y = (() => {
    const last5 = prices.slice(-5);
    return last5.reduce((s, v) => s + v, 0) / last5.length;
  })();

  profileEl.style.display = 'block';
  profileEl.className = 'card';
  profileEl.style.padding = '0';
  profileEl.style.marginTop = 'var(--gap)';

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.style.padding = '10px 14px 0';
  titleEl.textContent = month.toUpperCase() + ' EXPIRY HISTORY \u2014 ' + seriesData.length + ' contracts';
  profileEl.innerHTML = '';
  profileEl.appendChild(titleEl);

  const chartEl = document.createElement('div');
  chartEl.className = 'chart-wrap';
  chartEl.style.height = '260px';
  profileEl.appendChild(chartEl);

  const chart = createManagedChart('expiry', 'profile', chartEl);
  chart.applyOptions({ rightPriceScale: { scaleMargins: { top: 0.1, bottom: 0.1 } } });

  // Use year as fake time: YYYY-01-01
  const lineSeries = chart.addLineSeries({
    color: '#00d4ff', lineWidth: 2,
    lastValueVisible: true, crosshairMarkerRadius: 5,
    priceFormat: { type: 'custom', formatter: v => '$' + v.toFixed(3), minMove: 0.001 },
  });
  lineSeries.setData(seriesData.map(d => ({ time: d.year + '-01-01', value: d.value })));

  // Build flat horizontal data for avg lines (needs same time domain as seriesData)
  const avgAllSeriesData = seriesData.map(d => ({ time: d.year + '-01-01', value: avgAll }));
  const avg5ySeriesData  = seriesData.map(d => ({ time: d.year + '-01-01', value: avg5y }));

  const avgAllSeries = chart.addLineSeries({
    color: 'rgba(255,255,255,0.50)', lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: true, crosshairMarkerVisible: false,
    priceFormat: { type: 'custom', formatter: v => '$' + v.toFixed(3), minMove: 0.001 },
    title: 'All Avg',
  });
  avgAllSeries.setData(avgAllSeriesData);

  const avg5ySeries = chart.addLineSeries({
    color: '#ff8c00', lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: true, crosshairMarkerVisible: false,
    priceFormat: { type: 'custom', formatter: v => '$' + v.toFixed(3), minMove: 0.001 },
    title: '5Y Avg',
  });
  avg5ySeries.setData(avg5ySeriesData);

  // Pill toggle row above chart
  const pillRowEl = document.createElement('div');
  pillRowEl.style.cssText = 'display:flex;gap:8px;padding:8px 14px 0;';
  pillRowEl.innerHTML = `
    <button class="series-pill active" data-key="allAvg" style="font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.30);background:rgba(255,255,255,0.08);color:#f5f7fb;cursor:pointer;">All Avg</button>
    <button class="series-pill active" data-key="avg5y" style="font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid rgba(255,140,0,0.40);background:rgba(255,140,0,0.10);color:#ff8c00;cursor:pointer;">5Y Avg</button>
  `;
  profileEl.insertBefore(pillRowEl, chartEl);

  pillRowEl.addEventListener('click', ev => {
    const pill = ev.target.closest('.series-pill');
    if (!pill) return;
    pill.classList.toggle('active');
    const on = pill.classList.contains('active');
    if (pill.dataset.key === 'allAvg') {
      avgAllSeries.applyOptions({ visible: on });
      pill.style.opacity = on ? '1' : '0.38';
    } else {
      avg5ySeries.applyOptions({ visible: on });
      pill.style.opacity = on ? '1' : '0.38';
    }
  });

  // Build year lookup for tooltip and apply time axis
  const lookup = new Map(seriesData.map(d => [d.year + '-01-01', d]));
  applyChartTimeScaleOptions(chart, { formatter: undefined, barSpacing: Math.max(8, Math.floor(800 / seriesData.length)), fixLeftEdge: true, fixRightEdge: true });
  chart.timeScale().fitContent();

  attachChartTooltip({
    chart, container: chartEl, titleColor: '#f5f7fb',
    seriesConfigs: [{ series: lineSeries, label: month + ' Settlement', color: '#00d4ff', emphasis: true,
      getPoint: p => lookup.get(typeof p.time === 'string' ? p.time : ''),
      formatValue: v => '$' + v.toFixed(3) }],
    getTitle: p => { const d = lookup.get(typeof p.time === 'string' ? p.time : ''); return d ? d.year.toString() : ''; },
    getMetrics: () => [
      { label: 'All Avg', value: '$' + avgAll.toFixed(3) },
      { label: '5Y Avg', value: '$' + avg5y.toFixed(3) },
    ],
  });

  // Slider controls
  const minYear = allYears[0];
  const maxYear = allYears[allYears.length - 1];
  const footerEl = document.createElement('div');
  footerEl.className = 'card chart-footer';
  footerEl.style.marginTop = '0';
  footerEl.style.borderTop = '1px solid var(--border)';
  footerEl.style.padding = '10px 14px';
  footerEl.innerHTML = `
    <div class="range-toolbar" style="margin-bottom:8px;">
      <div class="flex flex-col gap-sm">
        <span class="range-kicker">Year Range</span>
        <div class="flex gap-sm" id="expiry-profile-presets">
          <button class="pill-btn" data-range="3">3Y</button>
          <button class="pill-btn" data-range="5">5Y</button>
          <button class="pill-btn" data-range="10">10Y</button>
          <button class="pill-btn" data-range="20">20Y</button>
          <button class="pill-btn active" data-range="all">ALL</button>
        </div>
      </div>
      <div class="range-scale-labels">
        <span id="expiry-profile-min-year">${minYear}</span>
        <span id="expiry-profile-max-year">${maxYear}</span>
      </div>
    </div>
    <div class="range-input-shell" style="margin:10px 0;">
      <div class="range-selection" id="expiry-profile-selection"></div>
      <input type="range" id="expiry-profile-window-start" min="${minYear}" max="${maxYear}" value="${minYear}" aria-label="Start year">
      <input type="range" id="expiry-profile-window-end" min="${minYear}" max="${maxYear}" value="${maxYear}" aria-label="End year">
    </div>

<script>
// ─── DAILY TRACKER HELPERS ───────────────────────────────────────────────────

function computeNGExpiry(year, month0) {
  // CME rule: NG expires 4 business days before the 1st calendar day of
  // the delivery month.
  const d = new Date(Date.UTC(year, month0, 1));
  let bd = 0;
  d.setUTCDate(d.getUTCDate() - 1);
  while (bd < 4) {
    const dow = d.getUTCDay();
    if (dow !== 0 && dow !== 6) bd++;
    if (bd < 4) d.setUTCDate(d.getUTCDate() - 1);
  }
  return d;
}

function computeRealizedVol(data, days) {
  if (!data || data.length < days + 1) return null;
  const slice = data.slice(-(days + 1));
  const logRets = [];
  for (let i = 1; i < slice.length; i++) {
    if (slice[i - 1].p > 0 && slice[i].p > 0)
      logRets.push(Math.log(slice[i].p / slice[i - 1].p));
  }
  if (!logRets.length) return null;
  const mean = logRets.reduce((s, r) => s + r, 0) / logRets.length;
  const variance = logRets.reduce((s, r) => s + (r - mean) ** 2, 0) / logRets.length;
  return Math.sqrt(variance * 252) * 100;
}

function computeWeeklyChanges(data) {
  if (!data || data.length < 2) return [];
  const weekMap = new Map();
  data.forEach(pt => {
    const d = new Date(pt.date + 'T00:00:00');
    const day = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
    const key = mon.toISOString().slice(0, 10);
    weekMap.set(key, pt);
  });
  const weeks = [...weekMap.values()].sort((a, b) => a.date.localeCompare(b.date));
  const changes = [];
  for (let i = 1; i < weeks.length; i++) {
    const pct = (weeks[i].p - weeks[i - 1].p) / weeks[i - 1].p * 100;
    changes.push({ date: weeks[i].date, pct });
  }
  return changes;
}

function getDailyStats(data) {
  if (!data || !data.length) return null;
  const now = new Date();
  const yearStart = `${now.getFullYear()}-01-01`;
  const oneYearAgo = new Date(now); oneYearAgo.setFullYear(now.getFullYear() - 1);
  const oneYearAgoStr = oneYearAgo.toISOString().slice(0, 10);
  const thirtyDaysAgo = new Date(now); thirtyDaysAgo.setDate(now.getDate() - 30);
  const thirtyDaysAgoStr = thirtyDaysAgo.toISOString().slice(0, 10);
  const threeSixtyDaysAgo = new Date(now); threeSixtyDaysAgo.setDate(now.getDate() - 360);
  const threeSixtyDaysAgoStr = threeSixtyDaysAgo.toISOString().slice(0, 10);

  const ttmData = data.filter(p => p.date >= oneYearAgoStr);
  const ytdData = data.filter(p => p.date >= yearStart);
  const d30 = data.filter(p => p.date >= thirtyDaysAgoStr);
  const d360 = data.filter(p => p.date >= threeSixtyDaysAgoStr);

  const prices52w = ttmData.map(p => p.p);
  const high52w = prices52w.length ? Math.max(...prices52w) : null;
  const low52w = prices52w.length ? Math.min(...prices52w) : null;
  const avg30d = d30.length ? d30.reduce((s, p) => s + p.p, 0) / d30.length : null;
  const avg360d = d360.length ? d360.reduce((s, p) => s + p.p, 0) / d360.length : null;
  const ytdPct = ytdData.length >= 2
    ? (ytdData[ytdData.length - 1].p - ytdData[0].p) / ytdData[0].p * 100
    : null;
  const rv21 = null;
  const rv63 = null;
  return { high52w, low52w, avg30d, avg360d, ytdPct };
}

function getTTFSpreadData() {
  const composite = new Map();
  const allTickers = new Set();
  
  // 1. Collect all tickers from historical data
  MONTHS.forEach(m => {
    if (STATE.ttf[m] && STATE.ttf[m].contracts) {
      Object.keys(STATE.ttf[m].contracts).forEach(t => allTickers.add(t));
    }
  });

  // 2. Add live tickers
  Object.keys(STATE.liveData).forEach(t => {
    if (t.startsWith('TTF')) {
      // Internal code uses TG, Yahoo uses TTF prefix
      const internalCode = 'TG' + t.slice(3, 5); // TTFJ26 -> TGJ26
      allTickers.add(internalCode);
    }
  });

  if (!allTickers.size) return [];

  // 3. For each ticker, merge its data into a global date map
  // To simulate a "Front Month" continuous series, we sort tickers by their 
  // delivery month and for each date, we pick the one that is currently the "front".
  const sortedTickers = Array.from(allTickers).sort((a, b) => {
    const yrA = parseInt(a.slice(3)), yrB = parseInt(b.slice(3));
    const fullA = yrA < 50 ? 2000 + yrA : 1900 + yrA;
    const fullB = yrB < 50 ? 2000 + yrB : 1900 + yrB;
    if (fullA !== fullB) return fullA - fullB;
    const codes = "FGHJKMNQUVXZ";
    return codes.indexOf(a.charAt(2)) - codes.indexOf(b.charAt(2));
  });

  const tickerMeta = sortedTickers.map(t => {
    const yr = parseInt(t.slice(3));
    const fullYear = yr < 50 ? 2000 + yr : 1900 + yr;
    const monthIdx = "FGHJKMNQUVXZ".indexOf(t.charAt(2));
    const deliveryDate = new Date(Date.UTC(fullYear, monthIdx, 1)).toISOString().slice(0, 7); // "YYYY-MM"
    return { ticker: t, deliveryDate };
  });

  // Collect all points
  const pointsByDate = new Map(); // date -> [{p, deliveryDate}]
  const TTF_TO_USD_MMBTU = 3.412;
  const FX_EUR_USD = STATE.eurusd || 1.08; // dynamic with fallback
  const CONVERSION = TTF_TO_USD_MMBTU / FX_EUR_USD;

  sortedTickers.forEach((ticker, idx) => {
    const data = typeof getTTFContractData === 'function' ? getTTFContractData(ticker) : [];
    const delivery = tickerMeta[idx].deliveryDate;
    data.forEach(pt => {
      if (!pointsByDate.has(pt.date)) pointsByDate.set(pt.date, []);
      // Convert EUR/MWh to USD/MMBtu
      pointsByDate.get(pt.date).push({ p: +(pt.p * CONVERSION).toFixed(3), delivery });
    });
  });

  // Pick the best point per date: the one where deliveryDate > date and is minimal
  const final = [];
  const dates = Array.from(pointsByDate.keys()).sort();
  dates.forEach(date => {
    const options = pointsByDate.get(date);
    // Sort by delivery date
    options.sort((a, b) => a.delivery.localeCompare(b.delivery));
    // Find the first one where delivery month is >= current month
    const currentMonth = date.slice(0, 7); // "YYYY-MM"
    let best = options.find(opt => opt.delivery >= currentMonth);
    if (!best) best = options[options.length - 1]; // fallback to the furthest out if none found
    final.push({ date, p: best.p });
  });

  return final;
}

function formatDailyDate(dateStr) {
  if (!dateStr) return '\u2014';
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  const d = new Date(Date.UTC(+parts[0], +parts[1] - 1, +parts[2]));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

        weeklyPresets.addEventListener('click', e => {
          const btn = e.target.closest('.pill-btn');
          if (!btn) return;
          const range = btn.dataset.range;
          const data = STATE._dailyWeeklyData;
          if (!data || !data.length) return;
          
          document.querySelectorAll('#daily-weekly-presets .pill-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          let sIdx = 0;
          if (range !== 'ALL') {
            const now = new Date();
            const years = parseInt(range) || 5;
            const cutoff = new Date(now); cutoff.setFullYear(now.getFullYear() - years);
            const cutoffStr = cutoff.toISOString().slice(0, 10);
            sIdx = data.findIndex(p => p.date >= cutoffStr);
            if (sIdx === -1) sIdx = 0;
          }

          STATE.dailyWeeklyView = { rangeStart: sIdx, rangeEnd: data.length - 1 };
          const startS = document.getElementById('daily-weekly-slider-start');
          const endS = document.getElementById('daily-weekly-slider-end');
          if (startS && endS) {
            startS.value = (sIdx / (data.length - 1)) * 100;
            endS.value = 100;
          }
          syncDailyWeeklyRangeFooter();
        });
      }
      
      const wsStart = document.getElementById('daily-weekly-slider-start');
      const wsEnd = document.getElementById('daily-weekly-slider-end');
      if (wsStart) wsStart.addEventListener('input', onDailyWeeklySlider);
      if (wsEnd) wsEnd.addEventListener('input', onDailyWeeklySlider);
  }
  updateDailyTracker();
}

function updateDailyTracker() {
  const now = new Date();
  const data = STATE.liveData['NG=F'] || [];
  const freshnessEl = document.getElementById('daily-freshness');
  if (freshnessEl) freshnessEl.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (!data.length) {
    document.getElementById('daily-price').textContent = 'No data';
    document.getElementById('daily-change').textContent = '';
    document.getElementById('daily-table').innerHTML = '<div style="padding:16px;color:var(--text-muted);">Live data unavailable</div>';
    return;
  }

  const last = data[data.length - 1];
  const prev = data.length > 1 ? data[data.length - 2] : last;
  const dayDelta = (last.p - prev.p) / prev.p * 100;
  document.getElementById('daily-price').textContent = '$' + last.p.toFixed(3);
  const changeEl = document.getElementById('daily-change');
  changeEl.textContent = (dayDelta >= 0 ? '+' : '') + dayDelta.toFixed(2) + '% day';
  changeEl.className = 'change ' + (dayDelta >= 0 ? 'positive' : 'negative');

  const stats = getDailyStats(data);
  _renderDailyStatChips(stats, last.p);
  updateDailyMainChart(STATE.dailyRange || '1Y');
  _renderSpreadPanel(data);
  _renderExpiryCalendar(now);
  _renderWeeklyChart(data);
  _renderDailyPriceLog(data);
  _renderMonthlySeasonality(data);
  _renderAnnualPerformance(data);
}

function _renderDailyStatChips(stats, currentPrice) {
  const el = document.getElementById('daily-stat-chips');
  if (!el) return;

  let chipData = stats;
  let badge = '';

  if (!stats) {
    const cache = getCachedData('daily_cache_stats');
    if (cache) {
      chipData = cache.data;
      badge = cache.isStale 
        ? `<span style="font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(255,68,85,0.12);color:var(--negative);border:1px solid rgba(255,68,85,0.25);margin-left:auto;font-family:var(--font-mono);font-weight:700;letter-spacing:0.02em;">⚠️ STALE CACHE (${cache.ageH}h ago)</span>`
        : `<span style="font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(255,204,0,0.12);color:var(--warning);border:1px solid rgba(255,204,0,0.25);margin-left:auto;font-family:var(--font-mono);font-weight:700;letter-spacing:0.02em;">🟡 CACHED (${cache.ageH}h ago)</span>`;
    }
  } else if (stats && currentPrice) {
    setCachedData('daily_cache_stats', stats);
  }

  if (!chipData) {
    el.innerHTML = '<span style="color:var(--text-muted);font-size:12px;padding-left:14px;font-family:var(--font-mono);">WAITING FOR LIVE MARKET QUOTES...</span>';
    return;
  }

  const s = chipData;
  const chip = (label, value, color) =>
    '<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:100px;">' +
    '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">' + label + '</div>' +
    '<div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:' + (color || 'var(--text-primary)') + ';">' + value + '</div>' +
    '</div>';
  
  const curP = currentPrice || (s.lastPrice || 0);
  const pctFrom52h = s.high52w ? ((curP - s.high52w) / s.high52w * 100).toFixed(1) : null;
  const pctFrom52l = s.low52w ? ((curP - s.low52w) / s.low52w * 100).toFixed(1) : null;
  
  el.innerHTML = [
    chip('52W High', s.high52w ? '$' + s.high52w.toFixed(3) : '\u2014', '#ff8c00'),
    chip('52W Low', s.low52w ? '$' + s.low52w.toFixed(3) : '\u2014', '#00d4ff'),
    chip('vs 52W H', pctFrom52h ? pctFrom52h + '%' : '\u2014', parseFloat(pctFrom52h) >= 0 ? 'var(--positive)' : 'var(--negative)'),
    chip('vs 52W L', pctFrom52l != null ? (parseFloat(pctFrom52l) >= 0 ? '+' : '') + pctFrom52l + '%' : '\u2014', parseFloat(pctFrom52l) >= 0 ? 'var(--positive)' : 'var(--negative)'),
    chip('30D Avg', s.avg30d ? '$' + s.avg30d.toFixed(3) : '\u2014', 'var(--text-secondary)'),
    chip('YTD \u0394%', s.ytdPct != null ? (s.ytdPct >= 0 ? '+' : '') + s.ytdPct.toFixed(1) + '%' : '\u2014', s.ytdPct != null && s.ytdPct >= 0 ? 'var(--positive)' : 'var(--negative)'),
    badge,
  ].join('');
}

function updateDailyMainChart(range) {
  const data = STATE.liveData['NG=F'] || [];
  if (!data.length) return;
  const now = new Date();
  let filtered = data;
  if (range !== 'ALL') {
    const months = range === '1M' ? 1 : range === '3M' ? 3 : range === '6M' ? 6 :
                   range === '1Y' ? 12 : range === '2Y' ? 24 : range === '3Y' ? 36 :
                   range === '5Y' ? 60 : range === '10Y' ? 120 : 12;
    const cutoff = new Date(now); cutoff.setMonth(now.getMonth() - months);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    filtered = data.filter(p => p.date >= cutoffStr);
  }
  if (!filtered.length) filtered = data;

  const stats = getDailyStats(data);
  const chartContainer = document.getElementById('daily-main-chart');
  const chart = createManagedChart('daily', 'main', chartContainer);
  chart.applyOptions({ rightPriceScale: { scaleMargins: { top: 0.12, bottom: 0.12 } } });

  const areaSeries = chart.addAreaSeries({
    lineColor: '#00d4ff',
    topColor: 'rgba(0,212,255,0.18)',
    bottomColor: 'rgba(0,212,255,0.0)',
    lineWidth: 2,
    priceLineVisible: false,
    lastValueVisible: true,
    crosshairMarkerRadius: 5,
    priceFormat: { type: 'custom', formatter: v => '$' + v.toFixed(3), minMove: 0.001 },
  });
  areaSeries.setData(data.map(p => ({ time: p.date, value: p.p })));

  // ── Reference level series (standalone, so applyOptions({ visible }) works) ──
  // Read current visibility from pill toggle state (persists across range changes)
  if (!STATE._dailyRefVisible) {
    STATE._dailyRefVisible = { '52wh': true, '52wl': true, avg360: true };
  }
  const refVis = STATE._dailyRefVisible;

  const makeRefSeries = (color, dotted) => chart.addLineSeries({
    color,
    lineWidth: 1,
    lineStyle: dotted ? LightweightCharts.LineStyle.Dashed : LightweightCharts.LineStyle.Solid,
    priceLineVisible: false,
    lastValueVisible: true,
    crosshairMarkerVisible: false,
    axisLabelVisible: true,
  });

  const fullDateRange = data.length >= 2
    ? [{ time: data[0].date }, { time: data[data.length - 1].date }]
    : [];

  STATE._dailyRefSeries = {};

  if (stats && stats.high52w && fullDateRange.length) {
    const s = makeRefSeries('#ff8c00', true);
    s.setData(fullDateRange.map(d => ({ time: d.time, value: stats.high52w })));
    s.applyOptions({ visible: refVis['52wh'], title: '52W H' });
    STATE._dailyRefSeries['52wh'] = s;
  }
  if (stats && stats.low52w && fullDateRange.length) {
    const s = makeRefSeries('#00d4ff', true);
    s.setData(fullDateRange.map(d => ({ time: d.time, value: stats.low52w })));
    s.applyOptions({ visible: refVis['52wl'], title: '52W L' });
    STATE._dailyRefSeries['52wl'] = s;
  }
  if (stats && stats.avg360d && fullDateRange.length) {
    const s = makeRefSeries('rgba(167,139,250,0.85)', true);
    s.setData(fullDateRange.map(d => ({ time: d.time, value: stats.avg360d })));
    s.applyOptions({ visible: refVis['avg360'], title: '360D Avg' });
    STATE._dailyRefSeries['avg360'] = s;
  }

  // Wire toggle pills (idempotent — re-registers on every chart rebuild)
  const toggleBar = document.getElementById('daily-ref-toggles');
  if (toggleBar && !toggleBar.dataset.wired) {
    toggleBar.dataset.wired = '1';
    toggleBar.addEventListener('click', e => {
      const pill = e.target.closest('.series-pill');
      if (!pill) return;
      const key = pill.dataset.ref;
      const isActive = pill.classList.toggle('active');
      STATE._dailyRefVisible[key] = isActive;
      const series = STATE._dailyRefSeries && STATE._dailyRefSeries[key];
      if (series) series.applyOptions({ visible: isActive });
    });
  }

  applyChartTimeScaleOptions(chart, {
    formatter: undefined, // default for general date
    barSpacing: 6,
    fixLeftEdge: true,
    fixRightEdge: true,
    tickMarkFormatter: (time, tickMarkType, locale) => {
      const d = new Date(typeof time === 'string' ? time : time * 1000);
      if (tickMarkType === 0) return d.getFullYear(); // Year
      if (tickMarkType === 1) return MONTHS[d.getMonth()]; // Month
      if (tickMarkType >= 2) return d.getDate(); // Day
      return '';
    }
  });
  
  // UNIFIED ZOOM LOGIC: Use setVisibleRange instead of data filtering
  if (range && range !== 'ALL') {
    const months = range === '1M' ? 1 : range === '3M' ? 3 : range === '6M' ? 6 :
                   range === '1Y' ? 12 : range === '2Y' ? 24 : range === '3Y' ? 36 :
                   range === '5Y' ? 60 : range === '10Y' ? 120 : 12;
    const cutoff = new Date(now); cutoff.setMonth(now.getMonth() - months);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    try {
      chart.timeScale().setVisibleRange({ from: cutoffStr, to: data[data.length-1].date });
    } catch(e) { chart.timeScale().fitContent(); }
  } else {
    chart.timeScale().fitContent();
  }

  // Store for slider sync — defer one animation frame so the chart viewport
  // has settled before _syncDailyMainSlider reads getVisibleRange() back.
  STATE._dailyMainChart = chart;
  STATE._dailyMainAllData = data;
  requestAnimationFrame(() => _syncDailyMainSlider());
  // Fix 5.1: Keep slider synced when user mouse-zooms / pans the chart
  chart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => _syncDailyMainSlider());
  });

  const dataLookup = new Map(data.map(p => [p.date, p]));
  attachChartTooltip({
    chart, container: chartContainer, titleColor: '#f5f7fb',
    seriesConfigs: [{ series: areaSeries, label: 'NG=F Close', color: '#00d4ff', emphasis: true,
      getPoint: param => dataLookup.get(typeof param.time === 'string' ? param.time : ''),
      formatValue: v => '$' + v.toFixed(3) }],
    getTitle: param => formatDailyDate(typeof param.time === 'string' ? param.time : ''),
    getMetrics: () => {
      if (!stats) return [];
      return [
        { label: '52W High', value: stats.high52w ? '$' + stats.high52w.toFixed(3) : '\u2014' },
        { label: '52W Low', value: stats.low52w ? '$' + stats.low52w.toFixed(3) : '\u2014' },
      ];
    },
  });
}

// ─── DAILY MAIN CHART SLIDER ─────────────────────────────────────────────────
function _initDailyMainSlider() {
  const start = document.getElementById('daily-main-slider-start');
  const end = document.getElementById('daily-main-slider-end');
  if (!start || !end) return;

  const updateChartFromSliders = () => {
    const chart = STATE._dailyMainChart;
    const data = STATE._dailyMainAllData;
    if (!chart || !data || !data.length) return;

    let s = parseInt(start.value, 10);
    let e = parseInt(end.value, 10);
    
    // Ensure min gap or swap (optional, Prices tab handles this)
    if (s > e) [s, e] = [e, s];
    
    const startIdx = Math.round((s / 100) * (data.length - 1));
    const endIdx = Math.round((e / 100) * (data.length - 1));
    
    // Deactivate range buttons if manually adjusted
    document.querySelectorAll('#daily-range-switch .segment-btn').forEach(b => b.classList.remove('active'));
    STATE.dailyRange = 'CUSTOM';

    chart.timeScale().setVisibleRange({
      from: data[startIdx].date,
      to: data[endIdx].date
    });
    _syncDailyMainSlider();
  };

  start.addEventListener('input', updateChartFromSliders);
  end.addEventListener('input', updateChartFromSliders);
}

function _syncDailyMainSlider() {
  const start = document.getElementById('daily-main-slider-start');
  const end = document.getElementById('daily-main-slider-end');
  const selection = document.getElementById('daily-main-range-selection');
  const readout = document.getElementById('daily-range-readout');
  const chart = STATE._dailyMainChart;
  const allData = STATE._dailyMainAllData;

  if (!start || !end || !selection || !chart || !allData || !allData.length) return;
  
  const range = chart.timeScale().getVisibleRange();
  if (!range || !range.from || !range.to) return;
  
  const fromTime = typeof range.from === 'string' ? range.from : (new Date(range.from * 1000).toISOString().slice(0, 10));
  const toTime = typeof range.to === 'string' ? range.to : (new Date(range.to * 1000).toISOString().slice(0, 10));
  
  const sIdx = allData.findIndex(p => p.date >= fromTime);
  const eIdx = allData.findLastIndex(p => p.date <= toTime);
  
  if (sIdx === -1 || eIdx === -1) return;
  
  const sPct = (sIdx / (allData.length - 1)) * 100;
  const ePct = (eIdx / (allData.length - 1)) * 100;
  
  start.value = String(Math.round(sPct));
  end.value = String(Math.round(ePct));
  
  selection.style.left = sPct + '%';
  selection.style.width = (ePct - sPct) + '%';
  
  if (readout) {
    const sDate = allData[sIdx].date;
    const eDate = allData[eIdx].date;
    readout.textContent = `${sDate} to ${eDate} (${eIdx - sIdx + 1} days)`;
  }
}


function _renderSpreadPanel(ngData) {
  const chipsEl = document.getElementById('daily-spread-kpis');
  const chartEl = document.getElementById('daily-spread-chart');
  if (!chipsEl || !chartEl) return;

  const ttfHistorical = getTTFSpreadData();
  if (!ttfHistorical.length) {
    chipsEl.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">TTF data unavailable</span>';
    chartEl.innerHTML = '';
    return;
  }

  const ttfByDate = new Map(ttfHistorical.map(p => [p.date, p.p]));
  const spreadSeries = ngData
    .filter(p => ttfByDate.has(p.date))
    .map(p => ({ time: p.date, value: +(p.p - ttfByDate.get(p.date)).toFixed(3) }));

  if (spreadSeries.length < 2) {
    chipsEl.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">Insufficient overlapping data</span>';
    chartEl.innerHTML = '';
    return;
  }

  const currentSpread = spreadSeries[spreadSeries.length - 1].value;
  const spreadPrices = spreadSeries.map(s => s.value);
  const highSpread = Math.max(...spreadPrices);
  const lowSpread = Math.min(...spreadPrices);
  const avgSpread = spreadPrices.reduce((s, v) => s + v, 0) / spreadPrices.length;
  
  const now = new Date();
  const yearStart = `${now.getFullYear()}-01-01`;
  const ytdSeries = spreadSeries.filter(s => s.time >= yearStart);
  const ytdDelta = ytdSeries.length >= 2 
    ? (currentSpread - ytdSeries[0].value) 
    : null;

  const chip = (label, value, color) =>
    '<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:110px;flex:1;">' +
    '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">' + label + '</div>' +
    '<div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:' + (color || 'var(--text-primary)') + ';">' + value + '</div>' +
    '</div>';

  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
  const spreadColor = currentSpread >= 0 ? 'var(--positive)' : 'var(--negative)';

  chipsEl.innerHTML = [
    chip('Current Spread', fmt(currentSpread), spreadColor),
    chip('52W High', fmt(highSpread), '#ff8c00'),
    chip('52W Low', fmt(lowSpread), '#00d4ff'),
    chip('Avg Spread', fmt(avgSpread), 'var(--text-secondary)'),
    chip('YTD \u0394', ytdDelta !== null ? fmt(ytdDelta) : '\u2014', (ytdDelta || 0) >= 0 ? 'var(--positive)' : 'var(--negative)'),
  ].join('');

  if (spreadSeries.length < 2) {
    chartEl.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">Insufficient overlapping data</div>';
    return;
  }

  const spreadChart = createManagedChart('daily', 'spread', chartEl);
  const zeroLine = spreadChart.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
  zeroLine.setData([{ time: spreadSeries[0].time, value: 0 }, { time: spreadSeries[spreadSeries.length - 1].time, value: 0 }]);
  const sSeries = spreadChart.addLineSeries({
    color: '#a78bfa', lineWidth: 2, priceLineVisible: false, lastValueVisible: true, crosshairMarkerRadius: 4,
    priceFormat: { type: 'custom', formatter: v => (v >= 0 ? '+' : '') + v.toFixed(3), minMove: 0.001 },
  });
  sSeries.setData(spreadSeries);
  applyChartTimeScaleOptions(spreadChart, { formatter: undefined, barSpacing: Math.max(3, Math.floor(600 / spreadSeries.length)), fixLeftEdge: true, fixRightEdge: true });
  
  const spread52w = spreadSeries.slice(-252);
  const sHighVal = Math.max(...spread52w.map(s => s.value));
  const sLowVal = Math.min(...spread52w.map(s => s.value));

  const sHighSeries = spreadChart.addLineSeries({
    color: '#ff8c00', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false,
    axisLabelVisible: true, title: '52W High'
  });
  sHighSeries.setData(spreadSeries.map(s => ({ time: s.time, value: sHighVal })));

  const sLowSeries = spreadChart.addLineSeries({
    color: '#00d4ff', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false,
    axisLabelVisible: true, title: '52W Low'
  });
  sLowSeries.setData(spreadSeries.map(s => ({ time: s.time, value: sLowVal })));

  STATE._dailySpreadChart = spreadChart;
  STATE._dailySpreadData = spreadSeries;
  STATE._dailySpreadSeries = sSeries;
  STATE._dailySpreadHighSeries = sHighSeries;
  STATE._dailySpreadLowSeries = sLowSeries;

  spreadChart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => _syncDailySpreadSliderFromChart());
  });

  const legendEl = document.getElementById('daily-spread-legend');
  if (legendEl) {
    if (STATE.dailySpreadVisible === undefined) STATE.dailySpreadVisible = true;
    if (STATE.dailySpreadHighVisible === undefined) STATE.dailySpreadHighVisible = true;
    if (STATE.dailySpreadLowVisible === undefined) STATE.dailySpreadLowVisible = true;
    const on = STATE.dailySpreadVisible;
    const onH = STATE.dailySpreadHighVisible;
    const onL = STATE.dailySpreadLowVisible;
    
    legendEl.innerHTML = `
      <button class="series-pill ${on ? 'active' : ''}" onclick="toggleDailySpreadSeries('main')" style="border-color:rgba(167,139,250,0.45);opacity:${on ? '1' : '0.4'};">
        <span class="swatch" style="background:#a78bfa;"></span>Spread
      </button>
      <button class="series-pill ${onH ? 'active' : ''}" onclick="toggleDailySpreadSeries('high')" style="border-color:rgba(255,140,0,0.45);opacity:${onH ? '1' : '0.4'};">
        <span class="swatch" style="background:#ff8c00;"></span>52W H
      </button>
      <button class="series-pill ${onL ? 'active' : ''}" onclick="toggleDailySpreadSeries('low')" style="border-color:rgba(0,212,255,0.45);opacity:${onL ? '1' : '0.4'};">
        <span class="swatch" style="background:#00d4ff;"></span>52W L
      </button>
    `;
    sSeries.applyOptions({ visible: on });
    sHighSeries.applyOptions({ visible: onH });
    sLowSeries.applyOptions({ visible: onL });
  }
  
  if (!STATE.dailySpreadView) {
    STATE.dailySpreadView = { rangeStart: 0, rangeEnd: spreadSeries.length - 1 };
  }
  
  syncDailySpreadRangeFooter();
}

function onDailySpreadSlider() {
  const chart = STATE._dailySpreadChart;
  const data = STATE._dailySpreadData;
  if (!chart || !data || !data.length) return;
  
  let start = parseInt(document.getElementById('daily-spread-slider-start').value);
  let end   = parseInt(document.getElementById('daily-spread-slider-end').value);
  
  if (start >= end) {
    end = Math.min(100, start + 1);
    document.getElementById('daily-spread-slider-end').value = end;
  }
  
  const sIdx = Math.floor((start / 100) * (data.length - 1));
  const eIdx = Math.min(data.length - 1, Math.floor((end / 100) * (data.length - 1)));
  
  STATE.dailySpreadView = { rangeStart: sIdx, rangeEnd: eIdx };
  syncDailySpreadRangeFooter();
}

function syncDailySpreadRangeFooter() {
  const chart = STATE._dailySpreadChart;
  const data = STATE._dailySpreadData;
  if (!chart || !data || !data.length) return;
  
  const startS = document.getElementById('daily-spread-slider-start');
  const endS   = document.getElementById('daily-spread-slider-end');
  const selection = document.getElementById('daily-spread-selection');
  const readout = document.getElementById('daily-spread-readout');
  const minL = document.getElementById('daily-spread-min-label');
  const maxL = document.getElementById('daily-spread-max-label');

  if (!startS) return;
  
  const view = STATE.dailySpreadView || { rangeStart: 0, rangeEnd: data.length - 1 };
  const sIdx = view.rangeStart;
  const eIdx = view.rangeEnd;
  
  const pctS = (sIdx / (data.length - 1)) * 100;
  const pctE = (eIdx / (data.length - 1)) * 100;
  
  if (selection) {
    selection.style.left = `${pctS}%`;
    selection.style.width = `${pctE - pctS}%`;
  }
  
  if (minL) minL.textContent = data[0].time;
  if (maxL) maxL.textContent = data[data.length - 1].time;
  
  if (readout) {
    readout.innerHTML = `<span>${data[sIdx].time}</span> <span style="color:var(--text-muted);font-size:10px;">TO</span> <span>${data[eIdx].time}</span>`;
  }
  
  chart.timeScale().setVisibleRange({ from: data[sIdx].time, to: data[eIdx].time });
}

function _syncDailySpreadSliderFromChart() {
  const chart = STATE._dailySpreadChart;
  const data = STATE._dailySpreadData;
  if (!chart || !data || !data.length) return;

  const range = chart.timeScale().getVisibleRange();
  if (!range) return;

  const fromTime = typeof range.from === 'string' ? range.from : new Date(range.from * 1000).toISOString().slice(0, 10);
  const toTime   = typeof range.to   === 'string' ? range.to   : new Date(range.to   * 1000).toISOString().slice(0, 10);

  let sIdx = data.findIndex(p => p.time >= fromTime);
  let eIdx = data.findLastIndex(p => p.time <= toTime);
  if (sIdx === -1) sIdx = 0;
  if (eIdx === -1) eIdx = data.length - 1;

  const pctS = (sIdx / (data.length - 1)) * 100;
  const pctE = (eIdx / (data.length - 1)) * 100;

  const startS = document.getElementById('daily-spread-slider-start');
  const endS   = document.getElementById('daily-spread-slider-end');
  const selection = document.getElementById('daily-spread-selection');
  const readout   = document.getElementById('daily-spread-readout');

  if (startS) startS.value = pctS;
  if (endS)   endS.value   = pctE;
  if (selection) {
    selection.style.left  = `${pctS}%`;
    selection.style.width = `${pctE - pctS}%`;
  }
  if (readout) readout.innerHTML = `<span>${data[sIdx].time}</span> <span style="color:var(--text-muted);font-size:10px;">TO</span> <span>${data[eIdx].time}</span>`;

  STATE.dailySpreadView = { rangeStart: sIdx, rangeEnd: eIdx };
}

function toggleDailySpreadSeries(type) {
  if (type === 'high') {
    STATE.dailySpreadHighVisible = (STATE.dailySpreadHighVisible === undefined) ? false : !STATE.dailySpreadHighVisible;
    if (STATE._dailySpreadHighSeries) STATE._dailySpreadHighSeries.applyOptions({ visible: STATE.dailySpreadHighVisible });
  } else if (type === 'low') {
    STATE.dailySpreadLowVisible = (STATE.dailySpreadLowVisible === undefined) ? false : !STATE.dailySpreadLowVisible;
    if (STATE._dailySpreadLowSeries) STATE._dailySpreadLowSeries.applyOptions({ visible: STATE.dailySpreadLowVisible });
  } else {
    // main
    STATE.dailySpreadVisible = (STATE.dailySpreadVisible === undefined) ? false : !STATE.dailySpreadVisible;
    if (STATE._dailySpreadSeries) STATE._dailySpreadSeries.applyOptions({ visible: STATE.dailySpreadVisible });
  }
  
  const legendEl = document.getElementById('daily-spread-legend');
  if (legendEl) {
    const mainOn = STATE.dailySpreadVisible !== false;
    const highOn = STATE.dailySpreadHighVisible !== false;
    const lowOn = STATE.dailySpreadLowVisible !== false;
    const pills = legendEl.querySelectorAll('.series-pill');
    if (pills[0]) { pills[0].classList.toggle('active', mainOn); pills[0].style.opacity = mainOn ? '1' : '0.4'; }
    if (pills[1]) { pills[1].classList.toggle('active', highOn); pills[1].style.opacity = highOn ? '1' : '0.4'; }
    if (pills[2]) { pills[2].classList.toggle('active', lowOn); pills[2].style.opacity = lowOn ? '1' : '0.4'; }
  }
}

function _renderExpiryCalendar(now) {
  const el = document.getElementById('daily-calendar');
  if (!el) return;
  let html = '<div class="card-title" style="padding:10px 14px 6px;">Upcoming Expirations</div><div style="padding:0 12px 10px;">';
  for (let offset = 1; offset <= 12; offset++) {
    const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const month = MONTHS[d.getMonth()];
    const code = MONTH_CODES[month];
    const yr = d.getFullYear() % 100;
    const pad = yr < 10 ? '0' + yr : '' + yr;
    const ticker = 'NG' + code + pad;
    const expiry = computeNGExpiry(d.getFullYear(), d.getMonth());
    const daysUntil = Math.round((expiry.getTime() - now.getTime()) / 86400000);
    const expiryStr = expiry.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const isPrompt = offset === 1;
    const isClose = daysUntil >= 0 && daysUntil <= 7;
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:11px;gap:4px;">' +
      '<span style="color:' + (isPrompt ? 'var(--accent-hh)' : 'var(--text-secondary)') + ';font-weight:' + (isPrompt ? '700' : '400') + ';cursor:pointer;" onclick="navigateTo(\'prices\',{month:\'' + month + '\',year:\'' + d.getFullYear() + '\'})" title="View in Prices">' + ticker + '</span>' +
      '<span style="color:var(--text-muted);">' + expiryStr + '</span>' +
      '<span style="color:' + (daysUntil < 0 ? 'var(--text-muted)' : isClose ? 'var(--negative)' : 'var(--text-secondary)') + ';">' + (daysUntil < 0 ? 'expired' : 'in ' + daysUntil + 'd') + '</span>' +
      '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}



function _renderWeeklyChart(data) {
  const weekly = computeWeeklyChanges(data);
  const subtitle = document.getElementById('daily-weekly-subtitle');
  if (subtitle) subtitle.textContent = weekly.length + ' weeks';
  if (weekly.length < 2) return;

  const chartEl = document.getElementById('daily-weekly-chart');
  const wChart = createManagedChart('daily', 'weekly', chartEl);

  const zl = wChart.addLineSeries({ color: 'rgba(255,255,255,0.12)', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
  zl.setData([{ time: weekly[0].date, value: 0 }, { time: weekly[weekly.length - 1].date, value: 0 }]);

  const hSeries = wChart.addHistogramSeries({
    priceFormat: { type: 'custom', formatter: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%', minMove: 0.01 },
    priceLineVisible: false, lastValueVisible: false,
  });
  hSeries.setData(weekly.map(w => ({ time: w.date, value: w.pct, color: w.pct >= 0 ? 'rgba(0,255,136,0.7)' : 'rgba(255,68,85,0.7)' })));
  applyChartTimeScaleOptions(wChart, { formatter: undefined, barSpacing: Math.max(3, Math.floor(800 / weekly.length)), fixLeftEdge: true, fixRightEdge: true });
  wChart.timeScale().fitContent();

  STATE._dailyWeeklyChart = wChart;
  STATE._dailyWeeklyData = weekly;
  if (!STATE.dailyWeeklyView) {
    STATE.dailyWeeklyView = { rangeStart: 0, rangeEnd: weekly.length - 1 };
  }
  
  wChart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => _syncDailyWeeklySliderFromChart());
  });

  const wLookup = new Map(weekly.map(w => [w.date, w]));
  attachChartTooltip({ chart: wChart, container: chartEl, titleColor: '#f5f7fb',
    seriesConfigs: [{ series: hSeries, label: 'Weekly \u0394%', color: '#00ff88', emphasis: true,
      getPoint: p => wLookup.get(typeof p.time === 'string' ? p.time : ''),
      formatValue: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%' }],
    getTitle: p => { const w = wLookup.get(typeof p.time === 'string' ? p.time : ''); return w ? formatDailyDate(w.date) : ''; },
    getMetrics: () => [
      { label: 'Pos weeks', value: weekly.filter(w => w.pct >= 0).length },
      { label: 'Neg weeks', value: weekly.filter(w => w.pct < 0).length },
      { label: 'Best', value: '+' + Math.max(...weekly.map(w => w.pct)).toFixed(2) + '%' },
      { label: 'Worst', value: Math.min(...weekly.map(w => w.pct)).toFixed(2) + '%' },
    ],
  });

  // Distribution
  const BUCKETS = [[-Infinity,-15],[-15,-10],[-10,-5],[-5,-2],[-2,0],[0,2],[2,5],[5,10],[10,15],[15,Infinity]];
  const BLABELS = ['<-15%','-15 to -10%','-10 to -5%','-5 to -2%','-2 to 0%','0 to 2%','2 to 5%','5 to 10%','10 to 15%','>15%'];
  const counts = BUCKETS.map(([lo, hi]) => weekly.filter(w => w.pct >= lo && w.pct < hi).length);
  const maxCount = Math.max(...counts, 1);
  const posCount = weekly.filter(w => w.pct >= 0).length;
  const mean = weekly.reduce((s, w) => s + w.pct, 0) / weekly.length;
  const stddev = Math.sqrt(weekly.reduce((s, w) => s + (w.pct - mean) ** 2, 0) / weekly.length);

  const distEl = document.getElementById('daily-dist');
  if (!distEl) return;
  let distHtml = '<div class="card-title" style="padding:10px 14px 0;">Return Distribution</div><div style="padding:6px 14px 12px;font-family:var(--font-mono);font-size:11px;">';
  counts.forEach((c, i) => {
    const isPos = BUCKETS[i][0] >= 0;
    const barW = (c / maxCount * 100).toFixed(1);
    distHtml += '<div style="display:flex;align-items:center;gap:6px;padding:2px 0;">' +
      '<span style="width:88px;text-align:right;color:var(--text-secondary);flex-shrink:0;">' + BLABELS[i] + '</span>' +
      '<div style="flex:1;background:var(--bg-primary);border-radius:2px;height:11px;">' +
      '<div style="width:' + barW + '%;height:100%;background:' + (isPos ? 'rgba(0,255,136,0.65)' : 'rgba(255,68,85,0.65)') + ';border-radius:2px;"></div>' +
      '</div><span style="width:18px;text-align:right;color:var(--text-primary);font-weight:600;">' + c + '</span></div>';
  });
  distHtml += '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:6px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap;">' +
    '<span>Pos: <strong style="color:var(--positive);">' + posCount + ' (' + (posCount/weekly.length*100).toFixed(1) + '%)</strong></span>' +
    '<span>Mean: <strong style="color:var(--text-primary);">' + (mean >= 0 ? '+' : '') + mean.toFixed(2) + '%</strong></span>' +
    '<span>\u03C3: <strong style="color:var(--text-primary);">' + stddev.toFixed(2) + '%</strong></span>' +
    '</div></div>';
  distEl.innerHTML = distHtml;
  distEl.innerHTML = distHtml;
}

function onDailyWeeklySlider() {
  const chart = STATE._dailyWeeklyChart;
  const data = STATE._dailyWeeklyData;
  if (!chart || !data || !data.length) return;
  
  let start = parseInt(document.getElementById('daily-weekly-slider-start').value);
  let end   = parseInt(document.getElementById('daily-weekly-slider-end').value);
  
  if (start >= end) {
    end = Math.min(100, start + 1);
    document.getElementById('daily-weekly-slider-end').value = end;
  }
  
  const sIdx = Math.floor((start / 100) * (data.length - 1));
  const eIdx = Math.min(data.length - 1, Math.floor((end / 100) * (data.length - 1)));
  
  // Deactivate preset buttons if slider is moved manually
  document.querySelectorAll('#daily-weekly-presets .pill-btn').forEach(b => b.classList.remove('active'));
  
  STATE.dailyWeeklyView = { rangeStart: sIdx, rangeEnd: eIdx };
  syncDailyWeeklyRangeFooter();
}

function syncDailyWeeklyRangeFooter() {
  const chart = STATE._dailyWeeklyChart;
  const data = STATE._dailyWeeklyData;
  if (!chart || !data || !data.length) return;
  
  const startS = document.getElementById('daily-weekly-slider-start');
  const selection = document.getElementById('daily-weekly-selection');
  const readout = document.getElementById('daily-weekly-readout');
  const minL = document.getElementById('daily-weekly-min-label');
  const maxL = document.getElementById('daily-weekly-max-label');

  if (!startS) return;
  
  const view = STATE.dailyWeeklyView || { rangeStart: 0, rangeEnd: data.length - 1 };
  const sIdx = view.rangeStart;
  const eIdx = view.rangeEnd;
  
  const pctS = (sIdx / (data.length - 1)) * 100;
  const pctE = (eIdx / (data.length - 1)) * 100;
  
  if (selection) {
    selection.style.left = `${pctS}%`;
    selection.style.width = `${pctE - pctS}%`;

  if (readout) readout.textContent = `${sDate} TO ${eDate} (${eIdx - sIdx + 1} weeks)`;
  
  chart.timeScale().setVisibleRange({ from: sDate, to: eDate });
}

const _priceLogState = { page: 0, data: [], pageSize: 100 };

function _renderDailyPriceLog(data) {
  const el = document.getElementById('daily-table');
  if (!el) return;
  _priceLogState.data = [...data].reverse();
