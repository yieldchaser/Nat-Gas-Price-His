/* ─── Feature 2: Forward Return Distributions by T-Day (Prices Tab) ─── */
function renderHHForwardReturns(data, month, year) {
  const el = document.getElementById('hh-fwd-returns');
  if (!el) return;

  if (!data || data.length === 0) { el.innerHTML = ''; return; }

  const last = data[data.length - 1];
  const currentDay = last.d;
  const contracts = STATE.hh[month] && STATE.hh[month].contracts;
  if (!contracts) { el.innerHTML = ''; return; }

  // Only show for active contracts — forward returns from current T-day are only
  // meaningful when the contract hasn't expired yet.
  const code = MONTH_CODES[month];
  const yy = year % 100;
  const pad = yy < 10 ? '0' + yy : '' + yy;
  const liveTicker = `NG${code}${pad}.NYM`;
  const isLive = !!STATE.liveData[liveTicker];
  if (!isLive) { el.innerHTML = ''; return; }

  const HORIZONS = [10, 20, 60];
  const WINDOW = 12; // ±12 T-days around currentDay

  // Accumulate forward returns for each horizon across all historical contracts
  const results = HORIZONS.map(() => []);

  Object.entries(contracts).forEach(([ticker, series]) => {
    if (!series || series.length === 0) return;
    // Skip the current year — no self-reference
    const tickerYear = parseInt('20' + ticker.slice(-2), 10);
    if (tickerYear === year) return;

    // Find the closest point within ±WINDOW of currentDay
    let matchPt = null;
    let minDiff = Infinity;
    for (const pt of series) {
      const diff = Math.abs(pt.d - currentDay);
      if (diff <= WINDOW && diff < minDiff) { matchPt = pt; minDiff = diff; }
    }
    if (!matchPt) return;

    HORIZONS.forEach((h, hi) => {
      const targetD = matchPt.d + h;
      // Find the closest point to targetD
      let fwdPt = null;
      const fwdIdx = series.findIndex(pt => pt.d >= targetD);
      if (fwdIdx !== -1) {
        if (fwdIdx > 0) {
          const ptA = series[fwdIdx];
          const ptB = series[fwdIdx - 1];
          fwdPt = Math.abs(ptA.d - targetD) <= Math.abs(ptB.d - targetD) ? ptA : ptB;
        } else {
          fwdPt = series[fwdIdx];
        }
      }
      if (!fwdPt) return;
      const ret = (fwdPt.p - matchPt.p) / matchPt.p * 100;
      if (!Number.isFinite(ret)) return;
      results[hi].push(ret);
    });
  });

  // Compute statistics for each horizon
  function horizonStats(rets) {
    if (!rets.length) return null;
    const sorted = [...rets].sort((a, b) => a - b);
    const n = sorted.length;
    const median = n % 2 === 0
      ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2
      : sorted[Math.floor(n / 2)];
    const posCount = rets.filter(r => r >= 0).length;
    return { median, pctPos: Math.round(posCount / n * 100), n };
  }

  const stats = results.map(horizonStats);
  const hasData = stats.some(s => s !== null && s.n >= 2);

  if (!hasData) {
    el.innerHTML = `
      <div class="card-title" style="padding:10px 14px 4px;">HISTORICAL BASE RATES</div>
      <div style="padding:8px 14px 12px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">
        Not enough historical same-month contracts at T-${currentDay} to compute forward returns.
      </div>`;
    return;
  }

  const horizonTips = {
    '+10T': 'Forward return 10 trading days (~2 weeks) from the current T-Day. Short-horizon momentum signal.',
    '+20T': 'Forward return 20 trading days (~1 month) from the current T-Day. Medium-horizon directional signal.',
    '+60T': 'Forward return 60 trading days (~3 months) from the current T-Day. Seasonal repositioning window.'
  };
  function renderHorizonCol(label, stat) {
    const tip = horizonTips[label] || '';
    if (!stat) return `<div style="flex:1;text-align:center;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;" data-tooltip="${tip}">${label}</div><div style="font-family:var(--font-mono);font-size:13px;color:var(--text-muted);">—</div></div>`;
    const lowN = stat.n < 5;
    const medColor = stat.median >= 0 ? 'var(--positive)' : 'var(--negative)';
    const medSign = stat.median >= 0 ? '+' : '';
    const pctColor = stat.pctPos >= 60 ? 'var(--positive)' : stat.pctPos <= 40 ? 'var(--negative)' : 'var(--text-secondary)';
    return `
      <div style="flex:1;text-align:center;padding:0 4px;">
        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;" data-tooltip="${tip}">${label}</div>
        <div style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:${medColor};" data-tooltip="Median historical return at this horizon across all matched analog T-Days.">${medSign}${stat.median.toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">median</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:${pctColor};margin-top:4px;" data-tooltip="% of historical instances where price was higher ${label.replace('+','')} after the matched T-Day. Above 60% = historically bullish; below 40% = historically bearish.">${stat.pctPos}% ↑</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">${lowN ? '<span title="Low sample count — interpret with caution">⚠️ ' : ''}n=${stat.n}${lowN ? '</span>' : ''}</div>
      </div>`;
  }

  el.innerHTML = `
    <div style="padding:10px 14px 6px;border-bottom:1px solid var(--border);">
      <div class="card-title" style="padding:0;margin-bottom:2px;" data-tooltip="For each historical same-month contract, finds the price at the current T-Day (±12 days) and records returns at +10T, +20T, +60T horizons. Shows median, % positive, and sample size. Historical base rates only — not a forecast.">T-DAY MATCHED FORWARD RETURNS</div>
      <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">
        T-${currentDay} ±${WINDOW} window · same delivery month · historical base rates only
      </div>
    </div>
    <div style="display:flex;gap:0;padding:12px 10px;border-bottom:1px solid var(--border);">
      ${renderHorizonCol('+10T', stats[0])}
      <div style="width:1px;background:var(--border);flex-shrink:0;"></div>
      ${renderHorizonCol('+20T', stats[1])}
      <div style="width:1px;background:var(--border);flex-shrink:0;"></div>
      ${renderHorizonCol('+60T', stats[2])}
    </div>
    <div style="padding:6px 14px;font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">
      ⓘ Historical base rates · not a forecast
    </div>`;
}

/* ─── Feature 7: Analog Year Clustering (Tier 3) ─── */
function renderAnalogCluster(data, month, year) {
  const el = document.getElementById('hh-analog-cluster');
  if (!el) return;
  if (!data || data.length < 20) { el.innerHTML = ''; return; }

  const contracts = STATE.hh[month] && STATE.hh[month].contracts;
  if (!contracts) { el.innerHTML = ''; return; }

  // Normalise a series array to its own opening price = 100
  function normalise(series) {
    const open = series[0].p;
    if (!open || open === 0) return null;
    return series.map(pt => ({ d: pt.d, norm: (pt.p / open) * 100 }));
  }

  // Active contract normalised
  const activeSeries = data;
  const activeNorm = normalise(activeSeries);
  if (!activeNorm) { el.innerHTML = ''; return; }

  const activeMap = new Map(activeNorm.map(pt => [pt.d, pt.norm]));
  const activeDs = activeNorm.map(pt => pt.d);
  const minD = activeDs[0], maxD = activeDs[activeDs.length - 1];

  // Build pool of historical contracts (same month, not current year)
  const candidates = [];
  Object.entries(contracts).forEach(([ticker, series]) => {
    if (!series || series.length < 20) return;
    const tickerYear = parseInt(ticker.slice(-2)) < 50 ? 2000 + parseInt(ticker.slice(-2)) : 1900 + parseInt(ticker.slice(-2));
    if (tickerYear === year) return; // no self-reference

    const expiry = estimateContractExpiry(ticker);
    let mapped = series;
    if (expiry) {
      mapped = series.map(pt => {
        const daysLeft = approxTradingDaysTo(pt.date, expiry);
        const d = 519 - daysLeft;
        if (d < 1) return null;
        return { d: Math.min(519, d), p: pt.p, date: pt.date };
      }).filter(Boolean);
    }
    if (mapped.length < 10) return;
    const norm = normalise(mapped);
    if (!norm) return;
    const normMap = new Map(norm.map(pt => [pt.d, pt.norm]));

    // Compute SSE over the overlapping window (minD to min of both maxDs)
    let sse = 0, count = 0;
    for (let d = minD; d <= maxD; d++) {
      const av = activeMap.get(d);
      const hv = normMap.get(d);
      if (av !== undefined && hv !== undefined) {
        sse += (av - hv) ** 2;
        count++;
      }
    }
    if (count < 10) return;
    const rmse = Math.sqrt(sse / count);
    candidates.push({ yr: tickerYear, norm, normMap, rmse, fullMapped: mapped });
  });

  if (candidates.length === 0) { el.innerHTML = ''; return; }

  // Sort by similarity, pick top 5
  candidates.sort((a, b) => a.rmse - b.rmse);
  const TOP_N = Math.min(5, candidates.length);
  const analogs = candidates.slice(0, TOP_N);

  // Composite = mean of analog normalised values at each D, from maxD onward
  const compositeDs = new Set();
  analogs.forEach(a => { a.norm.forEach(pt => { if (pt.d >= maxD) compositeDs.add(pt.d); }); });
  const compositePoints = [...compositeDs].sort((a, b) => a - b).map(d => {
    let sum = 0, cnt = 0;
    analogs.forEach(a => { const v = a.normMap.get(d); if (v !== undefined) { sum += v; cnt++; } });
    return cnt > 0 ? { d, norm: sum / cnt } : null;
  }).filter(Boolean);

  // SVG chart dimensions
  const SVG_H = 180;
  const PAD_T = 8, PAD_B = 24, PAD_L = 4;
  let allNormVals = [...activeNorm.map(p => p.norm)];
  analogs.forEach(a => a.norm.forEach(p => { if (p.d >= minD) allNormVals.push(p.norm); }));
  compositePoints.forEach(p => allNormVals.push(p.norm));
  let yMin = Math.min(...allNormVals), yMax = Math.max(...allNormVals);
  const yPad = (yMax - yMin) * 0.08 + 0.01;
  yMin -= yPad; yMax += yPad;
  const allD = new Set();
  activeNorm.forEach(p => allD.add(p.d));
  analogs.forEach(a => a.norm.forEach(p => allD.add(p.d)));
  const dMin = Math.min(...allD), dMax = Math.max(...allD);

  function sx(d) { return ((d - dMin) / (dMax - dMin) * 100).toFixed(2) + '%'; }
  function sy(v) { return (PAD_T + (SVG_H - PAD_T - PAD_B) * (1 - (v - yMin) / (yMax - yMin))).toFixed(1); }

  const COLORS = ['#60a5fa','#34d399','#f472b6','#a78bfa','#fb923c'];
  let svgStr = '';

  // Zero line (= 100, the open price baseline)
  const baseY = sy(100);
  svgStr += `<line x1="0" y1="${baseY}" x2="100%" y2="${baseY}" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>`;
  svgStr += `<text x="1%" y="${(parseFloat(baseY)-2).toFixed(1)}" font-size="8" fill="rgba(255,255,255,0.25)">100 (open)</text>`;

  // Analog year paths
  analogs.forEach((a, i) => {
    const pts = a.norm.filter(p => p.d >= minD).map(p => `${sx(p.d)},${sy(p.norm)}`).join(' ');
    if (!pts) return;
    svgStr += `<polyline points="${pts}" fill="none" stroke="${COLORS[i % COLORS.length]}" stroke-width="1" opacity="0.35"/>`;
    const last = a.norm[a.norm.length - 1];
    svgStr += `<text x="${sx(last.d)}" y="${(parseFloat(sy(last.norm)) - 2).toFixed(1)}" font-size="8" fill="${COLORS[i % COLORS.length]}" opacity="0.6" text-anchor="end">${a.yr}</text>`;
  });

  // Composite forward path (amber)
  if (compositePoints.length > 1) {
    const cpts = compositePoints.map(p => `${sx(p.d)},${sy(p.norm)}`).join(' ');
    svgStr += `<polyline points="${cpts}" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,2"/>`;
    const cl = compositePoints[compositePoints.length - 1];
    svgStr += `<text x="${sx(cl.d)}" y="${(parseFloat(sy(cl.norm)) - 3).toFixed(1)}" font-size="8" fill="#fbbf24" text-anchor="end">composite</text>`;
  }

  // Active contract path (white, solid, prominent)
  const activePts = activeNorm.map(p => `${sx(p.d)},${sy(p.norm)}`).join(' ');
  svgStr += `<polyline points="${activePts}" fill="none" stroke="white" stroke-width="2"/>`;
  const alast = activeNorm[activeNorm.length - 1];
  svgStr += `<circle cx="${sx(alast.d)}" cy="${sy(alast.norm)}" r="3.5" fill="white"/>`;

  // X-axis tick labels
  [minD, Math.round((minD + dMax) / 2), dMax].forEach(d => {
    svgStr += `<text x="${sx(d)}" y="${SVG_H - 6}" font-size="8" fill="rgba(255,255,255,0.35)" text-anchor="middle">T-${d}</text>`;
  });

  el.innerHTML = `
    <div style="padding:10px 14px 6px;border-bottom:1px solid var(--border);">
      <div class="card-title" style="padding:0;margin-bottom:2px;" data-tooltip="Finds the top historical contract years whose normalized trailing 90-day price path most closely matches the current year's trajectory (by RMSE). Projects a composite median path forward. Historical analog only — not a forecast.">ANALOG YEAR CLUSTERING</div>
      <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">
        ${month} · normalised to open=100 · top ${TOP_N} analogs by RMSE
      </div>
    </div>
    <div style="padding:8px 14px 2px;">
      <svg width="100%" height="${SVG_H}" style="overflow:visible;display:block;">${svgStr}</svg>
    </div>
    <div style="padding:4px 14px 6px;">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">
        ${analogs.map((a, i) => `<span style="font-family:var(--font-mono);font-size:10px;color:${COLORS[i % COLORS.length]};">● ${a.yr} <span style="color:var(--text-muted);">(Δ${a.rmse.toFixed(1)})</span></span>`).join('')}
        ${compositePoints.length > 0 ? `<span style="font-family:var(--font-mono);font-size:10px;color:#fbbf24;">◆ Composite</span>` : ''}
        <span style="font-family:var(--font-mono);font-size:10px;color:white;">— ${year}</span>
      </div>
      <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);">
        ⓘ Analog Year Composite (Historical) — not a forecast · RMSE = similarity score (lower = closer)
      </div>
    </div>`;
}

/* ─── Feature 9: Drawdown-by-T-Day Heatmap (Tier 3) ─── */
function renderDrawdownHeatmap(month) {
  const el = document.getElementById('hh-drawdown-heatmap');
  if (!el) return;
  const contracts = STATE.hh[month] && STATE.hh[month].contracts;
  if (!contracts) { el.innerHTML = ''; return; }

  const BUCKET_SIZE = 50;
  const MAX_TDAY    = 519;
  const NUM_BUCKETS = Math.ceil(MAX_TDAY / BUCKET_SIZE);

  // For each historical contract: compute running-peak drawdown at each T-day
  const bucketStats = Array.from({ length: NUM_BUCKETS }, () => ({
    dds: [],          // drawdown depths at each T-day in this bucket
    maxDdCount: 0,    // contracts whose max DD peaked in this bucket
    contractCount: 0, // contracts contributing to this bucket
  }));

  let contractsProcessed = 0;

  Object.entries(contracts).forEach(([ticker, series]) => {
    if (!series || series.length < 10) return;
    const expiry = estimateContractExpiry(ticker);
    let mapped = series;
    if (expiry) {
      mapped = series.map(pt => {
        const daysLeft = approxTradingDaysTo(pt.date, expiry);
        const d = 519 - daysLeft;
        if (d < 1) return null;
        return { d: Math.min(519, d), p: pt.p };
      }).filter(Boolean);
    }
    if (mapped.length < 10) return;
    mapped.sort((a, b) => a.d - b.d);

    contractsProcessed++;
    let peak = -Infinity;
    let maxDd = 0, maxDdBucket = 0;

    mapped.forEach(pt => {
      if (pt.p > peak) peak = pt.p;
      const dd = peak > 0 ? (peak - pt.p) / peak * 100 : 0;
      const bucket = Math.min(NUM_BUCKETS - 1, Math.floor((pt.d - 1) / BUCKET_SIZE));
      bucketStats[bucket].dds.push(dd);
      if (dd > maxDd) { maxDd = dd; maxDdBucket = bucket; }
    });
    bucketStats[maxDdBucket].maxDdCount++;
    bucketStats.forEach(b => { if (b.dds.length > 0) b.contractCount++; });
  });

  if (contractsProcessed === 0) { el.innerHTML = ''; return; }

  // Per-bucket aggregation
  const buckets = bucketStats.map((b, i) => {
    const sorted = [...b.dds].sort((a, c) => a - c);
    const avg = sorted.length ? sorted.reduce((s, v) => s + v, 0) / sorted.length : 0;
    const median = sorted.length ? (sorted.length % 2 === 0
      ? (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2
      : sorted[Math.floor(sorted.length / 2)]) : 0;
    const pctMaxHere = contractsProcessed > 0 ? (b.maxDdCount / contractsProcessed * 100) : 0;
    return {
      label: `T${i * BUCKET_SIZE + 1}–${Math.min(MAX_TDAY, (i + 1) * BUCKET_SIZE)}`,
      avg, median, pctMaxHere,
    };
  }).filter(b => b.avg > 0 || b.pctMaxHere > 0);

  if (buckets.length === 0) { el.innerHTML = ''; return; }

  const maxAvg = Math.max(...buckets.map(b => b.avg), 0.01);
  const maxPct = Math.max(...buckets.map(b => b.pctMaxHere), 0.01);

  // Heat colour: 0% → dark blue, 100% → deep red via amber
  function heatColor(ratio) {
    // 0→blue, 0.5→amber, 1→red
    if (ratio < 0.5) {
      const t = ratio * 2;
      const r = Math.round(30 + t * (251 - 30));
      const g = Math.round(100 + t * (191 - 100));
      const b = Math.round(220 + t * (36 - 220));
      return `rgb(${r},${g},${b})`;
    } else {
      const t = (ratio - 0.5) * 2;
      const r = Math.round(251 + t * (239 - 251));
      const g = Math.round(191 + t * (68 - 191));
      const b = Math.round(36 + t * (68 - 36));
      return `rgb(${r},${g},${b})`;
    }
  }

  const rows = buckets.map(b => {
    const avgBar  = (b.avg / maxAvg * 120).toFixed(0);
    const pctBar  = (b.pctMaxHere / maxPct * 120).toFixed(0);
    const hc = heatColor(b.pctMaxHere / maxPct);
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);white-space:nowrap;">${b.label}</td>
      <td style="padding:3px 6px;">
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="height:9px;width:${avgBar}px;background:rgba(0,212,255,0.55);border-radius:2px;"></div>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent-hh);">${b.avg.toFixed(1)}%</span>
        </div>
        <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);">med ${b.median.toFixed(1)}%</div>
      </td>
      <td style="padding:3px 6px;">
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="height:9px;width:${pctBar}px;background:${hc};opacity:0.8;border-radius:2px;"></div>
          <span style="font-family:var(--font-mono);font-size:10px;color:${hc};">${b.pctMaxHere.toFixed(0)}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="padding:10px 14px 6px;border-bottom:1px solid var(--border);">
      <div class="card-title" style="padding:0;margin-bottom:2px;" data-tooltip="Shows which 50-T-day lifecycle buckets have historically concentrated the deepest drawdowns. Bar intensity = % of contracts whose maximum drawdown occurred in that bucket.">DRAWDOWN HEATMAP</div>
      <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">
        ${month} · drawdown from running peak · ${contractsProcessed} contracts
      </div>
    </div>
    <div style="padding:6px 10px;overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr>
            <th style="text-align:left;font-size:10px;color:var(--text-muted);font-family:var(--font-mono);padding:2px 6px 4px 0;" data-tooltip="50-T-day lifecycle bucket (e.g. T1–50 = first ~10 weeks after listing).">T-Day</th>
            <th style="text-align:left;font-size:10px;color:var(--text-muted);font-family:var(--font-mono);padding:2px 6px 4px;" data-tooltip="Average depth of the running-peak drawdown across all historical contracts during this lifecycle window. More negative = deeper average pullbacks here.">Avg DD Depth</th>
            <th style="text-align:left;font-size:10px;color:var(--text-muted);font-family:var(--font-mono);padding:2px 6px 4px;" data-tooltip="% of historical contracts whose single deepest drawdown (from running peak) occurred within this T-Day bucket. High % = this is where contracts historically bottom out.">% Max DD Here</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="padding:4px 14px 6px;font-size:9px;color:var(--text-muted);font-family:var(--font-mono);">
      ⓘ Running-peak drawdown · heat = concentration of max drawdown events
    </div>`;
}
</script>

<script>
function renderTTFTab() {

    container.dataset.built = '1';
    container.innerHTML = `
      <div class="contract-header" id="ttf-header">
        <span class="ticker" id="ttf-ticker" style="color:var(--accent-ttf);">—</span>
        <span class="desc" id="ttf-desc">—</span>
        <span class="price" id="ttf-price">—</span>
        <span class="change" id="ttf-change">—</span>
      </div>
      <div class="flex gap" style="margin-bottom:var(--gap);flex-wrap:wrap;align-items:flex-end;">
        <div class="flex flex-col gap-sm">
          <label>Month</label>
          <select id="ttf-month">${MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
        </div>
        <div class="flex flex-col gap-sm">
          <label>Year</label>
          <select id="ttf-year"></select>
        </div>
        <div class="flex flex-col gap-sm" style="min-width:180px;">

          <label>Axis Mode</label>
          <div class="segment-switch" id="ttf-mode-switch">
             <button class="segment-btn active" data-mode="cal" data-tooltip="Plot price on real calendar dates — useful for spotting news-driven moves on specific dates.">Calendar Date</button>
             <button class="segment-btn" data-mode="tday" data-tooltip="Plot price on T-Day (1–519) — normalises all contracts to the same lifecycle axis for cross-year comparison.">Trading Day</button>
          </div>
        </div>
      </div>
      <div class="flex gap" style="flex-wrap:wrap;">
        <div class="grow" style="min-width:0;">
          <div class="card" style="padding:0;">
            <div class="chart-wrap" id="ttf-chart-container"></div>
          </div>
        </div>
        <div style="width:300px;flex-shrink:0;">
          <div class="card" id="ttf-stats"></div>
        </div>
      </div>
    `;
    document.getElementById('ttf-month').addEventListener('change', () => {
      populateTTFYears();

    document.getElementById('ttf-tday').addEventListener('input', updateTTFChart);
    document.getElementById('ttf-mode-switch').addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');

      btn.classList.add('active');
      updateTTFChart();

  populateTTFYears();
  updateTTFChart();

function populateTTFYears() {
  const month = document.getElementById('ttf-month').value;
  const yearSel = document.getElementById('ttf-year');
  const years = [];
  if (STATE.ttf[month]) {
    Object.keys(STATE.ttf[month].contracts).forEach(ticker => {
      const yr = parseInt(ticker.slice(3));
      const full = yr < 50 ? 2000 + yr : 1900 + yr;
      years.push(full);
    });
  }
  years.sort((a, b) => b - a);
  const currentVal = yearSel.value ? parseInt(yearSel.value, 10) : null;
  yearSel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  if (years.length) {
    yearSel.value = String(currentVal && years.includes(currentVal) ? currentVal : years[0]);
  }
}

function updateTTFChart() {
  const month = document.getElementById('ttf-month').value;
  const year = parseInt(document.getElementById('ttf-year').value);
  if (!year) return;
  const code = MONTH_CODES[month];
  const yy = year % 100;
  const pad = yy < 10 ? '0' + yy : '' + yy;
  const ticker = `TG${code}${pad}`;
  const calendarMode = document.querySelector('#ttf-mode-switch .segment-btn.active').dataset.mode === 'tday';
  const tdayIdx = parseInt(document.getElementById('ttf-tday').value);
  const tdayLimit = TDAY_STEPS[tdayIdx];
  document.getElementById('ttf-tday-label').textContent = tdayLimit === 0 ? 'ALL' : `Last ${tdayLimit}`;

  const data = getTTFContractData(ticker);
  if (data.length === 0) {
    // Check for pre-window contract: traded but not yet within 519-day analysis window.
    const liveTicker = 'TTF' + ticker.slice(2) + '.NYM';
    const rawLive = STATE.liveData[liveTicker];
    if (rawLive && rawLive.length > 0) {
      renderTTFPreWindowView(ticker, month, year, rawLive);
    } else {
      removeChart('ttf');
      document.getElementById('ttf-ticker').textContent = ticker;
      document.getElementById('ttf-desc').textContent = `${month} ${year}`;
      document.getElementById('ttf-price').textContent = 'No data';
      document.getElementById('ttf-change').textContent = '';
      document.getElementById('ttf-stats').innerHTML = '';
    }
    return;
  }

  let filtered = data;
  if (tdayLimit > 0 && data.length > tdayLimit) filtered = data.slice(data.length - tdayLimit);

  const last = data[data.length - 1];
  const first = data[0];
  document.getElementById('ttf-ticker').textContent = ticker;
  document.getElementById('ttf-desc').textContent = `${month.toUpperCase()} ${year} — EUR/MWh`;
  document.getElementById('ttf-price').textContent = `€${last.p.toFixed(3)}`;
  const change = ((last.p - first.p) / first.p * 100);
  const changeEl = document.getElementById('ttf-change');
  changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(1)}% from contract open`;
  changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');

  // Chart
  const chartContainer = document.getElementById('ttf-chart-container');
  const chart = createManagedChart('ttf', 'main', chartContainer);

  const series = chart.addLineSeries({ color: '#ff8c00', lineWidth: 2, priceLineVisible: true, lastValueVisible: true });
  series.setData(filtered.map(pt => ({ time: calendarMode ? dayToTime(pt.d) : pt.date, value: pt.p })));
  chart.timeScale().fitContent();

  // Stats
  const { max: high, min: low, avg } = getSeriesStats(data);
  // Z-score from TTF 5Y seasonal cache at current T-day
  const _ttfSeasonal = STATE.ttfSeasonalCache[month];
  const _ttfSeasonalEntry = _ttfSeasonal && _ttfSeasonal[last.d] ? _ttfSeasonal[last.d] : null;
  const ttfZScore = computeZScore(last.p, _ttfSeasonalEntry, data.length);
  const ttfYLabel = _ttfSeasonalEntry ? (_ttfSeasonalEntry.count < 5 ? `${_ttfSeasonalEntry.count}Y` : '5Y') : '5Y';
  document.getElementById('ttf-stats').innerHTML = `
    <div class="card-title">Contract Statistics</div>
    <div class="stat"><div class="stat-label" data-tooltip="Lifecycle stage: T-Day 519 = expiry.">Trading Days</div><div class="stat-value">${Math.max(0, last.d)} <span style="font-size:12px;color:var(--text-muted);">/ 519</span></div></div>
    ${zScoreStatHtml(ttfZScore, ttfYLabel)}
    <div class="stat"><div class="stat-label">High / Low / Avg</div><div style="font-family:var(--font-mono);font-size:13px;">€${high.toFixed(3)} / €${low.toFixed(3)} / €${avg.toFixed(3)}</div></div>
    <div class="stat"><div class="stat-label">From Contract Open</div><div style="font-family:var(--font-mono);font-size:13px;" class="${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change.toFixed(1)}%</div></div>
    <div class="stat"><div class="stat-label">Data Range</div><div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">2018 – present</div></div>
  `;
}

function renderTTFPreWindowView(ticker, month, year, rawLive) {
  const last  = rawLive[rawLive.length - 1];
  const first = rawLive[0];
  document.getElementById('ttf-ticker').textContent = ticker;
  document.getElementById('ttf-desc').textContent   = `${month.toUpperCase()} ${year} contract`;
  document.getElementById('ttf-price').textContent  = `€${last.p.toFixed(3)}`;
  const totalChange = (last.p - first.p) / first.p * 100;
  const changeEl = document.getElementById('ttf-change');
  changeEl.textContent = `${totalChange >= 0 ? '+' : ''}${totalChange.toFixed(1)}% from listing`;
  changeEl.className = 'change ' + (totalChange >= 0 ? 'positive' : 'negative');

  const chartContainer = document.getElementById('ttf-chart-container');
  const chart = createManagedChart('ttf', 'main', chartContainer);
  const series = chart.addCandlestickSeries({
    upColor: 'var(--positive)', downColor: 'var(--negative)',
    borderVisible: false,
    wickUpColor: 'var(--positive)', wickDownColor: 'var(--negative)',
  });
  series.setData(rawLive.map(pt => ({
    time:  pt.date,
    open:  pt.o != null ? pt.o : pt.p,
    high:  pt.h != null ? pt.h : pt.p,
    low:   pt.l != null ? pt.l : pt.p,
    close: pt.p,
  })));

  const windowOpen    = contractWindowOpenDate(ticker);
  const windowOpenStr = windowOpen
    ? windowOpen.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
    : '—';
  const { max: high, min: low, avg } = getSeriesStats(rawLive);
  document.getElementById('ttf-stats').innerHTML = `
    <div class="card-title">Contract Statistics</div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div style="font-family:var(--font-mono);font-size:12px;padding:3px 8px;border-radius:4px;display:inline-block;
        background:rgba(255,200,0,0.12);color:#ffc800;">PRE-ANALYSIS WINDOW</div>
    </div>
    <div class="stat">
      <div class="stat-label">Analysis Window Opens</div>
      <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);">~${windowOpenStr}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Within 519 trading days of expiry</div>
    </div>
    <div class="stat">
      <div class="stat-label">Trading Days Since Listing</div>
      <div style="font-family:var(--font-mono);font-size:14px;">${rawLive.length}
        <span style="font-size:11px;color:var(--text-muted);">days</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">High / Low / Avg</div>
      <div style="font-family:var(--font-mono);font-size:13px;">€${high.toFixed(3)} / €${low.toFixed(3)} / €${avg.toFixed(3)}</div>
    </div>
  `;
}
</script>

<script>
function renderSpotTab() {
  const container = document.getElementById('tab-spot');
  if (!container.dataset.built) {
    container.dataset.built = '1';
    // Gather all available years from spot data
    const allYears = new Set();
    MONTHS.forEach(m => {
      if (STATE.spot[m] && STATE.spot[m].years) {
        Object.keys(STATE.spot[m].years).forEach(y => allYears.add(y));
      }
    });
    const years = [...allYears].sort((a, b) => b - a);

    container.innerHTML = `
      <div class="contract-header">
        <span class="ticker" style="color:var(--accent-spot);">HENRY HUB SPOT</span>
        <span class="desc">EIA Daily — USD/MMBtu</span>
        <span class="price" id="spot-price">—</span>
        <span class="change" id="spot-change">—</span>
      </div>
      <div class="flex gap" style="margin-bottom:var(--gap);flex-wrap:wrap;align-items:flex-end;">
        <div class="flex flex-col gap-sm">
          <label>Year</label>
          <select id="spot-year">${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select>
        </div>
        <div class="flex flex-col gap-sm">
          <label>Highlight Month</label>
          <select id="spot-month"><option value="">All</option>${MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
        </div>
      </div>
      <div class="flex gap" style="flex-wrap:wrap;">
        <div class="grow" style="min-width:0;">
          <div class="card" style="padding:0;">
            <div class="chart-wrap" id="spot-chart-container"></div>
          </div>
        </div>
        <div style="width:300px;flex-shrink:0;">
          <div class="card" id="spot-stats"></div>
        </div>
      </div>
    `;
    document.getElementById('spot-year').addEventListener('change', updateSpotChart);
    document.getElementById('spot-month').addEventListener('change', updateSpotChart);
  }
  updateSpotChart();
}

function updateSpotChart() {
  const year = document.getElementById('spot-year').value;
  const highlightMonth = document.getElementById('spot-month').value;

  // Collect all data points for this year across all months
  const points = [];
  MONTHS.forEach(m => {
    if (!STATE.spot[m] || !STATE.spot[m].years || !STATE.spot[m].years[year]) return;
    STATE.spot[m].years[year].forEach(pt => {
      points.push({ date: pt.date, p: pt.p, month: m });
    });
  });
  points.sort((a, b) => a.date.localeCompare(b.date));

  // Deduplicate by date
  const seen = new Set();
  const unique = points.filter(pt => {
    if (seen.has(pt.date)) return false;
    seen.add(pt.date);
    return true;
  });

  if (unique.length === 0) {
    removeChart('spot');
    document.getElementById('spot-price').textContent = 'No data';
    document.getElementById('spot-stats').innerHTML = '';
    return;
  }

  const last = unique[unique.length - 1];
  document.getElementById('spot-price').textContent = `$${last.p.toFixed(3)}`;

  // Compute stats
  const { max: high, min: low, avg } = getSeriesStats(unique);
  const globalAvg = STATE.spotStats.avg;
  const globalStd = STATE.spotStats.stddev;

  // Chart
  const chartContainer = document.getElementById('spot-chart-container');
  const chart = createManagedChart('spot', 'main', chartContainer);

  // Main line
  const mainSeries = chart.addLineSeries({ color: '#a78bfa', lineWidth: 2, priceLineVisible: true, lastValueVisible: true });
  mainSeries.setData(unique.map(pt => ({ time: pt.date, value: pt.p })));

  // Spike markers (>2 std dev)
  const markers = unique
    .filter(pt => pt.p > globalAvg + 2 * globalStd)
    .map(pt => ({
      time: pt.date,
      position: 'aboveBar',
      color: pt.p > globalAvg * 3 ? '#ff4455' : '#ffcc00',
      shape: 'circle',
      text: pt.p > globalAvg * 3 ? `$${pt.p.toFixed(2)}` : '',
    }));
  if (markers.length > 0) mainSeries.setMarkers(markers);

  // Rolling 30D average line
  if (unique.length > 30) {
    const rolling30 = [];
    for (let i = 29; i < unique.length; i++) {
      const slice = unique.slice(i - 29, i + 1);
      const a = slice.reduce((s, d) => s + d.p, 0) / 30;
      rolling30.push({ time: unique[i].date, value: a });
    }
    const r30 = chart.addLineSeries({
      color: 'rgba(255,204,0,0.5)', lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
    r30.setData(rolling30);
  }

  chart.timeScale().fitContent();

  // Stats panel
  // 5Y seasonal Z-score from spotSeasonalCache (keyed by MM-DD)
  const _spotSeasonalKey = last.date ? last.date.slice(5) : null;
  const _spotSeasonalEntry = _spotSeasonalKey && STATE.spotSeasonalCache[_spotSeasonalKey]
    ? STATE.spotSeasonalCache[_spotSeasonalKey] : null;
  const spotZScore = computeZScore(last.p, _spotSeasonalEntry, unique.length);
  const spotYLabel = _spotSeasonalEntry ? (_spotSeasonalEntry.count < 5 ? `${_spotSeasonalEntry.count}Y` : '5Y') : '5Y';
  document.getElementById('spot-stats').innerHTML = `
    <div class="card-title">Spot Statistics — ${year}</div>
    <div class="stat"><div class="stat-label">High</div><div class="stat-value" style="color:var(--negative);">$${high.toFixed(3)}</div></div>
    <div class="stat"><div class="stat-label">Low</div><div class="stat-value" style="color:var(--positive);">$${low.toFixed(3)}</div></div>
    <div class="stat"><div class="stat-label">Average</div><div class="stat-value">$${avg.toFixed(3)}</div></div>
    <div class="stat"><div class="stat-label">Trading Days</div><div style="font-family:var(--font-mono);font-size:14px;">${unique.length}</div></div>
    <div class="stat"><div class="stat-label">Spikes (&gt;2σ)</div><div style="font-family:var(--font-mono);font-size:14px;color:var(--warning);">${markers.length}</div></div>
    ${zScoreStatHtml(spotZScore, spotYLabel)}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
      <div class="stat-label" style="margin-bottom:4px;">Global Stats (All Years)</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">
        Avg: $${globalAvg.toFixed(3)} | σ: $${globalStd.toFixed(3)}
      </div>
    </div>
  `;
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TAB 4: SPREAD ANALYSIS
     ═══════════════════════════════════════════════════════════ -->
<script src="prices-unified.js"></script>
<script>
const SPREAD_YEAR_COLORS = [
  '#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c',
  '#38bdf8','#4ade80','#facc15','#f472b6','#c084fc','#2dd4bf',
  '#fb7185','#818cf8','#a3e635','#e879f9','#22d3ee','#86efac',
  '#fde68a','#fca5a5','#67e8f9','#bbf7d0','#fed7aa','#ddd6fe',
];
function getSpreadYearColor(yr) {
  return SPREAD_YEAR_COLORS[(yr - 1990) % SPREAD_YEAR_COLORS.length];
}

function getSpreadBackYear(frontMonth, backMonth, year) {
  return year + (MONTHS.indexOf(backMonth) < MONTHS.indexOf(frontMonth) ? 1 : 0);
}

function getSpreadLegInfo(frontMonth, backMonth, year, instrument = 'hh') {
  const backYear = getSpreadBackYear(frontMonth, backMonth, year);
  const prefix = instrument === 'ttf' ? 'TG' : 'NG';
  const frontTicker = `${prefix}${MONTH_CODES[frontMonth]}${String(year % 100).padStart(2, '0')}`;
  const backTicker = `${prefix}${MONTH_CODES[backMonth]}${String(backYear % 100).padStart(2, '0')}`;
  return {
    frontYear: year,
    backYear,
    frontTicker,
    backTicker,
    shortLabel: `${frontMonth}${String(year).slice(-2)}/${backMonth}${String(backYear).slice(-2)}`,
    longLabel: `${frontMonth} ${year} / ${backMonth} ${backYear}`,
  };
}

function formatSignedSpread(value, digits = 3) {
  if (!Number.isFinite(value)) return '—';
  return `${value >= 0 ? '+' : ''}${value.toFixed(digits)}`;
}

function formatSignedPercent(value, digits = 1) {
  if (!Number.isFinite(value)) return null;
  return `${value >= 0 ? '+' : ''}${value.toFixed(digits)}%`;
}

function getSpreadRelativePercent(current, reference) {
  if (!Number.isFinite(current) || !Number.isFinite(reference)) return null;
  if (Math.abs(reference) < 1e-9) return null;
  // Spread references can be negative, so use the baseline magnitude to keep
  // above/below comparisons intuitive instead of flipping sign on negative refs.
  return ((current - reference) / Math.abs(reference)) * 100;
}

function isMeaningfulSpreadRelativePercent(reference, pct) {
  if (!Number.isFinite(reference) || !Number.isFinite(pct)) return false;
  // Tiny spread baselines make percentage deltas explode and stop being useful.
  return Math.abs(reference) >= 0.10 && Math.abs(pct) < 1000;
}

function getSpreadReferenceAvailabilityMessage(refs, year, instrument) {
  if (!refs || refs.priorYearsCount > 0) return '';
  const marketLabel = instrument === 'ttf' ? 'Dutch TTF' : 'Henry Hub';
  if (Number.isFinite(refs.historyStart) && year <= refs.historyStart) {
    return `No prior ${marketLabel} spread history exists before ${refs.historyStart} for this pair, so reference averages are unavailable.`;
  }
  return `No prior same T-Day reference history is available for this pair.`;
}

function onSpreadPairChange() {
  populateSpreadYears();
  scheduleSpreadChartUpdate(true);
}

function setSpreadPair(front, back) {
  const frontEl = document.getElementById('spread-front');
  const backEl = document.getElementById('spread-back');
  if (frontEl) frontEl.value = front;
  if (backEl) backEl.value = back;
  onSpreadPairChange();
  highlightHeatmapPair();
}

function syncSpreadHeatmapTitle() {
  const titleEl = document.getElementById('spread-heatmap-title');
  if (!titleEl) return;
  const instrument = getSpreadInstrument();
  const instrLabel = instrument === 'ttf' ? 'Dutch TTF' : 'Henry Hub';
  titleEl.textContent = `Spread Heatmap — Average Calendar Spread (Last 5 Years · ${instrLabel})`;
  titleEl.dataset.tooltip = `Cross-tabulated 12×12 matrix of average calendar spreads (Front − Back) over the last 5 completed years. Green = contango (front cheaper than back), Red = backwardation (front more expensive). Click any cell to view that spread in the chart above.`;
}

function highlightHeatmapPair() {
  const activeFront = document.getElementById('spread-front')?.value || '';
  const activeBack  = document.getElementById('spread-back')?.value  || '';
  // Reset all row/col headers
  document.querySelectorAll('#spread-heatmap-tbl [data-hm-row], #spread-heatmap-tbl [data-hm-col]').forEach(el => {
    el.style.color = 'var(--text-secondary)';
  });
  // Reset all cell outlines
  document.querySelectorAll('#spread-heatmap-tbl .hm-cell').forEach(el => {
    el.style.outline = '';
    el.style.outlineOffset = '';
  });
  if (!activeFront || !activeBack) return;
  const rowEl  = document.querySelector(`#spread-heatmap-tbl [data-hm-row="${activeFront}"]`);
  if (rowEl)  rowEl.style.color  = 'var(--accent-hh)';
  const colEl  = document.querySelector(`#spread-heatmap-tbl [data-hm-col="${activeBack}"]`);
  if (colEl)  colEl.style.color  = 'var(--accent-hh)';
  const cellEl = document.querySelector(`#spread-heatmap-tbl .hm-cell[data-hm-front="${activeFront}"][data-hm-back="${activeBack}"]`);
  if (cellEl) { cellEl.style.outline = '1.5px solid var(--accent-hh)'; cellEl.style.outlineOffset = '-1.5px'; }
}

function clearSpreadPins() {
  STATE.spreadPinnedYears = new Set();
  const yearSelect = document.getElementById('spread-year');
  const selectedYear = parseInt(yearSelect?.value, 10);
  if (Number.isFinite(selectedYear)) {
    STATE.spreadVisibleYears = new Set([selectedYear]);
  }
  scheduleSpreadChartUpdate(true);
}

function toggleAllSpreadYears(on) {
  const yearSelect = document.getElementById('spread-year');
  const selectedYear = parseInt(yearSelect?.value, 10);
  if (!STATE.spreadPinnedYears) STATE.spreadPinnedYears = new Set();
  if (on) {
    document.querySelectorAll('[data-spread-yr]').forEach(el => {
      const yr = parseInt(el.dataset.spreadYr);
      if (yr !== selectedYear) STATE.spreadPinnedYears.add(yr);
    });
  } else {
    STATE.spreadPinnedYears.clear();
  }
  STATE.spreadVisibleYears = new Set(STATE.spreadPinnedYears);
  STATE.spreadVisibleYears.add(selectedYear);
  if (STATE.spreadSeriesMap) {
    STATE.spreadSeriesMap.forEach((series, yr) => series.applyOptions({ visible: STATE.spreadVisibleYears.has(yr) }));
  }
  document.querySelectorAll('[data-spread-yr]').forEach(el => {
    const yr = parseInt(el.dataset.spreadYr);
    const isSelected = yr === selectedYear;
    const isOn = STATE.spreadVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    el.style.opacity = isOn ? '1' : '0.28';
    el.style.background = isOn ? `${color}22` : 'transparent';
    el.style.border = `1px solid ${isOn ? color : 'rgba(255,255,255,0.15)'}`;
  });
}

function toggleSpreadYear(yr) {
  yr = parseInt(yr);
  const yearSelect = document.getElementById('spread-year');
  const selectedYear = parseInt(yearSelect?.value, 10);
  
  if (yr === selectedYear) {
    // If the user clicks the selected year, we treat it as an attempt to focus 
    // but we don't allow "unpinning" it because it's the primary series.
    return;
  }
  
  if (!STATE.spreadPinnedYears) STATE.spreadPinnedYears = new Set();
  if (STATE.spreadPinnedYears.has(yr)) {
    STATE.spreadPinnedYears.delete(yr);
  } else {
    STATE.spreadPinnedYears.add(yr);
  }
  
  if (!STATE.spreadVisibleYears) STATE.spreadVisibleYears = new Set();
  STATE.spreadVisibleYears = new Set(STATE.spreadPinnedYears);
  STATE.spreadVisibleYears.add(selectedYear);
  
  const on = STATE.spreadPinnedYears.has(yr);
  const series = STATE.spreadSeriesMap && STATE.spreadSeriesMap.get(yr);
  if (series) series.applyOptions({ visible: on });
  
  const chip = document.querySelector(`[data-spread-yr="${yr}"]`);
  if (chip) {
    const color = getSpreadYearColor(yr);
    chip.style.opacity = on ? '1' : '0.28';
    chip.style.background = on ? `${color}22` : 'transparent';
    chip.style.border = `1px solid ${on ? color : 'rgba(255,255,255,0.15)'}`;
  }
}

function ensureSpreadAxisLabel(container) {
  if (!container) return null;
  let label = container.querySelector('.spread-axis-label');
  if (!label) {
    label = document.createElement('div');
    label.className = 'spread-axis-label';
    container.appendChild(label);
  }
  return label;
}

function renderSpreadAxisLabel() {
  const chart = STATE._spreadChart;
  const series = STATE._spreadSelectedSeries;
  const point = STATE._spreadSelectedLastPoint;
  const container = document.getElementById('spread-chart-container');
  const label = ensureSpreadAxisLabel(container);
  if (!label) return;

  if (!chart || !series || !point || !Number.isFinite(point.value)) {
    label.style.display = 'none';
    return;
  }

  const y = series.priceToCoordinate(point.value);
  if (!Number.isFinite(y)) {
    label.style.display = 'none';
    return;
  }

  const top = clamp(y, 16, Math.max(16, (container.clientHeight || 0) - 16));
  label.textContent = formatSignedSpread(point.value);
  label.style.top = `${top}px`;
  label.style.display = 'block';
  label.style.color = point.value >= 0 ? 'var(--positive)' : 'var(--negative)';
}

function renderSpreadTab() {
  const container = document.getElementById('tab-spread');
  if (!container.dataset.built) {
    container.dataset.built = '1';
    container.innerHTML = `
      <div class="contract-header" id="spread-header">
        <div class="ch-left">
          <div class="ch-top">
            <span class="ticker" style="color:var(--accent-spread);">SPREAD ANALYSIS</span>
          </div>
          <span class="desc" id="spread-desc">Calendar Spread</span>
        </div>
        <div class="ch-right">
          <span class="price" id="spread-price">--</span>
          <span class="change" id="spread-change" style="color:var(--text-muted);font-size:12px;"></span>
        </div>
      </div>
      <div class="card" style="margin-bottom:var(--gap);">
        <div class="ctrl-toolbar">
          <div class="ctrl-group">
            <div class="ctrl-group-label" data-tooltip="Choose Henry Hub (NYMEX, USD/MMBtu) or Dutch TTF (ICE, EUR/MWh) for all spread calculations.">Market</div>
            <div class="segment-switch" id="spread-instrument-switch">
              <button class="segment-btn active" data-tone="hh" data-val="hh" data-tooltip="Henry Hub Natural Gas — NYMEX futures, USD/MMBtu. The North American benchmark.">Henry Hub</button>
