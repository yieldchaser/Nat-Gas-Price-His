function getSpreadInstrument() {
  const btn = document.querySelector('#spread-instrument-switch .segment-btn.active');
  return btn ? btn.dataset.val : 'hh';
}

function populateSpreadYears() {
  const sel = document.getElementById('spread-year');
  const front = document.getElementById('spread-front')?.value || 'Jan';
  const back = document.getElementById('spread-back')?.value || 'Feb';
  const currentVal = sel.value ? parseInt(sel.value, 10) : null;
  const instrument = getSpreadInstrument();
  const yearSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  // Live data years
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const years = [...yearSet]
    .sort((a, b) => b - a)
    .filter(y => computeSpread(front, back, y, instrument).points.length > 0);
  sel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  if (years.length) {
    const currentYear = new Date().getFullYear();
    const fallback = years.includes(currentYear) ? currentYear : years[0];
    sel.value = String(currentVal && years.includes(currentVal) ? currentVal : fallback);
  }
}

function scheduleSpreadChartUpdate(immediate = false) {
  immediate = immediate === true;
  if (STATE._spreadUpdateTimer) {
    clearTimeout(STATE._spreadUpdateTimer);
    STATE._spreadUpdateTimer = null;
  }

  if (immediate) {
    updateSpreadChart();
    return;
  }

  STATE._spreadUpdateTimer = setTimeout(() => {
    STATE._spreadUpdateTimer = null;
    updateSpreadChart();
  }, 60);
}

function computeSpread(frontMonth, backMonth, year, instrument = 'hh') {
  const cacheKey = `${instrument}|${frontMonth}|${backMonth}|${year}`;
  if (STATE.spreadCache[cacheKey]) return STATE.spreadCache[cacheKey];

  const legInfo = getSpreadLegInfo(frontMonth, backMonth, year, instrument);
  const t1 = legInfo.frontTicker;
  const t2 = legInfo.backTicker;
  const d1 = instrument === 'ttf' ? getTTFContractData(t1) : getContractData(t1);
  const d2 = instrument === 'ttf' ? getTTFContractData(t2) : getContractData(t2);
  if (d1.length === 0 || d2.length === 0) {
    const empty = { points: [], stats: { min: 0, max: 0, avg: 0, count: 0 } };
    STATE.spreadCache[cacheKey] = empty;
    return empty;
  }
  // Build map for d2 keyed by calendar date so both legs are priced on the same day.
  // Joining on the sequential trading-day number (d) is wrong because the front and
  // back contracts have different listing dates, so d=1 of each corresponds to a
  // different calendar date (e.g. Nov contract lists ~41 trading days before Jan).
  const d2map = {};
  d2.forEach(pt => { if (pt.date) d2map[pt.date] = pt.p; });
  const spread = [];
  d1.forEach(pt => {
    if (pt.date && d2map[pt.date] !== undefined) {
      spread.push({ d: pt.d, date: pt.date, value: pt.p - d2map[pt.date] });
    }
  });
  const result = {
    points: spread,
    stats: getSeriesStats(spread, point => point.value),
  };
  STATE.spreadCache[cacheKey] = result;
  return result;
}

function getSpreadReferenceMetrics(frontMonth, backMonth, year, instrument, referenceDay) {
  if (!Number.isFinite(referenceDay)) {
    return { allTime: null, avg5y: null, avg10y: null, priorYearsCount: 0, historyStart: null, historyEnd: null };
  }

  const instrumentStore = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  const yearSet = new Set();
  [frontMonth, backMonth].forEach(month => {
    if (!instrumentStore[month]) return;
    Object.keys(instrumentStore[month].contracts).forEach(ticker => {
      const yr = parseInt(ticker.slice(3), 10);
      if (Number.isFinite(yr)) yearSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });

  const availableYears = [...yearSet].sort((a, b) => a - b);
  const referenceRows = availableYears
    .filter(yr => yr < year)
    .sort((a, b) => b - a)
    .map(yr => {
      const spreadResult = computeSpread(frontMonth, backMonth, yr, instrument);
      if (!spreadResult.points.length) return null;
      const point = spreadResult.points.find(entry => entry.d === referenceDay);
      return point ? { yr, value: point.value } : null;
    })
    .filter(Boolean);

  const avgFor = rows => rows.length
    ? rows.reduce((sum, row) => sum + row.value, 0) / rows.length
    : null;

  return {
    allTime: avgFor(referenceRows),
    avg5y: avgFor(referenceRows.filter(row => row.yr >= year - 5)),
    avg10y: avgFor(referenceRows.filter(row => row.yr >= year - 10)),
    priorYearsCount: referenceRows.length,
    historyStart: availableYears.length ? availableYears[0] : null,
    historyEnd: availableYears.length ? availableYears[availableYears.length - 1] : null,
  };
}

function updateSpreadChart() {
  const front = document.getElementById('spread-front').value;
  const back = document.getElementById('spread-back').value;
  const year = parseInt(document.getElementById('spread-year').value);
  if (!year) return;

  const instrument = getSpreadInstrument();
  const header = document.getElementById('spread-header');
  if (header) {
    const isHH = instrument === 'hh';
    const isTTF = instrument === 'ttf';
    let badge = '';
    if ((isHH && STATE.hhCacheUsed) || (isTTF && STATE.ttfCacheUsed)) {
      const isStale = isHH ? STATE.hhCacheIsStale : STATE.ttfCacheIsStale;
      const age = isHH ? STATE.hhCacheAgeH : STATE.ttfCacheAgeH;
      badge = isStale 
        ? `<span class="ctrl-hint-badge" style="color:var(--warning);border-color:var(--warning);margin-left:8px;">⚠️ STALE CACHE (${age}h ago)</span>`
        : `<span class="ctrl-hint-badge" style="color:var(--warning);border-color:var(--warning);margin-left:8px;">🟡 CACHED (${age}h ago)</span>`;
    }
    const oldBadge = header.querySelector('.ctrl-hint-badge');
    if (oldBadge) oldBadge.remove();
    if (badge) {
      const temp = document.createElement('div');
      temp.innerHTML = badge;
      header.querySelector('.ch-top').appendChild(temp.firstElementChild);
    }
  }

  const legInfo = getSpreadLegInfo(front, back, year, instrument);
  const unit = instrument === 'ttf' ? 'EUR/MWh' : 'USD/MMBtu';
  document.getElementById('spread-desc').textContent = `${legInfo.longLabel} Calendar Spread · ${instrument === 'ttf' ? 'Dutch TTF' : 'Henry Hub'} · ${unit}`;

  const chartContainer = document.getElementById('spread-chart-container');
  const chart = createManagedChart('spread', 'main', chartContainer);
  const palette = getNeutralChartPalette();

  // Collect all years with data for selected instrument
  const allYearsSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });
  const allYearsSorted = [...allYearsSet].sort((a, b) => b - a);

  // Init/reset visible years and range when pair/instrument changes
  const currentYear = new Date().getFullYear();
  const pairKey = `${instrument}|${front}|${back}`;
  if (!STATE.spreadPinnedYears) {
    const defaults = new Set();
    const historicalDefaults = allYearsSorted
      .filter(y => y < currentYear)
      .slice(0, 4);
    historicalDefaults.forEach(y => defaults.add(y));
    STATE.spreadPinnedYears = defaults;
  }

  if (STATE.spreadPairKey !== pairKey) {
    STATE.spreadPairKey = pairKey;
    STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  }
  STATE.spreadVisibleYears = new Set(STATE.spreadPinnedYears || []);
  STATE.spreadVisibleYears.add(year);
  STATE.spreadSeriesMap = new Map();

  const tableRows = [];
  let selectedSeries = null;
  let selectedLookup = new Map();
  let selectedStats = { min: 0, max: 0, avg: 0, count: 0 };
  let selectedLastPoint = null;

  // Render oldest→newest so selected year draws on top
  [...allYearsSorted].reverse().forEach(yr => {
    const spreadResult = computeSpread(front, back, yr, instrument);
    const sp = spreadResult.points;
    if (sp.length === 0) return;
    const isSelected = yr === year;
    const visible = STATE.spreadVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    const lineWidth = isSelected ? 2.5 : 1.2;
    const series = chart.addLineSeries({
      color, lineWidth,
      priceLineVisible: false,
      lastValueVisible: false,
      crosshairMarkerVisible: isSelected,
      visible,
    });
    series.setData(sp.map(pt => ({ time: dayToTime(pt.d), value: pt.value })));
    STATE.spreadSeriesMap.set(yr, series);
    if (isSelected) {
      selectedSeries = series;
      selectedLookup = new Map(sp.map(point => [timeKey(dayToTime(point.d)), point]));
      selectedStats = spreadResult.stats;
      selectedLastPoint = sp[sp.length - 1] || null;
    }
    const last = sp[sp.length - 1].value;
    
    const getValAt = d => { const pt = sp.find(p => p.d === d); return pt ? pt.value : null; };
    const getPenult = () => getValAt(518); // T-Day 518 (penultimate contract day)
    tableRows.push({ 
      yr, last, max: spreadResult.stats.max, min: spreadResult.stats.min, avg: spreadResult.stats.avg, days: sp.length,
      at519: getValAt(519),
      at90: getValAt(90),
      at10: getValAt(10),
      penult: getValAt(518)
    });

  });

  // KPI bar
  const kpiEl = document.getElementById('spread-kpis');
  if (kpiEl && tableRows.length) {
    const curRow = tableRows.find(r => r.yr === year);
    const curLast = curRow ? curRow.last : null;
    const referenceDay = computeSpread(front, back, year, instrument).points.at(-1)?.d ?? null;
    const refs = getSpreadReferenceMetrics(front, back, year, instrument, referenceDay);
    const delta5y = refs.avg5y != null && curLast != null ? curLast - refs.avg5y : null;
    const delta10y = refs.avg10y != null && curLast != null ? curLast - refs.avg10y : null;
    const pct5y = getSpreadRelativePercent(curLast, refs.avg5y);
    const pct10y = getSpreadRelativePercent(curLast, refs.avg10y);
    const refAvailabilityNote = getSpreadReferenceAvailabilityMessage(refs, year, instrument);
    const chip = (label, val, color = 'var(--text-primary)', tip = '') =>
      `<div class="ctrl-group"><div class="ctrl-group-label" ${tip ? `data-tooltip="${tip}"` : ''}>${label}</div><div style="font-family:var(--font-mono);font-size:15px;font-weight:700;color:${color};">${val}</div></div>`;
    const sep = `<div class="ctrl-sep"></div>`;
    const formatKpiSpread = value => Number.isFinite(value) ? formatSignedSpread(value) : 'N/A';
    const formatDeltaWithPercent = (delta, pct, reference, color) => {
      if (!Number.isFinite(delta)) return 'N/A';
      if (!isMeaningfulSpreadRelativePercent(reference, pct)) return formatSignedSpread(delta);
      const pctText = formatSignedPercent(pct);
      if (!pctText) return formatSignedSpread(delta);
      return `${formatSignedSpread(delta)} <span style="font-size:12px;color:${color};opacity:0.82;">(${pctText})</span>`;
    };
    const color5y  = delta5y  != null ? (delta5y  >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)';
    const color10y = delta10y != null ? (delta10y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)';
    const yr5range  = `${year - 5}–${year - 1}`;
    const yr10range = `${year - 10}–${year - 1}`;
    const priorN = refs.priorYearsCount;
    kpiEl.innerHTML = [
      chip('Ref T-Day', referenceDay != null ? String(referenceDay) : '—', 'var(--text-primary)',
        `The current T-Day for the ${year} contract. T-Day counts down from 519 (first listing day) to 0 (expiry). All reference averages are anchored to this same T-Day across prior years.`),
      sep,
      chip('All-Time Ref', formatKpiSpread(refs.allTime), 'var(--text-primary)',
        `Same-T-Day average for this spread pair across ALL ${priorN} prior years with data (${refs.historyStart ?? '?'}–${refs.historyEnd ?? '?'}). The long-run historical baseline at T-Day ${referenceDay}.`),
      sep,
      chip('5Y Ref', formatKpiSpread(refs.avg5y), 'var(--text-primary)',
        `Same-T-Day average across the 5 prior years (${yr5range}). A tighter, more recent benchmark that captures the current market regime.`),
      sep,
      chip('10Y Ref', formatKpiSpread(refs.avg10y), 'var(--text-primary)',
        `Same-T-Day average across the 10 prior years (${yr10range}). Bridges short-cycle and long-run seasonality.`),
      sep,
      chip('Curr − 5Y', formatDeltaWithPercent(delta5y, pct5y, refs.avg5y, color5y), color5y,
        `Current ${year} value minus the 5Y reference (${yr5range} avg). ${delta5y != null ? (delta5y >= 0 ? 'Currently ABOVE' : 'Currently BELOW') + ' the 5Y avg by ' + Math.abs(delta5y).toFixed(3) : 'No data'}.`),
      sep,
      chip('Curr − 10Y', formatDeltaWithPercent(delta10y, pct10y, refs.avg10y, color10y), color10y,
        `Current ${year} value minus the 10Y reference (${yr10range} avg). ${delta10y != null ? (delta10y >= 0 ? 'Currently ABOVE' : 'Currently BELOW') + ' the 10Y avg by ' + Math.abs(delta10y).toFixed(3) : 'No data'}.`),
    ].join('') + (refAvailabilityNote
      ? `<div style="flex-basis:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--text-muted);">${refAvailabilityNote}</div>`
      : '');
  }

  // Year legend chips
  const legendEl = document.getElementById('spread-legend');
  if (legendEl) {
    const yearsWithData = allYearsSorted.filter(yr => {
      const r = computeSpread(front, back, yr, instrument);
      return r.points.length > 0;
    });
    legendEl.innerHTML = yearsWithData.map(yr => {
      const on = STATE.spreadVisibleYears.has(yr);
      const color = yr === year ? '#ffffff' : getSpreadYearColor(yr);
      const isSelected = yr === year;
      const sr = computeSpread(front, back, yr, instrument);
      const avg = sr.stats ? sr.stats.avg : null;
      const tip = isSelected
        ? `${yr} ${front.slice(0,3)}/${back.slice(0,3)} — Primary year. Anchors all T-Day reference metrics in the KPI bar above. Always visible — use the Year selector to change the primary year.`
        : sr.points.length
          ? `${yr} ${front.slice(0,3)}/${back.slice(0,3)} — Lifecycle avg: ${avg != null ? (avg >= 0 ? '+' : '') + avg.toFixed(3) : 'N/A'} · ${sr.points.length} trading days · Click to toggle overlay`
          : `${yr} — No spread data`;
      return `<span data-spread-yr="${yr}" onclick="toggleSpreadYear(${yr})" data-tooltip="${tip}" style="
        display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
        border:1px solid ${on ? color : 'rgba(255,255,255,0.15)'};
        background:${on ? color + '22' : 'transparent'};
        opacity:${on ? '1' : '0.28'};
        cursor:${isSelected ? 'default' : 'pointer'};font-family:var(--font-mono);font-size:11px;
        color:${color};font-weight:${isSelected ? '700' : '400'};
        transition:opacity 0.15s,background 0.15s;
        ${isSelected ? 'box-shadow:0 0 0 1px '+color+';' : ''}
      "><span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${yr}</span>`;
    }).join('') + `
      <div style="flex-grow:1;"></div>
      <span onclick="toggleAllSpreadYears(true)" data-tooltip="Show all available years as overlay lines." style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">ALL</span>
      <span onclick="toggleAllSpreadYears(false)" data-tooltip="Hide all overlay years — show only the primary selected year." style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">NONE</span>`;
  }

  // Zero line
  const zeroLine = chart.addLineSeries({
    color: palette.zero, lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  const allSpreads = computeSpread(front, back, year, instrument).points;
  if (allSpreads.length > 0) {
    zeroLine.setData([
      { time: dayToTime(1), value: 0 },
      { time: dayToTime(allSpreads[allSpreads.length - 1].d), value: 0 },
    ]);
  }

  applyChartTimeScaleOptions(chart, {
    formatter: buildDateAxisFormatter(time => selectedLookup.get(timeKey(time))),
    barSpacing: getChartBarSpacing(allSpreads.length || 80),
  });
  chart.timeScale().fitContent();
  if (selectedSeries) {
    attachChartTooltip({
      chart,
      container: chartContainer,
      titleColor: '#f5f7fb',
      seriesConfigs: [{
        series: selectedSeries,
        label: legInfo.shortLabel,
        color: palette.main,
        emphasis: true,
        getPoint: param => selectedLookup.get(timeKey(param.time)),
        formatValue: value => value.toFixed(3),
      }],
      getTitle: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? formatDisplayDate(point.date) : `${legInfo.shortLabel} spread`;
      },
      getSubtitle: () => `${legInfo.longLabel} spread`,
      getMetrics: param => {
        const point = selectedLookup.get(timeKey(param.time));
        if (!point) return [];
        return [
          { label: 'Max', value: selectedStats.max.toFixed(3) },
          { label: 'Min', value: selectedStats.min.toFixed(3) },
          { label: 'Avg', value: selectedStats.avg.toFixed(3) },
          { label: 'T-Day (front leg)', value: String(point.d) },
        ];
      },
      getNote: param => {
        const point = selectedLookup.get(timeKey(param.time));
        return point ? `T-Day ${point.d} • ${legInfo.longLabel} calendar spread` : '';
      },
    });
  }

  // Update header price/change
  const priceEl = document.getElementById('spread-price');
  const changeEl = document.getElementById('spread-change');
  if (priceEl) {
    if (tableRows.length > 0) {
      const selected = tableRows.find(r => r.yr === year);
      if (selected) {
        const sign = selected.last >= 0 ? '+' : '';
        priceEl.textContent = `${sign}${selected.last.toFixed(3)}`;
        priceEl.style.color = selected.last >= 0 ? 'var(--positive)' : 'var(--negative)';
        if (changeEl) changeEl.textContent = `${legInfo.shortLabel} · ref T-Day ${allSpreads.at(-1)?.d ?? '—'}`;
      }
    } else {
      priceEl.textContent = '--';
      if (changeEl) changeEl.textContent = '';
    }
  }

  // Table with sticky header + rank + position bar
  const allLasts = tableRows.map(r => r.last).filter(Number.isFinite);
  const lastMin = allLasts.length ? Math.min(...allLasts) : 0;
  const lastMax = allLasts.length ? Math.max(...allLasts) : 1;
  const lastRange = lastMax - lastMin || 1;
  const sortedDesc = [...allLasts].sort((a, b) => b - a);

  const SCROLL_WRAP = inner => `<div style="overflow-x:auto;">${inner}</div>`;

  let html = `<div class="card-title" style="padding:12px 16px 8px;">${legInfo.shortLabel} Spread History <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${tableRows.length} years</span></div>`;
  html += SCROLL_WRAP(`<table><thead><tr>
    <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Contract year.">Year</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Last traded spread value — expiry price for historical years, latest quote for the active year.">Last</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="All-time rank of the expiry/last spread value — #1 = widest ever recorded.">Rank</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Maximum (widest) spread value recorded over the full contract lifecycle.">Max</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Minimum (narrowest / most inverted) spread value recorded over the lifecycle.">Min</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Average spread value over the full traded lifecycle of this contract.">Avg</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="AT-519: spread value on the very first trading day of the contract's lifecycle (T-Day 1 — ~2 years before expiry).">AT-519</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="AT-PENULT: spread value on the penultimate (second-to-last) trading day before expiry.">AT-PENULT</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="AT-90D: spread value at approximately 90 trading days before expiry — a key mid-lifecycle reference.">AT-90D</th>
    <th style="position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="AT-10D: spread value at approximately 10 trading days before expiry — the final approach window.">AT-10D</th>
  </tr></thead><tbody>`);

  const fmtSnap = v => v != null
    ? `<span style="color:${v >= 0 ? 'var(--positive)' : 'var(--negative)'};">${v.toFixed(3)}</span>`
    : '<span style="color:var(--text-muted);">—</span>';
  const fmtAvg = v => v != null ? v.toFixed(3) : '—';

  tableRows.sort((a, b) => b.yr - a.yr).forEach(r => {
    const cls = r.last >= 0 ? 'positive' : 'negative';
    const rank = Number.isFinite(r.last) ? sortedDesc.indexOf(r.last) + 1 : null;
    const rankOf = `#${rank}<span style="color:var(--text-muted);font-size:10px;">/${allLasts.length}</span>`;
    const barW = ((r.last - lastMin) / lastRange * 44).toFixed(1);
    const barColor = r.last >= 0 ? 'var(--positive)' : 'var(--negative)';
    const bar = `<span style="display:inline-block;width:${barW}px;height:3px;background:${barColor};border-radius:2px;vertical-align:middle;opacity:0.55;margin-left:4px;"></span>`;
    const isSelected = r.yr === year;
    const rowStyle = isSelected ? 'background:rgba(157,78,221,0.12);font-weight:600;' : '';
    const sign = r.last >= 0 ? '+' : '';
    const dot = isSelected ? `<span style="font-size:10px;margin-right:4px;color:#a78bfa;">●</span>` : '';

    // Rich row tooltip
    const snapParts = [
      r.at519 != null ? `AT-519: ${r.at519 >= 0 ? '+' : ''}${r.at519.toFixed(3)}` : null,
      r.at90  != null ? `AT-90D: ${r.at90  >= 0 ? '+' : ''}${r.at90.toFixed(3)}`  : null,
      r.penult != null ? `AT-PENULT: ${r.penult >= 0 ? '+' : ''}${r.penult.toFixed(3)}` : null,
      r.at10  != null ? `AT-10D: ${r.at10  >= 0 ? '+' : ''}${r.at10.toFixed(3)}`  : null,
    ].filter(Boolean).join(' · ');
    const rowTip = `${front}/${back} ${r.yr} — Last: ${sign}${r.last.toFixed(3)} · Rank #${rank ?? '?'}/${allLasts.length}`
      + ` · Range: ${r.min.toFixed(3)} – ${r.max.toFixed(3)} · Avg: ${r.avg.toFixed(3)}`
      + (snapParts ? ` · ${snapParts}` : '')
      + `. Click to view ${front} ${r.yr} in Prices tab.`;

    html += `<tr style="${rowStyle}cursor:pointer;" data-tooltip="${rowTip}" onclick="navigateTo('prices',{month:'${front}',year:'${r.yr}'})">
      <td style="text-align:left;${isSelected ? 'color:#a78bfa;' : ''}">${dot}${r.yr}</td>
      <td class="${cls}">${sign}${r.last.toFixed(3)}${bar}</td>
      <td style="font-family:var(--font-mono);font-size:11px;">${rank ? rankOf : '—'}</td>
      <td>${r.max.toFixed(3)}</td>
      <td style="color:${r.min >= 0 ? 'var(--positive)' : 'var(--negative)'};">${r.min.toFixed(3)}</td>
      <td>${fmtAvg(r.avg)}</td>
      <td>${fmtSnap(r.at519)}</td>
      <td>${fmtSnap(r.penult)}</td>
      <td>${fmtSnap(r.at90)}</td>
      <td>${fmtSnap(r.at10)}</td>
    </tr>`;
  });

  // Compute summary stats
  const calcAvg = key => {
    const vals = tableRows.map(r => r[key]).filter(Number.isFinite);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  const calcAvg5y = key => {
    const vals = tableRows.filter(r => r.yr >= currentYear - 5 && r.yr < currentYear).map(r => r[key]).filter(Number.isFinite);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };

  const sums = {
    all: { last: calcAvg('last'), max: calcAvg('max'), min: calcAvg('min'), avg: calcAvg('avg'), at519: calcAvg('at519'), penult: calcAvg('penult'), at90: calcAvg('at90'), at10: calcAvg('at10') },
    y5: { last: calcAvg5y('last'), max: calcAvg5y('max'), min: calcAvg5y('min'), avg: calcAvg5y('avg'), at519: calcAvg5y('at519'), penult: calcAvg5y('penult'), at90: calcAvg5y('at90'), at10: calcAvg5y('at10') }
  };

  const currentYearStr = String(currentYear);
  const y5Range = tableRows.filter(r => r.yr >= currentYear - 5 && r.yr < currentYear).map(r => r.yr).sort((a,b) => a - b);
  const y5Label = y5Range.length ? `${y5Range[0]}–${y5Range[y5Range.length - 1]}` : 'N/A';
  const mkRow = (label, data, tip = '') => `
    <tr style="background:var(--bg-card);font-weight:600;border-top:1px solid rgba(255,255,255,0.1);">
      <td style="text-align:left;color:var(--text-muted);" data-tooltip="${tip}">${label}</td>
      <td style="color:${data.last != null ? (data.last >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)'};">${data.last != null ? (data.last >= 0 ? '+' : '') + data.last.toFixed(3) : '—'}</td>
      <td style="color:var(--text-muted);">—</td>
      <td>${data.max != null ? data.max.toFixed(3) : '—'}</td>
      <td style="color:${data.min != null ? (data.min >= 0 ? 'var(--positive)' : 'var(--negative)') : 'inherit'};">${data.min != null ? data.min.toFixed(3) : '—'}</td>
      <td>${data.avg != null ? data.avg.toFixed(3) : '—'}</td>
      <td>${fmtSnap(data.at519)}</td>
      <td>${fmtSnap(data.penult)}</td>
      <td>${fmtSnap(data.at90)}</td>
      <td>${fmtSnap(data.at10)}</td>
    </tr>
  `;
  const allYrs = tableRows.map(r => r.yr).sort((a,b) => a - b);
  const allRange = allYrs.length ? `${allYrs[0]}–${allYrs[allYrs.length-1]}` : 'N/A';
  html = html.replace('</tbody>',
    mkRow('Avg (All Time)', sums.all, `Mean of each column across all ${tableRows.length} available years (${allRange}), excluding any year with missing data for that column.`) +
    mkRow(`Avg (5Y: ${y5Label})`, sums.y5, `Mean of each column across the 5 most recently completed years (${y5Label}). A tighter seasonal reference than the all-time average.`) +
    '</tbody>');

  html += `</tbody></table></div>`;
  document.getElementById('spread-table').innerHTML = html;

  // Store refs and sync range footer
  STATE._spreadChart = chart;
  STATE._spreadSelectedPoints = allSpreads; // selected year's points
  STATE._spreadSelectedSeries = selectedSeries;
  STATE._spreadSelectedLastPoint = selectedLastPoint;
  chart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => _syncSpreadSliderFromChart());
  });
  syncSpreadRangeFooter();
  renderSpreadAxisLabel();
  renderSpreadConvergenceCone(front, back, year, instrument);
}

function syncSpreadRangeFooter() {
  const points = STATE._spreadSelectedPoints;
  const chart = STATE._spreadChart;
  if (!points || !points.length || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  const view = STATE.spreadView;
  const start = clamp(Number.isFinite(view.rangeStart) ? view.rangeStart : 0, 0, maxIdx);
  const end = clamp(view.rangeEnd != null ? view.rangeEnd : maxIdx, 0, maxIdx);
  view.rangeStart = start; view.rangeEnd = end;

  const startSlider = document.getElementById('spread-window-start');
  const endSlider   = document.getElementById('spread-window-end');
  const selection   = document.getElementById('spread-range-selection');
  const minLabel    = document.getElementById('spread-range-min-label');
  const maxLabel    = document.getElementById('spread-range-max-label');
  const helperEl    = document.getElementById('spread-range-helper');
  const readoutEl   = document.getElementById('spread-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min='0'; s.max=String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(start); endSlider.value = String(end);

  const pct = getRangeSelectionPercent(points.length, start, end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = formatRangeEdgeLabel(points[0].date);
  if (maxLabel) maxLabel.textContent = formatRangeEdgeLabel(points[maxIdx].date);

  const count = end - start + 1;
  if (helperEl) helperEl.textContent = count >= points.length
    ? 'Full span across available history'
    : `${count} days selected · drag handles to move or resize`;
  if (readoutEl) readoutEl.innerHTML = count >= points.length
    ? `<span>${formatDisplayDate(points[0].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[maxIdx].date)}</span><span style="color:var(--text-muted);">|</span><span>Full span</span>`
    : `<span>${formatDisplayDate(points[start].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[end].date)}</span><span style="color:var(--text-muted);">|</span><span>${count} days</span><span style="color:var(--text-muted);">|</span><span>${count}/${points.length} pts</span>`;

  if (start > 0 || end < maxIdx) {
    chart.timeScale().setVisibleRange({ from: dayToTime(points[start].d), to: dayToTime(points[end].d) });
  } else {
    chart.timeScale().fitContent();
  }
  renderSpreadAxisLabel();
}

/* ─── Feature 5: Spread Convergence Cone (Tier 2) ─── */
function renderSpreadConvergenceCone(front, back, year, instrument) {
  const el = document.getElementById('spread-convergence');
  if (!el) return;

  const currentSpread = computeSpread(front, back, year, instrument);
  if (!currentSpread.points.length) { el.innerHTML = ''; return; }

  const lastPt   = currentSpread.points[currentSpread.points.length - 1];
  const currentD = lastPt.d;
  const currentV = lastPt.value;

  // Only meaningful when contract has significant history and is still active
  if (currentD < 10) { el.innerHTML = ''; return; }

  const TDAY_WINDOW  = 20;  // ±20 T-days
  const MIN_ANALOGS  = 4;
  let   VALUE_BAND   = Math.max(0.15, Math.abs(currentV) * 0.05); // ±15¢ or 5% of value, whichever larger

  // Collect all historical years for this pair
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  const allYears = new Set();
  [front, back].forEach(m => {
    if (!store[m]) return;
    Object.keys(store[m].contracts).forEach(t => {
      const yr = parseInt(t.slice(3)); 
      allYears.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });

  function findAnalogs(valueBand) {
    const analogs = [];
    allYears.forEach(yr => {
      if (yr === year) return; // no self-reference
      const sp = computeSpread(front, back, yr, instrument);
      if (!sp.points.length) return;
      // Find the closest point within ±TDAY_WINDOW of currentD
      let matchPt = null;
      let minDiff = Infinity;
      for (const pt of sp.points) {
        const diff = Math.abs(pt.d - currentD);
        if (diff <= TDAY_WINDOW && diff < minDiff) { matchPt = pt; minDiff = diff; }
      }
      if (!matchPt) return;
      // Check value proximity
      if (Math.abs(matchPt.value - currentV) > valueBand) return;
      // Collect all points from matchPt.d onward (the "forward path")
      const fwdPoints = sp.points.filter(pt => pt.d >= matchPt.d);
      if (fwdPoints.length < 5) return;
      const lastFwd = fwdPoints[fwdPoints.length - 1];
      analogs.push({ yr, matchPt, fwdPoints, finalValue: lastFwd.value });
    });
    return analogs;
  }

  let analogs = findAnalogs(VALUE_BAND);
  let widened = false;
  if (analogs.length < MIN_ANALOGS) {
    VALUE_BAND = VALUE_BAND * 1.5;
    analogs = findAnalogs(VALUE_BAND);
    widened = true;
    // If still < MIN_ANALOGS after widening, show a note but still render whatever we have
  }

  if (analogs.length === 0) {
    el.innerHTML = `
      <div style="padding:12px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">
        SPREAD CONVERGENCE CONE — No historical analog years found within the current search window.
      </div>`;
    return;
  }

  // ── Compute median final settlement ───────────────────────────────────────
  const finals = analogs.map(a => a.finalValue).sort((a, b) => a - b);
  const medianFinal = finals.length % 2 === 0
    ? (finals[finals.length / 2 - 1] + finals[finals.length / 2]) / 2
    : finals[Math.floor(finals.length / 2)];
  const avgFinal = finals.reduce((s, v) => s + v, 0) / finals.length;

  // ── SVG trajectory chart ───────────────────────────────────────────────────
  const SVG_H = 160;
  const PAD_L = 4, PAD_R = 4, PAD_T = 10, PAD_B = 20;
  const plotW = 100; // use percentage

  // Y extent — all fwd points across all analogs + current value
  let yMin = currentV, yMax = currentV;
  analogs.forEach(a => {
    a.fwdPoints.forEach(pt => {
      yMin = Math.min(yMin, pt.value);
      yMax = Math.max(yMax, pt.value);
    });
  });
  yMin -= Math.abs(yMax - yMin) * 0.1;
  yMax += Math.abs(yMax - yMin) * 0.1 + 0.001;

  // X: T-day range
  const dMin = currentD;
  const dMax = Math.max(...analogs.map(a => a.fwdPoints[a.fwdPoints.length - 1].d), currentD + 10);

  function toSvgX(d) { return ((d - dMin) / (dMax - dMin) * 100).toFixed(2) + '%'; }
  function toSvgY(v) { return (PAD_T + (SVG_H - PAD_T - PAD_B) * (1 - (v - yMin) / (yMax - yMin))).toFixed(1); }

  const zeroY = toSvgY(0);

  let svgLines = `<line x1="0" y1="${zeroY}" x2="100%" y2="${zeroY}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;

  // Draw analog trajectories as faded thin lines
  analogs.forEach((a, i) => {
    const color = getSpreadYearColor ? getSpreadYearColor(a.yr) : '#60a5fa';
    const pts = a.fwdPoints.map(pt => `${toSvgX(pt.d)},${toSvgY(pt.value)}`).join(' ');
    svgLines += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1" opacity="0.35"/>`;
    // Year label at the end
    const endPt = a.fwdPoints[a.fwdPoints.length - 1];
    svgLines += `<text x="${toSvgX(endPt.d)}" y="${(parseFloat(toSvgY(endPt.value)) - 3).toFixed(1)}" font-size="8" fill="${color}" opacity="0.6" text-anchor="end">${a.yr}</text>`;
  });

  // Median final settlement indicator (horizontal band ±0.05)
  const medY1 = toSvgY(medianFinal + Math.abs(medianFinal) * 0.02 + 0.02);
  const medY2 = toSvgY(medianFinal - Math.abs(medianFinal) * 0.02 - 0.02);
  const bandTop = Math.min(parseFloat(medY1), parseFloat(medY2));
  const bandH = Math.max(3, Math.abs(parseFloat(medY2) - parseFloat(medY1)));
  svgLines += `<rect x="60%" y="${bandTop.toFixed(1)}" width="40%" height="${bandH.toFixed(1)}" fill="rgba(251,191,36,0.2)" stroke="rgba(251,191,36,0.6)" stroke-width="1"/>`;
  svgLines += `<line x1="60%" y1="${toSvgY(medianFinal)}" x2="100%" y2="${toSvgY(medianFinal)}" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>`;
  svgLines += `<text x="62%" y="${(parseFloat(toSvgY(medianFinal)) - 2).toFixed(1)}" font-size="8" fill="#fbbf24">med ${medianFinal.toFixed(3)}</text>`;

  // Current value dot
  svgLines += `<circle cx="${toSvgX(currentD)}" cy="${toSvgY(currentV)}" r="4" fill="white" stroke="var(--accent-spread,#00d4ff)" stroke-width="2"/>`;

  // ── Histogram of final settlements (simple CSS bars) ──────────────────────
  const histBins = 5;
  const histRange = Math.max(0.01, yMax - yMin);
  const bins = Array(histBins).fill(0);
  finals.forEach(v => {
    const b = Math.min(histBins - 1, Math.floor(((v - yMin) / histRange) * histBins));
    bins[b]++;
  });
  const maxBin = Math.max(...bins, 1);
  const histHtml = bins.map((n, i) => {
    const pct = (n / maxBin * 80).toFixed(0);
    const binVal = (yMin + (i + 0.5) * histRange / histBins).toFixed(2);
    return `<div style="display:flex;align-items:center;gap:4px;margin:1px 0;">
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);width:40px;text-align:right;">${binVal}</div>
      <div style="height:10px;width:${pct}px;background:rgba(251,191,36,0.5);border-radius:1px;"></div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);">${n}</div>
    </div>`;

        ${front}/${back} · T-${currentD} @ ${currentV.toFixed(3)} ${unit}

}

function _syncSpreadSliderFromChart() {
  const chart  = STATE._spreadChart;
  const points = STATE._spreadSelectedPoints;
  if (!chart || !points || !points.length) return;
  const range = chart.timeScale().getVisibleRange();
  if (!range) return;
  const fromStr = typeof range.from === 'string' ? range.from : new Date(range.from * 1000).toISOString().slice(0,10);
  const toStr   = typeof range.to   === 'string' ? range.to   : new Date(range.to   * 1000).toISOString().slice(0,10);
  let sIdx = points.findIndex(pt => dayToTime(pt.d) >= fromStr);
  let eIdx = points.findLastIndex(pt => dayToTime(pt.d) <= toStr);
  if (sIdx === -1) sIdx = 0;
  if (eIdx === -1) eIdx = points.length - 1;
  const maxIdx = points.length - 1;
  const pct = getRangeSelectionPercent(points.length, sIdx, eIdx);
  const startSlider = document.getElementById('spread-window-start');
  const endSlider   = document.getElementById('spread-window-end');
  const selection   = document.getElementById('spread-range-selection');
  const readoutEl   = document.getElementById('spread-range-readout');
  const helperEl    = document.getElementById('spread-range-helper');
  if (!startSlider) return;
  startSlider.value = String(sIdx); endSlider.value = String(eIdx);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  const count = eIdx - sIdx + 1;
  if (helperEl) helperEl.textContent = count >= points.length ? 'Full span across available history' : `${count} days selected · drag handles to move or resize`;
  if (readoutEl) readoutEl.innerHTML = count >= points.length
    ? `<span>${formatDisplayDate(points[0].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[maxIdx].date)}</span><span style="color:var(--text-muted);">|</span><span>Full span</span>`
    : `<span>${formatDisplayDate(points[sIdx].date)}</span><span style="color:var(--text-muted);">to</span><span>${formatDisplayDate(points[eIdx].date)}</span><span style="color:var(--text-muted);">|</span><span>${count} days</span>`;
  if (!STATE.spreadView) STATE.spreadView = {};
  STATE.spreadView.rangeStart = sIdx; STATE.spreadView.rangeEnd = eIdx;
}

function onSpreadSlider() {
  const points = STATE._spreadSelectedPoints;
  const chart  = STATE._spreadChart;
  if (!points || !chart) return;
  if (!STATE.spreadView) STATE.spreadView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = points.length - 1;
  let start = clamp(parseInt(document.getElementById('spread-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('spread-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('spread-window-start').value = String(start); }
  STATE.spreadView.rangeStart = start; STATE.spreadView.rangeEnd = end;
  syncSpreadRangeFooter();
}

async function buildSpreadHeatmap(force = false) {
  const heatmapEl = document.getElementById('spread-heatmap');
  if (!heatmapEl) return;
  const instrument = getSpreadInstrument();
  const cacheKey = `${instrument}|last5`;
  syncSpreadHeatmapTitle();
  if (force || STATE.spreadHeatmapKey !== cacheKey) {
    STATE.spreadHeatmapHtml = '';
    STATE.spreadHeatmapKey = cacheKey;
  }
  if (STATE.spreadHeatmapHtml) {
    heatmapEl.innerHTML = STATE.spreadHeatmapHtml;
    highlightHeatmapPair();
    return;
  }

  // 12x12 grid: front(row) x back(col)
  const currentYear = new Date().getFullYear();
  const y1 = currentYear - 5, y2 = currentYear - 1;

  let html = `<style>#spread-heatmap-tbl td.hm-cell:hover{filter:brightness(1.28);}</style>`;
  html += `<div style="font-size:10px;color:var(--text-muted);padding:2px 14px 8px;font-family:var(--font-mono);letter-spacing:0.04em;">${y1}–${y2} · 5 completed years · Green = contango · Red = backwardation</div>`;
  html += `<div style="overflow-x:auto;"><table id="spread-heatmap-tbl" style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr>`;
  html += `<th style="width:44px;"></th>`;
  for (const month of MONTHS) {
    const m3 = month.slice(0,3).toUpperCase();
    html += `<th data-hm-col="${month}" style="text-align:center;padding:5px 6px;font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.06em;color:var(--text-secondary);border-bottom:1px solid rgba(255,255,255,0.06);" data-tooltip="Back leg: ${month} — this column shows ${month} as the back contract month.">${m3}</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (let fi = 0; fi < MONTHS.length; fi++) {
    const front = MONTHS[fi];
    const f3 = front.slice(0,3).toUpperCase();
    html += `<tr><td data-hm-row="${front}" style="text-align:left;font-weight:600;padding:5px 8px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;color:var(--text-secondary);white-space:nowrap;" data-tooltip="Front leg: ${front} — this row shows ${front} as the front contract month.">${f3}</td>`;
    for (let bi = 0; bi < MONTHS.length; bi++) {
      const back = MONTHS[bi];
      if (fi === bi) {
        html += `<td style="background:rgba(255,255,255,0.015);text-align:center;color:rgba(255,255,255,0.08);font-size:10px;font-family:var(--font-mono);">·</td>`;
        continue;
      }
      // Compute avg spread across last 5 years
      let sum = 0, count = 0;
      for (let yr = currentYear - 5; yr < currentYear; yr++) {
        const spreadResult = computeSpread(front, back, yr, instrument);
        if (spreadResult.points.length > 0) {
          sum += spreadResult.stats.avg;
          count++;
        }
      }
      const avg = count > 0 ? sum / count : null;
      const intensity = avg != null ? Math.min(Math.abs(avg) / 2, 1) : 0;
      const color = avg == null
        ? 'transparent'
        : (avg > 0 ? `rgba(0,255,136,${intensity * 0.45})` : `rgba(255,68,85,${intensity * 0.45})`);
      const value = avg == null ? '—' : avg.toFixed(2);
      const sign = avg != null && avg >= 0 ? '+' : '';
      const tip = avg == null
        ? `${front.slice(0,3)}/${back.slice(0,3)} — No spread data available.`
        : `${front.slice(0,3)} / ${back.slice(0,3)} · 5Y Avg: ${sign}${avg.toFixed(3)} · ${count}/5 years with data · Click to select this spread`;
      const click = avg == null ? '' : ` onclick="setSpreadPair('${front}','${back}')"`;
      html += `<td class="hm-cell" data-hm-front="${front}" data-hm-back="${back}" style="text-align:center;padding:5px 6px;background:${color};cursor:${avg == null ? 'default' : 'pointer'};font-family:var(--font-mono);font-size:11px;color:${avg == null ? 'rgba(255,255,255,0.2)' : 'inherit'};transition:filter 0.1s;" data-tooltip="${tip}"${click}>${value}</td>`;
    }
    html += `</tr>`;
    await yieldToBrowser();
  }
  html += `</tbody></table></div>`;
  html += `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px 12px;">
    <div style="width:72px;height:3px;background:linear-gradient(to right,rgba(255,68,85,0.75),rgba(255,68,85,0.12));border-radius:2px;"></div>
    <span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.04em;">Backwardation</span>
    <div style="width:20px;height:3px;background:rgba(255,255,255,0.04);border-radius:2px;"></div>
    <div style="width:72px;height:3px;background:linear-gradient(to right,rgba(0,255,136,0.12),rgba(0,255,136,0.75));border-radius:2px;"></div>
    <span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.04em;">Contango</span>
  </div>`;
  STATE.spreadHeatmapHtml = html;
  heatmapEl.innerHTML = html;
  highlightHeatmapPair();
}


// ─── SPREADS UPGRADE 11: LIFECYCLE RESOLUTION CHART ───────────────────────
let _resolutionMode = 'all';

function renderSpreadResolutionChart() {
  const container = document.getElementById('spread-resolution-chart');
  if (!container) return;

  const front = document.getElementById('resolution-front').value;
  const back = document.getElementById('resolution-back').value;
  const year = parseInt(document.getElementById('spread-year').value);
  if (!year) return;
  const instrument = getSpreadInstrument();

  const chart = createManagedChart('spread', 'resolution', container);
  // The time axis uses pseudo-dates (base 2000-01-01 + d days); suppress the
  // built-in crosshair time label which would show "02 Jan '00" instead of T-518.
  // The custom tooltip already shows the correct T-day label.
  chart.applyOptions({ crosshair: { vertLine: { labelVisible: false } } });
  const palette = getNeutralChartPalette();

  // Gather years based on mode
  const currentYear = new Date().getFullYear();
  const allYearsSet = new Set();
  const store = instrument === 'ttf' ? STATE.ttf : STATE.hh;
  [front, back].forEach(month => {
    if (!store[month]) return;
    Object.keys(store[month].contracts).forEach(t => {
      const yr = parseInt(t.slice(3));
      allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  const livePrefix = instrument === 'ttf' ? 'TTF' : 'NG';
  Object.keys(STATE.liveData).forEach(t => {
    if (!t.startsWith(livePrefix)) return;
    const yrStart = livePrefix.length + 1;
    const yr = parseInt(t.slice(yrStart, yrStart + 2));
    if (Number.isFinite(yr)) allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
  });

  const allYearsSorted = [...allYearsSet].sort((a, b) => b - a);
  STATE._resolutionAvailableYears = allYearsSorted.filter(y => computeSpread(front, back, y, instrument).points.length > 0);

  // Init/reset pinned years on pair change
  const pairKey = `${instrument}|${front}|${back}`;
  if (STATE.resolutionPairKey !== pairKey) {
    STATE.resolutionPairKey = pairKey;
    const defaults = new Set();
    STATE._resolutionAvailableYears.filter(y => y < currentYear).slice(0, 4).forEach(y => defaults.add(y));
    defaults.add(year); // Include selected year as pinned by default
    STATE.resolutionPinnedYears = defaults;
    STATE.resolutionView = null; // reset — will be set after visible extent is computed
  }

  STATE.resolutionVisibleYears = new Set(STATE.resolutionPinnedYears || []);
  STATE.resolutionSeriesMap = new Map();
  STATE._resolutionChart = chart;
  STATE._resolutionYearData = new Map();

  const _zeroBase = new Date('2000-01-01T00:00:00Z').getTime();
  const _resTimeStr = d => new Date(_zeroBase + d * 86400000).toISOString().split('T')[0];
  const _resTimeToD = t => {
    const s = typeof t === 'string' ? t : new Date(t * 1000).toISOString().slice(0, 10);
    return Math.round((new Date(s).getTime() - _zeroBase) / 86400000);
  };

  // Add the zero line (data set later once we know the visible extent)
  const zeroLine = chart.addLineSeries({
    color: palette.zero, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false
  });
  STATE._resolutionZeroLine = zeroLine;

  // Sync slider on drag/zoom
  chart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => {
      _syncResolutionSliderFromChart();
    });
  });

  let yearsToPlot = [...STATE._resolutionAvailableYears].sort((a, b) => a - b);
  // Filtering mode (All/5Y/Current) still restricts what's added to chart initially
  if (_resolutionMode === '5y') {
    yearsToPlot = yearsToPlot.filter(y => y >= currentYear - 5 && y < currentYear);
  } else if (_resolutionMode === 'current') {
    yearsToPlot = [year];
  }

  const seriesConfigs = [];

  // Draw oldest first
  yearsToPlot.forEach(yr => {
    const spreadResult = computeSpread(front, back, yr, instrument);
    const sp = spreadResult.points;
    if (sp.length === 0) return;

    const isSelected = yr === year;
    const visible = STATE.resolutionVisibleYears.has(yr);
    const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
    const lineWidth = isSelected ? 2.5 : (_resolutionMode === 'all' ? 1.2 : 1.5);
    const series = chart.addLineSeries({
      color, lineWidth,
      priceLineVisible: false, lastValueVisible: isSelected,
      crosshairMarkerVisible: isSelected || _resolutionMode !== 'all',
      visible,
      priceFormat: { type: 'custom', formatter: v => formatSignedSpread(v, 3), minMove: 0.001 }
    });
    
    const dataToPlot = [];
    const localLookup = new Map();
    sp.forEach(pt => {
      const d = pt.d;
      const baseMs = new Date("2000-01-01T00:00:00Z").getTime();
      const fakeTimeStr = new Date(baseMs + d * 86400000).toISOString().split('T')[0];
      dataToPlot.push({ time: fakeTimeStr, value: pt.value });
      localLookup.set(fakeTimeStr, pt);
    });
    series.setData(dataToPlot);
    STATE.resolutionSeriesMap.set(yr, series);
    STATE._resolutionYearData.set(yr, sp);

    seriesConfigs.push({
      series, label: `${yr}`, color, emphasis: isSelected,
      getPoint: p => localLookup.get(typeof p.time === 'string' ? p.time : ''),
      formatValue: v => formatSignedSpread(v, 3)
    });
  });

  // Render Legend
  const legendEl = document.getElementById('spread-resolution-legend');
  if (legendEl) {
    const yearsInChart = yearsToPlot.sort((a, b) => b - a);
    legendEl.innerHTML = yearsInChart.map(yr => {
      const on = STATE.resolutionVisibleYears.has(yr);
      const isSelected = yr === year;
      const color = isSelected ? '#ffffff' : getSpreadYearColor(yr);
      const spreadResult = computeSpread(front, back, yr, instrument);
      const sp = spreadResult.points;
      const avg = sp.length ? sp.reduce((s,p) => s + p.value, 0) / sp.length : null;
      const tip = sp.length
        ? `${yr} ${front.slice(0,3)}/${back.slice(0,3)} — Full-lifecycle avg: ${avg != null ? (avg >= 0 ? '+' : '') + avg.toFixed(3) : 'N/A'} · ${sp.length} trading days${isSelected ? ' · Currently selected year' : ''} · Click to toggle visibility`
        : `${yr} ${front.slice(0,3)}/${back.slice(0,3)} — No data available`;
      return `<span data-resolution-yr="${yr}" onclick="toggleResolutionYear(${yr})" data-tooltip="${tip}" style="
        display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
        border:1px solid ${on ? color : 'rgba(255,255,255,0.15)'};
        background:${on ? color + '22' : 'transparent'};
        opacity:${on ? '1' : '0.28'};
        cursor:pointer;font-family:var(--font-mono);font-size:11px;
        color:${color};font-weight:${isSelected ? '700' : '400'};
        transition:opacity 0.15s,background 0.15s;
        ${isSelected ? 'box-shadow:0 0 0 1px '+color+';' : ''}
      "><span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${yr}</span>`;
    }).join('') + `
      <div style="flex-grow:1;"></div>
      <span onclick="toggleAllResolutionYears(true)" data-tooltip="Show all available years as overlay lines." style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">ALL</span>
      <span onclick="toggleAllResolutionYears(false)" data-tooltip="Hide all years except the currently selected one." style="cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);user-select:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">NONE</span>
    `;
  }
  
  // Compute visible extent from VISIBLE years only (not all available years, which include old contracts
  // with full T-518 history that would force the chart to show the entire 519-day axis)
  let _visMinD = 519, _visMaxD = 1;
  [...STATE._resolutionYearData.entries()]
    .filter(([yr]) => STATE.resolutionVisibleYears.has(yr))
    .forEach(([, sp]) => sp.forEach(pt => {
      if (pt.d < _visMinD) _visMinD = pt.d;
      if (pt.d > _visMaxD) _visMaxD = pt.d;
    }));
  // Fall back to all plotted years if visible set is empty
  if (_visMinD > _visMaxD) {
    [...STATE._resolutionYearData.values()].forEach(sp => sp.forEach(pt => {
      if (pt.d < _visMinD) _visMinD = pt.d;
      if (pt.d > _visMaxD) _visMaxD = pt.d;
    }));
  }
  _visMinD = Math.max(1, _visMinD);
  _visMaxD = Math.min(519, _visMaxD);
  STATE._resolutionDataMinD = _visMinD;
  STATE._resolutionDataMaxD = _visMaxD;

  // Set zero line to match the visible data extent so fitContent() lands on the correct range
  zeroLine.setData([{ time: _resTimeStr(_visMinD), value: 0 }, { time: _resTimeStr(_visMaxD), value: 0 }]);

  if (!STATE.resolutionView) {
    STATE.resolutionView = { rangeStart: _visMinD, rangeEnd: _visMaxD };
  }

  applyChartTimeScaleOptions(chart, {
    formatter: time => {
      const d = (new Date(time).getTime() - _zeroBase) / 86400000;
      return `T-${519 - Math.round(d)}`;
    },
    barSpacing: 2,
    fixLeftEdge: true,
    fixRightEdge: true
  });
  // Explicitly fit to the visible data range (not just fitContent which respects all series including zero line)
  chart.timeScale().setVisibleRange({ from: _resTimeStr(_visMinD), to: _resTimeStr(_visMaxD) });

  if (seriesConfigs.length) {
    attachChartTooltip({
      chart, container, titleColor: '#f5f7fb',
      seriesConfigs: seriesConfigs.reverse(), // Put newest/selected at top
      getTitle: p => {
        const d = (new Date(p.time).getTime() - new Date("2000-01-01T00:00:00Z").getTime()) / 86400000;
        const tDay = 519 - Math.round(d);
        return `T-${tDay} · ${front.slice(0,3)}/${back.slice(0,3)}`;
      },
      getMetrics: p => {
        const d = (new Date(p.time).getTime() - new Date("2000-01-01T00:00:00Z").getTime()) / 86400000;
        const tDay = 519 - Math.round(d);
        const pctDone = ((519 - tDay) / 519 * 100).toFixed(0);
        return [
          { label: 'Days to Expiry', value: `${tDay}` },
          { label: 'Lifecycle', value: `${pctDone}% complete` },
        ];
      }
    });
  }
  syncResolutionRangeFooter();
}

function _syncResolutionSliderFromChart() {
  const chart = STATE._resolutionChart;
  if (!chart) return;
  const range = chart.timeScale().getVisibleRange();
  if (!range) return;
  // Resolution chart uses fake consecutive-day dates: base = 2000-01-01, day d → base + d*86400000
  const _resBase = new Date('2000-01-01T00:00:00Z').getTime();
  const timeToDay = t => {
    const str = typeof t === 'string' ? t : new Date(t * 1000).toISOString().slice(0,10);
    return Math.round((new Date(str).getTime() - _resBase) / 86400000);
  };
  const start = Math.max(1, Math.min(519, timeToDay(range.from)));
  const end   = Math.max(1, Math.min(519, timeToDay(range.to)));
  if (!STATE.resolutionView) STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
  STATE.resolutionView.rangeStart = start;
  STATE.resolutionView.rangeEnd   = end;
  const startSlider = document.getElementById('resolution-window-start');
  const endSlider   = document.getElementById('resolution-window-end');
  const selection   = document.getElementById('resolution-range-selection');
  const readout     = document.getElementById('resolution-range-readout');
  const helper      = document.getElementById('resolution-range-helper');
  if (!startSlider) return;
  startSlider.value = String(start); endSlider.value = String(end);
  const pctStart = ((start - 1) / 518) * 100;
  const pctEnd   = ((end   - 1) / 518) * 100;
  if (selection) { selection.style.left = `${pctStart}%`; selection.style.width = `${pctEnd - pctStart}%`; }
  const count = end - start + 1;
  if (readout) readout.innerHTML = `<span>T-${519 - start}</span> <span style="color:var(--text-muted);">to</span> <span>T-${519 - end}</span> <span style="color:var(--text-muted);">|</span> <span>${count} days</span>`;
  if (helper) helper.textContent = count >= 519 ? 'Full lifecycle' : `${count} days selected`;
  updateResolutionKPI(start, end);
}

function onResolutionSlider() {
  const chart = STATE._resolutionChart;
  if (!chart) return;
  if (!STATE.resolutionView) STATE.resolutionView = { rangeStart: 1, rangeEnd: 519 };
  let start = parseInt(document.getElementById('resolution-window-start').value) || 1;
  let end   = parseInt(document.getElementById('resolution-window-end').value) || 519;
  if (start >= end) { start = Math.max(1, end - 1); document.getElementById('resolution-window-start').value = String(start); }
  STATE.resolutionView.rangeStart = start;
  STATE.resolutionView.rangeEnd = end;
  syncResolutionRangeFooter();
}

function syncResolutionRangeFooter() {
  const chart = STATE._resolutionChart;
  if (!chart) return;
  const _fullMinD = STATE._resolutionDataMinD || 1;
  const _fullMaxD = STATE._resolutionDataMaxD || 519;
  if (!STATE.resolutionView) STATE.resolutionView = { rangeStart: _fullMinD, rangeEnd: _fullMaxD };
  const view = STATE.resolutionView;

  const startSlider = document.getElementById('resolution-window-start');
  const endSlider   = document.getElementById('resolution-window-end');
  const selection   = document.getElementById('resolution-range-selection');
  const readout     = document.getElementById('resolution-range-readout');
  const helper      = document.getElementById('resolution-range-helper');

  if (!startSlider) return;

  const start = view.rangeStart;
  const end = view.rangeEnd;

  const pctStart = ((start - 1) / 518) * 100;
  const pctEnd = ((end - 1) / 518) * 100;
  if (selection) {
    selection.style.left = `${pctStart}%`;
    selection.style.width = `${Math.max(pctEnd - pctStart, 0)}%`;
  }

  const count = end - start + 1;
  const isFullRange = start <= _fullMinD && end >= _fullMaxD;
  if (readout) {
    readout.innerHTML = `<span>T-${519 - start}</span> <span style="color:var(--text-muted);">to</span> <span>T-${519 - end}</span> <span style="color:var(--text-muted);">|</span> <span>${count} days</span>`;
  }
  if (helper) {
    helper.textContent = isFullRange ? 'Full lifecycle' : `${count} days selected`;
  }

  const _resBase = new Date("2000-01-01T00:00:00Z").getTime();
  const resolutionDayToTime = d => new Date(_resBase + d * 86400000).toISOString().split('T')[0];
  if (!isFullRange) {
    chart.timeScale().setVisibleRange({ from: resolutionDayToTime(start), to: resolutionDayToTime(end) });
  } else {
    // Use the actual visible data extent, not fitContent() which includes old-year series up to T-518
    chart.timeScale().setVisibleRange({
      from: resolutionDayToTime(_fullMinD),
      to:   resolutionDayToTime(_fullMaxD),
    });
  }
  updateResolutionKPI(start, end);
}

function updateResolutionKPI(start, end) {
  const kpiEl = document.getElementById('resolution-kpi');
  if (!kpiEl || !STATE._resolutionYearData) return;
  const visYears = STATE.resolutionVisibleYears || new Set();
  const front = document.getElementById('resolution-front')?.value;
  const back  = document.getElementById('resolution-back')?.value;
  const instrument = document.getElementById('spread-instrument')?.value || 'hh';
  const selectedYear = parseInt(document.getElementById('spread-year')?.value, 10);
  const items = [];
  [...STATE._resolutionYearData.entries()]
    .filter(([yr]) => visYears.has(yr))
    .sort(([a], [b]) => b - a)
    .forEach(([yr, sp]) => {
      const pts = sp.filter(pt => pt.d >= start && pt.d <= end).map(pt => pt.value);
      if (!pts.length) return;
      const avg = pts.reduce((s, v) => s + v, 0) / pts.length;
      const mn = Math.min(...pts);
      const mx = Math.max(...pts);
      const color = yr === selectedYear ? '#ffffff' : getSpreadYearColor(yr);
      const rangeSpread = (mx - mn).toFixed(3);
      const tip = `${yr} ${front || ''}/${back || ''} · Window avg: ${(avg >= 0 ? '+' : '') + avg.toFixed(3)} · Min: ${mn.toFixed(3)} · Max: ${(mx >= 0 ? '+' : '') + mx.toFixed(3)} · Range: ${rangeSpread} · ${pts.length} days in window${yr === selectedYear ? ' · Selected year' : ''}`;
      items.push(`<div data-tooltip="${tip}" style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;border:1px solid ${color}33;background:${color}11;cursor:default;">
        <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>
        <span style="font-family:var(--font-mono);font-size:11px;color:${color};font-weight:${yr===selectedYear?'700':'400'};">${yr}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">avg</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">${formatSignedSpread(avg,3)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--negative);">${formatSignedSpread(mn,3)}</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">/</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--positive);">${formatSignedSpread(mx,3)}</span>
      </div>`);
    });
  kpiEl.innerHTML = items.join('');
}

function toggleResolutionYear(yr) {
  yr = parseInt(yr);
  
  if (!STATE.resolutionPinnedYears) STATE.resolutionPinnedYears = new Set();
  
  const on = !STATE.resolutionPinnedYears.has(yr);
  if (on) {
    STATE.resolutionPinnedYears.add(yr);
  } else {
    STATE.resolutionPinnedYears.delete(yr);
  }
  
  STATE.resolutionVisibleYears = new Set(STATE.resolutionPinnedYears);
  
  const series = STATE.resolutionSeriesMap && STATE.resolutionSeriesMap.get(yr);
  if (series) series.applyOptions({ visible: on });
  
  const chip = document.querySelector(`[data-resolution-yr="${yr}"]`);
  if (chip) {
    const color = getSpreadYearColor(yr);
    chip.style.opacity = on ? '1' : '0.28';
    chip.style.background = on ? `${color}22` : 'transparent';
    chip.style.border = `1px solid ${on ? color : 'rgba(255,255,255,0.15)'}`;
  }

  // Recalculate available scroll bounds for visible series so Slider/Chart correctly map future active plots
  let _visMinD = 519, _visMaxD = 1;
  const activeEntries = [...STATE._resolutionYearData.entries()].filter(([y]) => STATE.resolutionVisibleYears.has(y));
  activeEntries.forEach(([, sp]) => sp.forEach(pt => {
    if (pt.d < _visMinD) _visMinD = pt.d;
    if (pt.d > _visMaxD) _visMaxD = pt.d;
  }));
  if (activeEntries.length === 0 || _visMinD > _visMaxD) {
    _visMinD = 1; _visMaxD = 519;
  }
  
  STATE._resolutionDataMinD = Math.max(1, _visMinD);
  STATE._resolutionDataMaxD = Math.min(519, _visMaxD);
  
  // Update zero-line bounds organically without full re-render
  if (STATE._resolutionChart) {
    const palette = getNeutralChartPalette();
    const zeroLineSeries = STATE._resolutionZeroLine;
    if (zeroLineSeries) {
      const _zeroBase = new Date('2000-01-01T00:00:00Z').getTime();
      const _resTimeStr = d => new Date(_zeroBase + d * 86400000).toISOString().split('T')[0];
      zeroLineSeries.setData([{ time: _resTimeStr(STATE._resolutionDataMinD), value: 0 }, { time: _resTimeStr(STATE._resolutionDataMaxD), value: 0 }]);
    }
  }

  syncResolutionRangeFooter();
}

function toggleAllResolutionYears(on) {
  const yearSelect = document.getElementById('spread-year');

  if (!STATE.resolutionPinnedYears) STATE.resolutionPinnedYears = new Set();

}

/* ─── Feature 8: Butterfly Spread Builder (Tier 3) ─── */
function computeButterfly(frontMonth, midMonth, backMonth, year) {
  const cacheKey = `fly|${frontMonth}|${midMonth}|${backMonth}|${year}`;
  if (STATE._flyCache && STATE._flyCache[cacheKey]) return STATE._flyCache[cacheKey];
  if (!STATE._flyCache) STATE._flyCache = {};

  // Get T-day mapped data for all three legs using existing calendar-date join
  function getSpreadPoints(month, yr) {
    const code = MONTH_CODES[month];
    if (!code) return [];
    const yy = yr % 100;
    const pad = yy < 10 ? '0' + yy : '' + yy;
    const ticker = `NG${code}${pad}`;
    return getContractData(ticker); // {d, p, date}
  }

  const front = getSpreadPoints(frontMonth, year);
  const mid   = getSpreadPoints(midMonth,  year);
  const back  = getSpreadPoints(backMonth, year);

  if (!front.length || !mid.length || !back.length) {
    const empty = { points: [], stats: { min:0, max:0, avg:0, count:0 } };
    STATE._flyCache[cacheKey] = empty; return empty;
  }

  // Join on calendar date
  const midMap  = new Map(); mid.forEach(pt => { if (pt.date) midMap.set(pt.date, pt.p); });
  const backMap = new Map(); back.forEach(pt => { if (pt.date) backMap.set(pt.date, pt.p); });

  const points = [];
  front.forEach(pt => {
    if (!pt.date) return;
    const mp = midMap.get(pt.date);
    const bp = backMap.get(pt.date);
    if (mp !== undefined && bp !== undefined) {
      points.push({ d: pt.d, date: pt.date, value: pt.p + bp - 2 * mp });
    }
  });

  const result = { points, stats: getSeriesStats(points, p => p.value) };
  STATE._flyCache[cacheKey] = result;
  return result;
}
