<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>NatGas Pro Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay-loader" class="overlay hidden"><div class="spinner"></div><div class="loader-text">Loading data ...</div></div>
  <header class="app-header">
    <div class="header-left">⚡ NatGas Pro Terminal</div>
    <div class="header-center">
      <div class="ticker-card" id="ng-ticker">NG=F: --</div>
      <div class="ticker-card" id="ttf-ticker">TTF=F: --</div>
      <div class="ticker-card" id="eurusd-ticker">EUR/USD: --</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="refresh-btn">⟳ Refresh</button>
    </div>
  </header>

  <section class="tool-menu">
    <button data-tab="market" data-choice="ng" class="tool-btn active">HH</button>
    <button data-tab="market" data-choice="ttf" class="tool-btn">TTF</button>
    <button data-tab="market" data-choice="spot" class="tool-btn">Spot</button>
    <button data-tab="spread" class="tool-btn">Spread</button>
    <button data-tab="curve" class="tool-btn">Curve</button>
    <button data-tab="expiry" class="tool-btn">Expiry</button>
    <button data-tab="log" class="tool-btn">Log</button>
    <button data-tab="cross" class="tool-btn">Cross</button>
  </section>

  <main class="app-shell">
    <aside class="side-panel">
      <div class="panel-title">Contracts</div>
      <div class="quick-grid" id="quick-contracts"></div>
      <div class="panel-title">Controls</div>
      <div class="control-group"><label>Year:</label><select id="global-year"></select></div>
      <div class="control-group"><label>Month:</label><select id="global-month"></select></div>
      <div class="control-group"><label>T-Day:</label><div class="tdays-grid" id="global-tdays"></div></div>
    </aside>

    <section class="main-panel">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="chart-container" id="chart-container"></div>
      <div class="data-grid" id="data-grid"></div>
    </section>
  </main>

  <div id="global-tooltip" class="tooltip"></div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/tooltip.js"></script>
  <script src="js/data_loader.js"></script>
  <script src="js/yahoo_fetch.js"></script>
  <script src="js/eia_fetch.js"></script>
  <script src="js/data_engine.js"></script>
  <script src="js/charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
