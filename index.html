        '</div>' +
        '<span style="width:26px;text-align:right;color:var(--text-primary);font-weight:600;">' + c + '</span>' +
        '<span style="width:34px;text-align:right;color:var(--text-muted);font-size:10px;">' + pct + '%</span>' +
      '</div>';
  });

  distHtml +=
    '</div>' +
    '<div style="margin:0 14px;border-top:1px solid var(--border);padding:8px 0 10px;font-family:var(--font-mono);font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;">' +
      '<span data-tooltip="Weeks that closed higher than the prior week\'s close.">↑ Pos: <strong style="color:var(--positive);">' + posCount + ' (' + (posCount/total*100).toFixed(1) + '%)</strong></span>' +
      '<span data-tooltip="Weeks that closed lower than the prior week\'s close.">↓ Neg: <strong style="color:var(--negative);">' + negCount + ' (' + (negCount/total*100).toFixed(1) + '%)</strong></span>' +
      '<span data-tooltip="Arithmetic mean of all weekly returns in the visible range.">Mean: <strong style="color:var(--text-primary);">' + (mean >= 0 ? '+' : '') + mean.toFixed(2) + '%</strong></span>' +
      '<span data-tooltip="Median weekly return — the middle value. Less sensitive to extreme outliers than the mean.">Median: <strong style="color:var(--text-primary);">' + (median >= 0 ? '+' : '') + median.toFixed(2) + '%</strong></span>' +
      '<span data-tooltip="Standard deviation — measures how widely returns are dispersed around the mean. Higher σ = more volatile.">Std Dev: <strong style="color:var(--text-primary);">' + stddev.toFixed(2) + '%</strong></span>' +
      '<span data-tooltip="Best and worst single week in the visible range.">Range: <strong style="color:var(--positive);">+' + best.toFixed(1) + '%</strong> / <strong style="color:var(--negative);">' + worst.toFixed(1) + '%</strong></span>' +
    '</div>';

  distEl.innerHTML = distHtml;
}

function onDailyWeeklySlider() {
  const chart = STATE._dailyWeeklyChart;
  const data = STATE._dailyWeeklyData;
  if (!chart || !data || !data.length) return;
  
  let start = parseInt(document.getElementById('daily-weekly-slider-start').value);
  let end   = parseInt(document.getElementById('daily-weekly-slider-end').value);
  
  if (start >= end) {
    end = Math.min(100, start + 1);
    document.getElementById('daily-weekly-slider-end').value = end;
  }
  
  const sIdx = Math.floor((start / 100) * (data.length - 1));
  const eIdx = Math.min(data.length - 1, Math.floor((end / 100) * (data.length - 1)));
  
  // Deactivate preset buttons if slider is moved manually
  document.querySelectorAll('#daily-weekly-presets .pill-btn').forEach(b => b.classList.remove('active'));
  
  STATE.dailyWeeklyView = { rangeStart: sIdx, rangeEnd: eIdx };
  syncDailyWeeklyRangeFooter();
}

function syncDailyWeeklyRangeFooter() {
  const chart = STATE._dailyWeeklyChart;
  const data = STATE._dailyWeeklyData;
  if (!chart || !data || !data.length) return;
  
  const startS = document.getElementById('daily-weekly-slider-start');
  const selection = document.getElementById('daily-weekly-selection');
  const readout = document.getElementById('daily-weekly-readout');
  const minL = document.getElementById('daily-weekly-min-label');
  const maxL = document.getElementById('daily-weekly-max-label');

  if (!startS) return;
  
  const view = STATE.dailyWeeklyView || { rangeStart: 0, rangeEnd: data.length - 1 };
  const sIdx = view.rangeStart;
  const eIdx = view.rangeEnd;
  
  const pctS = (sIdx / (data.length - 1)) * 100;
  const pctE = (eIdx / (data.length - 1)) * 100;
  
  if (selection) {
    selection.style.left = `${pctS}%`;
    selection.style.width = `${pctE - pctS}%`;
  }
  
  const sDate = data[sIdx].date;
  const eDate = data[eIdx].date;
  
  if (minL) minL.textContent = data[0].date;
  if (maxL) maxL.textContent = data[data.length - 1].date;
  if (readout) readout.textContent = `${sDate} TO ${eDate} (${eIdx - sIdx + 1} weeks)`;
  
  chart.timeScale().setVisibleRange({ from: sDate, to: eDate });
}

function _syncDailyWeeklySliderFromChart() {
  const chart = STATE._dailyWeeklyChart;
  const data = STATE._dailyWeeklyData;
  if (!chart || !data || !data.length) return;
  
  const range = chart.timeScale().getVisibleRange();
  if (!range) return;
  
  const fromTime = typeof range.from === 'string' ? range.from : (new Date(range.from * 1000).toISOString().slice(0,10));
  const toTime = typeof range.to === 'string' ? range.to : (new Date(range.to * 1000).toISOString().slice(0,10));
  
  let sIdx = data.findIndex(p => p.date >= fromTime);
  let eIdx = data.findLastIndex(p => p.date <= toTime);
  if (sIdx === -1) sIdx = 0;
  if (eIdx === -1) eIdx = data.length - 1;
  
  const pctS = (sIdx / (data.length - 1)) * 100;
  const pctE = (eIdx / (data.length - 1)) * 100;
  
  const startS = document.getElementById('daily-weekly-slider-start');
  const endS = document.getElementById('daily-weekly-slider-end');
  const selection = document.getElementById('daily-weekly-selection');
  
  if (startS) startS.value = pctS;
  if (endS) endS.value = pctE;
  if (selection) {
    selection.style.left = `${pctS}%`;
    selection.style.width = `${pctE - pctS}%`;
  }
  
  STATE.dailyWeeklyView = { rangeStart: sIdx, rangeEnd: eIdx };
  
  const readout = document.getElementById('daily-weekly-readout');
  if (readout) readout.textContent = `${data[sIdx].date} TO ${data[eIdx].date} (${eIdx - sIdx + 1} weeks)`;
}

const _priceLogState = { page: 0, data: [], pageSize: 100 };

function _renderDailyPriceLog(data) {
  const el = document.getElementById('daily-table');
  if (!el) return;
  _priceLogState.data = [...data].reverse();
  _priceLogState.page = 0;
  _renderPriceLogPage(el);
}

function _renderPriceLogPage(el) {
  if (!el) el = document.getElementById('daily-table');
  if (!el) return;
  const { data, page, pageSize } = _priceLogState;
  const totalPages = Math.ceil(data.length / pageSize);
  const start = page * pageSize;
  const pageData = data.slice(start, start + pageSize);
  const allPrices = data.map(p => p.p);
  const pMin = Math.min(...allPrices), pMax = Math.max(...allPrices), pRange = pMax - pMin || 1;
  const sessionLabel = data.length >= 8000 ? data.length + '+ SESSIONS' : data.length + ' sessions';

  // Pre-compute streaks for the full dataset (most recent first)
  const streaks = new Array(data.length).fill(0);
  for (let i = 0; i < data.length; i++) {
    const prevIdx = i + 1;
    if (prevIdx >= data.length) { streaks[i] = 1; continue; }
    const delta = data[prevIdx].p > 0 ? (data[i].p - data[prevIdx].p) / data[prevIdx].p : 0;
    const dir = delta > 0 ? 1 : delta < 0 ? -1 : 0;
    if (dir === 0) { streaks[i] = 0; continue; }
    let count = 1;
    let j = i + 1;
    while (j < data.length - 1) {
      const d2 = data[j + 1].p > 0 ? (data[j].p - data[j + 1].p) / data[j + 1].p : 0;
      const d2dir = d2 > 0 ? 1 : d2 < 0 ? -1 : 0;
      if (d2dir !== dir) break;
      count++; j++;
    }
    streaks[i] = dir * count;
  }

  // Recent stats for header summary
  const recent20 = data.slice(0, Math.min(20, data.length));
  const posRecent = recent20.filter((pt, i) => i < recent20.length - 1 && pt.p > recent20[i + 1].p).length;

  const th = (label, tip, extra) =>
    '<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;' +
    (label === 'Date' ? 'text-align:left;' : '') + (extra || '') + '"' +
    (tip ? ' data-tooltip="' + tip + '"' : '') + '>' + label + '</th>';

  let html =
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border);">' +
      '<div>' +
        '<span class="card-title" style="margin-bottom:0;">Price Log &mdash; NG=F · <span style="color:var(--accent-hh);">' + sessionLabel + '</span></span>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono);">' +
          'All-time range: $' + pMin.toFixed(3) + ' – $' + pMax.toFixed(3) + ' · ' +
          'Last 20 sessions: ' + posRecent + '/20 up · ' +
          'Current streak: ' + (streaks[0] > 0 ? '<span style="color:var(--positive);">▲' + Math.abs(streaks[0]) + ' up</span>' : streaks[0] < 0 ? '<span style="color:var(--negative);">▼' + Math.abs(streaks[0]) + ' down</span>' : 'flat') +
        '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);">' +
        '<button onclick="_priceLogPage(-1)" style="background:var(--bg-primary);border:1px solid var(--border);color:var(--text-secondary);border-radius:4px;padding:2px 8px;cursor:pointer;font-family:var(--font-mono);font-size:12px;" ' + (page === 0 ? 'disabled' : '') + '>&#9664; Prev</button>' +
        '<span>Page ' + (page + 1) + ' / ' + totalPages + '</span>' +
        '<button onclick="_priceLogPage(1)" style="background:var(--bg-primary);border:1px solid var(--border);color:var(--text-secondary);border-radius:4px;padding:2px 8px;cursor:pointer;font-family:var(--font-mono);font-size:12px;" ' + (page >= totalPages - 1 ? 'disabled' : '') + '>Next &#9654;</button>' +
      '</div>' +
    '</div>';

  html += '<div style="overflow-y:auto;max-height:420px;"><table><thead><tr>' +
    th('Date', 'Trading session date (most recent first).') +
    th('Close', 'Front-month NG=F closing price in USD/MMBtu.') +
    th('Day Δ%', 'Close-to-close % change vs the prior session.') +
    th('Streak', 'Consecutive up (▲) or down (▼) sessions ending on this day. e.g. ▲3 = up 3 days in a row.') +
    th('Level', 'Price position within the all-time history range — left = all-time low, right = all-time high.') +
    '</tr></thead><tbody>';

  pageData.forEach((pt, i) => {
    const globalIdx = start + i;
    const prevPt = globalIdx < data.length - 1 ? data[globalIdx + 1] : null;
    const delta = prevPt && prevPt.p > 0 ? (pt.p - prevPt.p) / prevPt.p * 100 : null;
    const levelPct = pRange > 0 ? ((pt.p - pMin) / pRange * 100) : 0;
    const barW = Math.max(2, (levelPct / 100 * 60)).toFixed(1);
    const streak = streaks[globalIdx];
    const streakLabel = streak === 0 ? '<span style="color:var(--text-muted);">—</span>'
      : streak > 0
        ? '<span style="color:var(--positive);">▲' + Math.abs(streak) + '</span>'
        : '<span style="color:var(--negative);">▼' + Math.abs(streak) + '</span>';
    const levelColor = levelPct > 70 ? 'var(--positive)' : levelPct < 30 ? 'var(--negative)' : 'var(--accent-hh)';
    const rowTip = formatDailyDate(pt.date) + ' · $' + pt.p.toFixed(3) +
      (delta !== null ? ' · ' + (delta >= 0 ? '+' : '') + delta.toFixed(2) + '%' : '') +
      ' · ' + levelPct.toFixed(0) + 'th percentile all-time';
    html += '<tr data-tooltip="' + rowTip + '">' +
      '<td style="text-align:left;">' + formatDailyDate(pt.date) + '</td>' +
      '<td style="font-family:var(--font-mono);">$' + pt.p.toFixed(3) + '</td>' +
      '<td class="' + (delta === null ? '' : delta >= 0 ? 'positive' : 'negative') + '">' +
        (delta === null ? '\u2014' : (delta >= 0 ? '+' : '') + delta.toFixed(2) + '%') +
      '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11px;">' + streakLabel + '</td>' +
      '<td style="text-align:right;">' +
        '<div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;">' +
          '<span style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);width:26px;text-align:right;">' + levelPct.toFixed(0) + '%</span>' +
          '<div style="width:60px;background:rgba(255,255,255,0.06);border-radius:2px;height:6px;flex-shrink:0;">' +
            '<div style="width:' + barW + 'px;height:100%;background:' + levelColor + ';border-radius:2px;opacity:0.7;"></div>' +
          '</div>' +
        '</div>' +
      '</td>' +
      '</tr>';
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function _priceLogPage(dir) {
  const totalPages = Math.ceil(_priceLogState.data.length / _priceLogState.pageSize);
  _priceLogState.page = Math.max(0, Math.min(totalPages - 1, _priceLogState.page + dir));
  _renderPriceLogPage();
}

</script>

<script>
// ─── DAILY TRACKER UPGRADE 6: MONTHLY SEASONALITY + ANNUAL PERFORMANCE ───────

function _renderMonthlySeasonality(data) {
  const el = document.getElementById('daily-seasonality');
  if (!el || data.length < 50) {
    if (el) el.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">Need more data for seasonality</div>';
    return;
  }

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthReturns = Array.from({length:12}, () => []);
  const monthYearCounts = Array.from({length:12}, () => ({ pos: 0, total: 0 }));

  const getClose = pt => (pt.close != null ? pt.close : pt.p);
  const yearlyMonthData = new Map();
  data.forEach(pt => {
    const close = getClose(pt);
    if (close == null || close <= 0) return;
    const d = new Date(pt.date + 'T00:00:00Z');
    const mo = d.getUTCMonth();
    const yr = d.getUTCFullYear();
    const key = `${yr}-${String(mo).padStart(2,'0')}`;
    if (!yearlyMonthData.has(key)) {
      yearlyMonthData.set(key, { month: mo, year: yr, firstClose: close, lastClose: close });
    } else {
      yearlyMonthData.get(key).lastClose = close;
    }
  });

  const entries = [...yearlyMonthData.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  for (let i = 1; i < entries.length; i++) {
    const [, v] = entries[i];
    const [, prev] = entries[i - 1];
    const prevDate = new Date(Date.UTC(prev.year, prev.month, 1));
    const currDate = new Date(Date.UTC(v.year, v.month, 1));
    const diffMonths = Math.round((currDate - prevDate) / (1000 * 60 * 60 * 24 * 30));
    if (diffMonths !== 1) continue;
    if (prev.lastClose <= 0) continue;
    const ret = (v.lastClose - prev.lastClose) / prev.lastClose * 100;
    monthReturns[v.month].push(ret);
    monthYearCounts[v.month].total++;
    if (ret >= 0) monthYearCounts[v.month].pos++;
  }

  const avgs = monthReturns.map(rets => rets.length ? rets.reduce((s, r) => s + r, 0) / rets.length : 0);
  const maxAbs = Math.max(...avgs.map(Math.abs), 0.01);

  // ── Persist toggle state ──────────────────────────────────────────────────
  if (!el._seasonViewMode) el._seasonViewMode = 'bar';
  const viewMode = el._seasonViewMode;

  // ── Header with toggle ────────────────────────────────────────────────────
  const headerHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:10px 14px 6px;border-bottom:1px solid var(--border);">
      <div style="padding:0;">
        <div class="card-title" style="padding:0;" data-tooltip="Average month-over-month % return grouped by calendar month across all available history. Reveals seasonal tendencies — e.g. winter demand peaks, shoulder-season weakness.">${viewMode === 'box' ? 'MONTHLY RETURN DISTRIBUTION — NG=F' : 'AVERAGE MONTHLY RETURN — NG=F'}
          <span style="font-size:10px;color:var(--text-muted);font-weight:400;">full history</span>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">
          ${viewMode === 'box'
            ? 'Each box = 1 calendar month · green = historically positive median · red = negative median · numbers = years of data'
            : 'Average month-over-month % return · green = net positive · fraction = years positive / total years'}
        </div>
      </div>
      <div class="segment-switch" id="season-view-toggle">
        <button class="segment-btn${viewMode === 'bar' ? ' active' : ''}" data-view="bar" data-tooltip="Bar chart — shows average return per calendar month.">BAR</button>
        <button class="segment-btn${viewMode === 'box' ? ' active' : ''}" data-view="box" data-tooltip="Box plot — shows full distribution (p5/p25/median/p75/p95) per calendar month. Better for understanding variance and outlier risk.">BOX</button>
      </div>
    </div>`;

  // ── BAR view (existing) ───────────────────────────────────────────────────
  let bodyHtml = '';
  if (viewMode === 'bar') {
    // Centered bar chart — shared zero baseline, bars grow up (positive) or down (negative)
    const CHART_H = 90;  // half-height above and below zero
    const TOTAL_H = CHART_H * 2;
    bodyHtml = '<div style="padding:8px 14px 2px;">';
    // Zero line label
    bodyHtml += '<div style="position:relative;height:' + TOTAL_H + 'px;margin-bottom:2px;">';
    // Horizontal zero line
    bodyHtml += '<div style="position:absolute;top:' + CHART_H + 'px;left:0;right:0;height:1px;background:rgba(255,255,255,0.15);z-index:1;"></div>';
    bodyHtml += '<div style="position:absolute;top:' + (CHART_H - 10) + 'px;right:0;font-family:var(--font-mono);font-size:8px;color:rgba(255,255,255,0.25);">0%</div>';
    bodyHtml += '<div style="display:flex;height:100%;align-items:stretch;gap:4px;">';
    avgs.forEach((avg, i) => {
      const isPos = avg >= 0;
      const barH = Math.max(3, Math.round((Math.abs(avg) / maxAbs) * (CHART_H - 4)));
      const { pos, total } = monthYearCounts[i];
      const pctPos = total ? Math.round(pos / total * 100) : 0;
      const label = (isPos ? '+' : '') + avg.toFixed(2) + '%';
      const tip = MONTH_NAMES[i] + ': avg ' + label + ' · ' + pos + '/' + total + ' years positive (' + pctPos + '%) · ' + (total - pos) + '/' + total + ' years negative';
      const barColor = isPos ? 'rgba(0,255,136,0.75)' : 'rgba(255,68,85,0.75)';
      const labelColor = isPos ? 'var(--positive)' : 'var(--negative)';
      const pctColor = pctPos >= 60 ? 'var(--positive)' : pctPos <= 40 ? 'var(--negative)' : 'var(--text-muted)';
      bodyHtml +=
        '<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative;" data-tooltip="' + tip + '">' +
          // avg % label — above zero for positive, below bar top for negative
          '<div style="height:' + CHART_H + 'px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;width:100%;">' +
            (isPos ? '<span style="font-family:var(--font-mono);font-size:9px;color:' + labelColor + ';margin-bottom:2px;">' + label + '</span>' : '') +
            (isPos ? '<div style="width:100%;height:' + barH + 'px;background:' + barColor + ';border-radius:2px 2px 0 0;"></div>' : '<div style="flex:1;"></div>') +
          '</div>' +
          // below-zero half
          '<div style="height:' + CHART_H + 'px;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;width:100%;">' +
            (!isPos ? '<div style="width:100%;height:' + barH + 'px;background:' + barColor + ';border-radius:0 0 2px 2px;"></div>' : '<div></div>') +
            (!isPos ? '<span style="font-family:var(--font-mono);font-size:9px;color:' + labelColor + ';margin-top:2px;">' + label + '</span>' : '') +
          '</div>' +
        '</div>';
    });
    bodyHtml += '</div></div>'; // close flex + relative container
    // Month labels + % positive row
    bodyHtml += '<div style="display:flex;gap:4px;padding:0 14px 4px;">';
    avgs.forEach((avg, i) => {
      const { pos, total } = monthYearCounts[i];
      const pctPos = total ? Math.round(pos / total * 100) : 0;
      const pctColor = pctPos >= 60 ? 'var(--positive)' : pctPos <= 40 ? 'var(--negative)' : 'var(--text-muted)';
      bodyHtml +=
        '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;">' +
          '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">' + MONTH_NAMES[i] + '</span>' +
          '<span style="font-size:9px;color:' + pctColor + ';" data-tooltip="' + pos + ' of ' + total + ' years closed positive in ' + MONTH_NAMES[i] + '">' + pctPos + '% ↑</span>' +
        '</div>';
    });
    bodyHtml += '</div>';
    bodyHtml += '<div style="padding:2px 14px 6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">bar height = avg return · % ↑ = years that closed positive</div>';
  } else {
    // ── BOX PLOT view ────────────────────────────────────────────────────────
    // SVG box plot: 12 columns, each shows p5, p25, median, p75, p95 + avg diamond + outliers
    const SVG_H = 160; // total SVG height
    const SVG_TOP = 14; // top padding for labels
    const SVG_BOT = 24; // bottom for month labels
    const PLOT_H = SVG_H - SVG_TOP - SVG_BOT; // drawable height

    function percentile(sorted, p) {
      if (sorted.length < 20) return 0;
      const idx = p / 100 * (sorted.length - 1);
      const lo = Math.floor(idx), hi = Math.ceil(idx);
      return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
    }

    // Compute box stats per month
    const boxStats = monthReturns.map(rets => {
      if (rets.length < 3) return null;
      const sorted = [...rets].sort((a, b) => a - b);
      const p5  = percentile(sorted, 5);
      const p25 = percentile(sorted, 25);
      const p50 = percentile(sorted, 50);
      const p75 = percentile(sorted, 75);
      const p95 = percentile(sorted, 95);
      const outliers = sorted.filter(r => r < p5 || r > p95);
      return { p5, p25, p50, p75, p95, outliers, n: rets.length };
    });

    // Global y-scale: all p5/p95 + outliers
    let yMin = Infinity, yMax = -Infinity;
    boxStats.forEach((s, i) => {
      if (!s) return;
      yMin = Math.min(yMin, s.p5, ...s.outliers);
      yMax = Math.max(yMax, s.p95, ...s.outliers);
      yMin = Math.min(yMin, avgs[i]);
      yMax = Math.max(yMax, avgs[i]);
    });
    // Ensure 0 is always on scale
    yMin = Math.min(yMin, 0);
    yMax = Math.max(yMax, 0);
    const yPad = (yMax - yMin) * 0.08;
    yMin -= yPad; yMax += yPad;

    function toY(v) {
      return SVG_TOP + PLOT_H - ((v - yMin) / (yMax - yMin)) * PLOT_H;
    }
    const zeroY = toY(0);

    // Each month column width
    const COL_W = (1 / 12) * 100; // percent
    const BOX_W_PCT = COL_W * 0.5;

    // Y-axis reference lines and labels
    const yAxisVals = [];
    const step = Math.ceil((yMax - yMin) / 5 / 5) * 5 || 5;
    for (let v = Math.ceil(yMin / step) * step; v <= yMax; v += step) yAxisVals.push(v);
    let svgContent = '';
    yAxisVals.forEach(v => {
      const vy = toY(v).toFixed(1);
      svgContent += `<line x1="3.5%" x2="100%" y1="${vy}" y2="${vy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
      svgContent += `<text x="2.8%" y="${(parseFloat(vy) + 3).toFixed(1)}" text-anchor="end" font-size="8" fill="rgba(180,180,200,0.35)" font-family="monospace">${v > 0 ? '+' : ''}${v}%</text>`;
    });
    // Zero line (more prominent)
    svgContent += `<line x1="0" y1="${zeroY.toFixed(1)}" x2="100%" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
    svgContent += `<text x="2.8%" y="${(parseFloat(zeroY.toFixed(1)) + 3).toFixed(1)}" text-anchor="end" font-size="8" fill="rgba(255,255,255,0.3)" font-family="monospace">0%</text>`;

    boxStats.forEach((s, i) => {
      const cx = COL_W * i + COL_W / 2; // center % of column
      const bLeft  = (cx - BOX_W_PCT / 2).toFixed(2) + '%';
      const bRight = (cx + BOX_W_PCT / 2).toFixed(2) + '%';
      const cxPct  = cx.toFixed(2) + '%';
      const avg = avgs[i];
      const isPos = avg >= 0;

      if (!s) {
        // No data — just month label
        svgContent += `<text x="${cxPct}" y="${(SVG_H - 4).toFixed(1)}" text-anchor="middle" font-size="10" fill="rgba(180,180,200,0.5)">${MONTH_NAMES[i]}</text>`;
        return;
      }

      const p5Y  = toY(s.p5).toFixed(1);
      const p25Y = toY(s.p25).toFixed(1);
      const p50Y = toY(s.p50).toFixed(1);
      const p75Y = toY(s.p75).toFixed(1);
      const p95Y = toY(s.p95).toFixed(1);
      const avgY = toY(avg).toFixed(1);
      const boxColor = isPos ? 'rgba(0,255,136,0.25)' : 'rgba(255,68,85,0.25)';
      const strokeColor = isPos ? 'rgba(0,255,136,0.7)' : 'rgba(255,68,85,0.7)';
      const avgColor = isPos ? '#00ff88' : '#ff4455';

      // Whisker lines (p5 to p95)
      svgContent += `<line x1="${cxPct}" y1="${p5Y}" x2="${cxPct}" y2="${p95Y}" stroke="${strokeColor}" stroke-width="1.5" stroke-dasharray="2,2"/>`;
      // Whisker caps
      svgContent += `<line x1="${bLeft}" y1="${p5Y}" x2="${bRight}" y2="${p5Y}" stroke="${strokeColor}" stroke-width="1.5"/>`;
      svgContent += `<line x1="${bLeft}" y1="${p95Y}" x2="${bRight}" y2="${p95Y}" stroke="${strokeColor}" stroke-width="1.5"/>`;
      // Box (p25 to p75)
      const boxTop = Math.min(parseFloat(p25Y), parseFloat(p75Y));
      const boxH = Math.abs(parseFloat(p75Y) - parseFloat(p25Y));
      svgContent += `<rect x="${bLeft}" y="${boxTop.toFixed(1)}" width="${BOX_W_PCT.toFixed(2)}%" height="${boxH.toFixed(1)}" fill="${boxColor}" stroke="${strokeColor}" stroke-width="1"/>`;
      // Median line
      svgContent += `<line x1="${bLeft}" y1="${p50Y}" x2="${bRight}" y2="${p50Y}" stroke="${strokeColor}" stroke-width="2"/>`;
      // Avg diamond overlay (avg line as a ◆ symbol)
      svgContent += `<polygon points="${cx},${(parseFloat(avgY) - 4).toFixed(1)} ${(cx + 4).toFixed(1)},${avgY} ${cx},${(parseFloat(avgY) + 4).toFixed(1)} ${(cx - 4).toFixed(1)},${avgY}" fill="${avgColor}" opacity="0.9"/>`;
      // Outlier dots
      s.outliers.forEach(o => {
        const oy = toY(o).toFixed(1);
        svgContent += `<circle cx="${cxPct}" cy="${oy}" r="2" fill="${strokeColor}" opacity="0.7"/>`;
      });
      // Month label
      svgContent += `<text x="${cxPct}" y="${(SVG_H - 4).toFixed(1)}" text-anchor="middle" font-size="10" fill="rgba(180,180,200,0.7)" font-family="monospace">${MONTH_NAMES[i]}</text>`;
      // n label
      svgContent += `<text x="${cxPct}" y="${(SVG_TOP - 2).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(180,180,200,0.4)">n=${s.n}</text>`;
    });

    bodyHtml = `<div style="padding:4px 14px 8px;">
      <svg width="100%" height="${SVG_H}" style="overflow:visible;display:block;">${svgContent}</svg>
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:6px;padding-left:2px;">
        <span data-tooltip="The interquartile range — 50% of all monthly returns fall inside this box.">▬ p25–p75 (IQR box)</span>
        <span data-tooltip="The 5th–95th percentile range — whiskers capture 90% of returns, excluding extreme outliers.">⊣⊢ p5–p95 whiskers</span>
        <span data-tooltip="The median (p50) return — half of months were above, half below this line.">— median (p50)</span>
        <span data-tooltip="The arithmetic mean return — can differ from median when large spikes skew the distribution."><span style="color:rgba(0,255,136,0.8);">◆</span> mean</span>
        <span data-tooltip="Individual returns outside the p5–p95 whisker range — rare but significant outlier months.">• outliers (&lt;p5 or &gt;p95)</span>
        <span style="margin-left:6px;border-left:1px solid rgba(255,255,255,0.1);padding-left:10px;" data-tooltip="n = number of years of data available for that calendar month.">n = years of data</span>
      </div>
    </div>`;
  }

  el.innerHTML = headerHtml + bodyHtml;

  // Wire toggle
  const toggleEl = document.getElementById('season-view-toggle');
  if (toggleEl) {
    toggleEl.addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      el._seasonViewMode = btn.dataset.view;
      _renderMonthlySeasonality(data);
    });
  }
}

function _renderAnnualPerformance(data) {
  const el = document.getElementById('daily-annual');
  if (!el || data.length < 50) { if (el) el.innerHTML = ''; return; }

  const yearMap = new Map();
  data.forEach(pt => {
    const yr = pt.date.slice(0, 4);
    if (!yearMap.has(yr)) yearMap.set(yr, { first: pt.p, last: pt.p });
    else yearMap.get(yr).last = pt.p;
  });

  const rows = [];
  for (const [yr, {first, last}] of yearMap) {
    if (first <= 0) continue;
    rows.push({ year: yr, jan: first, dec: last, pct: (last - first) / first * 100 });
  }
  rows.sort((a, b) => b.year.localeCompare(a.year));

  // Rank by annual %
  const sorted = [...rows].sort((a, b) => b.pct - a.pct);
  sorted.forEach((r, i) => { r.rank = i + 1; });
  const byYear = new Map(rows.map(r => [r.year, r]));

  const posYears = rows.filter(r => r.pct >= 0).length;
  const currentYearStr = new Date().getFullYear().toString();
  const allPcts = rows.filter(r => r.year !== currentYearStr).map(r => r.pct);
  const avgAnn = allPcts.length ? allPcts.reduce((s, v) => s + v, 0) / allPcts.length : 0;
  const best = sorted[0];
  const worst = sorted[sorted.length - 1];

  // Median (exclude current year)
  const sortedPcts = [...allPcts].sort((a, b) => a - b);
  const median = sortedPcts.length % 2 === 0
    ? (sortedPcts[sortedPcts.length / 2 - 1] + sortedPcts[sortedPcts.length / 2]) / 2
    : sortedPcts[Math.floor(sortedPcts.length / 2)];

  // Max abs pct for bar scaling
  const maxAbsPct = Math.max(...rows.map(r => Math.abs(r.pct)), 1);

  const th = (label, tip, align) =>
    '<th style="position:sticky;top:0;background:var(--bg-card);z-index:2;' + (align === 'left' ? 'text-align:left;' : '') + '"' +
    (tip ? ' data-tooltip="' + tip + '"' : '') + '>' + label + '</th>';

  let html =
    '<div style="padding:10px 14px 4px;border-bottom:1px solid var(--border);">' +
      '<div class="card-title" style="padding:0;margin-bottom:2px;" data-tooltip="Year-over-year performance using first and last close of each calendar year. Current year is partial and excluded from averages.">ANNUAL PERFORMANCE \u2014 NG=F' +
        '<span style="font-size:10px;color:var(--text-muted);font-weight:400;margin-left:6px;">' + rows.length + ' years</span>' +
      '</div>' +
      '<div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">first close of year → last close of year · current year marked PARTIAL</div>' +
    '</div>';

  html += '<div style="overflow-y:auto;max-height:360px;"><table><thead><tr>' +
    th('Year', 'Calendar year. Current year is in-progress (PARTIAL) and excluded from avg/median.', 'left') +
    th('Jan Close', 'First available close of the calendar year (USD/MMBtu).') +
    th('Dec Close', 'Last available close of the calendar year.') +
    th('Annual Δ%', 'Year-over-year % return: (Dec Close − Jan Close) / Jan Close.') +
    th('Return Bar', 'Visual magnitude of the annual return — bar width ∝ absolute return, green = positive, red = negative.') +
    th('vs Avg', 'Deviation from the historical average annual return (excludes current year). Positive = outperformed avg.') +
    th('Rank', 'All-time rank by annual return. #1 = best year on record.') +
    '</tr></thead><tbody>';

  rows.forEach(r => {
    const isCurrent = r.year === currentYearStr;
    const vsAvg = r.pct - avgAnn;
    const barW = Math.max(2, (Math.abs(r.pct) / maxAbsPct * 80)).toFixed(1);
    const barColor = r.pct >= 0 ? 'rgba(0,255,136,0.65)' : 'rgba(255,68,85,0.65)';
    const vsColor = vsAvg >= 0 ? 'var(--positive)' : 'var(--negative)';
    const rowTip = r.year + ': $' + r.jan.toFixed(3) + ' → $' + r.dec.toFixed(3) +
      ' · ' + (r.pct >= 0 ? '+' : '') + r.pct.toFixed(1) + '% · Rank #' + r.rank + '/' + rows.length +
      ' · vs avg: ' + (vsAvg >= 0 ? '+' : '') + vsAvg.toFixed(1) + '%' +
      (isCurrent ? ' · PARTIAL YEAR (in progress)' : '');
    html += '<tr data-tooltip="' + rowTip + '">' +
      '<td style="text-align:left;font-weight:600;">' + r.year +
        (isCurrent ? '<span style="font-size:9px;color:var(--accent-hh);margin-left:6px;font-weight:400;font-family:var(--font-mono);">PARTIAL</span>' : '') +
      '</td>' +
      '<td style="font-family:var(--font-mono);color:var(--text-secondary);">$' + r.jan.toFixed(3) + '</td>' +
      '<td style="font-family:var(--font-mono);color:var(--text-secondary);">$' + r.dec.toFixed(3) + '</td>' +
      '<td class="' + (r.pct >= 0 ? 'positive' : 'negative') + '" style="font-weight:600;">' + (r.pct >= 0 ? '+' : '') + r.pct.toFixed(1) + '%</td>' +
      '<td>' +
        '<div style="width:' + barW + 'px;height:6px;background:' + barColor + ';border-radius:2px;display:inline-block;vertical-align:middle;"></div>' +
      '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11px;color:' + vsColor + ';">' +
        (isCurrent ? '<span style="color:var(--text-muted);">—</span>' : (vsAvg >= 0 ? '+' : '') + vsAvg.toFixed(1) + '%') +
      '</td>' +
      '<td style="color:var(--text-muted);font-size:11px;">#' + r.rank + '<span style="font-size:9px;">/' + rows.length + '</span></td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  html +=
    '<div style="padding:8px 14px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;display:flex;gap:16px;flex-wrap:wrap;color:var(--text-muted);">' +
      '<span data-tooltip="Arithmetic mean of annual returns — excludes current partial year.">Avg: <strong style="color:var(--text-primary);">' + (avgAnn >= 0 ? '+' : '') + avgAnn.toFixed(1) + '%</strong></span>' +
      '<span data-tooltip="Median annual return — less sensitive to outliers like 2000\'s +358%.">Median: <strong style="color:var(--text-primary);">' + (median >= 0 ? '+' : '') + median.toFixed(1) + '%</strong></span>' +
      '<span data-tooltip="Best single calendar year on record.">Best: <strong style="color:var(--positive);">' + (best.pct >= 0 ? '+' : '') + best.pct.toFixed(1) + '% (' + best.year + ')</strong></span>' +
      '<span data-tooltip="Worst single calendar year on record.">Worst: <strong style="color:var(--negative);">' + worst.pct.toFixed(1) + '% (' + worst.year + ')</strong></span>' +
      '<span data-tooltip="Number of calendar years with a positive annual return.">Pos: <strong style="color:var(--positive);">' + posYears + '/' + rows.length + '</strong></span>' +
    '</div>';

  el.innerHTML = html;
}

/* ─── Feature 1: Conditional Probability / Streak Table (Daily Tracker) ─── */
function _renderStreakTable(data) {
  const el = document.getElementById('daily-streak');
  if (!el || !data || data.length < 100) {
    if (el) el.innerHTML = '';
    return;
  }

  // ── Month filter state ──────────────────────────────────────────────────────
  // Store selected month on the element so re-renders are stable
  if (!el._streakMonth) el._streakMonth = 'ALL';
  const selMonth = el._streakMonth;

  // ── Compute daily changes ───────────────────────────────────────────────────
  // Each point in daily data: { date: 'YYYY-MM-DD', p: number }
  const dailyChanges = [];
  for (let i = 1; i < data.length; i++) {
    const ret = (data[i].p - data[i - 1].p) / data[i - 1].p * 100;
    const calMonth = parseInt(data[i].date.slice(5, 7), 10); // 1-12
    if (Number.isFinite(ret)) dailyChanges.push({ ret, month: calMonth });
  }

  // ── Build weekly closes ─────────────────────────────────────────────────────
  // Group into ISO-week buckets (Sun-start: split on day===1, Mon)
  const weeklyChanges = [];
  {
    let weekBuckets = [];
    let curWeek = [];
    let prevMonday = null;
    data.forEach(pt => {
      const d = new Date(pt.date + 'T00:00:00Z');
      const dow = d.getUTCDay(); // 0=Sun
      if (dow === 1 && curWeek.length > 0) {
        weekBuckets.push(curWeek);
        curWeek = [];
      }
      curWeek.push(pt);
    });
    if (curWeek.length > 0) weekBuckets.push(curWeek);

    for (let i = 1; i < weekBuckets.length; i++) {
      const prev = weekBuckets[i - 1];
      const curr = weekBuckets[i];
      const prevClose = prev[prev.length - 1].p;
      const currClose = curr[curr.length - 1].p;
      const ret = (currClose - prevClose) / prevClose * 100;
      const calMonth = parseInt(curr[curr.length - 1].date.slice(5, 7), 10);
      if (Number.isFinite(ret)) weeklyChanges.push({ ret, month: calMonth });
    }
  }

  // ── Core streak computation ─────────────────────────────────────────────────
  // Returns { up: { 1: [], ... }, down: { 1: [], ... } } for streak lengths 1-maxStreak
  function computeStreakStats(changes, maxStreak, monthFilter) {
    if (changes.length < maxStreak + 2) return null;

    const buckets = { up: {}, down: {} };
    for (let n = 1; n <= maxStreak; n++) {
      buckets.up[n] = [];
      buckets.down[n] = [];
    }

    // Walk vertically through the unfiltered changes array tracking true chronological streaks.
    let streakDir = null; // 'up' or 'down'
    let streakLen = 0;

    for (let i = 0; i < changes.length - 1; i++) {
      const dir = changes[i].ret >= 0 ? 'up' : 'down';
      if (dir === streakDir) {
        streakLen++;
      } else {
        streakDir = dir;
        streakLen = 1;
      }
      
      // The period whose return we are predicting
      const targetMonth = changes[i].month;

      // Only record the stat if the *current* period is in the scoped month (or if ALL)
      // This means "if today is in May, and today ends a 3-day down streak, what is tomorrow's return?"
      if (monthFilter === 'ALL' || targetMonth === monthFilter) {
        const nextRet = changes[i + 1].ret;
        for (let n = 1; n <= Math.min(streakLen, maxStreak); n++) {
          buckets[dir][n].push(nextRet);
        }
      }
    }
    return buckets;
  }

  // ── Compute summary stats from an array of returns ──────────────────────────
  function streakSummary(rets) {
    if (!rets || rets.length < 20) return null;
    const sorted = [...rets].sort((a, b) => a - b);
    const n = sorted.length;
    const median = n % 2 === 0
      ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2
      : sorted[Math.floor(n / 2)];
    const avg = rets.reduce((s, r) => s + r, 0) / n;
    const pctUp = Math.round(rets.filter(r => r >= 0).length / n * 100);
    return { n, median, avg, pctUp };
  }

  const monthNum = selMonth === 'ALL' ? 'ALL' : parseInt(selMonth, 10);
  const dailyBuckets = computeStreakStats(dailyChanges, 5, monthNum);
  const weeklyBuckets = computeStreakStats(weeklyChanges, 4, monthNum);

  // ── Render one streak sub-table ─────────────────────────────────────────────
  const LOW_N = 15;
  function renderStreakRows(buckets, maxLen) {
    if (!buckets) return '<tr><td colspan="6" style="color:var(--text-muted);text-align:center;padding:12px;">Insufficient data</td></tr>';
    let rows = '';
    ['up', 'down'].forEach(dir => {
      for (let n = 1; n <= maxLen; n++) {
        const rets = buckets[dir][n];
        const st = streakSummary(rets);
        if (!st) continue;
        const lowN = st.n < LOW_N;
        const dimStyle = lowN ? 'opacity:0.55;' : '';
        const flag = lowN ? `<span data-tooltip="Low sample: only ${st.n} instances found (threshold: ${LOW_N}). Pattern may not be statistically meaningful — interpret with caution." style="color:var(--warning);font-size:10px;cursor:help;"> *</span>` : '';
        const dirLabel = dir === 'up'
          ? `<span style="color:var(--positive);">▲</span> ${n}× Up`
          : `<span style="color:var(--negative);">▼</span> ${n}× Down`;
        const pctUp = st.pctUp;
        const pctDn = 100 - pctUp;
        const edge = pctUp - 50;
        // Edge bar: deviation from 50% baseline, max visual width 54px for ±30%
        const edgeBarW = Math.min(Math.abs(edge) / 30 * 54, 54);
        const edgeColor = edge >= 0 ? 'var(--positive)' : 'var(--negative)';
        const pctUpColor = pctUp >= 60 ? 'var(--positive)' : pctUp <= 40 ? 'var(--negative)' : 'var(--text-secondary)';
        const pctDnColor = pctDn >= 60 ? 'var(--positive)' : pctDn <= 40 ? 'var(--negative)' : 'var(--text-secondary)';
        const edgeBar = `<div style="display:flex;align-items:center;gap:5px;justify-content:center;">
          <span style="color:${pctUpColor};font-family:var(--font-mono);min-width:32px;text-align:right;">${pctUp}%</span>
          <div style="position:relative;width:54px;height:6px;background:var(--bg-page);border-radius:3px;overflow:hidden;" title="">
            <div style="position:absolute;top:0;${edge >= 0 ? 'left:50%' : `left:calc(50% - ${edgeBarW}px)`};width:${edgeBarW}px;height:100%;background:${edgeColor};border-radius:3px;"></div>
            <div style="position:absolute;top:0;left:50%;width:1px;height:100%;background:var(--border);"></div>
          </div>
          <span style="color:${edgeColor};font-family:var(--font-mono);font-size:10px;min-width:28px;">${edge >= 0 ? '+' : ''}${edge}%</span>
        </div>`;
        // Return bars: ±5% max visual width 36px
        const maxRet = 5;
        const medBarW = Math.min(Math.abs(st.median) / maxRet * 36, 36);
        const avgBarW = Math.min(Math.abs(st.avg) / maxRet * 36, 36);
        const medColor = st.median >= 0 ? 'var(--positive)' : 'var(--negative)';
        const avgColor = st.avg >= 0 ? 'var(--positive)' : 'var(--negative)';
        const medCell = `<div style="display:flex;align-items:center;gap:4px;justify-content:center;">
          <span style="color:${medColor};font-family:var(--font-mono);min-width:44px;text-align:right;">${st.median >= 0 ? '+' : ''}${st.median.toFixed(2)}%</span>
          <div style="position:relative;width:36px;height:5px;background:var(--bg-page);border-radius:2px;overflow:hidden;">
            <div style="position:absolute;top:0;${st.median >= 0 ? 'left:0' : `left:calc(100% - ${medBarW}px)`};width:${medBarW}px;height:100%;background:${medColor};border-radius:2px;"></div>
          </div>
        </div>`;
        const avgCell = `<div style="display:flex;align-items:center;gap:4px;justify-content:center;">
          <span style="color:${avgColor};font-family:var(--font-mono);min-width:44px;text-align:right;">${st.avg >= 0 ? '+' : ''}${st.avg.toFixed(2)}%</span>
          <div style="position:relative;width:36px;height:5px;background:var(--bg-page);border-radius:2px;overflow:hidden;">
            <div style="position:absolute;top:0;${st.avg >= 0 ? 'left:0' : `left:calc(100% - ${avgBarW}px)`};width:${avgBarW}px;height:100%;background:${avgColor};border-radius:2px;"></div>
          </div>
        </div>`;
        const periodLabel = maxLen <= 4 ? 'week' : 'day';
        const rowTip = `After ${n} consecutive ${dir} ${periodLabel}${n > 1 ? 's' : ''}: next ${periodLabel} was positive ${pctUp}% of the time (${edge >= 0 ? '+' : ''}${edge}% edge vs random 50/50). Median next return: ${st.median >= 0 ? '+' : ''}${st.median.toFixed(2)}%. Mean: ${st.avg >= 0 ? '+' : ''}${st.avg.toFixed(2)}%. Sample: n=${st.n} instances.${lowN ? ' Low sample — treat with caution.' : ''}`;
        rows += `<tr style="${dimStyle}" data-tooltip="${rowTip.replace(/"/g, '&quot;')}">
          <td style="text-align:left;">${dirLabel}${flag}</td>
          <td style="font-family:var(--font-mono);text-align:center;">${st.n}</td>
          <td style="text-align:center;">${edgeBar}</td>
          <td style="color:${pctDnColor};font-family:var(--font-mono);text-align:center;">${pctDn}%</td>
          <td style="text-align:center;">${medCell}</td>
          <td style="text-align:center;">${avgCell}</td>
        </tr>`;
      }
    });
    return rows;
  }

  function tableHtml(title, rows) {
    return `
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px;">${title}</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;min-width:520px;">
          <thead><tr>
            <th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Streak type and length. ▲ = consecutive up periods, ▼ = consecutive down periods. N× = number of consecutive periods in the streak. * = low sample (n &lt; 15).">Streak</th>
            <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Number of historical instances matching this exact streak pattern. Larger N = more statistically reliable. Rows with n &lt; 15 are dimmed and flagged with *.">N</th>
            <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="% of next periods that were positive (up) after this streak. The bar shows deviation from 50% (random baseline) — longer bar = stronger historical edge. Green = bullish bias, red = bearish bias.">Next ↑ &amp; Edge</th>
            <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="% of next periods that were negative (down) after this streak. Always equals 100% minus Next ↑.">Next ↓</th>
            <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Median next-period return after this streak. The middle value of all observed next-period moves — less sensitive to outlier sessions than the mean. Bar shows magnitude (max visual = ±5%).">Med Return</th>
            <th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="Mean (average) next-period return after this streak. Sensitive to outlier sessions — compare with the median to spot skew. Bar shows magnitude (max visual = ±5%).">Avg Return</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── Month filter dropdown ───────────────────────────────────────────────────
  const MONTH_NAMES_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthOptions = ['<option value="ALL"' + (selMonth === 'ALL' ? ' selected' : '') + '>All Months</option>']
    .concat(MONTH_NAMES_SHORT.map((m, i) => {
      const v = String(i + 1);
      return `<option value="${v}"${selMonth === v ? ' selected' : ''}>${m}</option>`;
    })).join('');

  const dailyRows = renderStreakRows(dailyBuckets, 5);
  const weeklyRows = renderStreakRows(weeklyBuckets, 4);

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 14px 6px;border-bottom:1px solid var(--border);">
      <div>
        <div class="card-title" style="padding:0;margin-bottom:2px;" data-tooltip="After N consecutive up or down days/weeks, what has historically happened next? Shows % of next-period up moves, median and average next-period return, and sample size. Filter by calendar month to see seasonal streak tendencies.">CONDITIONAL STREAK PROBABILITIES — NG=F</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">
          Given N consecutive up/down periods, how often is the next period up vs. down?
          &nbsp;·&nbsp; * = n &lt; ${LOW_N} (low sample)
        </div>
      </div>
      <select id="streak-month-filter" style="font-size:12px;padding:4px 8px;">${monthOptions}</select>
    </div>
    ${tableHtml(`Daily Streaks (1–5 consecutive days) · full history ${selMonth === 'ALL' ? '' : '· ' + MONTH_NAMES_SHORT[parseInt(selMonth,10)-1] + ' only'}`, dailyRows)}
    <div style="height:1px;background:var(--border);margin:0 14px;"></div>
    ${tableHtml(`Weekly Streaks (1–4 consecutive weeks) · full history ${selMonth === 'ALL' ? '' : '· ' + MONTH_NAMES_SHORT[parseInt(selMonth,10)-1] + ' only'}`, weeklyRows)}
    <div style="padding:6px 14px;font-size:10px;color:var(--text-muted);font-family:var(--font-mono);border-top:1px solid var(--border);">
      ⓘ Based on ${dailyChanges.length.toLocaleString()} daily sessions · ${weeklyChanges.length.toLocaleString()} weeks · historical observation counts, not predictions
    </div>`;

  // Wire up month filter — re-render in place without rebuilding the whole daily tracker
  const filterEl = document.getElementById('streak-month-filter');
  if (filterEl) {
    filterEl.addEventListener('change', function() {
      el._streakMonth = this.value;
      _renderStreakTable(data);
    });
  }
}
</script>

<script>
// ─── GLOBAL CROSS-TAB NAVIGATION ─────────────────────────────────────────────
function navigateTo(tab, params) {
  params = params || {};
  // Map tab name to the tab button data-tab attribute
  const tabMap = {
    prices: 'prices',
    spread: 'spread',
    curve: 'curve',
    expiry: 'expiry',
    daily: 'daily',
  };
  const tabId = tabMap[tab] || tab;

  // Click the nav tab button to switch tabs (uses existing tab switching logic)
  const btn = document.querySelector('.tab-btn[data-tab="' + tabId + '"]');
  if (btn) btn.click();

  // After tab renders, apply params
  requestAnimationFrame(() => {
    if (tab === 'prices' && params.month && params.year) {
      // Update STATE.priceView directly (reliable path regardless of element IDs)
      const market = params.market || 'hh';
      STATE.priceView.instrument = market;
      STATE.priceView.month = params.month;
      STATE.priceView.year = parseInt(params.year, 10) || STATE.priceView.year;
      // Reset view window so chart shows the full contract
      STATE.priceView.rangeStart = 0;
      STATE.priceView.rangeEnd = null;
      // Re-render controls and chart
      if (typeof renderPricesControls === 'function') renderPricesControls();
      if (typeof schedulePricesChartUpdate === 'function') schedulePricesChartUpdate();
    }
  });
}

</script>

<script>
init();
</script>

<!-- Global Tooltip Anchor -->
<div id="global-tooltip"></div>

<script>
(function() {
  const tt = document.getElementById('global-tooltip');
  let hideTimer = null;

  document.addEventListener('mouseover', function(e) {
    const target = e.target.closest('[data-tooltip]');
    if (!target) return;
    const text = target.getAttribute('data-tooltip');
    if (!text) return;
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    tt.textContent = text;
    tt.classList.add('visible');
    const rect = target.getBoundingClientRect();
    const GAP = 12;
    // Force reflow so offsetWidth/Height are accurate
    tt.style.top = '-9999px'; tt.style.left = '-9999px';
    let left = rect.left + rect.width / 2 - tt.offsetWidth / 2;
    let top = rect.top - tt.offsetHeight - GAP;
    if (top < 8) top = rect.bottom + GAP;
    if (left < 8) left = 8;
    if (left + tt.offsetWidth > window.innerWidth - 8) left = window.innerWidth - tt.offsetWidth - 8;
    tt.style.top = top + 'px';
    tt.style.left = left + 'px';
  });

  document.addEventListener('mouseout', function(e) {
    if (e.target.closest('[data-tooltip]')) {
      hideTimer = setTimeout(() => tt.classList.remove('visible'), 80);
    }
  });
})();
</script>
