function _flyPopulateYear() {
  const front = document.getElementById('fly-front')?.value || 'Jan';
  const mid   = document.getElementById('fly-mid')?.value   || 'Feb';
  const back  = document.getElementById('fly-back')?.value  || 'Mar';
  const sel   = document.getElementById('fly-year');
  if (!sel) return;

  const yearsSet = new Set();
  [front, mid, back].forEach(m => {
    const store = STATE.hh[m];
    if (!store) return;
    Object.keys(store.contracts).forEach(t => {
      const yr = parseInt(t.slice(-2));
      yearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });

  const years = [...yearsSet].sort((a, b) => b - a);
  const curYear = new Date().getFullYear();
  const prevVal = sel.value ? parseInt(sel.value) : curYear;
  sel.innerHTML = years.map(y => `<option value="${y}" ${y === prevVal ? 'selected':''}>${y}</option>`).join('');
  if (!sel.value && years.length) sel.value = String(years[0]);
}

function _flyUpdate() {
  const front = document.getElementById('fly-front')?.value || 'Jan';
  const mid   = document.getElementById('fly-mid')?.value   || 'Feb';
  const back  = document.getElementById('fly-back')?.value  || 'Mar';
  const year  = parseInt(document.getElementById('fly-year')?.value);
  if (!year) return;

  const result = computeButterfly(front, mid, back, year);
  const chartEl = document.getElementById('fly-chart-container');
  const statsEl = document.getElementById('fly-stats');

  // ── Stats ────────────────────────────────────────────────────────────────
  const pts = result.points;
  const unit = '$/MMBtu';
  const fmt = v => Number.isFinite(v) ? (v >= 0 ? '+' : '') + v.toFixed(3) : '—';
  const fmtAbs = v => Number.isFinite(v) ? v.toFixed(3) : '—';

  // All-history reference (all years for this fly combo)
  let allVals = [];
  const allYearsSet = new Set();
  [front, mid, back].forEach(m => {
    if (STATE.hh[m]) Object.keys(STATE.hh[m].contracts).forEach(t => {
      const yr = parseInt(t.slice(-2)); allYearsSet.add(yr < 50 ? 2000 + yr : 1900 + yr);
    });
  });
  allYearsSet.forEach(yr => {
    if (yr === year) return;
    const r = computeButterfly(front, mid, back, yr);
    r.points.forEach(p => allVals.push(p.value));
  });
  const allAvg  = allVals.length ? allVals.reduce((s,v) => s+v, 0) / allVals.length : null;
  const allMin  = allVals.length ? Math.min(...allVals) : null;
  const allMax  = allVals.length ? Math.max(...allVals) : null;

  // 5Y reference (5 prior years max)
  const priorYears = [...allYearsSet].filter(y => y < year).sort((a,b)=>b-a).slice(0,5);
  let vals5y = [];
  priorYears.forEach(yr => {
    const r = computeButterfly(front, mid, back, yr);
    r.points.forEach(p => vals5y.push(p.value));
  });
  const avg5y = vals5y.length ? vals5y.reduce((s,v) => s+v, 0) / vals5y.length : null;

  const last = pts.length ? pts[pts.length - 1] : null;
  const curr = last ? last.value : null;
  const delta5y = (curr != null && avg5y != null) ? curr - avg5y : null;
  const deltaAll = (curr != null && allAvg != null) ? curr - allAvg : null;

  const priorYearsLabel = priorYears.length
    ? `${priorYears[priorYears.length - 1]}–${priorYears[0]}`
    : 'N/A';
  const allYearsLabel = [...allYearsSet].filter(y => y !== year).sort((a,b) => a - b);
  const allYearsRange = allYearsLabel.length
    ? `${allYearsLabel[0]}–${allYearsLabel[allYearsLabel.length - 1]}`
    : 'N/A';
  const lastDate = last ? last.date : null;

  const chip = (label, val, color = 'var(--text-primary)', tip = '') =>
    `<div class="stat" ${tip ? `data-tooltip="${tip}"` : ''}>` +
    `<div class="stat-label">${label}</div>` +
    `<div style="font-family:var(--font-mono);font-size:13px;color:${color};">${val}</div></div>`;
  const sep = `<div style="height:1px;background:var(--border);margin:4px 0;"></div>`;

  statsEl.innerHTML = [
    chip('Fly Formula', `${front} + ${back} − 2×${mid}`, 'var(--text-muted)',
      `Butterfly = Front (${front}) + Back (${back}) − 2×Middle (${mid}). Positive = wings trade above belly; negative = belly above wings.`),
    chip('Current', curr != null ? fmt(curr) + ' ' + unit : '—',
      curr != null ? (curr >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)',
      `Last computed butterfly value for ${year}${lastDate ? ' on ' + lastDate : ''}. Calculated as ${front} + ${back} − 2×${mid} at that date.`),
    sep,
    chip('5Y Avg', avg5y != null ? fmt(avg5y) : '—', 'var(--text-secondary)',
      `Mean butterfly value across all points in the ${priorYears.length} prior years (${priorYearsLabel}). Used as the seasonal reference line on the chart.`),
    chip('vs 5Y', delta5y != null ? fmt(delta5y) : '—',
      delta5y != null ? (delta5y >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)',
      `Current minus 5Y average (${priorYearsLabel}): ${curr != null ? fmt(curr) : '—'} − ${avg5y != null ? fmt(avg5y) : '—'}. Positive = current year is structurally richer than the prior 5Y mean.`),
    sep,
    chip('All-Time Avg', allAvg != null ? fmt(allAvg) : '—', 'var(--text-secondary)',
      `Mean butterfly value across all available history (${allYearsRange}), excluding the selected year. Longer-term structural reference.`),
    chip('All-Time Range', (allMin != null && allMax != null) ? `${fmtAbs(allMin)} – ${fmtAbs(allMax)}` : '—', 'var(--text-muted)',
      `Minimum to maximum butterfly value ever recorded (${allYearsRange}). Context for how extreme today's reading is in historical terms.`),
    chip('vs All-Time', deltaAll != null ? fmt(deltaAll) : '—',
      deltaAll != null ? (deltaAll >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-muted)',
      `Current minus all-time average (${allYearsRange}): ${curr != null ? fmt(curr) : '—'} − ${allAvg != null ? fmt(allAvg) : '—'}.`),
    chip('Data Points', String(pts.length), 'var(--text-secondary)',
      `Number of calendar dates where all three legs (${front}, ${mid}, ${back}) had a price for the ${year} contracts. Gaps cause days to be skipped.`),
  ].join('');

  // ── Chart ─────────────────────────────────────────────────────────────────
  if (!pts.length) { chartEl.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-family:var(--font-mono);font-size:12px;">No data for this fly combination / year</div>'; return; }

  const chart = createManagedChart('fly', 'main', chartEl);
  const palette = getNeutralChartPalette();

  // Zero baseline
  const zeroSeries = chart.addLineSeries({
    color: palette.zero, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  zeroSeries.setData([
    { time: dayToTime(pts[0].d), value: 0 },
    { time: dayToTime(pts[pts.length - 1].d), value: 0 },
  ]);

  // 5Y avg reference line
  if (avg5y != null) {
    const avg5ySeries = chart.addLineSeries({
      color: 'rgba(167,139,250,0.35)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
    avg5ySeries.setData([
      { time: dayToTime(pts[0].d), value: avg5y },
      { time: dayToTime(pts[pts.length - 1].d), value: avg5y },
    ]);
  }

  const mainSeries = chart.addLineSeries({
    color: '#a78bfa', lineWidth: 2,
    priceLineVisible: true, lastValueVisible: true, crosshairMarkerVisible: true,
    crosshairMarkerRadius: 4,
  });
  mainSeries.setData(pts.map(p => ({ time: dayToTime(p.d), value: p.value })));

  // Chart tooltip
  const ptLookup = new Map(pts.map(p => [dayToTime(p.d), p]));
  attachChartTooltip({
    chart,
    container: chartEl,
    titleColor: '#a78bfa',
    seriesConfigs: [{
      series: mainSeries,
      label: `${front} + ${back} − 2×${mid}`,
      color: '#a78bfa',
      emphasis: true,
      getPoint: param => ptLookup.get(typeof param.time === 'string' ? param.time : ''),
      formatValue: v => `${v >= 0 ? '+' : ''}${v.toFixed(3)} $/MMBtu`,
    }],
    getTitle: param => {
      const pt = ptLookup.get(typeof param.time === 'string' ? param.time : '');
      return pt ? `${pt.date} · T-Day ${pt.d}` : 'Butterfly';
    },
    getMetrics: param => {
      const pt = ptLookup.get(typeof param.time === 'string' ? param.time : '');
      if (!pt) return [];
      const m = [];
      if (avg5y != null) {
        m.push({ label: `5Y Avg (${priorYearsLabel})`, value: `${avg5y >= 0 ? '+' : ''}${avg5y.toFixed(3)}` });
        const d5 = pt.value - avg5y;
        m.push({ label: 'vs 5Y', value: `<span style="color:${d5 >= 0 ? 'var(--positive)' : 'var(--negative)'};">${d5 >= 0 ? '+' : ''}${d5.toFixed(3)}</span>` });
      }
      if (allAvg != null) {
        const dAll = pt.value - allAvg;
        m.push({ label: `All-Time Avg (${allYearsRange})`, value: `${allAvg >= 0 ? '+' : ''}${allAvg.toFixed(3)}` });
        m.push({ label: 'vs All-Time', value: `<span style="color:${dAll >= 0 ? 'var(--positive)' : 'var(--negative)'};">${dAll >= 0 ? '+' : ''}${dAll.toFixed(3)}</span>` });
      }
      return m;
    },
    getNote: param => {
      const pt = ptLookup.get(typeof param.time === 'string' ? param.time : '');
      if (!pt) return '';
      return `Formula: ${front} + ${back} − 2×${mid} · T-Day ${pt.d}`;
    },
  });

  applyChartTimeScaleOptions(chart, {});
  chart.timeScale().fitContent();
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TAB 5: FORWARD CURVE
     ═══════════════════════════════════════════════════════════ -->
<script>
function getForwardCurveStatusHtml() {
  const hhLive = STATE.hhLiveCount || 0;
  const ttfLive = STATE.ttfLiveCount || 0;
  const totalLive = hhLive + ttfLive;

  const getBadge = (used, stale, age, market) => {
    if (!used) return '';
    const color = stale ? 'var(--negative)' : 'var(--warning)';
    const text = stale ? 'STALE' : 'CACHED';
    const sym = stale ? '\u26A0' : '\u231B';
    const tip = stale
      ? `${market} data is stale — loaded from browser cache ${age}h ago. Prices may not reflect the latest market. Refresh the page to attempt a new fetch.`
      : `${market} prices loaded from browser cache (${age}h old) rather than a live Yahoo Finance fetch. Prices are recent but may not be real-time.`;
    return `<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid ${color};color:${color};margin-right:4px;font-weight:700;" data-tooltip="${tip}">${sym} ${text}</span>`;
  };

  const hhBadge = getBadge(STATE.hhCacheUsed, STATE.hhCacheIsStale, STATE.hhCacheAgeH, 'Henry Hub');
  const ttfBadge = getBadge(STATE.ttfCacheUsed, STATE.ttfCacheIsStale, STATE.ttfCacheAgeH, 'Dutch TTF');

  let html = `<span data-tooltip="Number of Henry Hub (NYMEX) monthly contracts with live quotes out of the maximum 72-month strip.">${hhBadge}HH: ${hhLive}/72</span>`
    + ` · <span data-tooltip="Number of Dutch TTF (ICE) monthly contracts with live quotes out of the maximum 36-month strip.">${ttfBadge}TTF: ${ttfLive}/36 quoted</span>`;
  if (totalLive < 20 && totalLive > 0 && !STATE.hhCacheUsed && !STATE.ttfCacheUsed) {
    html = `<span style="color:var(--warning);font-weight:700;" data-tooltip="Fewer than 20 contracts quoted — the strip may be loading or market data is limited. Wait a moment and refresh if the count remains low.">\u26A0 PARTIAL DATA</span> \u2014 ` + html;
  }
  return html;
}

function getCurveSeason(monthIdx) {
  if ([10, 11, 0, 1].includes(monthIdx)) return 'winter';
  if ([4, 5, 6, 7].includes(monthIdx)) return 'summer';
  return 'shoulder';
}

function buildCurveSlot(baseDate, offset, instrument = 'hh') {
  const d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, 1);
  const yr = d.getFullYear();
  const monthIdx = d.getMonth();
  const month = MONTHS[monthIdx];
  const yy = yr % 100;
  const pad = yy < 10 ? '0' + yy : '' + yy;
  const prefix = instrument === 'ttf' ? 'TG' : 'NG';
  const ticker = `${prefix}${MONTH_CODES[month]}${pad}`;
  
  // Robust Priority chain: 
  // 1. Live Yahoo fetch
  const liveTicker = instrument === 'ttf' ? 'TTF' + ticker.slice(2) + '.NYM' : ticker + '.NYM';
  const liveDataExists = STATE.liveData[liveTicker] && STATE.liveData[liveTicker].length > 0;
  
  // 2. Historical local data
  const histData = (instrument === 'ttf' ? STATE.ttf : STATE.hh)[month]?.contracts?.[ticker];
  const histDataExists = histData && histData.length > 0;

  let source = 'missing';
  let last = null;

  if (liveDataExists) {
    source = 'live';
    // Read last price directly from raw Yahoo data.  getContractData/getTTFContractData
    // filter out points before the 519-day lifecycle window, which makes pre-window
    // contracts (>519 trading days from expiry) return [] and appear unquoted on the
    // curve.  The Forward Curve only needs the last traded price, so bypass the filter.
    const rawLive = STATE.liveData[liveTicker];
    last = rawLive && rawLive.length ? rawLive[rawLive.length - 1] : null;
  } else if (histDataExists) {
    source = 'historical';
    last = histData[histData.length - 1] || null;
  }

  return {
    ticker,
    month,
    year: yr,
    monthIdx,
    season: getCurveSeason(monthIdx),
    label: `${month.slice(0, 3)} ${String(yr).slice(2)}`,
    price: last && Number.isFinite(last.p) ? last.p : null,
    quoteDate: last && last.date ? last.date : null,
    pointCount: last ? 1 : 0,
    source,
  };
}

function isCurveQuoteFresh(slot, latestQuoteStamp) {
  if (!slot || !slot.quoteDate || !Number.isFinite(slot.price)) return false;
  if (!latestQuoteStamp) return true;
  const slotStamp = timeToStamp(slot.quoteDate);
  if (!slotStamp) return false;
  return ((latestQuoteStamp - slotStamp) / 86400000) <= FORWARD_CURVE_FRESHNESS_DAYS;
}

function summarizeCurveLabels(items, limit = 5) {
  const labels = (items || [])
    .map(item => typeof item === 'string' ? item : item.label)
    .filter(Boolean);
  if (!labels.length) return '';
  if (labels.length <= limit) return labels.join(', ');
  return `${labels.slice(0, limit).join(', ')} +${labels.length - limit} more`;
}

function formatCurveValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(3)}` : 'N/A';
}

function formatCurveAxisValue(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function formatCurvePointLabel(value) {
  return Number.isFinite(value) ? `$${value.toFixed(2)}` : '';
}

function teardownCurveAnnotations() {
  if (STATE._curveAnnotationFrame) {
    cancelAnimationFrame(STATE._curveAnnotationFrame);
    STATE._curveAnnotationFrame = null;
  }
  if (STATE._curveResizeObserver) {
    STATE._curveResizeObserver.disconnect();
    STATE._curveResizeObserver = null;
  }
  if (STATE._curveTimeRangeListener && STATE._curveChart) {
    try {
      STATE._curveChart.timeScale().unsubscribeVisibleTimeRangeChange(STATE._curveTimeRangeListener);
      STATE._curveChart.timeScale().unsubscribeVisibleLogicalRangeChange(STATE._curveTimeRangeListener);
    } catch (_) {}
    STATE._curveTimeRangeListener = null;
  }
}

function ensureCurveAnnotationLayer(container) {
  if (!container) return null;
  let layer = container.querySelector('.curve-annotation-layer');
  if (!layer) {
    layer = document.createElement('div');
    layer.className = 'curve-annotation-layer';
    container.appendChild(layer);
  }
  return layer;
}

function bindCurveAnnotations(chart, container) {
  teardownCurveAnnotations();
  const rerender = () => scheduleCurveAnnotationRender();
  STATE._curveTimeRangeListener = rerender;
  chart.timeScale().subscribeVisibleTimeRangeChange(rerender);
  chart.timeScale().subscribeVisibleLogicalRangeChange(rerender);
  if (typeof ResizeObserver === 'function' && container) {
    const observer = new ResizeObserver(() => scheduleCurveAnnotationRender());
    observer.observe(container);
    STATE._curveResizeObserver = observer;
  }
}

function scheduleCurveAnnotationRender() {
  if (STATE._curveAnnotationFrame) cancelAnimationFrame(STATE._curveAnnotationFrame);
  STATE._curveAnnotationFrame = requestAnimationFrame(() => {
    STATE._curveAnnotationFrame = null;
    renderCurveAnnotations();
  });
}

function isCurveTurningPoint(points, index) {
  if (!Array.isArray(points) || index <= 0 || index >= points.length - 1) return false;
  const prev = points[index - 1] && points[index - 1].slot ? points[index - 1].slot.price : null;
  const curr = points[index] && points[index].slot ? points[index].slot.price : null;
  const next = points[index + 1] && points[index + 1].slot ? points[index + 1].slot.price : null;
  if (![prev, curr, next].every(Number.isFinite)) return false;
  const isPeak = curr >= prev && curr >= next && (curr > prev || curr > next);
  const isTrough = curr <= prev && curr <= next && (curr < prev || curr < next);
  return isPeak || isTrough;
}

function renderCurveAnnotations() {
  const chart = STATE._curveChart;
  const series = STATE._curveSeries;
  const windowContext = STATE._curveWindowContext;
  // Guard: windowSlots may be undefined on first render before syncCurveRangeFooter
  const slots = (windowContext && Array.isArray(windowContext.windowSlots) && windowContext.windowSlots.length > 0)
    ? windowContext.windowSlots
    : (Array.isArray(STATE._curveSlots) && STATE._curveSlots.length > 0 ? STATE._curveSlots : []);
  const container = document.getElementById('curve-chart-container');
  const layer = ensureCurveAnnotationLayer(container);
  if (!layer) return;

  if (!chart || !series || !slots.length) {
    layer.innerHTML = '';
    return;
  }

  const width = container.clientWidth || 0;
  const height = container.clientHeight || 0;
  // Clamp bottomInset so dots don't float too high on compact/narrow viewports
  const bottomInset = Math.max(20, Math.min(40, height * 0.06));
  // Keep annotations within the plot area (exclude price scale on right, ~72px)
  const plotRight = width - 72;
  const visiblePoints = slots
    .filter(slot => Number.isFinite(slot.price))
    .map(slot => ({
      slot,
      x: chart.timeScale().timeToCoordinate(slot.time),
      y: series.priceToCoordinate(slot.price),
    }))
    .filter(point =>
      Number.isFinite(point.x) &&
      Number.isFinite(point.y) &&
      point.x >= -24 &&
      point.x <= plotRight + 24 &&
      point.y >= -24 &&
      point.y <= height + 24
    );

  if (!visiblePoints.length) {
    layer.innerHTML = '';
    return;
  }

  const spacings = [];
  for (let i = 1; i < visiblePoints.length; i++) {
    const gap = visiblePoints[i].x - visiblePoints[i - 1].x;
    if (gap > 0) spacings.push(gap);
  }
  spacings.sort((a, b) => a - b);
  const medianSpacing = spacings.length ? spacings[Math.floor(spacings.length / 2)] : width;
  const labelStride = Math.max(1, Math.ceil(38 / Math.max(medianSpacing, 10)));
  const lastVisibleIndex = visiblePoints.length - 1;

  let lastLabelX = -1000;
  const LABEL_MIN_DISTANCE = 36;

  layer.innerHTML = visiblePoints.map((point, index) => {
    const dropHeight = Math.max(10, height - point.y - bottomInset);
    const isTurning = isCurveTurningPoint(visiblePoints, index);

    // Logic:
    // 1. Always show first and last.
    // 2. Show turning points if they aren't too close to the previous label.
    // 3. Show stride points if they aren't too close to the previous label.
    let showLabel = index === 0 || index === lastVisibleIndex;
    // Always show turning points (peaks/troughs) regardless of distance — critical price levels must be visible
    if (!showLabel && isTurning) {
      if (Math.abs(point.x - lastLabelX) > 28) {
        showLabel = true;
      }
    } else if (!showLabel && index % labelStride === 0) {
      if (Math.abs(point.x - lastLabelX) > LABEL_MIN_DISTANCE) {
        showLabel = true;
      }
    }

    if (showLabel) {
      lastLabelX = point.x;
    }

    // Flip label to left-anchored when near the right edge to prevent overflow
    const labelNearRight = point.x > plotRight - 60;
    const labelTransform = labelNearRight
      ? 'transform:translate(-100%,-100%)'
      : 'transform:translate(-50%,-100%)';

    return `<div class="curve-annotation" style="left:${point.x.toFixed(2)}px;top:${point.y.toFixed(2)}px;">
      <div class="curve-drop-line" style="height:${dropHeight.toFixed(2)}px;"></div>
      <div class="curve-drop-dot"></div>
      ${showLabel ? `<div class="curve-point-label" style="${labelTransform}">${formatCurvePointLabel(point.slot.price)}</div>` : ''}
    </div>`;
  }).join('');
}

function buildCurveAnchorData(slots) {
  if (!Array.isArray(slots) || !slots.length) return [];
  const nextFinite = new Array(slots.length).fill(null);
  let carryForward = null;
  for (let index = slots.length - 1; index >= 0; index--) {
    if (Number.isFinite(slots[index].price)) carryForward = slots[index].price;
    nextFinite[index] = carryForward;
  }

  let carryBack = null;
  return slots.map((slot, index) => {
    if (Number.isFinite(slot.price)) carryBack = slot.price;
    const anchorValue = Number.isFinite(slot.price) ? slot.price : (carryBack ?? nextFinite[index]);
    return Number.isFinite(anchorValue)
      ? { time: slot.time, value: anchorValue }
      : null;
  }).filter(Boolean);
}

function applyCurveVisibleWindow(chart, slots, start, end) {
  if (!chart || !Array.isArray(slots) || !slots.length) return;
  const maxIdx = slots.length - 1;
  const isFullWindow = start <= 0 && end >= maxIdx;
  const logicalPadding = 0.45;
  // Always use logical range — prevents the chart from rendering empty
  // pseudo-time space at the edges which causes spurious "Year 2000" labels.
  if (typeof chart.timeScale().setVisibleLogicalRange === 'function') {
    const from = Math.max(-0.5, start - logicalPadding);
    const to = Math.min(maxIdx + 0.5, end + logicalPadding);
    if (isFullWindow) {
      chart.timeScale().setVisibleLogicalRange({ from: -logicalPadding, to: maxIdx + logicalPadding });
    } else {
      chart.timeScale().setVisibleLogicalRange({ from, to });
    }
    return;
  }
  // Fallback: use time-based range
  if (isFullWindow) {
    chart.timeScale().fitContent();
    return;
  }
  chart.timeScale().setVisibleRange({
    from: slots[start].time,
    to: slots[end].time,
  });
}

function syncCurveVisibleWindow(chart, slots, start, end) {
  if (!chart || !Array.isArray(slots) || !slots.length) return;
  applyCurveVisibleWindow(chart, slots, start, end);
  if (STATE._curveVisibleWindowFrame) cancelAnimationFrame(STATE._curveVisibleWindowFrame);
  STATE._curveVisibleWindowFrame = requestAnimationFrame(() => {
    STATE._curveVisibleWindowFrame = null;
    applyCurveVisibleWindow(chart, slots, start, end);
  });
}

function buildForwardCurveData() {
  const instrument = getCurveInstrument();
  const baseDate = new Date();
  const rawSlots = [];
  for (let offset = 0; offset < FORWARD_CURVE_HORIZON + FORWARD_CURVE_FETCH_BUFFER; offset++) {
    rawSlots.push(buildCurveSlot(baseDate, offset, instrument));
  }

  const latestQuoteStamp = rawSlots.reduce((max, slot) => {
    const stamp = slot.quoteDate && Number.isFinite(slot.price) ? timeToStamp(slot.quoteDate) : 0;
    return Math.max(max, stamp || 0);
  }, 0);

  let startIndex = rawSlots.findIndex(slot => isCurveQuoteFresh(slot, latestQuoteStamp));
  if (startIndex < 0) startIndex = rawSlots.findIndex(slot => Number.isFinite(slot.price));
  if (startIndex < 0) startIndex = 0;

  const skippedSlots = rawSlots
    .slice(0, startIndex)
    .filter(slot => Number.isFinite(slot.price) || slot.quoteDate);

  const slots = rawSlots
    .slice(startIndex, startIndex + FORWARD_CURVE_HORIZON)
    .map((slot, index) => Object.assign({}, slot, {
      index,
      time: dayToTime(index + 1),
      missing: !Number.isFinite(slot.price),
    }));

  const quotedSlots = slots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = slots.filter(slot => !Number.isFinite(slot.price));

  return {
    slots,
    quotedSlots,
    missingSlots,
    skippedSlots,
    latestQuoteDate: latestQuoteStamp ? new Date(latestQuoteStamp).toISOString().slice(0, 10) : '',
    firstQuoted: quotedSlots[0] || null,
    lastQuoted: quotedSlots[quotedSlots.length - 1] || null,
  };
}

function getCurveWindowContext(slots) {
  if (!slots || !slots.length) {
    return {
      start: 0,
      end: -1,
      count: 0,
      windowSlots: [],
      quotedSlots: [],
      missingSlots: [],
      firstQuoted: null,
      lastQuoted: null,
      stats: { min: 0, max: 0, avg: 0, count: 0 },
      winterAvg: null,
      summerAvg: null,
      premium: null,
      slope: null,
      coverageText: '0/0',
    };
  }

  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = slots.length - 1;
  let start = clamp(Number.isFinite(STATE.curveView.rangeStart) ? STATE.curveView.rangeStart : 0, 0, maxIdx);
  let end = clamp(STATE.curveView.rangeEnd != null ? STATE.curveView.rangeEnd : maxIdx, 0, maxIdx);
  if (end < start) {
    const swap = start;
    start = end;
    end = swap;
  }
  if (start === end && slots.length > 1) {
    if (end < maxIdx) end += 1;
    else start = Math.max(0, start - 1);
  }

  STATE.curveView.rangeStart = start;
  STATE.curveView.rangeEnd = end;

  const windowSlots = slots.slice(start, end + 1);
  const quotedSlots = windowSlots.filter(slot => Number.isFinite(slot.price));
  const missingSlots = windowSlots.filter(slot => !Number.isFinite(slot.price));
  const firstQuoted = quotedSlots[0] || null;
  const lastQuoted = quotedSlots[quotedSlots.length - 1] || null;
  const stats = getSeriesStats(quotedSlots, slot => slot.price);
  const averageFor = list => list.length ? list.reduce((sum, slot) => sum + slot.price, 0) / list.length : null;
  const winterAvg = averageFor(quotedSlots.filter(slot => slot.season === 'winter'));
  const summerAvg = averageFor(quotedSlots.filter(slot => slot.season === 'summer'));

  return {
    start,
    end,
    count: windowSlots.length,
    windowSlots,
    quotedSlots,
    missingSlots,
    firstQuoted,
    lastQuoted,
    stats,
    winterAvg,
    summerAvg,
    premium: winterAvg != null && summerAvg != null ? winterAvg - summerAvg : null,
    slope: quotedSlots.length >= 2 ? lastQuoted.price - firstQuoted.price : null,
    coverageText: `${quotedSlots.length}/${windowSlots.length}`,
  };
}

function renderCurveMetrics(curveData, windowContext) {
  const metricsEl = document.getElementById('curve-metrics');
  if (!metricsEl || !curveData || !windowContext) return;

  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const fmt = val => Number.isFinite(val) ? `${meta.currency}${val.toFixed(3)}` : 'N/A';

  // Card-style chip (matches KPI chips used elsewhere)
  const chip = (label, valueHtml, color, tip, sub) =>
    `<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:100px;flex:1;" data-tooltip="${tip}">` +
    `<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">${label}</div>` +
    `<div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:${color};">${valueHtml}</div>` +
    (sub ? `<div style="font-size:10px;color:var(--text-muted);margin-top:1px;font-family:var(--font-mono);">${sub}</div>` : '') +
    `</div>`;

  // Coverage chip with mini bar
  const covQ = windowContext.quotedSlots.length;
  const covT = windowContext.count;
  const covPct = covT > 0 ? Math.round(covQ / covT * 100) : 0;
  const covColor = windowContext.missingSlots.length ? 'var(--negative)' : 'var(--positive)';
  const covBar = `<div style="display:flex;align-items:center;gap:5px;margin-top:3px;">` +
    `<div style="width:56px;height:4px;background:var(--bg-page);border-radius:2px;overflow:hidden;flex-shrink:0;">` +
    `<div style="width:${covPct}%;height:100%;background:${covColor};border-radius:2px;"></div></div>` +
    `<span style="font-size:10px;color:${covColor};font-family:var(--font-mono);">${covPct}%</span></div>`;
  const covChip = chip('Coverage',
    `${windowContext.coverageText} quoted`, covColor,
    `${covQ} of ${covT} contracts in the selected window have live quotes. Missing contracts are excluded from all averages.`,
    covBar.replace(/"/g, "'"));

  // Slope: +$X.XXX · Contango with structure badge
  const slopeColor = windowContext.slope == null ? 'var(--text-muted)'
    : windowContext.slope >= 0 ? 'var(--positive)' : 'var(--negative)';
  const structWord = windowContext.slope == null ? '' : windowContext.slope >= 0 ? 'Contango' : 'Backwardation';
  const slopeVal = windowContext.slope == null ? 'N/A'
    : `${windowContext.slope >= 0 ? '+' : ''}${fmt(windowContext.slope)}`;
  const structBadge = structWord
    ? ` <span style="font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;` +
      (windowContext.slope >= 0
        ? `background:rgba(0,255,136,0.12);color:var(--positive);border:1px solid rgba(0,255,136,0.25);`
        : `background:rgba(255,68,85,0.12);color:var(--negative);border:1px solid rgba(255,68,85,0.25);`) +
      `">${structWord}</span>` : '';

  // W/S Premium %
  const wsPct = (windowContext.winterAvg != null && windowContext.summerAvg != null && windowContext.summerAvg > 0)
    ? ((windowContext.winterAvg - windowContext.summerAvg) / windowContext.summerAvg * 100) : null;
  const wsColor = windowContext.premium == null ? 'var(--text-muted)'
    : windowContext.premium >= 0 ? 'var(--positive)' : 'var(--negative)';

  const notes = [];
  if (curveData.latestQuoteDate) notes.push(`Latest quote: ${formatDisplayDate(curveData.latestQuoteDate)}`);
  if (curveData.skippedSlots.length) notes.push(`Rolled past: ${summarizeCurveLabels(curveData.skippedSlots, 3)}`);
  if (windowContext.missingSlots.length) notes.push(`Missing in window: ${summarizeCurveLabels(windowContext.missingSlots, 6)}`);

  metricsEl.innerHTML =
    `<div style="display:flex;flex-wrap:wrap;gap:8px;width:100%;">` +
    covChip +
    chip('Front Quote',
      windowContext.firstQuoted ? `${fmt(windowContext.firstQuoted.price)}<span style="font-size:11px;font-weight:400;color:var(--text-muted);"> · ${windowContext.firstQuoted.label}</span>` : 'N/A',
      meta.color,
      `First quoted contract in the selected window: ${windowContext.firstQuoted ? windowContext.firstQuoted.label + ' at ' + fmt(windowContext.firstQuoted.price) : 'none'}.`) +
    chip('Back Quote',
      windowContext.lastQuoted ? `${fmt(windowContext.lastQuoted.price)}<span style="font-size:11px;font-weight:400;color:var(--text-muted);"> · ${windowContext.lastQuoted.label}</span>` : 'N/A',
      'var(--text-primary)',
      `Last quoted contract in the selected window: ${windowContext.lastQuoted ? windowContext.lastQuoted.label + ' at ' + fmt(windowContext.lastQuoted.price) : 'none'}.`) +
    chip('Slope',
      `${slopeVal}${structBadge}`,
      slopeColor,
      `Back quote minus front quote within the window. Positive = contango (deferred more expensive), negative = backwardation. Does not account for time value — compare to strip averages for richer context.`) +
    chip('Winter Avg',
      fmt(windowContext.winterAvg), '#e2e8f0',
      `Average price of all Winter (Nov–Mar) contracts in the window. Winter contracts typically carry a premium due to heating demand.`) +
    chip('Summer Avg',
      fmt(windowContext.summerAvg), '#e2c09a',
      `Average price of all Summer (Apr–Oct) contracts in the window. Includes shoulder months.`) +
    chip('W/S Premium',
      fmt(windowContext.premium), wsColor,
      `Winter average minus Summer average — the seasonal premium embedded in the strip. Positive = winter deferred at a premium to summer (normal). ${wsPct != null ? Math.abs(wsPct).toFixed(1) + '% ' + (wsPct >= 0 ? 'above' : 'below') + ' summer avg.' : ''}`,
      wsPct != null ? `${wsPct >= 0 ? '+' : ''}${wsPct.toFixed(1)}% vs summer` : null) +
    `</div>` +
    (notes.length
      ? `<div style="width:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:8px;">` +
        notes.map(n => `<span>· ${n}</span>`).join('') + `</div>`
      : '');
}

function renderCurveTable(curveData, windowContext) {
  const tableEl = document.getElementById('curve-table');
  if (!tableEl || !curveData || !windowContext) return;

  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const quotedPrices = curveData.quotedSlots.map(slot => slot.price);
  const priceMin = quotedPrices.length ? Math.min(...quotedPrices) : 0;
  const priceMax = quotedPrices.length ? Math.max(...quotedPrices) : 0;
  const priceRange = (priceMax - priceMin) || 1;
  const frontPrice = curveData.quotedSlots.length ? curveData.quotedSlots[0].price : null;
  const today = new Date();

  const seasonBadge = season => {
    const s = {
      winter:   'background:rgba(56,189,248,0.12);color:#e2e8f0;border:1px solid rgba(56,189,248,0.25);',
      summer:   'background:rgba(251,146,60,0.12);color:#e2c09a;border:1px solid rgba(251,146,60,0.25);',
      shoulder: 'background:rgba(148,163,184,0.08);color:#7d818b;border:1px solid rgba(148,163,184,0.2);',
    };
    return `<span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;${s[season] || ''}">${season.charAt(0).toUpperCase() + season.slice(1)}</span>`;
  };

  const th  = (l, tip) => `<th style="text-align:center;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="${tip}">${l}</th>`;
  const thL = (l, tip) => `<th style="text-align:left;position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="${tip}">${l}</th>`;

  let tableHtml =
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-wrap:wrap;gap:4px;">` +
    `<span class="card-title" style="padding:0;" data-tooltip="All contracts in the forward strip. Click any row to view that contract's full price history in the Prices tab. Rows highlighted with a faint background are within the current window selection.">Contract Quotes</span>` +
    `<span style="font-size:11px;color:var(--text-muted);">${curveData.quotedSlots.length}/${curveData.slots.length} quoted` +
    (frontPrice != null ? ` · Front: <span style="color:var(--text-primary);font-family:var(--font-mono);">${meta.currency}${frontPrice.toFixed(3)}</span>` : '') +
    `</span></div>` +
    `<div style="overflow-x:auto;"><table><thead><tr>` +
    thL('Contract',   'NYMEX ticker and delivery month. Click any row to view that contract\'s full price history in the Prices tab.') +
    th('Price',       `Live market price. Bar shows position within the strip range (${meta.currency}${priceMin.toFixed(3)}–${meta.currency}${priceMax.toFixed(3)}).`) +
    th('vs Front',    `Premium or discount vs the front-month contract (${meta.currency}${frontPrice != null ? frontPrice.toFixed(3) : '—'}). Positive = contango, negative = backwardation.`) +
    th('vs Prev',     'Price change vs the immediately prior contract — the local slope of the curve at each step. Shows whether the curve is steepening or flattening.') +
    th('Season',      'Delivery season. Winter (Nov–Mar) typically commands a premium due to heating demand. Summer (Apr–Oct) is cooling season. Shoulder = spring/fall transition.') +
    th('Last Quote',  'Date of the most recent market quote for this contract. Amber = >1 day stale, red = >5 days stale.') +
    `</tr></thead><tbody>`;

  curveData.slots.forEach((slot, index) => {
    const inWindow = index >= windowContext.start && index <= windowContext.end;
    const rowBg = inWindow ? 'background:rgba(255,255,255,0.035);' : '';

    // Price bar
    const barW = (Number.isFinite(slot.price) && priceRange > 0) ? ((slot.price - priceMin) / priceRange * 48).toFixed(1) : '0';
    const bar = Number.isFinite(slot.price)
      ? `<span style="display:inline-block;width:${barW}px;height:3px;background:${meta.color};border-radius:2px;vertical-align:middle;opacity:0.5;margin-left:5px;"></span>`
      : '';
    const priceHtml = Number.isFinite(slot.price)
      ? `<span style="font-family:var(--font-mono);">${meta.currency}${slot.price.toFixed(3)}</span>${bar}`
      : `<span style="color:var(--text-muted);">—</span>`;

    // vs Front
    const vsFront = (Number.isFinite(slot.price) && frontPrice != null) ? slot.price - frontPrice : null;
    const vfC = vsFront == null ? 'var(--text-muted)' : Math.abs(vsFront) < 0.005 ? 'var(--text-muted)' : vsFront > 0 ? 'var(--positive)' : 'var(--negative)';
    const vsFrontHtml = vsFront == null
      ? `<span style="color:var(--text-muted);">—</span>`
      : `<span style="font-family:var(--font-mono);color:${vfC};">${vsFront >= 0 ? '+$' : '-$'}${Math.abs(vsFront).toFixed(3)}</span>`;

    // vs Prev
    const prevSlot = index > 0 ? curveData.slots[index - 1] : null;
    const vsPrev = (Number.isFinite(slot.price) && prevSlot && Number.isFinite(prevSlot.price)) ? slot.price - prevSlot.price : null;
    const vpC = vsPrev == null ? 'var(--text-muted)' : Math.abs(vsPrev) < 0.001 ? 'var(--text-muted)' : vsPrev > 0 ? 'var(--positive)' : 'var(--negative)';
    const vsPrevHtml = vsPrev == null
      ? `<span style="color:var(--text-muted);">—</span>`
      : `<span style="font-family:var(--font-mono);font-size:11px;color:${vpC};">${vsPrev > 0 ? '▲' : '▼'}${vsPrev >= 0 ? '+$' : '-$'}${Math.abs(vsPrev).toFixed(3)}</span>`;

    // Season badge
    const seasonHtml = seasonBadge(slot.season);

    // Last quote with staleness
    let quoteHtml;
    if (slot.quoteDate) {
      const ageDays = Math.round((today - new Date(slot.quoteDate + 'T12:00:00Z')) / 86400000);
      const ageC = ageDays > 5 ? 'var(--negative)' : ageDays > 1 ? 'var(--warning)' : 'var(--text-secondary)';
      const ageSuffix = ageDays > 1 ? ` <span style="font-size:10px;color:${ageC};">(${ageDays}d)</span>` : '';
      quoteHtml = `<span style="font-family:var(--font-mono);font-size:12px;color:${ageC};">${formatDisplayDate(slot.quoteDate)}</span>${ageSuffix}`;
    } else {
      quoteHtml = `<span style="color:var(--negative);">Missing</span>`;
    }

    // Row tooltip
    const rowTip = Number.isFinite(slot.price)
      ? `${slot.ticker} · ${slot.label} · ${meta.currency}${slot.price.toFixed(3)}`
        + (vsFront != null ? ` · vs front: ${vsFront >= 0 ? '+$' : '-$'}${Math.abs(vsFront).toFixed(3)}` : '')
        + (vsPrev  != null ? ` · vs prev: ${vsPrev  >= 0 ? '+$' : '-$'}${Math.abs(vsPrev).toFixed(3)}`  : '')
        + ` · ${slot.season}${inWindow ? ' · in window' : ''}`
      : `${slot.ticker} · ${slot.label}: no quote available`;

    // Navigation
    const isHH = instrument === 'hh';
    const tickerCode  = isHH ? slot.ticker.charAt(2) : slot.ticker.charAt(3);
    const tickerYrStr = isHH ? slot.ticker.slice(3) : slot.ticker.slice(4);
    const tickerYrFull = parseInt(tickerYrStr) < 50 ? 2000 + parseInt(tickerYrStr) : 1900 + parseInt(tickerYrStr);
    const tickerMonth = (typeof CODE_TO_MONTH !== 'undefined' ? CODE_TO_MONTH : {})[tickerCode] || '';
    const navMarket = isHH ? 'hh' : 'ttf';
    const clickAttr = tickerMonth
      ? `onclick="navigateTo('prices',{market:'${navMarket}',month:'${tickerMonth}',year:'${tickerYrFull}'})"` : '';

    tableHtml += `<tr style="${rowBg}${slot.missing ? 'opacity:0.7;' : ''}cursor:pointer;" ${clickAttr} data-tooltip="${rowTip.replace(/"/g, '&quot;')}">
      <td style="text-align:left;">
        <div style="font-family:var(--font-mono);color:${meta.color};">${slot.ticker}</div>
        <div style="font-size:11px;color:var(--text-muted);">${slot.label}</div>
      </td>
      <td style="text-align:center;">${priceHtml}</td>
      <td style="text-align:center;">${vsFrontHtml}</td>
      <td style="text-align:center;">${vsPrevHtml}</td>
      <td style="text-align:center;">${seasonHtml}</td>
      <td style="text-align:center;">${quoteHtml}</td>
    </tr>`;
  });

  tableHtml += '</tbody></table></div>';
  tableEl.innerHTML = tableHtml;
}


// ─── FORWARD CURVE UPGRADE 3: CAL STRIP AVERAGES ─────────────────────────────
function renderCurveStrips(curveData) {
  const containerEl = document.getElementById('curve-strips');
  if (!containerEl || !curveData || !curveData.slots.length) return;

  const currentYear = new Date().getFullYear();
  const frontPrice = curveData.quotedSlots.length ? curveData.quotedSlots[0].price : null;
  const strips = [];

  // Group by year
  const byYear = {};
  curveData.slots.forEach(slot => {
    if (!byYear[slot.year]) byYear[slot.year] = [];
    byYear[slot.year].push(slot);
  });

  const getAvg = slots => {
    const quoted = slots.filter(s => !s.missing && Number.isFinite(s.price));
    if (quoted.length === 0) return { avg: null, missing: slots.length, total: slots.length, quoted: 0 };
    const sum = quoted.reduce((s, slot) => s + slot.price, 0);
    return { avg: sum / quoted.length, missing: slots.length - quoted.length, total: slots.length, quoted: quoted.length };
  };

  // Build Cal Strips
  const calAvgByYear = {}; // track Cal avg per year for winter premium calc
  Object.keys(byYear).sort().forEach(yr => {
    const year = parseInt(yr);
    if (year < currentYear) return;
    const slots = byYear[yr];
    if (slots.length < 1) return;

    const stat = getAvg(slots);
    calAvgByYear[year] = stat.avg;
    strips.push({ label: 'Cal ' + year, desc: 'Jan–Dec', stat, type: 'cal', year });

    const summerSlots = slots.filter(s => s.monthIdx >= 3 && s.monthIdx <= 9);
    if (summerSlots.length > 0)
      strips.push({ label: 'Summer ' + String(year).slice(2), desc: 'Apr–Oct', stat: getAvg(summerSlots), type: 'summer', year });

    if (byYear[year + 1]) {
      const winterSlots = [
        ...slots.filter(s => s.monthIdx === 10 || s.monthIdx === 11),
        ...byYear[year + 1].filter(s => s.monthIdx >= 0 && s.monthIdx <= 2),
      ];
      if (winterSlots.length > 0)
        strips.push({ label: 'Winter ' + String(year).slice(2) + '/' + String(year+1).slice(2), desc: 'Nov–Mar', stat: getAvg(winterSlots), type: 'winter', year });
    }
  });

  if (strips.length === 0) { containerEl.innerHTML = ''; return; }

  // Pre-compute max |vsFront| for bar scaling
  const maxAbsVsFront = Math.max(...strips.map(strip => {
    const v = strip.stat.avg != null && frontPrice != null ? Math.abs(strip.stat.avg - frontPrice) : 0;
    return v;
  }), 0.01);

  const th = (label, tip, left = false) =>
    `<th style="text-align:${left ? 'left' : 'center'};position:sticky;top:0;background:var(--bg-card);z-index:2;" data-tooltip="${tip}">${label}</th>`;

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-wrap:wrap;gap:4px;">` +
    `<span class="card-title" style="padding:0;" data-tooltip="Average price of each standard NG delivery strip computed from live quoted contracts. Cal = full calendar year, Summer = Apr–Oct, Winter = Nov–Mar cross-year. Partial strips are noted with N/M quoted.">Strip Averages</span>` +
    (frontPrice != null ? `<span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">Front: <span style="color:var(--text-primary);">$${frontPrice.toFixed(3)}</span></span>` : '') +
    `</div>`;

  html += `<div style="overflow-x:auto;"><table><thead><tr>` +
    th('Strip',     'Strip name. Cal = Jan–Dec calendar year average. Summer = Apr–Oct. Winter = Nov (year Y) through Mar (year Y+1). Click any row to see that strip\'s contracts on the curve chart.', true) +
    th('Contracts', 'Delivery months included in this strip. N/M quoted = only N of M months have live market quotes — avg may not be representative.', true) +
    th('Avg Price',  'Simple average of all quoted contract prices within the strip. Partial strips (not all months quoted) are noted.') +
    th('vs Front',  'Strip average minus the front-month contract price. Positive = strip is above front (contango term structure). Bar shows magnitude relative to the widest strip in this table.') +
    th('% vs Front','Strip average as a % premium/discount to the front month. Complements the dollar difference.') +
    th('Structure',  'Term structure signal for this strip relative to the front month: Contango = strip avg above front (deferred premium), Back = strip avg below front (backwardation).') +
    `</tr></thead><tbody>`;

  strips.forEach(strip => {
    const s = strip.stat;
    const vsFront    = (s.avg != null && frontPrice != null) ? s.avg - frontPrice : null;
    const vsFrontPct = (vsFront != null && frontPrice > 0) ? (vsFront / frontPrice * 100) : null;
    const vsFrontColor = vsFront == null ? 'var(--text-muted)' : vsFront > 0 ? 'var(--positive)' : 'var(--negative)';

    // Mini bar for vs Front
    const barW = vsFront != null ? Math.min(Math.abs(vsFront) / maxAbsVsFront * 52, 52) : 0;
    const vsFrontCell = vsFront == null ? '<span style="color:var(--text-muted);">—</span>' :
      `<div style="display:flex;align-items:center;gap:5px;justify-content:center;">` +
      `<span style="font-family:var(--font-mono);color:${vsFrontColor};min-width:52px;text-align:right;">${vsFront > 0 ? '+$' : '-$'}${Math.abs(vsFront).toFixed(3)}</span>` +
      `<div style="position:relative;width:52px;height:5px;background:var(--bg-page);border-radius:3px;overflow:hidden;">` +
      `<div style="position:absolute;top:0;${vsFront >= 0 ? 'left:0' : `left:calc(100% - ${barW}px)`};width:${barW}px;height:100%;background:${vsFrontColor};border-radius:3px;"></div></div></div>`;

    const pctCell = vsFrontPct == null ? '<span style="color:var(--text-muted);">—</span>' :
      `<span style="font-family:var(--font-mono);color:${vsFrontColor};">${vsFrontPct > 0 ? '+' : ''}${vsFrontPct.toFixed(1)}%</span>`;

    // Structure badge
    let structBadge = '<span style="color:var(--text-muted);">—</span>';
    if (vsFront != null && Math.abs(vsFront) >= 0.005) {
      structBadge = vsFront > 0
        ? `<span style="background:rgba(0,255,136,0.12);color:var(--positive);border:1px solid rgba(0,255,136,0.25);border-radius:4px;font-size:10px;padding:2px 7px;font-weight:600;">Contango</span>`
        : `<span style="background:rgba(255,68,85,0.12);color:var(--negative);border:1px solid rgba(255,68,85,0.25);border-radius:4px;font-size:10px;padding:2px 7px;font-weight:600;">Back</span>`;
    }

    // Partial coverage mini bar
    const covPct = s.total > 0 ? (s.quoted / s.total * 100) : 100;
    const covColor = covPct === 100 ? 'var(--positive)' : covPct >= 60 ? 'var(--warning)' : 'var(--negative)';
    const covBar = s.missing > 0
      ? `<div style="display:flex;align-items:center;gap:4px;margin-top:2px;">` +
        `<div style="width:32px;height:3px;background:var(--bg-page);border-radius:2px;overflow:hidden;flex-shrink:0;">` +
        `<div style="width:${covPct}%;height:100%;background:${covColor};border-radius:2px;"></div></div>` +
        `<span style="font-size:10px;color:${covColor};">${s.quoted}/${s.total}</span></div>`
      : '';

    // Winter premium vs Cal of same year
    let winterPremNote = '';
    if (strip.type === 'winter' && s.avg != null) {
      const calRef = calAvgByYear[strip.year];
      if (calRef != null) {
        const prem = s.avg - calRef;
        const premColor = prem >= 0 ? 'var(--positive)' : 'var(--negative)';
        winterPremNote = ` <span style="font-size:10px;color:${premColor};" data-tooltip="Winter ${String(strip.year).slice(2)}/${String(strip.year+1).slice(2)} avg vs Cal ${strip.year} avg ($${calRef.toFixed(3)}): seasonal premium/discount.">${prem >= 0 ? '+' : ''}$${prem.toFixed(3)} vs Cal</span>`;
      }
    }

    // Row background tinting by type
    const rowBg = strip.type === 'summer' ? 'background:rgba(251,146,60,0.04);'
                : strip.type === 'winter' ? 'background:rgba(56,189,248,0.04);'
                : '';

    // Row tooltip
    const quotedNote = s.missing > 0 ? ` Only ${s.quoted}/${s.total} months quoted — avg may be incomplete.` : ` All ${s.total} months quoted.`;
    const winterPremTip = strip.type === 'winter' && calAvgByYear[strip.year] != null
      ? ` Winter premium vs Cal ${strip.year}: ${(s.avg - calAvgByYear[strip.year]) >= 0 ? '+' : ''}$${(s.avg - calAvgByYear[strip.year]).toFixed(3)}.`
      : '';
    const rowTip = s.avg != null
      ? `${strip.label} (${strip.desc}): avg $${s.avg.toFixed(3)} · ${vsFront != null ? (vsFront >= 0 ? '+$' : '-$') + Math.abs(vsFront).toFixed(3) + ' vs front' : ''} ${vsFrontPct != null ? '(' + (vsFrontPct >= 0 ? '+' : '') + vsFrontPct.toFixed(1) + '%)' : ''}.${quotedNote}${winterPremTip}`
      : `${strip.label}: insufficient quotes to compute average.`;

    html += `<tr style="${rowBg}cursor:default;" data-tooltip="${rowTip.replace(/"/g, '&quot;')}">` +
      `<td style="text-align:left;font-weight:600;">${strip.label}${winterPremNote}</td>` +
      `<td style="text-align:left;color:var(--text-muted);">${strip.desc}${covBar}</td>` +
      `<td style="text-align:center;font-family:var(--font-mono);">${s.avg == null ? '<span style="color:var(--text-muted);">—</span>' : '$' + s.avg.toFixed(3)}</td>` +
      `<td style="text-align:center;">${vsFrontCell}</td>` +
      `<td style="text-align:center;">${pctCell}</td>` +
      `<td style="text-align:center;">${structBadge}</td>` +
      `</tr>`;
  });

  html += '</tbody></table></div>';
  containerEl.innerHTML = html;
}

          </div>
          <div class="card" style="margin-top:var(--gap);">
            <div id="curve-metrics"></div>
          </div>
          <div class="card" style="margin-top:var(--gap);padding:0;" id="curve-table"></div>
          <div class="card" style="margin-top:var(--gap);padding:0;" id="curve-strips"></div>
        </div>
      </div>
    `;
    document.getElementById('curve-window-start').addEventListener('input', onCurveSlider);
    document.getElementById('curve-compare-pills').addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      document.querySelectorAll('#curve-compare-pills .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isCustom = btn.dataset.val === 'custom';
      document.getElementById('curve-custom-days-wrap').style.display = isCustom ? 'flex' : 'none';
      if (!isCustom) updateCurveChart();
    });
    document.getElementById('curve-custom-days').addEventListener('input', e => {
      const days = parseInt(e.target.value);
      if (days > 0) { STATE._curveCustomDays = days; updateCurveChart(); }
    });
    document.getElementById('curve-window-end').addEventListener('input', onCurveSlider);
    document.getElementById('curve-instrument-switch').addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      document.querySelectorAll('#curve-instrument-switch .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      delete STATE.curveView; // reset view on switch
      updateCurveChart();
    });
    document.getElementById('curve-horizon-switch').addEventListener('click', e => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      document.querySelectorAll('#curve-horizon-switch .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const h = parseInt(btn.dataset.val);
      STATE.curveView = { rangeStart: 0, rangeEnd: h - 1 };
      updateCurveChart();
      // Immediately sync footer so window context is fresh after horizon switch
      if (typeof syncCurveRangeFooter === 'function') syncCurveRangeFooter();
    });
  }
  updateCurveChart();
}


function buildCurveHistoricalData(slots, period) {
  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  if (period === 'none') return [];
  const _n = new Date(), _y = _n.getFullYear(), _mo = _n.getMonth(), _d = _n.getDate();
  let targetDate;
  if      (period === '1d')     targetDate = new Date(_y, _mo, _d - 1);
  else if (period === '3d')     targetDate = new Date(_y, _mo, _d - 3);
  else if (period === '1w')     targetDate = new Date(_y, _mo, _d - 7);
  else if (period === '2w')     targetDate = new Date(_y, _mo, _d - 14);
  else if (period === '1m')     targetDate = new Date(_y, _mo - 1, _d);
  else if (period === '3m')     targetDate = new Date(_y, _mo - 3, _d);
  else if (period === '6m')     targetDate = new Date(_y, _mo - 6, _d);
  else if (period === '1y')     targetDate = new Date(_y - 1, _mo, _d);
  else if (period === 'custom') targetDate = new Date(_y, _mo, _d - (STATE._curveCustomDays || 30));
  else return [];
  
  const targetStr = targetDate.toISOString().slice(0, 10);
  
  return slots.map(slot => {
    const data = instrument === 'ttf' ? getTTFContractData(slot.ticker) : getContractData(slot.ticker);
    if (!data || data.length === 0) return { time: slot.time };
    
    let closest = null;
    for (let i = data.length - 1; i >= 0; i--) {
      if (data[i].date <= targetStr) {
        closest = data[i];
        break;
      }
    }
    
    if (closest && Number.isFinite(closest.p)) {
      return { time: slot.time, value: closest.p };
    }
    return { time: slot.time };
  });
}

function getCurveInstrument() {
  const btn = document.querySelector('#curve-instrument-switch .segment-btn.active');
  return btn ? btn.dataset.val : 'hh';
}

function getCurveComparePeriod() {
  const btn = document.querySelector('#curve-compare-pills .segment-btn.active');
  return btn ? btn.dataset.val : 'none';
}

function updateCurveChart() {
  const curveData = buildForwardCurveData();
  const slots = curveData.slots;
  const instrument = getCurveInstrument();
  const meta = getPriceInstrumentMeta(instrument);
  const palette = getNeutralChartPalette();

  if (!slots.length || !curveData.firstQuoted) {
    teardownCurveAnnotations();
    document.getElementById('curve-desc').textContent = 'No quoted curve data available';
    document.getElementById('curve-price').textContent = '--';
    document.getElementById('curve-change').textContent = '';
    document.getElementById('curve-metrics').innerHTML = `<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);padding:8px 0;">No forward quotes available for the current strip.</div>`;
    document.getElementById('curve-table').innerHTML = '';
    return;
  }

  // Update header text/colors
  document.getElementById('curve-ticker').style.color = meta.color;
  document.getElementById('curve-dot').style.background = meta.color;
  document.getElementById('curve-instrument-label').textContent = meta.label;

  const descEl = document.getElementById('curve-desc');
  descEl.textContent = `${slots.length}-month strip — ${slots[0].label} to ${slots[slots.length - 1].label} • ${curveData.quotedSlots.length}/${slots.length} quoted`;
  descEl.dataset.tooltip = `Forward strip spanning ${slots.length} monthly delivery contracts (${slots[0].label}–${slots[slots.length - 1].label}). ${curveData.quotedSlots.length} of ${slots.length} contracts have live quotes. Contracts without quotes are excluded from all window averages.`;

  // Chart
  const chartContainer = document.getElementById('curve-chart-container');
  teardownCurveAnnotations();
  const chart = createManagedChart('curve', 'main', chartContainer);
  chart.applyOptions({
    rightPriceScale: {
      scaleMargins: { top: 0.18, bottom: 0.12 },
    },
    // The x-axis uses pseudo-dates (fake Jan–Apr 2000 timestamps) to achieve
    // equal month spacing. The axis tickMarkFormatter translates these to real
    // delivery month labels ("Apr '26", "Jun '30", etc.), but the crosshair
    // time label bypasses the formatter and would show the raw pseudo-date
    // (e.g. "12 Mar '00"). Hide it — the tooltip already shows the delivery month.
    crosshair: { vertLine: { labelVisible: false } },
  });

  const lineSeries = chart.addLineSeries({
    color: meta.color,
    lineWidth: 2,
    priceLineVisible: false,
    lastValueVisible: false,
    crosshairMarkerVisible: false,
    priceFormat: {
      type: 'custom',
      formatter: value => formatCurveAxisValue(value),
      minMove: 0.001,
    },
  });
  lineSeries.setData(slots.map(slot => Number.isFinite(slot.price) ? ({ time: slot.time, value: slot.price }) : ({ time: slot.time })));
  const anchorSeries = chart.addLineSeries({
    color: 'rgba(0,0,0,0)',
    lineWidth: 1,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  anchorSeries.setData(buildCurveAnchorData(slots));

  // Y-axis minimum visible range enforcement.
  // When the forward curve is very flat (e.g. TTF $54.18–$54.98, range $0.80),
  // auto-scaling compresses that tiny range across the full chart height, making
  // a minor variation look like a huge move. We enforce a minimum visible price
  // range of 5% of the mid-price by injecting two invisible anchor points at the
  // expanded min/max. LightweightCharts includes these in the scale without
  // drawing anything visible, so the curve appears proportionate.
  (function enforceCurveMinRange() {
    const quotedPrices = slots.filter(s => Number.isFinite(s.price)).map(s => s.price);
    if (quotedPrices.length < 2 || slots.length < 2) return;
    const dataMin = Math.min(...quotedPrices);
    const dataMax = Math.max(...quotedPrices);
    const mid = (dataMin + dataMax) / 2;
    const minRange = mid * 0.05; // 5% of mid price as minimum visible span
    if (dataMax - dataMin >= minRange) return; // range already wide enough
    const pad = (minRange - (dataMax - dataMin)) / 2;
    const rangeSeries = chart.addLineSeries({
      color: 'rgba(0,0,0,0)', lineWidth: 0,
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
    rangeSeries.setData([
      { time: slots[0].time, value: dataMin - pad },
      { time: slots[slots.length - 1].time, value: dataMax + pad },
    ]);
  })();

  const comparePeriod = getCurveComparePeriod();
  let histLookup = new Map();
  if (comparePeriod !== 'none') {
    const histData = buildCurveHistoricalData(slots, comparePeriod);
    if (histData.length) {
      const histSeries = chart.addLineSeries({
        color: 'rgba(255, 165, 50, 0.85)',
        lineWidth: 1.5,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
      });
      histSeries.setData(histData);
      histData.forEach(pt => histLookup.set(timeKey(pt.time), pt));
      STATE._curveHistSeries = histSeries;
      STATE._curveHistData = histData;
    }
  } else {
    STATE._curveHistSeries = null;
    STATE._curveHistData = null;
  }
  const curveLookup = new Map(slots.map(slot => [timeKey(slot.time), slot]));

  applyChartTimeScaleOptions(chart, {
    formatter: buildCurveAxisFormatter(time => curveLookup.get(timeKey(time))),
    barSpacing: slots.length > 36 ? 8 : 11,
    minBarSpacing: 0.5,
    fixLeftEdge: true,
    fixRightEdge: true,
  });
  chart.timeScale().fitContent();
  attachChartTooltip({
    chart,
    container: chartContainer,
    titleColor: '#f5f7fb',
    seriesConfigs: [{
      series: lineSeries,
      label: `${meta.label} curve`,
      color: meta.color,
      emphasis: true,
      getPoint: param => curveLookup.get(timeKey(param.time)),
      formatValue: value => `${meta.currency}${value.toFixed(3)}`,
    }],
    getSubtitle: () => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      if (!windowContext || !windowContext.count) return `${meta.label} strip`;
      return `${meta.label} strip • Window Slope: ${windowContext.slope >= 0 ? '+' : ''}${meta.currency}${windowContext.slope != null ? windowContext.slope.toFixed(3) : 'N/A'}`;
    },
    getMetrics: (param) => {
      const windowContext = STATE._curveWindowContext || getCurveWindowContext(STATE._curveSlots || slots);
      const fmt = val => Number.isFinite(val) ? `${meta.currency}${val.toFixed(3)}` : 'N/A';
      const m = [
        { label: 'Max', value: fmt(windowContext.stats.count ? windowContext.stats.max : null) },
        { label: 'Min', value: fmt(windowContext.stats.count ? windowContext.stats.min : null) },
      ];
      
      const point = curveLookup.get(timeKey(param.time));
      const histPt = histLookup.get(timeKey(param.time));
      if (point && histPt && histPt.value != null && point.price != null) {
        const diff = point.price - histPt.value;
        const comparePeriod = getCurveComparePeriod();
        const customLabel = STATE._curveCustomDays ? `${STATE._curveCustomDays}D Ago` : 'Custom';
        const lblMap = { '1d':'1D Ago', '3d':'3D Ago', '1w':'1W Ago', '2w':'2W Ago', '1m':'1M Ago', '3m':'3M Ago', '6m':'6M Ago', '1y':'1Y Ago', 'custom': customLabel };
        m.push({ label: lblMap[comparePeriod] || 'History', value: fmt(histPt.value) });
        m.push({ label: 'Shift', value: `<span style="color:${diff >= 0 ? 'var(--positive)' : 'var(--negative)'};">${diff >= 0 ? '+' : ''}${fmt(diff)}</span>` });
      } else {
        m.push({ label: 'First', value: windowContext.firstQuoted ? `${fmt(windowContext.firstQuoted.price)} • ${windowContext.firstQuoted.label}` : 'N/A' });
        m.push({ label: 'Last', value: windowContext.lastQuoted ? `${fmt(windowContext.lastQuoted.price)} • ${windowContext.lastQuoted.label}` : 'N/A' });
      }
      return m;
    },
    getTitle: param => {
      const point = curveLookup.get(timeKey(param.time));
      return point ? `${point.label} • ${point.ticker}` : 'Forward curve';
    },
    getNote: param => {
      const point = curveLookup.get(timeKey(param.time));
      if (!point) return '';
      if (!point.quoteDate) return `No quote available • ${point.season} contract`;
      return `${point.season} contract • Quote ${formatDisplayDate(point.quoteDate)}`;
    },
  });

  // Header price = first quoted prompt
  const curveHeaderPrice = document.getElementById('curve-price');
  const curveHeaderChange = document.getElementById('curve-change');
  if (curveHeaderPrice) {
    curveHeaderPrice.textContent = `${meta.currency}${curveData.firstQuoted.price.toFixed(3)}`;
    curveHeaderPrice.style.color = meta.color;
    curveHeaderPrice.dataset.tooltip = `Prompt month: ${curveData.firstQuoted.label} at ${meta.currency}${curveData.firstQuoted.price.toFixed(3)}. This is the nearest actively-traded contract — the front of the forward curve.`;
  }
  if (curveHeaderChange) {
    const promptMonth = curveData.firstQuoted ? `${curveData.firstQuoted.label} prompt · ` : '';
    curveHeaderChange.innerHTML = `${promptMonth}${getForwardCurveStatusHtml()}`;
  }

  // Store refs and sync range footer
  STATE._curveChart = chart;
  STATE._curveSlots = slots;
  STATE._curveData = curveData;
  STATE._curveSeries = lineSeries;
  chart.timeScale().subscribeVisibleTimeRangeChange(() => {
    requestAnimationFrame(() => _syncCurveSliderFromChart());
  });
  bindCurveAnnotations(chart, chartContainer);
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const curveKey = `${slots.length}|${slots[0].ticker}|${slots[slots.length - 1].ticker}`;
  if (STATE._curvePrevKey !== curveKey) {
    STATE._curvePrevKey = curveKey;
    STATE.curveView = { rangeStart: 0, rangeEnd: null };
  }
  syncCurveRangeFooter();
}

function syncCurveRangeFooter() {
  const curveData = STATE._curveData;
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!curveData || !contracts || !contracts.length || !chart) return;

  const windowContext = getCurveWindowContext(contracts);
  STATE._curveWindowContext = windowContext;
  const maxIdx = contracts.length - 1;

  const startSlider = document.getElementById('curve-window-start');
  const endSlider   = document.getElementById('curve-window-end');
  const selection   = document.getElementById('curve-range-selection');
  const minLabel    = document.getElementById('curve-range-min-label');
  const maxLabel    = document.getElementById('curve-range-max-label');
  const helperEl    = document.getElementById('curve-range-helper');
  const readoutEl   = document.getElementById('curve-range-readout');
  if (!startSlider) return;

  [startSlider, endSlider].forEach(s => { s.min = '0'; s.max = String(maxIdx); s.disabled = maxIdx < 1; });
  startSlider.value = String(windowContext.start);
  endSlider.value = String(windowContext.end);

  const pct = getRangeSelectionPercent(contracts.length, windowContext.start, windowContext.end);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  if (minLabel) minLabel.textContent = contracts[0].label;
  if (maxLabel) maxLabel.textContent = contracts[maxIdx].label;

  const count = windowContext.count;
  if (helperEl) helperEl.textContent = count >= contracts.length
    ? `Full strip • ${windowContext.coverageText} quoted`
    : `${count} months selected • ${windowContext.coverageText} quoted`;
  if (readoutEl) {
    const missingCount = windowContext.missingSlots.length;
    readoutEl.innerHTML = `<span>${contracts[windowContext.start].label}</span><span style="color:var(--text-muted);">to</span><span>${contracts[windowContext.end].label}</span><span style="color:var(--text-muted);">|</span><span>${count} month${count !== 1 ? 's' : ''}</span><span style="color:var(--text-muted);">|</span><span>${windowContext.quotedSlots.length} quoted</span>${missingCount ? `<span style="color:var(--text-muted);">|</span><span>${missingCount} missing</span>` : ''}`;
  }

  syncCurveVisibleWindow(chart, contracts, windowContext.start, windowContext.end);

  renderCurveMetrics(curveData, windowContext);
  renderCurveTable(curveData, windowContext);
  renderCurveStrips(curveData);
  scheduleCurveAnnotationRender();
}

function _syncCurveSliderFromChart() {
  const chart = STATE._curveChart;
  const contracts = STATE._curveSlots;
  if (!chart || !contracts || !contracts.length) return;
  const range = chart.timeScale().getVisibleRange();
  if (!range) return;
  const fromStr = typeof range.from === 'string' ? range.from : new Date(range.from * 1000).toISOString().slice(0,10);
  const toStr   = typeof range.to   === 'string' ? range.to   : new Date(range.to   * 1000).toISOString().slice(0,10);
  const maxIdx = contracts.length - 1;
  let sIdx = contracts.findIndex(s => s.time >= fromStr);
  let eIdx = contracts.findLastIndex(s => s.time <= toStr);
  if (sIdx === -1) sIdx = 0;
  if (eIdx === -1) eIdx = maxIdx;
  const startSlider = document.getElementById('curve-window-start');
  const endSlider   = document.getElementById('curve-window-end');
  const selection   = document.getElementById('curve-range-selection');
  const readoutEl   = document.getElementById('curve-range-readout');
  const helperEl    = document.getElementById('curve-range-helper');
  if (!startSlider) return;
  startSlider.value = String(sIdx); endSlider.value = String(eIdx);
  const pct = getRangeSelectionPercent(contracts.length, sIdx, eIdx);
  if (selection) { selection.style.left=`${pct.left}%`; selection.style.width=`${pct.width}%`; }
  const count = eIdx - sIdx + 1;
  if (helperEl) helperEl.textContent = count >= contracts.length ? `Full strip` : `${count} months selected`;
  if (readoutEl) readoutEl.innerHTML = `<span>${contracts[sIdx].label}</span><span style="color:var(--text-muted);">to</span><span>${contracts[eIdx].label}</span><span style="color:var(--text-muted);">|</span><span>${count} month${count!==1?'s':''}</span>`;
  if (!STATE.curveView) STATE.curveView = {};
  STATE.curveView.rangeStart = sIdx; STATE.curveView.rangeEnd = eIdx;
}

function onCurveSlider() {
  const contracts = STATE._curveSlots;
  const chart = STATE._curveChart;
  if (!contracts || !chart) return;
  if (!STATE.curveView) STATE.curveView = { rangeStart: 0, rangeEnd: null };
  const maxIdx = contracts.length - 1;
  let start = clamp(parseInt(document.getElementById('curve-window-start').value) || 0, 0, maxIdx);
  let end   = clamp(parseInt(document.getElementById('curve-window-end').value)   || 0, 0, maxIdx);
  if (start >= end) { start = Math.max(0, end - 1); document.getElementById('curve-window-start').value = String(start); }
  STATE.curveView.rangeStart = start; STATE.curveView.rangeEnd = end;
  syncCurveRangeFooter();
}
</script>
